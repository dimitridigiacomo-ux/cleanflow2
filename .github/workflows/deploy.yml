name: Deploy CleanFlow to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Gemini API key
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, json
          from pathlib import Path

          key = os.environ.get("GEMINI_KEY", "").strip()

          if not key:
              raise RuntimeError("GEMINI_API_KEY secret is empty or missing")

          if not key.startswith("AIza"):
              raise RuntimeError(f"GEMINI_API_KEY does not look like a Gemini key (got: {key[:6]}...)")

          path = Path("index.html")
          content = path.read_text(encoding="utf-8")

          placeholder = '"__GEMINI_API_KEY__"'
          count = content.count(placeholder)

          if count != 1:
              raise RuntimeError(f"Expected exactly 1 quoted placeholder, found {count}")

          content = content.replace(placeholder, json.dumps(key))
          path.write_text(content, encoding="utf-8")

          print(f"✓ Injected Gemini key: {key[:8]}... (length={len(key)})")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
