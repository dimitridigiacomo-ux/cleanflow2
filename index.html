      const scoreB = (needMaleOnTarget && clB?.gender==='m') || (needFemaleOnTarget && clB?.gender==='f') ? 0 : 1;
      if(scoreA !== scoreB) return scoreA - scoreB;
      return (getCleanerTrainingBreadth(clB)||0) - (getCleanerTrainingBreadth(clA)||0);
    });
    const combos = [];
    const gen = (start, current) => {
      if(combos.length >= MAX_DONOR_COMBINATIONS) return;
      if(current.length === releaseCount) { combos.push([...current]); return; }
      // FIX 10: iterate over sorted, not donorIds
      for(let i=start; i<sorted.length; i++){
        current.push(sorted[i]);
        gen(i+1, current);
        current.pop();
      }
    };
    gen(0, []);
    return combos.map(releasedIds => ({
      releasedIds,
      keepIds: sorted.filter(id => !releasedIds.includes(id)),
    }));
  };

  // ── Main simulation loop ──────────────────────────────────────────────────
  const suggestions = [];
  const seenSuggestionKeys = new Set();

  for(const donor of donorJobs){
    const fbConfig     = getCheckoutFallbackConfig(donor);
    const donorIds     = dedupeCleanerIds(donor.cleanerIds);
    const donorGenReq  = getJobGenderRequirement(donor);
    const donorOriginalWorkerHours = donorIds.length * getJobOperationalDuration(donor); // FIX 9

    for(const target of targetJobs){
      if(target.id === donor.id) continue;
      const targetOrigIds    = dedupeCleanerIds(target.cleanerIds);
      const targetRequired   = getJobRequiredCleaners(target);
      const targetGenReq     = getJobGenderRequirement(target);
      const origMissingCount = Math.max(0, targetRequired - targetOrigIds.length);
      const origGenderOk     = genderRequirementMet(target, targetOrigIds);
      const origSeniorOk     = seniorRequirementMet(target, targetOrigIds); // Fix 10M-C
      // FIX 5: compute missing slots to cap selection
      const missingSlots     = Math.max(0, targetRequired - targetOrigIds.length);
      const existingHaveM    = targetOrigIds.filter(id=>(CLEANERS.find(c=>c.id===id)||{}).gender==='m').length;
      const existingHaveF    = targetOrigIds.filter(id=>(CLEANERS.find(c=>c.id===id)||{}).gender==='f').length;
      const existingHaveSr   = countTeamSenior(targetOrigIds).senior; // Fix 10M-C
      const needMale   = Math.max(0, Number(targetGenReq.male)   - existingHaveM);
      const needFemale = Math.max(0, Number(targetGenReq.female) - existingHaveF);
      const needSenior = Math.max(0, Number(getJobSeniorRequirement(target).senior) - existingHaveSr); // Fix 10M-C

      const combos = getReleaseCombinations(donorIds, fbConfig.cleaners, target);

      for(const { releasedIds, keepIds } of combos){
        diagnostics.simulationsTried++;

        // FIX 10: stable key using pre-sorted copy
        const sortedReleasedIds = [...releasedIds].sort();

        // ── FIX 8: Full donor validation after fallback conversion ───────────
        // Build a tentative simulated jobs list with donor removed (cleaner hours excluded)
        const simJobsNoDonor = jobs.filter(j=>j.id!==donor.id);
        // Check every keepId cleaner is still valid for the fallback donor slot
        const donorKeepCleaners = keepIds.map(id=>CLEANERS.find(c=>c.id===id)).filter(Boolean);
        if(donorKeepCleaners.length !== fbConfig.cleaners) continue;
        const simDonor = {
          ...donor,
          cleanerIds: keepIds,
          cleanersRequired: fbConfig.cleaners,
          duration: fbConfig.duration,
          fallbackUsed: true,
          fallbackOriginalCleanersRequired: getJobRequiredCleaners(donor),
          fallbackOriginalDuration: getJobOperationalDuration(donor),
        };
        if(!genderRequirementMet(simDonor, keepIds)) continue;
        if(!seniorRequirementMet(simDonor, keepIds)) continue; // Fix 10M-C: donor must stay senior-valid
        const simJobsWithFallbackDonor = [...simJobsNoDonor, simDonor];
        // Validate each keeper against the fallback slot
        let donorInvalid = false;
        for(const cl of donorKeepCleaners){
          if(!isDonorCleanerValidForFallback(cl, simDonor, fbConfig, simJobsNoDonor)){
            donorInvalid = true; break;
          }
        }
        if(donorInvalid) continue;

        // ── FIX 4: All released cleaners must go to target; none disappear ───
        const releasedCleaners = releasedIds.map(id=>CLEANERS.find(c=>c.id===id)).filter(Boolean);
        // Validate which released cleaners can be added to target using simulated hours
        const validForTarget = releasedCleaners.filter(cl =>
          canAddCleanerToTarget(cl, target, simJobsWithFallbackDonor)
        );
        // FIX 4: All released cleaners must be placed on the target; if any can't → reject
        if(validForTarget.length !== releasedCleaners.length) continue;
        if(validForTarget.length === 0) continue;

        // ── FIX 5 + Fix 10M-C: Senior-aware selection capped at missingSlots ──
        // Use contribution-score approach so a senior male satisfies both senior+male.
        const selectedForTarget = [];
        const taken = new Set(targetOrigIds);
        let currentTargetIds = [...targetOrigIds];
        // Greedy: pick cleaners that contribute to unmet requirements first.
        const maxIter = validForTarget.length + 1;
        for(let iter = 0; iter < maxIter && selectedForTarget.length < missingSlots; iter++){
          const deficits = getTeamRequirementDeficits(target, currentTargetIds);
          const hasReqs = deficits.senior > 0 || deficits.male > 0 || deficits.female > 0;
          let best = null; let bestScore = -1;
          for(const cl of validForTarget){
            if(taken.has(cl.id)) continue;
            const score = hasReqs ? getCleanerRequirementContribution(cl, deficits) : 0;
            if(hasReqs && score === 0) continue; // skip non-contributors during req phase
            // Note: cap already enforced by canAddCleanerToTarget() → validForTarget filter above.
            if(score > bestScore){ best = cl; bestScore = score; }
            else if(score === bestScore && best) break;
          }
          if(!best) break;
          selectedForTarget.push(best); taken.add(best.id);
          currentTargetIds = [...currentTargetIds, best.id];
        }
        // Fill remaining optional count slots if requirements are met.
        for(const cl of validForTarget){
          if(selectedForTarget.length >= missingSlots) break;
          if(taken.has(cl.id)) continue;
          const deficits = getTeamRequirementDeficits(target, currentTargetIds);
          if(deficits.senior > 0 || deficits.male > 0 || deficits.female > 0) continue; // requirements still unmet, don't fill optional yet
          // Note: cap already enforced by canAddCleanerToTarget() → validForTarget filter above.
          selectedForTarget.push(cl); taken.add(cl.id);
          currentTargetIds = [...currentTargetIds, cl.id];
        }
        // FIX 4: selectedForTarget must exactly match all released cleaners
        if(selectedForTarget.length !== releasedCleaners.length) continue;
        const actualReleasedIds = selectedForTarget.map(c=>c.id);
        const donorKeepIds = donorIds.filter(id => !actualReleasedIds.includes(id));
        if(donorKeepIds.length !== fbConfig.cleaners) continue;

        // Build final simulated state
        const newTargetIds    = dedupeCleanerIds([...targetOrigIds, ...actualReleasedIds]);
        const newMissingCount = Math.max(0, targetRequired - newTargetIds.length);
        const newGenderOk     = genderRequirementMet(target, newTargetIds);
        const newSeniorOk     = seniorRequirementMet(target, newTargetIds); // Fix 10M-C
        const genderFixed     = !origGenderOk && newGenderOk;
        const seniorFixed     = !origSeniorOk && newSeniorOk; // Fix 10M-C
        const fullyFixed      = newTargetIds.length >= targetRequired && newGenderOk && newSeniorOk;
        if(newMissingCount >= origMissingCount && !genderFixed && !seniorFixed) continue;

        const simTarget     = { ...target, cleanerIds: newTargetIds, status: fullyFixed?'assigned':'needs_review' };
        const simulatedJobs = simJobsWithFallbackDonor.map(j=>j.id===target.id?simTarget:j);

        // ── FIX 6: Real conflict comparison using shared helpers ─────────────
        const simConflicts = detectConflicts(simulatedJobs);
        const donorBaseReal   = getRealIssues(baselineConflicts, donor.id);
        const targetBaseReal  = getRealIssues(baselineConflicts, target.id);
        const donorSimReal    = getRealIssues(simConflicts, simDonor.id);
        const targetSimReal   = getRealIssues(simConflicts, simTarget.id);
        if(donorSimReal.length  > donorBaseReal.length)  continue;
        if(targetSimReal.length > targetBaseReal.length) continue;
        // Fix 10M-C: seniority is review-only in detectConflicts but is a hard
        // acceptance gate here — explicitly reject if donor/target senior coverage fails.
        if(!seniorRequirementMet(simDonor, donorKeepIds)) continue;
        if(!seniorRequirementMet(simTarget, newTargetIds) && getJobSeniorRequirement(target).senior > 0) continue;

        // ── FIX 7 + Fix 10M-C: Check all affected jobs ───────────────────────
        const affectedCleanerIds = new Set([...actualReleasedIds, ...donorKeepIds]);
        let affectedJobInvalid = false;
        for(const affId of affectedCleanerIds){
          const affJobs = simulatedJobs.filter(j=>(j.cleanerIds||[]).includes(affId) && j.id!==donor.id && j.id!==target.id);
          for(const aj of affJobs){
            const baseReal = getRealIssues(baselineConflicts, aj.id);
            const simReal  = getRealIssues(simConflicts, aj.id);
            if(simReal.length > baseReal.length){ affectedJobInvalid = true; break; }
            // Fix 10M-C: reject if affected job loses required senior coverage.
            if(getJobSeniorRequirement(aj).senior > 0){
              const wasOk = seniorRequirementMet(aj, (jobs.find(j=>j.id===aj.id)||aj).cleanerIds||[]);
              const nowOk = seniorRequirementMet(aj, aj.cleanerIds||[]);
              if(wasOk && !nowOk){ affectedJobInvalid = true; break; }
            }
          }
          if(affectedJobInvalid) break;
        }
        if(affectedJobInvalid) continue;

        // ── FIX 5/4: Deduplication key ────────────────────────────────────────
        const key = `${donor.id}|${target.id}|${sortedReleasedIds.join(',')}`;
        if(seenSuggestionKeys.has(key)) continue;
        seenSuggestionKeys.add(key);

        // ── FIX 9: Correct worker-hours calculation ───────────────────────────
        const donorFallbackWorkerHours     = donorKeepIds.length * fbConfig.duration;
        const donorAdditionalWorkerHours   = donorFallbackWorkerHours - donorOriginalWorkerHours;
        const warnings = [];
        if(donorAdditionalWorkerHours > 0)  warnings.push(`Il fallback aumenta le ore cleaner di ${donorAdditionalWorkerHours}h.`);
        if(donorAdditionalWorkerHours === 0) warnings.push('Nessuna variazione di ore cleaner sul donor.');
        if(donorAdditionalWorkerHours < 0)  warnings.push(`Il fallback riduce le ore cleaner di ${Math.abs(donorAdditionalWorkerHours)}h.`);
        if(!fullyFixed) warnings.push('Il target rimane needs_review dopo la riallocazione.');
        warnings.push('Decisione supervisore richiesta. Nessuna modifica applicata automaticamente.');

        const donorName      = getJobDisplayName(donor);
        const targetName     = getJobDisplayName(target);
        const releasedNames  = selectedForTarget.map(c=>c.name).join(', ');
        const explanation = [
          `Converti ${donorName} da ${getJobRequiredCleaners(donor)} cleaners × ${getJobOperationalDuration(donor)}h`,
          `al fallback ${fbConfig.cleaners} cleaners × ${fbConfig.duration}h.`,
          `Libera ${releasedNames} e assegna${selectedForTarget.length>1?'li':'lo'} a ${targetName}.`,
          fullyFixed
            ? `${donorName} resta coperta e ${targetName} passa da needs_review ad assigned.`
            : `${targetName} migliora (${origMissingCount}→${newMissingCount} slot mancanti${genderFixed?' + gender fix':''}).`,
        ].join(' ');

        suggestions.push({
          id: `fr_${donor.id}_${target.id}_${sortedReleasedIds.join('_')}`,
          type: 'fallback_reallocation',
          targetJobId: target.id,
          targetPropertyName: targetName,
          targetDay: target.day,
          targetStartTime: target.startTime,
          donorJobId: donor.id,
          donorPropertyName: donorName,
          donorDay: donor.day,
          donorStartTime: donor.startTime,
          donorOriginalCleanersRequired: getJobRequiredCleaners(donor),
          donorFallbackCleanersRequired: fbConfig.cleaners,
          donorOriginalDuration: getJobOperationalDuration(donor),
          donorFallbackDuration: fbConfig.duration,
          donorOriginalCleanerIds: donorIds,
          donorFallbackCleanerIds: donorKeepIds,
          releasedCleanerIds: actualReleasedIds,
          releasedCleanerNames: selectedForTarget.map(c=>c.name),
          targetOriginalCleanerIds: targetOrigIds,
          targetSuggestedCleanerIds: newTargetIds,
          targetWasFullyUnassigned: targetOrigIds.length === 0,
          targetOriginalMissingCount: origMissingCount,
          targetNewMissingCount: newMissingCount,
          targetGenderFixed: genderFixed,
          targetSeniorFixed: seniorFixed, // Fix 10M-C
          targetFullyFixed: fullyFixed,
          donorAdditionalWorkerHours,
          warnings,
          explanation,
          _score: [
            fullyFixed ? 0 : 1,
            genderFixed ? 0 : 1,
            newMissingCount,
            -selectedForTarget.length,
            -getJobRequiredCleaners(donor),
            donorAdditionalWorkerHours,
            DAYS.indexOf(target.day),
            t2m(target.startTime),
            t2m(donor.startTime),
          ],
        });
        diagnostics.validSuggestions++;
      }
    }
  }

  suggestions.sort((a,b) => {
    for(let i=0; i<a._score.length; i++){
      if(a._score[i] !== b._score[i]) return a._score[i] - b._score[i];
    }
    return (a.donorJobId+a.targetJobId).localeCompare(b.donorJobId+b.targetJobId);
  });
  suggestions.forEach(s=>delete s._score);
  return { suggestions, diagnostics };
};

const exportWIW = (jobs, weekOffset, conflicts) => {
  const dates = getWeekDates(weekOffset);
  const rows = [['First Name','Last Name','Date','Start Time','End Time','Job Site','Position','Notes','Type']];
  const sorted=[...jobs].sort((a,b)=>{
    const dd=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    if(dd!==0) return dd;
    return sortJobsByPropertyDisplayOrder(a,b);
  });
  sorted.forEach(job=>{
    const prop=PROPERTIES.find(p=>p.id===job.propertyId);
    const di=DAYS.indexOf(job.day);
    if(!job.dateISO) console.warn('[CleanFlow] Job missing dateISO, falling back to selected week', job);
    // Guard: if job.day is invalid (di===-1) or dateISO fails to parse, dates[di] would be
    // undefined and fmtDate would crash with "Cannot read properties of undefined (reading 'getMonth')".
    // Use a safe chain: parsed dateISO → week array fallback (only when di valid) → empty string.
    const parsedDate = job.dateISO ? parseISODateLocal(job.dateISO) : null;
    const fallbackDate = di >= 0 ? dates[di] : null;
    const dateStr = (parsedDate || fallbackDate) ? fmtDate(parsedDate || fallbackDate) : '';
    // Defensive guards — prevent "12:undefined AM" / "12:NaN AM" on fantasy jobs.
    const validStart = isExportHHMM(job.startTime);
    if(!validStart) console.warn('[WIW export] Job missing/invalid startTime', job);
    const start = validStart ? fmtAMPM(job.startTime) : '';
    const end   = validStart ? fmtAMPM(m2t(getJobOperationalEndMinutes(job))) : '';
    // Safe site name — fall back through known fields rather than emitting "Unknown location".
    const rawSiteName = getJobDisplayName(job);
    const siteName = (rawSiteName && rawSiteName !== 'Unknown location')
      ? rawSiteName
      : (job.displayName || job.temporaryLocationName || job.propertyId || 'UNKNOWN LOCATION');
    // Mark conflicted jobs by prefixing the existing Notes field — no new column,
    // so the sheet stays compatible with WIW import.
    const issues=conflicts?.get?.(job.id)||[];
    const conflictText=issues.length>0?`⚠ CONFLICT: ${issues.map(i=>i.msg).filter(Boolean).join(' · ')}`:'';
    // Export-validity warnings for invalid rows (defensive last resort, appended after conflict text).
    const exportWarnings = [];
    if(!validStart) exportWarnings.push('EXPORT WARNING: missing/invalid start time');
    if(siteName === 'UNKNOWN LOCATION') exportWarnings.push('EXPORT WARNING: missing/invalid job site');
    const warningText = exportWarnings.join(' · ');
    const baseNote = job.note || '';
    const noteOut = [conflictText, warningText, baseNote].filter(Boolean).join(' · ');
    const exportCleanerIds=dedupeCleanerIds(job.cleanerIds);
    if(exportCleanerIds.length===0){
      rows.push(['UNASSIGNED','',dateStr,start,end,siteName,'',noteOut,job.type||'']);
    } else {
      exportCleanerIds.forEach(cId=>{
        const cl=CLEANERS.find(c=>c.id===cId); if(!cl) return;
        const [first,...rest]=cl.name.split(' ');
        const cStart = validStart ? fmtAMPM(m2t(getCleanerOperationalStartMinutes(job,cId))) : '';
        const cEnd   = validStart ? fmtAMPM(m2t(getCleanerOperationalEndMinutes(job,cId))) : '';
        rows.push([first,rest.join(' '),dateStr,cStart,cEnd,siteName,cl.type==='senior'?'Senior Cleaner':'Cleaner',noteOut,job.type||'']);
      });
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:26},{wch:16},{wch:30},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Shifts');
  const filename=`CleanFlow_WhenIWork_${fmtWeek(weekOffset).replace(/[–\s]/g,'_')}.xlsx`;
  console.log('[WIW export] rows built', rows.length);
  console.log('[WIW export] workbook ready', filename);
  // Blob + <a> download is more reliable than XLSX.writeFile in mobile/PWA contexts
  // where the latter can silently fail (no visible error, no download, nothing).
  // Falls back to XLSX.writeFile if Blob or createObjectURL is unavailable.
  // Rethrows if both fail so the caller (WIWExportModal) can show a visible error toast.
  let blobOk = false;
  try {
    const wbout = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const blob = new Blob([wbout], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    blobOk = true;
  } catch(blobErr) {
    console.warn('[WIW export] Blob download failed, trying XLSX.writeFile fallback', blobErr);
    try {
      XLSX.writeFile(wb, filename);
      blobOk = true;
    } catch(writeErr) {
      console.error('[WIW export] Both download methods failed', writeErr);
      throw writeErr; // rethrow so WIWExportModal.doExport() can toast the error
    }
  }
};

// ── SPRINT 2B — SUPERVISOR PRINT EXPORT HELPERS (display-only, export-exclusive) ────
// All helpers below are pure, read-only, and used ONLY by exportSupervisorScheduleXLSX.
// None of them are read by exportWIW, the scheduler, optimizer, fallback, conflict
// engine, JobForm, or JobCard. None of them mutate jobs/cleaners/properties.

const SUPERVISOR_MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// CHECKOUT_COMPLETE/BACK_TO_BACK/PREPARE_FOR_GUEST/CHECKIN_ONLY/REFRESH_CLEAN/
// RESTAURANT_CLEAN/OFFICE_CLEAN/MAINTENANCE/TRAINING/OTHER — the full SERVICE_TYPE_IDS
// set (see SERVICE_TYPE_IDS/inferServiceTypeId). Unknown values fall back to a
// readable capitalization instead of crashing or showing "undefined".
const SUPERVISOR_SERVICE_LABELS = {
  CHECKOUT_COMPLETE: 'Checkout',
  BACK_TO_BACK: 'B2B',
  PREPARE_FOR_GUEST: 'Prepare',
  CHECKIN_ONLY: 'Check-in',
  REFRESH_CLEAN: 'Refresh',
  RESTAURANT_CLEAN: 'Restaurant',
  OFFICE_CLEAN: 'Office',
  MAINTENANCE: 'Maintenance',
  TRAINING: 'Training',
  OTHER: 'Other',
};
const getSupervisorServiceLabel = (serviceTypeId, jobType) => {
  if(serviceTypeId && SUPERVISOR_SERVICE_LABELS[serviceTypeId]) return SUPERVISOR_SERVICE_LABELS[serviceTypeId];
  const raw = serviceTypeId || jobType || '';
  if(!raw) return '';
  const words = String(raw).replace(/_/g,' ').trim().toLowerCase().split(/\s+/).filter(Boolean);
  return words.map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
};

// Compact guest string: adults=A, children=C, infants=I, pets=P (e.g. "2A+1C", "4G").
// guestSource is expected to already be the OUTPUT of getArrivalGuestDisplaySource
// (Sprint 2C, shared with the tool UI) — this helper never decides guest DIRECTION
// itself, only formatting.
const getSupervisorGuestCompact = guestSource => {
  if(!guestSource) return '';
  const toNum = v => { const n = Number(v); return Number.isFinite(n) && n>0 ? n : 0; };
  const adults = toNum(guestSource.guestAdults);
  const children = toNum(guestSource.guestChildren);
  const infants = toNum(guestSource.guestInfants);
  const pets = toNum(guestSource.guestPets);
  const hasDetail = adults>0 || children>0 || infants>0;
  const parts = [];
  if(hasDetail){
    if(adults>0) parts.push(`${adults}A`);
    if(children>0) parts.push(`${children}C`);
    if(infants>0) parts.push(`${infants}I`);
  } else {
    const count = toNum(guestSource.guestCount);
    if(count>0) parts.push(`${count}G`);
  }
  if(pets>0) parts.push(`${pets}P`);
  return parts.join('+');
};

// Builds a first-name → display-label map for every cleaner actually assigned to at
// least one job in THIS export (collision-safe: two "Anita"s become "Anita D."/"Anita
// K."; if that still collides, a short ID suffix is used as a last-resort, deterministic
// fallback). Built once per workbook so labels stay consistent across all day sheets.
const buildSupervisorCleanerNameMap = jobs => {
  const presentIds = new Set();
  (jobs||[]).forEach(j => dedupeCleanerIds(j?.cleanerIds).forEach(id => presentIds.add(id)));
  const presentCleaners = CLEANERS.filter(c => presentIds.has(c.id));
  const byFirst = {};
  presentCleaners.forEach(cl => {
    const parts = String(cl.name||'').trim().split(/\s+/).filter(Boolean);
    const first = parts[0] || cl.id;
    (byFirst[first] = byFirst[first] || []).push(cl);
  });
  const map = {};
  Object.keys(byFirst).forEach(first => {
    const group = byFirst[first];
    if(group.length === 1){
      map[group[0].id] = first;
      return;
    }
    const seen = new Set();
    group.forEach(cl => {
      const parts = String(cl.name||'').trim().split(/\s+/).filter(Boolean);
      const lastInitial = parts.length>1 ? parts[parts.length-1].charAt(0).toUpperCase() : '';
      let label = lastInitial ? `${first} ${lastInitial}.` : first;
      if(seen.has(label)) label = `${first} [${String(cl.id).slice(-4)}]`;
      seen.add(label);
      map[cl.id] = label;
    });
  });
  return map;
};

// Builds the Cleaners cell text for one job. Duty stays ONE row (never duplicated per
// cleaner). If every assigned cleaner's operational window matches the duty window,
// uses the compact "A + B + C" form; otherwise switches to one cleaner per line (\n),
// showing an explicit time range ONLY for cleaners whose window actually differs
// (manual cleaner override, manual duty override, or an early-leave suggestion — the
// operational helpers already fold in that full priority hierarchy).
const buildSupervisorCleanersCell = (job, assignedIds, nameMap) => {
  if(!assignedIds || assignedIds.length === 0) return '';
  const dutyStartMin = getJobOperationalStartMinutes(job);
  const dutyEndMin = getJobOperationalEndMinutes(job);
  const entries = assignedIds.map(id => {
    const label = nameMap[id] || 'Unknown';
    const csMin = getCleanerOperationalStartMinutes(job, id);
    const ceMin = getCleanerOperationalEndMinutes(job, id);
    const differs = csMin !== dutyStartMin || ceMin !== dutyEndMin;
    return { label, differs, timeStr: differs ? `${m2t(csMin)}–${m2t(ceMin)}` : '' };
  });
  if(!entries.some(e => e.differs)) return entries.map(e => e.label).join(' + ');
  return entries.map(e => e.differs ? `${e.label} ${e.timeStr}` : e.label).join('\n');
};

// Short, print-friendly warning + manual-note combiner. Staffing/gender/seniority
// shortfalls (UNASSIGNED/MISSING N/REVIEW) are kept separate from true scheduling
// clashes (CONFLICT), matching the existing real-conflict taxonomy
// (REVIEW_ONLY_CONFLICT_TYPES / getRealConflictIssues) — never mixed together.
// Hostaway boilerplate ("Hostaway checkout · Res 12345 · arrival 16:00", etc.) is
// stripped out; any genuinely operational fragment (e.g. a back-to-back window
// instruction) and any manual free-text note are preserved. job.note itself is never
// modified — this only builds a local display string.
const getSupervisorNotesCompact = (job, conflicts, assignedCount) => {
  const required = getJobRequiredCleaners(job);
  const warnings = [];
  if(assignedCount === 0) warnings.push('UNASSIGNED');
  else if(assignedCount < required) warnings.push(`MISSING ${required-assignedCount}`);
  else if(calcJobStatus(job) === 'needs_review') warnings.push('REVIEW');
  if(getRealConflictIssues(conflicts, job.id).length > 0) warnings.push('CONFLICT');

  const rawNote = String(job?.note || '').trim();
  const isBoilerplateSegment = seg => {
    const s = seg.trim();
    if(!s) return true;
    if(/^Hostaway\s/i.test(s)) return true;
    if(/^Res\s*\S+$/i.test(s)) return true;
    if(/^arrival\s/i.test(s)) return true;
    return false;
  };
  const manualNote = rawNote
    ? rawNote.split('·').map(s=>s.trim()).filter(s=>!isBoilerplateSegment(s)).join(' · ')
    : '';

  return [manualNote, warnings.join(' ')].filter(Boolean).join(' · ');
};

// Compact row height (points) for the !rows array, based on how many lines the
// Cleaners/Notes/Property cell text actually needs (newline-separated). Kept small —
// this is a printed operational sheet, not a diagnostic report.
const getSupervisorRowHeight = (cleanersText, notesText, propertyText) => {
  const lines = Math.max(
    1,
    String(cleanersText||'').split('\n').length,
    String(notesText||'').split('\n').length,
    String(propertyText||'').split('\n').length
  );
  return lines <= 1 ? 18 : Math.min(60, 14 + lines*10);
};

// ── SUPERVISOR SCHEDULE XLSX EXPORT ───────────────────────────────────────────
// One worksheet per day (Mon–Sun), optimised for human reading.
// Does NOT affect exportWIW() or the WIW/When-I-Work import format in any way.
const exportSupervisorScheduleXLSX = (jobs, weekOffset, conflicts) => {
  const dates = getWeekDates(weekOffset);
  const filename = `CleanFlow_Supervisor_Schedule_${fmtWeek(weekOffset).replace(/[–\s]/g,'_')}.xlsx`;
  const wb = XLSX.utils.book_new();
  wb.Workbook = wb.Workbook || {};
  wb.Workbook.Names = wb.Workbook.Names || [];
  // Sprint 2B: compact print layout — 7 operational columns only (no diagnostic
  // Hours/Status/Origin/Issues columns; that information is folded into Notes as
  // short warnings, and Total hours moves to the daily-summary row instead of a
  // per-row column).
  const COL_WIDTHS = [{wch:7},{wch:7},{wch:22},{wch:13},{wch:10},{wch:34},{wch:28}];
  const NUM_COLS = 7;
  const HEADER = ['Start','End','Property','Service','Guests','Cleaners','Notes'];
  // Built once for the whole workbook so cleaner-name disambiguation stays consistent
  // across every day sheet (Sprint 2B collision rule).
  const nameMap = buildSupervisorCleanerNameMap(jobs);

  let sheetIdx = 0;
  DAYS.forEach((day, di) => {
    const date = dates[di];
    // Sprint 2B: full English weekday + date (e.g. "Monday 20 July 2026"). Uses the
    // SAME local Date object already produced by getWeekDates()/getMondayOf() — local
    // getDate()/getMonth()/getFullYear() only, no UTC conversion, so the day never
    // shifts relative to Malta time.
    const dayLabel = date
      ? `${DAY_EN[day]||day} ${date.getDate()} ${SUPERVISOR_MONTH_NAMES[date.getMonth()]} ${date.getFullYear()}`
      : (DAY_EN[day]||day);
    const sheetName = DAY_EN[day] || day;

    // Sprint 2B ordering (declared change from the previous propertyDisplayOrder-first
    // sort): start time first, then property display order, then property name, then
    // job ID as a final deterministic tie-break. Never sorts the source `jobs` array
    // in place — always a fresh local copy.
    const dayJobs = [...jobs.filter(j => j.day === day)].sort((a, b) => {
      const ta = getJobOperationalStartMinutes(a), tb = getJobOperationalStartMinutes(b);
      if(ta !== tb) return ta - tb;
      const oa = getPropertyDisplayOrder(a.propertyId), ob = getPropertyDisplayOrder(b.propertyId);
      if(oa !== ob) return oa - ob;
      const na = getJobDisplayName(a), nb = getJobDisplayName(b);
      if(na !== nb) return na.localeCompare(nb);
      return String(a.id||'').localeCompare(String(b.id||''));
    });

    // Sprint 2B declared behavior change: days with zero jobs do NOT get a sheet at
    // all (previous behavior created a sheet with a single "No jobs scheduled" row
    // for every day of the week, even empty ones).
    if(dayJobs.length === 0) return;

    // Daily summary — worker HOURS (sum of each assigned cleaner's own effective
    // duration, respecting manual overrides/early-leave), not duty-hours × headcount.
    const totalJobs = dayJobs.length;
    const totalUnassigned = dayJobs.filter(j => dedupeCleanerIds(j.cleanerIds).length === 0).length;
    const totalNeedsReview = dayJobs.filter(j => {
      const n = dedupeCleanerIds(j.cleanerIds).length;
      return n > 0 && calcJobStatus(j) === 'needs_review';
    }).length;
    const totalHrsRaw = dayJobs.reduce((sum, j) => {
      const ids = dedupeCleanerIds(j.cleanerIds);
      return sum + ids.reduce((s, id) => s + getCleanerEffectiveJobDuration(j, id), 0);
    }, 0);
    const totalHrs = Math.round(totalHrsRaw * 10) / 10;
    const summaryStr = `Jobs: ${totalJobs}    Unassigned: ${totalUnassigned}    Needs review: ${totalNeedsReview}    Total hours: ${totalHrs}`;

    // Row layout: Row1=title, Row2=date, Row3=summary, Row4=header, Row5+=jobs.
    // No blank row — "nessuna riga vuota non necessaria" per spec.
    const rows = [
      ['CleanFlow Supervisor Schedule', ...Array(NUM_COLS-1).fill('')],
      [dayLabel, ...Array(NUM_COLS-1).fill('')],
      [summaryStr, ...Array(NUM_COLS-1).fill('')],
      HEADER,
    ];
    const rowHeights = [22, 18, 18, 18];

    dayJobs.forEach(job => {
      const validStart = isExportHHMM(job.startTime);
      const start = validStart ? m2t(getJobOperationalStartMinutes(job)) : '';
      const end   = validStart ? m2t(getJobOperationalEndMinutes(job)) : '';
      const property = getJobDisplayName(job);
      const service  = getSupervisorServiceLabel(job.serviceTypeId, job.type);
      const guestSource = getArrivalGuestDisplaySource(job);
      const guests = getSupervisorGuestCompact(guestSource);
      const assignedIds = dedupeCleanerIds(job.cleanerIds);
      const cleaners = buildSupervisorCleanersCell(job, assignedIds, nameMap);
      const notes = getSupervisorNotesCompact(job, conflicts, assignedIds.length);
      rows.push([start, end, property, service, guests, cleaners, notes]);
      rowHeights.push(getSupervisorRowHeight(cleaners, notes, property));
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = COL_WIDTHS;
    // Title / date / summary rows span all 7 columns (A:G). Never overlaps the header
    // row (row index 3) or any job row.
    ws['!merges'] = [
      { s:{r:0,c:0}, e:{r:0,c:NUM_COLS-1} },
      { s:{r:1,c:0}, e:{r:1,c:NUM_COLS-1} },
      { s:{r:2,c:0}, e:{r:2,c:NUM_COLS-1} },
    ];
    // Row heights (points), one entry per row, in the compact ranges requested
    // (title 20–24, date/summary/header ~18, job rows 18+ scaled by line count).
    ws['!rows'] = rowHeights.map(hpt => ({ hpt }));
    // Print setup: A4 landscape, fit to one page wide × one page tall, minimal margins.
    // NOTE (see Sprint 2B report): whether xlsx 0.18.5's writer actually serializes
    // !pageSetup/!margins into the generated .xlsx could not be verified by inspecting
    // the output archive in this environment (no network/library access) — implemented
    // per SheetJS's documented Worksheet Object Model; requires a physical print-preview
    // check before being relied upon.
    ws['!margins'] = { left:0.2, right:0.2, top:0.25, bottom:0.25, header:0.1, footer:0.1 };
    ws['!pageSetup'] = { paperSize:9, orientation:'landscape', fitToWidth:1, fitToHeight:1, scale:100 };
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    // Print area limited to the actual content (A1:G<lastRow>) via the standard
    // SheetJS defined-name mechanism. Same verification caveat as above.
    wb.Workbook.Names.push({
      Name: '_xlnm.Print_Area',
      Sheet: sheetIdx,
      Ref: `'${sheetName}'!$A$1:$G$${rows.length}`,
    });
    sheetIdx++;
  });

  // Safety net: if every day of the selected week has zero jobs, the loop above would
  // otherwise produce a workbook with no sheets at all, which XLSX.write cannot
  // serialize. A single explanatory sheet keeps the workbook valid and openable.
  if(sheetIdx === 0){
    const ws = XLSX.utils.aoa_to_sheet([
      ['CleanFlow Supervisor Schedule', ...Array(NUM_COLS-1).fill('')],
      ['No jobs scheduled this week', ...Array(NUM_COLS-1).fill('')],
    ]);
    ws['!cols'] = COL_WIDTHS;
    ws['!merges'] = [
      { s:{r:0,c:0}, e:{r:0,c:NUM_COLS-1} },
      { s:{r:1,c:0}, e:{r:1,c:NUM_COLS-1} },
    ];
    XLSX.utils.book_append_sheet(wb, ws, 'Week');
  }

  console.log('[Supervisor export] workbook ready', filename);
  try {
    const wbout = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const blob = new Blob([wbout], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  } catch(blobErr) {
    console.warn('[Supervisor export] Blob failed, trying XLSX.writeFile fallback', blobErr);
    try { XLSX.writeFile(wb, filename); }
    catch(writeErr) { console.error('[Supervisor export] Both download methods failed', writeErr); throw writeErr; }
  }
};


function Toast({toast}){
  if(!toast) return null;
  const bg=toast.type==='error'?C.conflict:toast.type==='warn'?C.warn:C.ok;
  return(
    <div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',zIndex:600,
      background:bg,color:'white',borderRadius:14,boxShadow:'0 4px 20px rgba(0,0,0,0.28)',
      whiteSpace:'nowrap',animation:'toastIn 0.25s ease',display:'flex',alignItems:'stretch',overflow:'hidden',pointerEvents:'auto'}}>
      <span style={{padding:'11px 16px',fontSize:14,fontWeight:700}}>{toast.msg}</span>
      {toast.onUndo&&<button onClick={toast.onUndo} style={{background:'rgba(255,255,255,0.22)',border:'none',borderLeft:'1px solid rgba(255,255,255,0.2)',color:'white',fontWeight:800,fontSize:13,padding:'0 16px',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>}
    </div>
  );
}

function Modal({children,onClose}){

    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:C.card,borderRadius:'22px 22px 0 0',padding:'8px 24px 36px',width:'100%',maxWidth:600,maxHeight:'93vh',overflowY:'auto'}}>
        <div style={{width:40,height:4,background:'#DDD',borderRadius:2,margin:'12px auto 20px'}}/>

// ── OVERWRITE DIFF MODAL ───────────────────────────────────────────────────────
// Shown only when publishing a week that another device republished after we
// loaded it (serverVersionChanged). Compares local jobs vs the freshly-refetched
// published snapshot by operational key, so the supervisor sees what an overwrite
// would lose before confirming. Frontend-only; no backend involvement.
function OverwriteDiffModal({localJobs, publishedJobs, onConfirm, onClose}){
  const fmtJob = (job) => {
    const when = `${DAY_IT[job.day]||job.day||''}${job.dateISO?` ${job.dateISO}`:''} · ${job.startTime||'—'}`;
    const cleaners = (job.cleanerIds||[])
      .map(id=>CLEANERS.find(c=>c.id===id)?.name?.split(' ')[0])
      .filter(Boolean).join(', ');
    const svc = job.serviceTypeId || job.type || '';
    return { name:getJobDisplayName(job), when, cleaners, svc };
  };

  const localKeys = new Map((localJobs||[]).map(j=>[getJobOperationalKey(j), j]));
  const serverKeys = new Map((publishedJobs||[]).map(j=>[getJobOperationalKey(j), j]));
  const lost   = [...serverKeys].filter(([k])=>!localKeys.has(k)).map(([,j])=>j);   // in published, not local
  const onlyMine = [...localKeys].filter(([k])=>!serverKeys.has(k)).map(([,j])=>j); // in local, not published
  const commonCount = [...localKeys].filter(([k])=>serverKeys.has(k)).length;

  // Display-layer diff for jobs present in BOTH versions (same operational key)
  // but changed in assignment/metadata. getJobOperationalKey stays assignment-
  // independent (used elsewhere for dedup), so we compare these fields here only.
  const sortedIds = ids => [...(ids||[])].map(String).sort().join(',');
  const cleanersFirstNames = job => (job.cleanerIds||[])
    .map(id=>CLEANERS.find(c=>c.id===id)?.name?.split(' ')[0])
    .filter(Boolean).join(', ') || '—';
  const modified = [...localKeys]
    .filter(([k])=>serverKeys.has(k))
    .map(([k, localJob])=>{
      const serverJob = serverKeys.get(k);
      const cleanersDiffer = sortedIds(localJob.cleanerIds) !== sortedIds(serverJob.cleanerIds);
      const noteDiffers = (localJob.note||'') !== (serverJob.note||'');
      const statusDiffers = (localJob.status||'') !== (serverJob.status||'');
      const priorityDiffers = (localJob.priority||'') !== (serverJob.priority||'');
      if(cleanersDiffer || noteDiffers || statusDiffers || priorityDiffers){
        return { localJob, serverJob, cleanersDiffer, noteDiffers, statusDiffers, priorityDiffers };
      }
      return null;
    })
    .filter(Boolean);

  const Row = ({job, tone}) => {
    const f = fmtJob(job);
    return (
      <div style={{padding:'8px 10px',borderRadius:8,background:tone==='lost'?'#FEF2F2':'#F0FDF4',border:`1px solid ${tone==='lost'?'#FECACA':'#BBF7D0'}`,marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>
          {f.when}{f.svc?` · ${f.svc}`:''}{f.cleaners?` · 👤 ${f.cleaners}`:' · non assegnato'}
        </div>
      </div>
    );
  };

  return (<>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>⚠️ Stai per sovrascrivere una versione più recente</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
      Un altro dispositivo ha pubblicato questa settimana dopo che l'hai caricata. Controlla cosa cambia prima di confermare.
    </div>

    <div style={{fontSize:13,fontWeight:800,color:C.conflict,margin:'4px 0 8px'}}>
      🗑 Turni che verranno persi se sovrascrivi ({lost.length})
    </div>
    {lost.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno — la tua versione contiene tutti i turni della versione pubblicata.</div>
      : <div style={{marginBottom:12}}>{lost.map((j,i)=><Row key={'l'+i} job={j} tone="lost"/>)}</div>}

    <div style={{fontSize:13,fontWeight:800,color:'#166534',margin:'4px 0 8px'}}>
      ➕ Turni presenti solo nella tua versione ({onlyMine.length})
    </div>
    {onlyMine.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno.</div>
      : <div style={{marginBottom:12}}>{onlyMine.map((j,i)=><Row key={'m'+i} job={j} tone="mine"/>)}</div>}

    <div style={{fontSize:13,fontWeight:800,color:'#92400E',margin:'4px 0 8px'}}>
      ✏️ Turni modificati in entrambe le versioni ({modified.length})
    </div>
    {modified.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno.</div>
      : <div style={{marginBottom:12}}>{modified.map((m,i)=>{
          const f = fmtJob(m.localJob);
          return (
            <div key={'mod'+i} style={{padding:'8px 10px',borderRadius:8,background:'#FFFBEB',border:'1px solid #FCD34D',marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{f.when}{f.svc?` · ${f.svc}`:''}</div>
              {m.cleanersDiffer && <div style={{fontSize:11,color:'#92400E',marginTop:4}}>
                👤 Loro: {cleanersFirstNames(m.serverJob)} · Tua versione: {cleanersFirstNames(m.localJob)}
              </div>}
              {m.noteDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>📝 Note diverse</div>}
              {m.statusDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>🔖 Stato diverso ({m.serverJob.status||'—'} → {m.localJob.status||'—'})</div>}
              {m.priorityDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>⚑ Priorità diversa</div>}
            </div>
          );
        })}</div>}

    <div style={{fontSize:11,color:C.muted,marginBottom:18}}>Turni in comune: {commonCount}{modified.length>0?` (di cui ${modified.length} modificati)`:''}</div>

    <div style={{display:'flex',gap:10}}>
      <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
      <button onClick={onConfirm} style={{flex:1,padding:'12px',borderRadius:10,background:C.conflict,color:'white',fontWeight:800,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Pubblica e sovrascrivi</button>
    </div>
  </>);
}
