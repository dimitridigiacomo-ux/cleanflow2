// Dedupe a cleanerIds array: drop falsy entries, coerce to string, remove duplicates.
const dedupeCleanerIds = ids => [...new Set((Array.isArray(ids) ? ids : []).filter(Boolean).map(String))];

// ── CONFLICT ENGINE ─────────────────────────────────────────────────────────────
const detectConflicts = jobs => {
  const out = new Map();
  const add = (id, issue) => { if(!out.has(id)) out.set(id,[]); out.get(id).push(issue); };
  jobs.forEach(job => {
    const jobCleanerIds=dedupeCleanerIds(job.cleanerIds);
    const jS=t2m(job.startTime), jE=jS+getJobDuration(job)*60;
    const required=getJobRequiredCleaners(job);
    if(jobCleanerIds.length<required)
      add(job.id,{type:'staffing',msg:`Richiede ${required} cleaner${required>1?'s':''} — assegnate solo ${jobCleanerIds.length}`});
    // Gender requirement: enforced for NON-locked jobs only. Locked template jobs are
    // authoritative and never blocked on gender (diagnostic-only).
    {
      const genReq=getJobGenderRequirement(job);
      if(genReq.male>0 || genReq.female>0){
        const have=countTeamGender(jobCleanerIds);
        const locked=isLockedTemplateJob(job);
        const pass=have.male>=genReq.male && have.female>=genReq.female;
        const prop=PROPERTIES.find(p=>p.id===job.propertyId);
        if(typeof console!=='undefined') console.debug('[gender]',{property:prop?.name||job.propertyId,jobId:job.id,source:job.source,type:job.type,requiredMale:genReq.male,requiredFemale:genReq.female,assignedMale:have.male,assignedFemale:have.female,lockedTemplate:locked,result:pass?'pass':'fail'});
        if(!pass && !locked){
          add(job.id,{type:'gender',msg:`Requisito genere non soddisfatto: servono ${genReq.male} uomini e ${genReq.female} donne, team assegnato ha ${have.male} uomini e ${have.female} donne.`});
        }
      }
    }
    // Window conflict (flexible jobs only). Fixed jobs are never window-constrained.
    if(job.flexibleWindow){
      const win=getJobSchedulingWindow(job);
      const jStart=t2m(job.startTime), jEnd=jStart+getJobDuration(job)*60;
      if(win.end){
        const wEnd=t2m(win.end);
        if(jEnd>wEnd) add(job.id,{type:'window',msg:`Fuori finestra pulizia: il turno deve finire entro ${win.end}.`});
      }
      if(win.start && /^\d{1,2}:\d{2}$/.test(win.start)){
        const wStart=t2m(win.start);
        if(jStart<wStart) add(job.id,{type:'window',msg:`Fuori finestra pulizia: il turno non può iniziare prima di ${win.start}.`});
      }
    }
    jobCleanerIds.forEach(cId=>{
      const cl=CLEANERS.find(c=>c.id===cId); if(!cl) return;
      if(!cl.days.includes(job.day)) add(job.id,{type:'unavailable',cId,msg:`${cl.name}: non disponibile ${DAY_IT[job.day]}`});
      // Holiday / off period — only checkable when the job carries a concrete date.
      if(job.dateISO && isCleanerUnavailableOnDate(cl, job.dateISO))
        add(job.id,{type:'unavailable',cId,msg:`${cl.name}: assente/ferie il ${job.dateISO}`});
      // Training check only for jobs with a known property
      if(jobRequiresTraining(job)&&!TRAINING[cId]?.includes(job.propertyId))
        add(job.id,{type:'untrained',cId,msg:`${cl.name}: non formata per ${getJobDisplayName(job)}`});
      // Overlap: temporary jobs block cleaner slots too — no prop required.
      // Flag BOTH overlapping jobs so each job's card shows the conflict
      // (previously only the earlier job was flagged).
      jobs.filter(o=>o.id!==job.id&&o.day===job.day&&o.cleanerIds.includes(cId)
      ).forEach(o=>{
        const oS=t2m(o.startTime), oE=oS+getJobDuration(o)*60;
        if(jS<oE&&jE>oS) add(job.id,{type:'overlap',cId,msg:`${cl.name}: già a ${getJobDisplayName(o)} (${o.startTime}–${m2t(oE)})`});
        else {
          // Non-overlapping: check travel buffer. Flag only on THIS job when it is the
          // later one (so each adjacent pair produces one message per job, not duplicated).
          if(jS>=oE){
            const issue=getTravelBufferIssue(cl.name, o, job);
            if(issue) add(job.id,{type:'travel',cId,msg:issue.msg});
          }
        }
      });
      // Late-shift rest rule (cross-day). Flag only on the LATER job to avoid
      // double-reporting; the earlier job is processed when its own iteration runs.
      jobs.filter(o=>o.id!==job.id&&o.cleanerIds.includes(cId)&&
        getJobAbsStartMinutes(o)<getJobAbsStartMinutes(job)
      ).forEach(o=>{
        const issue=getLateShiftRestIssue(cl.name, o, job);
        if(issue) add(job.id,{type:'late_rest',severity:'hard',cId,msg:issue.msg});
      });
    });
  });
  return out;
};

// ── Real-conflict taxonomy (display-only; detectConflicts() itself is untouched) ──
// detectConflicts() lumps staffing/gender shortfalls into the same Map as true
// scheduling clashes (overlap, travel, late_rest, unavailable, untrained, window).
// These helpers split that out for display purposes so "Conflitti" UI elements can
// show only real operational clashes, while staffing/gender stay under "Da rivedere".
// Shared by WeekView and Sidebar to avoid the two drifting out of sync.
const REVIEW_ONLY_CONFLICT_TYPES = new Set(['staffing','gender']);
const isRealConflictIssue = issue => issue && !REVIEW_ONLY_CONFLICT_TYPES.has(issue.type);
const getRealConflictIssues = (conflicts, jobId) => (conflicts?.get?.(jobId)||[]).filter(isRealConflictIssue);
const getRealConflictCount = (jobs, conflicts) => jobs.filter(j => getRealConflictIssues(conflicts, j.id).length > 0).length;

// Only flag offices and restaurants as "uncovered" — short-let without checkout is normal
const getUncovered = jobs => PROPERTIES.filter(p=>
  (p.type==='office'||p.type==='restaurant') && !jobs.some(j=>j.propertyId===p.id)
);
// All properties without any job this week (informational only)
const getAllUncovered = jobs => PROPERTIES.filter(p=>!jobs.some(j=>j.propertyId===p.id));
const computeCleanerStats = jobs => CLEANERS.map(cl=>{
  const assignedHrs=jobs.filter(j=>j.cleanerIds.includes(cl.id)).reduce((s,j)=>s+getJobDuration(j),0);
  const availDays=DAYS.filter(d=>cl.days.includes(d)).length;
  const capacityHrs=cl.weeklyHrs||availDays*MAX_HRS[cl.type];
  const pct=capacityHrs>0?Math.min(100,Math.round(assignedHrs/capacityHrs*100)):0;
  const daysWorked=new Set(jobs.filter(j=>j.cleanerIds.includes(cl.id)).map(j=>j.day)).size;
  const daysOverLimit=cl.workDays>0&&daysWorked>cl.workDays;
  return {cl,assignedHrs,capacityHrs,availDays,pct,daysWorked,daysOverLimit};
});

// ── RICHIESTE EXTRA PARSER ─────────────────────────────────────────────────────
// Reads free Italian text, extracts operational constraints.
// Returns: { daysOff, maxWeeklyHrs, maxDailyHrs, maxEndTime, parsed[] }
const parseExtraRequests = (text, weekOffset) => {
  const result = { daysOff:[], maxWeeklyHrs:null, maxDailyHrs:null, maxEndTime:null, parsed:[] };
  if (!text?.trim()) return result;

  const t = text.toLowerCase();

  // Week validity check — format "19/05/2026 – 25/05/2026" or "19/05 – 25/05"
  // (called separately, parser always runs regardless)

  // Day name map — Italian full + abbreviation
  const DAY_MAP = {
    'lunedì':'Mon','lunedi':'Mon','lun':'Mon',
    'martedì':'Tue','martedi':'Tue','mar':'Tue',
    'mercoledì':'Wed','mercoledi':'Wed','mer':'Wed',
    'giovedì':'Thu','giovedi':'Thu','gio':'Thu',
    'venerdì':'Fri','venerdi':'Fri','ven':'Fri',
    'sabato':'Sat','sab':'Sat',
    'domenica':'Sun','dom':'Sun',
  };

  // Context words that signal unavailability
  const OFF_CTX = ['riposa','riposo','fuori','non disponibile','assente','off','pausa','libera','libero'];

  // For each day name found, check if preceded (within 40 chars) by an off-context word
  Object.entries(DAY_MAP).forEach(([it,en])=>{
    const idx = t.indexOf(it);
    if(idx === -1) return;
    const before = t.slice(Math.max(0,idx-40), idx);
    if(OFF_CTX.some(ctx => before.includes(ctx)) || t.includes(`riposa ${it}`) || t.includes(`fuori ${it}`)){
      if(!result.daysOff.includes(en)){
        result.daysOff.push(en);
        result.parsed.push(`Non disponibile ${DAY_FULL[en]}`);
      }
    }
  });

  // Max daily hours: "max 6 ore al giorno", "max 6 ore giornaliere", "max 6h"
  const dailyM = t.match(/max(?:imo)?\s+(\d+(?:[.,]\d+)?)\s*(?:h\b|ore?\s*(?:al\s*giorno|giornali)?)/);
  if(dailyM){ result.maxDailyHrs=parseFloat(dailyM[1].replace(',','.')); result.parsed.push(`Max ${result.maxDailyHrs}h/giorno`); }

  // Max weekly hours: "max 30 ore questa settimana" / "max 30 ore settimanali"
  const weeklyM = t.match(/max(?:imo)?\s+(\d+)\s*ore?\s*(?:questa\s*)?settimana(?:li)?/);
  if(weeklyM){ result.maxWeeklyHrs=parseInt(weeklyM[1]); result.parsed.push(`Max ${result.maxWeeklyHrs}h/settimana`); }

  // Max end time: "max fino alle 15", "fino alle 15:30", "solo mattina" → 13:00
  const endM = t.match(/(?:max\s+)?fino\s+alle\s+(\d{1,2})(?::(\d{2}))?/);
  if(endM){ result.maxEndTime=`${endM[1].padStart(2,'0')}:${endM[2]||'00'}`; result.parsed.push(`Fine max ${result.maxEndTime}`); }
  else if(t.includes('solo mattina')||t.includes('solo la mattina')){ result.maxEndTime='13:00'; result.parsed.push('Solo mattina (max 13:00)'); }

  return result;
};

// Check if a "Valida per settimana" date range covers the current week
const isWeekValid = (weekStr, weekOffset) => {
  if(!weekStr?.trim()) return false;
  const dates = getWeekDates(weekOffset);
  const weekMon = dates[0]; const weekSun = dates[6];
  // Parse dates like "19/05/2026" or "19/05"
  const parts = weekStr.split(/[–\-—]/);
  const parseDate = s => {
    const clean = s.trim();
    const m = clean.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{4}))?/);
    if(!m) return null;
    const year = m[3] ? parseInt(m[3]) : weekMon.getFullYear();
    return new Date(year, parseInt(m[2])-1, parseInt(m[1]));
  };
  if(parts.length < 2) return false;
  const from = parseDate(parts[0]); const to = parseDate(parts[1]);
  if(!from||!to) return false;
  // Overlap: week range overlaps with validity range
  return from <= weekSun && to >= weekMon;
};

// Build constraint map: { cId: parsedResult } — only for valid weeks
const buildConstraints = (weekOffset) => {
  const out = {};
  CLEANERS.forEach(cl => {
    if(!cl.extraRequests?.trim()) return;
    const valid = !cl.extraWeek?.trim() || isWeekValid(cl.extraWeek, weekOffset);
    if(!valid) return;
    const parsed = parseExtraRequests(cl.extraRequests, weekOffset);
    if(parsed.daysOff.length||parsed.maxDailyHrs||parsed.maxWeeklyHrs||parsed.maxEndTime)
      out[cl.id] = { ...parsed, cleanerName: cl.name };
  });
  return out;
};

// ── EFFECTIVE DAILY LIMIT ─────────────────────────────────────────────────────
// Returns the hard cumulative daily-hours ceiling for a cleaner, taking the most
// restrictive of: the cleaner's DailyHours sheet value, the ExtraRequests constraint
// for this week, and the absolute 8h cap. Used as a hard REJECT gate in the
// auto-scheduler (not a soft penalty).
const getEffectiveDailyLimit = (cleaner, constraints={}) => {
  const cleanerLimit = Number(cleaner?.dailyHrs) > 0 ? Number(cleaner.dailyHrs) : 8;
  const constraintLimit = Number(constraints?.[cleaner?.id]?.maxDailyHrs) > 0
    ? Number(constraints[cleaner.id].maxDailyHrs)
    : cleanerLimit;
  return Math.min(cleanerLimit, constraintLimit, 8);
};

// Returns the hard max number of distinct days a cleaner may work in one week.
// Priority: maxWorkedDays (sheet-parsed) → workDays → 7-restDaysRequired → 7.
const getEffectiveMaxWorkedDays = cleaner => {
  if(Number(cleaner?.maxWorkedDays) > 0) return Number(cleaner.maxWorkedDays);
  if(Number(cleaner?.workDays) > 0) return Number(cleaner.workDays);
  if(Number(cleaner?.restDaysRequired) >= 0) return Math.max(0, 7 - Number(cleaner.restDaysRequired));
  return 7;
};

// ── AUTO-SCHEDULER — soft limits + richieste extra ─────────────────────────────
const runAutoSchedule = (allJobs, weekOffset=0) => {
  const constraints = buildConstraints(weekOffset);

  // A job counts as fully assigned only if it has enough cleaners for its requirement
  const isFullyAssigned = job => (job.cleanerIds||[]).length >= getJobRequiredCleaners(job);

  const weeklyHrs = Object.fromEntries(CLEANERS.map(cl=>[cl.id,0]));
  const dailyHrs  = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,0]))]));
  const daySched  = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,[]]))]));
  // Per-cleaner/per-day list of assigned JOB OBJECTS (needed for travel-buffer checks
  // within the SAME generation run — daySched only holds time slots, not areas).
  const dayJobs   = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,[]]))]));
  // Cross-day committed jobs per cleaner — used by the late-shift rest rule.
  // dayJobs is per-day; this covers all days so the 22:00 rule works across midnight.
  const assignedJobsByCleaner = Object.fromEntries(CLEANERS.map(cl=>[cl.id,[]]));

  // Map each weekday to its ISO date for this week, for off/holiday checks.
  const weekDates = getWeekDates(weekOffset);
  const dayToISO = Object.fromEntries(DAYS.map((d,i)=>[d, toISODateLocal(weekDates[i])]));
  const jobDateISO = job => job.dateISO || dayToISO[job.day] || '';

  // A job needs (more) work if it is short on count, OR it is a NON-locked job whose
  // team doesn't meet the gender requirement. Locked template jobs (full team) are
  // authoritative and never re-touched, even if their gender mix differs.
  // Flexible template jobs always need scheduling — the scheduler must determine startTime.
  const needsWork = j =>
    !isLockedTemplateJob(j) &&
    ( j.flexibleWindow ||
      (j.cleanerIds||[]).length < getJobRequiredCleaners(j) ||
      !genderRequirementMet(j, j.cleanerIds) );

  // STEP 6: commit ONLY jobs that do NOT need work, at their fixed times. Jobs that
  // need work are NOT pre-committed at their old startTime (flexible jobs may move),
  // so we don't block their old slot or double-count their existing cleaners here.
  allJobs.filter(j=>!needsWork(j) && (j.cleanerIds||[]).length>0).forEach(job=>{
    const dur=getJobDuration(job);
    job.cleanerIds.forEach(cId=>{
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+dur;
      dailyHrs[cId]?.[job.day] && (dailyHrs[cId][job.day]+=dur);
      daySched[cId]?.[job.day]?.push({start:t2m(job.startTime),end:t2m(job.startTime)+dur*60});
      dayJobs[cId]?.[job.day]?.push(job);
      assignedJobsByCleaner[cId]?.push(job);
    });
  });

  // Commit a finalized job's team into the hour/overlap/dayJobs maps at its (possibly
  // moved) startTime. Only the NEW picks are committed for hours (existing of a partial
  // job were never pre-committed, so for needsWork jobs we commit the WHOLE final team).
  const commitTeam = (finalJob, idsToCommit) => {
    const dur=getJobDuration(finalJob);
    const s=t2m(finalJob.startTime), e=s+dur*60;
    idsToCommit.forEach(cId=>{
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+dur;
      dailyHrs[cId]?.[finalJob.day] && (dailyHrs[cId][finalJob.day]+=dur);
      daySched[cId]?.[finalJob.day]?.push({start:s,end:e});
      dayJobs[cId]?.[finalJob.day]?.push(finalJob);
      assignedJobsByCleaner[cId]?.push(finalJob);
    });
  };

  // Build the eligible-and-ranked candidate list for a job AT a specific candidate slot
  // (candidateJob carries the candidate startTime). Pure: does not mutate maps.
  // Validates a single already-assigned cleaner against a candidate slot.
  // Mirrors the filter chain in buildEligibleForSlot without the "not in existing" step.
  // Used to verify pre-assigned team members before filling gaps with new cleaners.
  // effectiveDur must be passed explicitly so fallback duration overrides are respected.
  const isCleanerEligibleForCandidateSlot = (cl, job, candidateJob, effectiveDur) => {
    const cjS=t2m(candidateJob.startTime), cjE=cjS+effectiveDur*60;
    const dISO=jobDateISO(job);
    if(jobRequiresTraining(job)&&!TRAINING[cl.id]?.includes(job.propertyId)) return false;
    if(!cl.days.includes(job.day)) return false;
    if(isCleanerUnavailableOnDate(cl, dISO)) return false;
    if((constraints[cl.id]?.daysOff||[]).includes(job.day)) return false;
    // Overlap with already-committed slots (exclude this job's own id)
    if((daySched[cl.id]?.[job.day]||[]).some(s=>cjS<s.end&&cjE>s.start)) return false;
    // Direction-aware travel buffer (exclude this job's own id)
    if((dayJobs[cl.id]?.[job.day]||[]).some(o=>{
      if(o.id===job.id) return false;
      const oS=t2m(o.startTime), oE=oS+getJobDuration(o)*60;
      if(cjS<oE&&cjE>oS) return false; // overlap handled above
      const candidateAfterExisting=oE<=cjS;
      const needed=candidateAfterExisting?getTravelBufferMinutes(o,candidateJob):getTravelBufferMinutes(candidateJob,o);
      const gap=candidateAfterExisting?cjS-oE:oS-cjE;
      return gap<needed;
    })) return false;
    // MaxEndTime constraint
    const maxEnd=constraints[cl.id]?.maxEndTime;
    if(maxEnd&&cjE>t2m(maxEnd)) return false;
    // Hard cumulative daily-hours cap: reject if this job would push the cleaner over
    // their effective daily limit (min of DailyHours, ExtraRequests, and 8h hard cap).
    // This is a hard gate — never assign over the limit even if no other candidate exists.
    const currentDaily = dailyHrs[cl.id]?.[job.day] || 0;
    if(currentDaily + effectiveDur > getEffectiveDailyLimit(cl, constraints)) return false;
    // Hard max worked-days cap: reject if this job would open a NEW working day
    // beyond the cleaner's effective weekly day limit (RestDaysRequired / maxWorkedDays).
    // Same-day additional assignments are allowed — they don't add a new worked day.
    {
      const alreadyWorksThisDay = (dailyHrs[cl.id]?.[job.day] || 0) > 0;
      if(!alreadyWorksThisDay){
        const projectedDays = new Set(
          Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)
        );
        projectedDays.add(job.day);
        if(projectedDays.size > getEffectiveMaxWorkedDays(cl)) return false;
      }
    }
    // Late-shift 9h rest rule (cross-day, uses assignedJobsByCleaner)
    if((assignedJobsByCleaner[cl.id]||[]).some(o=>getLateShiftRestIssue(cl.name,o,candidateJob))) return false;
    return true;
  };

  const buildEligibleForSlot = (job, candidateJob, existing, durationOverride=null) => {
    const effectiveDur = durationOverride !== null ? durationOverride : getJobDuration(candidateJob);
    const cjS=t2m(candidateJob.startTime), cjE=cjS+effectiveDur*60;
    const dISO=jobDateISO(job);
    return CLEANERS
      .filter(cl=>!existing.includes(cl.id))
      .filter(cl=>!jobRequiresTraining(job)||TRAINING[cl.id]?.includes(job.propertyId))
      .filter(cl=>cl.days.includes(job.day))
      .filter(cl=>!isCleanerUnavailableOnDate(cl, dISO))
      .filter(cl=>!(constraints[cl.id]?.daysOff||[]).includes(job.day))
      .filter(cl=>!(daySched[cl.id]?.[job.day]||[]).some(s=>cjS<s.end&&cjE>s.start))
      // Travel buffer: inline gap calc uses effectiveDur so fallback duration is respected.
      // (getTravelBufferIssue uses getJobDuration internally, which may not know the override.)
      .filter(cl=>!(dayJobs[cl.id]?.[job.day]||[]).some(o=>{
        if(o.id===job.id) return false;
        const oS=t2m(o.startTime), oE=oS+getJobDuration(o)*60;
        if(cjS<oE&&cjE>oS) return false; // overlap — handled by the overlap filter above
        const candidateAfterExisting = oE<=cjS;
        const needed = candidateAfterExisting ? getTravelBufferMinutes(o, candidateJob) : getTravelBufferMinutes(candidateJob, o);
        const gap = candidateAfterExisting ? cjS-oE : oS-cjE;
        return gap<needed;
      }))
      .filter(cl=>{
        const maxEnd=constraints[cl.id]?.maxEndTime;
        return !maxEnd || cjE <= t2m(maxEnd);
      })
      // Late-shift rest rule: reject cleaner if any already-committed job would violate
      // the 9-hour rest requirement after a shift ending after 22:00.
      .filter(cl=>!(assignedJobsByCleaner[cl.id]||[]).some(o=>
        getLateShiftRestIssue(cl.name, o, candidateJob)
      ))
      // Hard cumulative daily-hours cap: mirrors the check in isCleanerEligibleForCandidateSlot.
      // Over-limit candidates are rejected here so they never appear in the eligible pool,
      // making the overDaily sort penalty below redundant (kept as a no-op fallback only).
      .filter(cl=>{
        const currentDaily = dailyHrs[cl.id]?.[job.day] || 0;
        return currentDaily + effectiveDur <= getEffectiveDailyLimit(cl, constraints);
      })
      // Hard max worked-days cap: reject if assigning this job would open a new worked day
      // beyond the cleaner's effective weekly day limit. Same-day additions are allowed.
      .filter(cl=>{
        const alreadyWorksThisDay = (dailyHrs[cl.id]?.[job.day] || 0) > 0;
        if(alreadyWorksThisDay) return true; // same day — no new day opened
        const projectedDays = new Set(
          Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)
        );
        projectedDays.add(job.day);
        return projectedDays.size <= getEffectiveMaxWorkedDays(cl);
      })
      .sort((a,b)=>{
        // aDaysOver/bDaysOver removed — over-days candidates are now hard-filtered above.
        const aWeeklyLim = constraints[a.id]?.maxWeeklyHrs ?? a.weeklyHrs;
        const bWeeklyLim = constraints[b.id]?.maxWeeklyHrs ?? b.weeklyHrs;
        const aWOver = aWeeklyLim && (weeklyHrs[a.id]||0)+effectiveDur > aWeeklyLim ? 1 : 0;
        const bWOver = bWeeklyLim && (weeklyHrs[b.id]||0)+effectiveDur > bWeeklyLim ? 1 : 0;
        if(aWOver!==bWOver) return aWOver-bWOver;
        return (weeklyHrs[a.id]||0)-(weeklyHrs[b.id]||0);
      });
  };

  // Gender-aware pick of the missing cleaners from a ranked eligible list. Returns the
  // array of newly-picked cleaner objects (does not include existing).
  const pickGenderAware = (job, eligible, existing, missing) => {
    const genReq=getJobGenderRequirement(job);
    const haveExisting=countTeamGender(existing);
    const needMale  =Math.max(0, genReq.male   - haveExisting.male);
    const needFemale=Math.max(0, genReq.female - haveExisting.female);
    const pickNew=[]; const taken=new Set();
    let mCount=0;
    for(const cl of eligible){ if(pickNew.length>=missing) break; if(mCount>=needMale) break;
      if(cl.gender==='m' && !taken.has(cl.id)){ pickNew.push(cl); taken.add(cl.id); mCount++; } }
    let fCount=0;
    for(const cl of eligible){ if(pickNew.length>=missing) break; if(fCount>=needFemale) break;
      if(cl.gender==='f' && !taken.has(cl.id)){ pickNew.push(cl); taken.add(cl.id); fCount++; } }
    for(const cl of eligible){ if(pickNew.length>=missing) break;
      if(!taken.has(cl.id)){ pickNew.push(cl); taken.add(cl.id); } }
    return pickNew;
  };

  // Schedule jobs that need work. For flexible jobs we try candidate start times across
  // the window (30-min steps) and choose the first slot that yields a valid full team.
  const unassigned=[...allJobs.filter(needsWork)].sort((a,b)=>{
    const dd=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    return dd!==0?dd:t2m(a.startTime)-t2m(b.startTime);
  });

  const newlyScheduled = unassigned.map(job=>{
    const needed=getJobRequiredCleaners(job);
    const existing=(job.cleanerIds||[]).slice(); // preserve existing assignments
    const missing=Math.max(0, needed-existing.length);
    const jobDur=getJobDuration(job);

    // Build candidate start times. Flexible + valid end → step from window.start to the
    // latest start that still finishes by window.end, in 30-min increments. Otherwise
    // just the job's current startTime (fixed behaviour).
    const win=getJobSchedulingWindow(job);
    let candidateStarts;
    if(win.flexible && win.end){
      const wS=t2m(win.start), wEnd=t2m(win.end);
      const latestStart=wEnd - jobDur*60;
      candidateStarts=[];
      for(let t=wS; t<=latestStart; t+=30) candidateStarts.push(t);
      if(candidateStarts.length===0) candidateStarts=[wS]; // window too short for duration; try start anyway
    } else if(win.flexible){
      candidateStarts=[t2m(win.start || job.startTime)]; // flexible start, no end bound
    } else {
      candidateStarts=[t2m(job.startTime)]; // fixed
    }

    // Try each candidate slot; pick the FIRST that yields a full, gender-valid team.
    let chosen=null;
    for(const cs of candidateStarts){
      const candidateJob={...job, startTime:m2t(cs)};
      // Validate pre-assigned cleaners against this candidate slot first.
      // If any existing cleaner can't work here (overlap / travel / rest / holiday),
      // skip this slot — try the next one. Vacuously true when existing is empty.
      const existingValid=existing.every(id=>{
        const cl=CLEANERS.find(c=>c.id===id);
        return cl&&isCleanerEligibleForCandidateSlot(cl,job,candidateJob,jobDur);
      });
      if(!existingValid) continue;
      const eligible=buildEligibleForSlot(job, candidateJob, existing);
      const pickNew=pickGenderAware(job, eligible, existing, missing);
      const teamIds=[...existing, ...pickNew.map(c=>c.id)];
      const countOk=teamIds.length>=needed;
      const genderOk=genderRequirementMet(job, teamIds);
      if(countOk && genderOk){ chosen={cs, candidateJob, pickNew, teamIds}; break; }
      // Remember the best partial (first valid-existing slot) as fallback.
      if(!chosen) chosen={cs, candidateJob, pickNew, teamIds, partial:true};
    }
    // If every slot was skipped (existing team invalid everywhere), fall back to
    // first candidate so the job is marked needs_review rather than crashing.
    if(!chosen){
      const fbCs=candidateStarts[0];
      chosen={cs:fbCs,candidateJob:{...job,startTime:m2t(fbCs)},pickNew:[],teamIds:[...existing],partial:true};
    }

    // ── CHECKOUT FALLBACK TRIAL (Patch 2) ──────────────────────────────────
    // If no valid full team was found with the normal requirement, and this job
    // is eligible for fallback, retry using the fallback team size / duration.
    // All eligibility filters still apply; the fallback just uses smaller team + longer time.
    const normalTrialFailed = !!chosen.partial;
    if(normalTrialFailed && isCheckoutFallbackEligibleJob(job)){
      const fbCfg=getCheckoutFallbackConfig(job);
      if(fbCfg){
        const fbNeeded=fbCfg.cleaners;
        const fbMissing=Math.max(0, fbNeeded-existing.length);
        const fbDur=fbCfg.duration;
        // Recompute candidate start times using the fallback (longer) duration.
        // CRITICAL: if fallback duration does not fit inside the window, do NOT force
        // any start — a fallback job that would exceed windowEnd must not be scheduled.
        let fbCandidateStarts;
        if(win.flexible && win.end){
          const wS=t2m(win.start), wEnd=t2m(win.end);
          const fbLatest=wEnd-fbDur*60;
          fbCandidateStarts=[];
          if(fbLatest>=wS){ // only generate starts if fallback fits inside the window
            for(let t=wS; t<=fbLatest; t+=30) fbCandidateStarts.push(t);
          }
          // If empty: fallback duration > window → skip fallback trial entirely.
        } else {
          fbCandidateStarts=candidateStarts;
        }
        for(const cs of fbCandidateStarts){  // loop body never runs when empty
          const fbCandidateJob={...job, startTime:m2t(cs)};
          // Same existing-cleaner validation for the fallback duration.
          const existingValid=existing.every(id=>{
            const cl=CLEANERS.find(c=>c.id===id);
            return cl&&isCleanerEligibleForCandidateSlot(cl,job,fbCandidateJob,fbDur);
          });
          if(!existingValid) continue;
          const eligible=buildEligibleForSlot(job, fbCandidateJob, existing, fbDur);
          const pickNw=pickGenderAware(job, eligible, existing, fbMissing);
          const teamIds=[...existing, ...pickNw.map(c=>c.id)];
          const countOk=teamIds.length>=fbNeeded;
          const genderOk=genderRequirementMet(job, teamIds);
          if(countOk && genderOk){
            // Fallback succeeded — override chosen with fallback data.
            chosen={cs, candidateJob:fbCandidateJob, pickNew:pickNw, teamIds,
                    fbMeta:{needed:fbNeeded, dur:fbDur, origNeeded:needed, origDur:jobDur}};
            break;
          }
        }
      }
    }
    // ── END FALLBACK TRIAL ──────────────────────────────────────────────────

    const useFallback=!!chosen.fbMeta;
    const effectiveNeeded = useFallback ? chosen.fbMeta.needed : needed;

    const finalStart=m2t(chosen.cs);
    const finalJob={
      ...job,
      startTime:finalStart,
      ...(useFallback ? {
        duration:               chosen.fbMeta.dur,
        cleanersRequired:       chosen.fbMeta.needed,
        fallbackUsed:           true,
        fallbackOriginalCleanersRequired: chosen.fbMeta.origNeeded,
        fallbackOriginalDuration:         chosen.fbMeta.origDur,
        fallbackWarning: `Fallback: team ridotto ${chosen.fbMeta.needed} cleaners, durata ${chosen.fbMeta.dur}h`,
      } : {}),
    };
    const pickNew=chosen.pickNew;
    const pick=[...existing.map(id=>CLEANERS.find(c=>c.id===id)).filter(Boolean), ...pickNew];
    const finalIds=pick.map(c=>c.id);
    const countOk=finalIds.length>=effectiveNeeded;
    const genderOk=genderRequirementMet(job, finalIds);

    // Commit the WHOLE final team at the chosen start (existing of needsWork jobs were
    // never pre-committed). This blocks the correct (possibly moved) slot for later jobs.
    commitTeam(finalJob, finalIds);

    // Soft-limit warnings (computed against the now-updated maps for the picked cleaners).
    const warnings=[];
    pickNew.forEach(cl=>{
      const c=constraints[cl.id];
      const dailyLim = c?.maxDailyHrs ?? cl.dailyHrs;
      const weeklyLim = c?.maxWeeklyHrs ?? cl.weeklyHrs;
      const daily = (dailyHrs[cl.id]?.[job.day]||0);
      const weekly = (weeklyHrs[cl.id]||0);
      const projDays = new Set(Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)); projDays.add(job.day);
      if(dailyLim && daily > dailyLim) warnings.push(`${cl.name}: ${daily}h/${dailyLim}h/giorno`);
      else if(weeklyLim && weekly > weeklyLim) warnings.push(`${cl.name}: ${weekly}h/${weeklyLim}h/sett.`);
      else if(cl.workDays && projDays.size > cl.workDays) warnings.push(`${cl.name}: ${projDays.size}/${cl.workDays} giorni`);
    });

    const result={
      ...finalJob,
      cleanerIds:finalIds,
      status: (!chosen.partial && countOk && genderOk) ? 'assigned' : 'needs_review',
      softLimitWarning: warnings.length>0 ? warnings.join(' · ') : null,
    };
    // If flexible with a window and no valid slot was found (or team incomplete), flag clearly.
    if(win.flexible && win.end && (chosen.partial || !(countOk && genderOk))){
      result.windowWarning=`Nessuno slot valido nella finestra pulizia ${win.start}–${win.end}`;
      // If fallback was attempted but also failed (or couldn't fit), clarify.
      if(normalTrialFailed && isCheckoutFallbackEligibleJob(job)){
        const fbCfg2=getCheckoutFallbackConfig(job);
        if(fbCfg2){
          const wEnd2=win.end?t2m(win.end):null;
          const fbFitsInWindow = !wEnd2 || (t2m(win.start)+fbCfg2.duration*60 <= wEnd2);
          result.fallbackWarning = fbFitsInWindow
            ? 'Nessun team valido trovato (né ideale né fallback) nella finestra pulizia.'
            : `Fallback (${fbCfg2.duration}h) non si adatta alla finestra pulizia ${win.start}–${win.end}.`;
        }
      }
    } else if(result.windowWarning){
      delete result.windowWarning;
    }
    return result;
  });

  return {
    jobs: [
      // Untouched jobs = everything NOT in the needsWork set (locked template jobs, and
      // jobs already complete on count + gender). Keep their team; set status by validity.
      ...allJobs.filter(j=>!needsWork(j)).map(j=>({
        ...j,
        status: 'assigned',
      })),
      ...newlyScheduled,
    ],
    constraints,
  };
};

// ── AI CONTEXT ─────────────────────────────────────────────────────────────────
const buildSystemPrompt=(jobs,weekOffset)=>{
  const dates=getWeekDates(weekOffset);
  const sched=DAYS.map((day,i)=>{
    const dj=jobs.filter(j=>j.day===day).sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
    const ds=`${dates[i].getDate()} ${MON_IT[dates[i].getMonth()]}`;
    if(!dj.length) return `${DAY_FULL[day]} ${ds}: nessun turno`;
    return `${DAY_FULL[day]} ${ds}:\n`+dj.map(j=>{
      const name=getJobDisplayName(j);
      const dur=getJobDuration(j);
      const n=j.cleanerIds.map(id=>CLEANERS.find(c=>c.id===id)?.name).filter(Boolean).join(' + ');
      return `  • ${name} ${j.startTime}–${tAdd(j.startTime,dur)} → ${n||'NON ASSEGNATO'} [${j.type}]${j.note?' ('+j.note+')':''}`;
    }).join('\n');
  }).join('\n');
  const ci=CLEANERS.map(c=>{
    const t=(TRAINING[c.id]||[]).map(pid=>PROPERTIES.find(p=>p.id===pid)?.name).filter(Boolean);
    return `${c.name} (${c.type==='senior'?'SENIOR':c.type}, disp: ${c.days.map(d=>DAY_IT[d]).join('/')}): → ${t.join(', ')}`;
  }).join('\n');
  const uncov=getUncovered(jobs).map(p=>p.name).join(', ')||'nessuna';
  const extras=CLEANERS.filter(cl=>cl.extraRequests&&(!cl.extraWeek||isWeekValid(cl.extraWeek,weekOffset)))
    .map(cl=>`${cl.name}: "${cl.extraRequests}"${cl.extraWeek?' (valida '+cl.extraWeek+')':''}`).join('\n')||'nessuna';
  const propsStr=PROPERTIES.map(p=>{const req=p.cleanersRequired&&p.cleanersRequired>1?' · RICHIEDE '+p.cleanersRequired+' CLEANERS':'';return p.name+' (id:'+p.id+', '+p.type+', '+p.duration+'h'+req+(p.notes?' · '+p.notes:'')+')';}).join('\n');
  const actionBlock='[AZIONI]\n{"suggestions":[{"label":"Descrizione breve","actions":[{"type":"add|reassign|remove","propertyId":"pX","day":"Mon","startTime":"HH:MM","cleanerIds":["cX"],"note":""}]}]}\n['+'/AZIONI]';
  const seniors=CLEANERS.filter(c=>c.type==='senior').map(c=>c.name).join(', ')||'nessuna';
  return `Sei l'assistente scheduling di una cleaning company a Malta. Rispondi SEMPRE in italiano, conciso e operativo.\n\nCLEANERS:\n${ci}\n\nPROPRIETÀ:\n${propsStr}\n\nTURNI (${fmtWeek(weekOffset)}):\n${sched}\n\nRICHIESTE EXTRA QUESTA SETTIMANA:\n${extras}\n\nPROPRIETÀ NON COPERTE: ${uncov}\n\nREGOLE: 1) Solo cleaners formate per training matrix 2) No doppia assegnazione stesso orario 3) Rispetta cleanersRequired 4) Rispetta disponibilità e richieste extra 5) Senior cleaners: ${seniors} — non assumere siano formate su tutto: usa solo la training matrix\n\nQUANDO SUGGERISCI MODIFICHE AI TURNI: dopo la spiegazione in italiano, includi SEMPRE un blocco strutturato:\n${actionBlock}\n\nSolo per add: propertyId, day, startTime, cleanerIds, note.\nSolo per reassign: propertyId, day, startTime, cleanerIds (nuovi).\nSolo per remove: propertyId, day, startTime.\nMax 3 suggestions. Ometti il blocco se non stai suggerendo modifiche specifiche.`;
};

// ── WIW EXPORT VALIDATION HELPERS ─────────────────────────────────────────────
// Used by both WIWExportModal (to block/warn before download) and exportWIW
// (last-line-of-defense guards). Defined here so they're in scope for both.
const isExportHHMM = v => /^\d{1,2}:\d{2}$/.test(String(v||'').trim());

const getExportJobIssues = job => {
  const issues = [];
  const dayOk = DAYS.indexOf(job?.day) >= 0;
  const parsedDate = job?.dateISO ? parseISODateLocal(job.dateISO) : null;
  const dateOk = !!parsedDate || dayOk;
  const timeOk = isExportHHMM(job?.startTime);
  const siteName = getJobDisplayName(job || {});
  const hasSite =
    !!(siteName && siteName !== 'Unknown location') ||
    !!(job?.displayName) ||
    !!(job?.temporaryLocationName) ||
    !!(job?.propertyId);
  if(!dateOk) issues.push('missing/invalid date or day');
  if(!timeOk) issues.push('missing/invalid start time');
  if(!hasSite) issues.push('missing/invalid job site');
  return issues;
};

// ── WIW XLSX EXPORT ────────────────────────────────────────────────────────────
const exportWIW = (jobs, weekOffset, conflicts) => {
  const dates = getWeekDates(weekOffset);
  const rows = [['First Name','Last Name','Date','Start Time','End Time','Job Site','Position','Notes','Type']];
  const sorted=[...jobs].sort((a,b)=>{
    const dd=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    if(dd!==0) return dd;
    return sortJobsByPropertyDisplayOrder(a,b);
  });
  sorted.forEach(job=>{
    const prop=PROPERTIES.find(p=>p.id===job.propertyId);
    const di=DAYS.indexOf(job.day);
    if(!job.dateISO) console.warn('[CleanFlow] Job missing dateISO, falling back to selected week', job);
    // Guard: if job.day is invalid (di===-1) or dateISO fails to parse, dates[di] would be
    // undefined and fmtDate would crash with "Cannot read properties of undefined (reading 'getMonth')".
    // Use a safe chain: parsed dateISO → week array fallback (only when di valid) → empty string.
    const parsedDate = job.dateISO ? parseISODateLocal(job.dateISO) : null;
    const fallbackDate = di >= 0 ? dates[di] : null;
    const dateStr = (parsedDate || fallbackDate) ? fmtDate(parsedDate || fallbackDate) : '';
    // Defensive guards — prevent "12:undefined AM" / "12:NaN AM" on fantasy jobs.
    const validStart = isExportHHMM(job.startTime);
    if(!validStart) console.warn('[WIW export] Job missing/invalid startTime', job);
    const start = validStart ? fmtAMPM(job.startTime) : '';
    const end   = validStart ? fmtAMPM(tAdd(job.startTime, getJobDuration(job))) : '';
    // Safe site name — fall back through known fields rather than emitting "Unknown location".
    const rawSiteName = getJobDisplayName(job);
    const siteName = (rawSiteName && rawSiteName !== 'Unknown location')
      ? rawSiteName
      : (job.displayName || job.temporaryLocationName || job.propertyId || 'UNKNOWN LOCATION');
    // Mark conflicted jobs by prefixing the existing Notes field — no new column,
    // so the sheet stays compatible with WIW import.
    const issues=conflicts?.get?.(job.id)||[];
    const conflictText=issues.length>0?`⚠ CONFLICT: ${issues.map(i=>i.msg).filter(Boolean).join(' · ')}`:'';
    // Export-validity warnings for invalid rows (defensive last resort, appended after conflict text).
    const exportWarnings = [];
    if(!validStart) exportWarnings.push('EXPORT WARNING: missing/invalid start time');
    if(siteName === 'UNKNOWN LOCATION') exportWarnings.push('EXPORT WARNING: missing/invalid job site');
    const warningText = exportWarnings.join(' · ');
    const baseNote = job.note || '';
    const noteOut = [conflictText, warningText, baseNote].filter(Boolean).join(' · ');
    const exportCleanerIds=dedupeCleanerIds(job.cleanerIds);
    if(exportCleanerIds.length===0){
      rows.push(['UNASSIGNED','',dateStr,start,end,siteName,'',noteOut,job.type||'']);
    } else {
      exportCleanerIds.forEach(cId=>{
        const cl=CLEANERS.find(c=>c.id===cId); if(!cl) return;
        const [first,...rest]=cl.name.split(' ');
        rows.push([first,rest.join(' '),dateStr,start,end,siteName,cl.type==='senior'?'Senior Cleaner':'Cleaner',noteOut,job.type||'']);
      });
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:26},{wch:16},{wch:30},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Shifts');
  const filename=`CleanFlow_WhenIWork_${fmtWeek(weekOffset).replace(/[–\s]/g,'_')}.xlsx`;
  console.log('[WIW export] rows built', rows.length);
  console.log('[WIW export] workbook ready', filename);
  // Blob + <a> download is more reliable than XLSX.writeFile in mobile/PWA contexts
  // where the latter can silently fail (no visible error, no download, nothing).
  // Falls back to XLSX.writeFile if Blob or createObjectURL is unavailable.
  // Rethrows if both fail so the caller (WIWExportModal) can show a visible error toast.
  let blobOk = false;
  try {
    const wbout = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const blob = new Blob([wbout], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    blobOk = true;
  } catch(blobErr) {
    console.warn('[WIW export] Blob download failed, trying XLSX.writeFile fallback', blobErr);
    try {
      XLSX.writeFile(wb, filename);
      blobOk = true;
    } catch(writeErr) {
      console.error('[WIW export] Both download methods failed', writeErr);
      throw writeErr; // rethrow so WIWExportModal.doExport() can toast the error
    }
  }
};

// ── ATOMS ──────────────────────────────────────────────────────────────────────
function Toast({toast}){
  if(!toast) return null;
  const bg=toast.type==='error'?C.conflict:toast.type==='warn'?C.warn:C.ok;
  return(
    <div style={{position:'fixed',top:100,left:'50%',transform:'translateX(-50%)',zIndex:600,
      background:bg,color:'white',borderRadius:14,boxShadow:'0 4px 20px rgba(0,0,0,0.28)',
      whiteSpace:'nowrap',animation:'toastIn 0.25s ease',display:'flex',alignItems:'stretch',overflow:'hidden',pointerEvents:'auto'}}>
      <span style={{padding:'11px 16px',fontSize:14,fontWeight:700}}>{toast.msg}</span>
      {toast.onUndo&&<button onClick={toast.onUndo} style={{background:'rgba(255,255,255,0.22)',border:'none',borderLeft:'1px solid rgba(255,255,255,0.2)',color:'white',fontWeight:800,fontSize:13,padding:'0 16px',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>}
    </div>
  );
}

function Modal({children,onClose}){

      <div style={{background:C.card,borderRadius:'22px 22px 0 0',padding:'8px 24px 36px',width:'100%',maxWidth:600,maxHeight:'93vh',overflowY:'auto'}}>

}

// ── OVERWRITE DIFF MODAL ───────────────────────────────────────────────────────
// Shown only when publishing a week that another device republished after we
// loaded it (serverVersionChanged). Compares local jobs vs the freshly-refetched
// published snapshot by operational key, so the supervisor sees what an overwrite
// would lose before confirming. Frontend-only; no backend involvement.
function OverwriteDiffModal({localJobs, publishedJobs, onConfirm, onClose}){
  const fmtJob = (job) => {
    const when = `${DAY_IT[job.day]||job.day||''}${job.dateISO?` ${job.dateISO}`:''} · ${job.startTime||'—'}`;
    const cleaners = (job.cleanerIds||[])
      .map(id=>CLEANERS.find(c=>c.id===id)?.name?.split(' ')[0])
      .filter(Boolean).join(', ');
    const svc = job.serviceTypeId || job.type || '';
    return { name:getJobDisplayName(job), when, cleaners, svc };
  };

  const localKeys = new Map((localJobs||[]).map(j=>[getJobOperationalKey(j), j]));
  const serverKeys = new Map((publishedJobs||[]).map(j=>[getJobOperationalKey(j), j]));
  const lost   = [...serverKeys].filter(([k])=>!localKeys.has(k)).map(([,j])=>j);   // in published, not local
  const onlyMine = [...localKeys].filter(([k])=>!serverKeys.has(k)).map(([,j])=>j); // in local, not published
  const commonCount = [...localKeys].filter(([k])=>serverKeys.has(k)).length;

  // Display-layer diff for jobs present in BOTH versions (same operational key)
  // but changed in assignment/metadata. getJobOperationalKey stays assignment-
  // independent (used elsewhere for dedup), so we compare these fields here only.
  const sortedIds = ids => [...(ids||[])].map(String).sort().join(',');
  const cleanersFirstNames = job => (job.cleanerIds||[])
    .map(id=>CLEANERS.find(c=>c.id===id)?.name?.split(' ')[0])
    .filter(Boolean).join(', ') || '—';
  const modified = [...localKeys]
    .filter(([k])=>serverKeys.has(k))
    .map(([k, localJob])=>{
      const serverJob = serverKeys.get(k);
      const cleanersDiffer = sortedIds(localJob.cleanerIds) !== sortedIds(serverJob.cleanerIds);
      const noteDiffers = (localJob.note||'') !== (serverJob.note||'');
      const statusDiffers = (localJob.status||'') !== (serverJob.status||'');
      const priorityDiffers = (localJob.priority||'') !== (serverJob.priority||'');
      if(cleanersDiffer || noteDiffers || statusDiffers || priorityDiffers){
        return { localJob, serverJob, cleanersDiffer, noteDiffers, statusDiffers, priorityDiffers };
      }
      return null;
    })
    .filter(Boolean);

  const Row = ({job, tone}) => {
    const f = fmtJob(job);
    return (
      <div style={{padding:'8px 10px',borderRadius:8,background:tone==='lost'?'#FEF2F2':'#F0FDF4',border:`1px solid ${tone==='lost'?'#FECACA':'#BBF7D0'}`,marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>
          {f.when}{f.svc?` · ${f.svc}`:''}{f.cleaners?` · 👤 ${f.cleaners}`:' · non assegnato'}
        </div>
      </div>
    );
  };

  return (<>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>⚠️ Stai per sovrascrivere una versione più recente</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
      Un altro dispositivo ha pubblicato questa settimana dopo che l'hai caricata. Controlla cosa cambia prima di confermare.
    </div>

    <div style={{fontSize:13,fontWeight:800,color:C.conflict,margin:'4px 0 8px'}}>
      🗑 Turni che verranno persi se sovrascrivi ({lost.length})
    </div>
    {lost.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno — la tua versione contiene tutti i turni della versione pubblicata.</div>
      : <div style={{marginBottom:12}}>{lost.map((j,i)=><Row key={'l'+i} job={j} tone="lost"/>)}</div>}

    <div style={{fontSize:13,fontWeight:800,color:'#166534',margin:'4px 0 8px'}}>
      ➕ Turni presenti solo nella tua versione ({onlyMine.length})
    </div>
    {onlyMine.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno.</div>
      : <div style={{marginBottom:12}}>{onlyMine.map((j,i)=><Row key={'m'+i} job={j} tone="mine"/>)}</div>}

    <div style={{fontSize:13,fontWeight:800,color:'#92400E',margin:'4px 0 8px'}}>
      ✏️ Turni modificati in entrambe le versioni ({modified.length})
    </div>
    {modified.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno.</div>
      : <div style={{marginBottom:12}}>{modified.map((m,i)=>{
          const f = fmtJob(m.localJob);
          return (
            <div key={'mod'+i} style={{padding:'8px 10px',borderRadius:8,background:'#FFFBEB',border:'1px solid #FCD34D',marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{f.when}{f.svc?` · ${f.svc}`:''}</div>
              {m.cleanersDiffer && <div style={{fontSize:11,color:'#92400E',marginTop:4}}>
                👤 Loro: {cleanersFirstNames(m.serverJob)} · Tua versione: {cleanersFirstNames(m.localJob)}
              </div>}
              {m.noteDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>📝 Note diverse</div>}
              {m.statusDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>🔖 Stato diverso ({m.serverJob.status||'—'} → {m.localJob.status||'—'})</div>}
              {m.priorityDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>⚑ Priorità diversa</div>}
            </div>
          );
        })}</div>}

    <div style={{fontSize:11,color:C.muted,marginBottom:18}}>Turni in comune: {commonCount}{modified.length>0?` (di cui ${modified.length} modificati)`:''}</div>

    <div style={{display:'flex',gap:10}}>
      <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
      <button onClick={onConfirm} style={{flex:1,padding:'12px',borderRadius:10,background:C.conflict,color:'white',fontWeight:800,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Pubblica e sovrascrivi</button>
    </div>
  </>);
}
