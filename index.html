// ── SOLVER LOCAL ──────────────────────────────────────────────────────────────
// ── Rescue Split constants ────────────────────────────────────────────────
const RESCUE_SPLIT_ENABLED                = true;
const RESCUE_MIN_SOURCE_COMPLETION_PCT    = 0.5;   // cleaner must complete ≥50% of donor shift
const RESCUE_MIN_REMAINING_CLEANERS       = 1;     // donor job must keep ≥1 cleaner after release
const RESCUE_MAX_RELEASED_PER_DONOR_JOB  = 1;     // MVP: release at most 1 per donor

const buildLocalAssignmentOptions = (targetJob, jobs, weekOffset) => {
  // Defensive normalization — Hostaway/restored jobs can arrive with missing/non-array cleanerIds.
  const safeTargetJob = { ...targetJob, cleanerIds: Array.isArray(targetJob?.cleanerIds) ? targetJob.cleanerIds : [] };
  // Cleaners already on this job — used to stop the solver recommending a no-op
  // (re-suggesting/re-applying a cleaner who is already assigned to the target).
  const existingTargetIds = new Set(dedupeCleanerIds(safeTargetJob.cleanerIds));
  const safeJobs = (Array.isArray(jobs) ? jobs : []).map(j => {
    if(!Array.isArray(j?.cleanerIds)){
      console.warn('[Trova soluzione] Normalised job with missing cleanerIds', j?.id||'(no id)');
      return { ...j, cleanerIds: [] };
    }
    return j;
  });
  const jS = t2m(safeTargetJob.startTime);
  const jE = getJobOperationalEndMinutes(safeTargetJob);
  const needed = getJobRequiredCleaners(safeTargetJob);
  const requiresTraining = jobRequiresTraining(safeTargetJob);
  const constraints = buildConstraints(weekOffset);

  // Build hour maps from current jobs (excluding targetJob itself)
  const weeklyHrs = {};
  const dailyHrs = {};
  const daySched = {};
  CLEANERS.forEach(cl=>{
    weeklyHrs[cl.id]=0; dailyHrs[cl.id]={}; daySched[cl.id]={};
    DAYS.forEach(d=>{ dailyHrs[cl.id][d]=0; daySched[cl.id][d]=[]; });
  });
  safeJobs.filter(j=>j.id!==safeTargetJob.id&&j.cleanerIds.length>0).forEach(j=>{
    (j.cleanerIds||[]).forEach(cId=>{
      const dur=getCleanerOperationalDuration(j,cId);
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+dur;
      if(dailyHrs[cId]?.[j.day]!==undefined) dailyHrs[cId][j.day]+=dur;
      if(daySched[cId]?.[j.day]) daySched[cId][j.day].push({start:getCleanerOperationalStartMinutes(j,cId),end:getCleanerOperationalEndMinutes(j,cId)});
    });
  });

  const validCandidates = [];
  const rejectedCandidates = [];

  CLEANERS.forEach(cl=>{
    const rejectReasons = [];
    // Day availability
    if(!cl.days.includes(safeTargetJob.day)) rejectReasons.push(`non disponibile ${DAY_IT[safeTargetJob.day]}`);
    // Holiday / off period (hard)
    const tDateISO = safeTargetJob.dateISO || toISODateLocal(getWeekDates(weekOffset)[DAYS.indexOf(safeTargetJob.day)] || new Date());
    if(isCleanerUnavailableOnDate(cl, tDateISO)) rejectReasons.push(`assente/ferie il ${tDateISO}`);
    // daysOff in constraints
    if((constraints[cl.id]?.daysOff||[]).includes(safeTargetJob.day)) rejectReasons.push('giorno di riposo programmato');
    // Training
    if(requiresTraining && !TRAINING[cl.id]?.includes(safeTargetJob.propertyId)) rejectReasons.push('non formata per questa proprietà');
    // Overlap
    const hasOverlap = (daySched[cl.id]?.[safeTargetJob.day]||[]).some(s=>jS<s.end&&jE>s.start);
    if(hasOverlap) rejectReasons.push('overlap orario');
    // Travel buffer vs any existing same-day job of this cleaner
    const bufIssue = safeJobs.find(o=>
      o.id!==safeTargetJob.id && o.day===safeTargetJob.day && (o.cleanerIds||[]).includes(cl.id) &&
      getTravelBufferIssue(cl.name, o, safeTargetJob, cl.id)
    );
    if(bufIssue){
      const issue=getTravelBufferIssue(cl.name, bufIssue, safeTargetJob, cl.id);
      rejectReasons.push(`stacco insufficiente (servono ${issue.needed} min, disponibili ${issue.gap} min)`);
    }
    // maxEndTime
    const maxEnd = constraints[cl.id]?.maxEndTime;
    if(maxEnd && jE>t2m(maxEnd)) rejectReasons.push(`supera orario max ${maxEnd}`);
    // Late-shift rest rule (cross-day)
    const lateRestViolation = safeJobs.filter(o=>o.id!==safeTargetJob.id&&(o.cleanerIds||[]).includes(cl.id))
      .map(o=>getLateShiftRestIssue(cl.name, o, safeTargetJob, cl.id))
      .find(Boolean);
    if(lateRestViolation) rejectReasons.push(lateRestViolation.msg);

    if(rejectReasons.length>0){
      rejectedCandidates.push({cleanerId:cl.id,cleanerName:cl.name,reason:rejectReasons.join(', ')});
      return;
    }

    // Scoring (lower = better)
    const dur = getJobOperationalDuration(safeTargetJob);
    const dailyLim = constraints[cl.id]?.maxDailyHrs ?? cl.dailyHrs;
    const weeklyLim = constraints[cl.id]?.maxWeeklyHrs ?? cl.weeklyHrs;
    const newDaily = (dailyHrs[cl.id]?.[safeTargetJob.day]||0)+dur;
    const newWeekly = (weeklyHrs[cl.id]||0)+dur;
    const overDaily = dailyLim && newDaily>dailyLim ? 1 : 0;
    const overWeekly = weeklyLim && newWeekly>weeklyLim ? 1 : 0;
    const projDays = new Set(Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d));
    projDays.add(safeTargetJob.day);
    const overWorkDays = cl.workDays && projDays.size>cl.workDays ? 1 : 0;
    const isSenior = cl.type==='senior' ? 0.1 : 0; // soft penalty for using senior on simple jobs
    const score = overDaily*10 + overWeekly*8 + overWorkDays*5 + newDaily + (newWeekly/10) + isSenior;

    const reasonParts = [];
    if(!overDaily&&!overWeekly&&!overWorkDays) reasonParts.push('nessun superamento limiti');
    else {
      if(overDaily) reasonParts.push(`supererebbe limite giornaliero (${newDaily}h/${dailyLim}h)`);
      if(overWeekly) reasonParts.push(`supererebbe limite settimanale (${newWeekly}h/${weeklyLim}h)`);
      if(overWorkDays) reasonParts.push(`supererebbe giorni lavorativi (${projDays.size}/${cl.workDays})`);
    }
    reasonParts.push(`${(dailyHrs[cl.id]?.[safeTargetJob.day]||0).toFixed(1)}h già oggi, ${(weeklyHrs[cl.id]||0).toFixed(1)}h settimana`);

    validCandidates.push({
      cleanerId:cl.id, cleanerName:cl.name, score, isSenior:cl.type==='senior',
      reason:reasonParts.join(' · '),
      action:{type:'assign',jobId:safeTargetJob.id,cleanerIds:[cl.id]},
    });
  });

  validCandidates.sort((a,b)=>a.score-b.score);

  // ── Gender-aware combination selection ──────────────────────────────────────
  const locked = isLockedTemplateJob(safeTargetJob);
  const genReq = getJobGenderRequirement(safeTargetJob);
  const hasGenderReq = !locked && (genReq.male>0 || genReq.female>0);
  const existingIds = (safeTargetJob.cleanerIds||[]);
  const existingGender = countTeamGender(existingIds);
  // genderOf for a candidate's cleaner
  const genderOf = id => CLEANERS.find(c=>c.id===id)?.gender || '';

  // Build a gender-valid combination of `k` candidates (from score-sorted validCandidates)
  // that, together with the existing team, meets the male/female requirement. Greedy by
  // score within each gender bucket, then fill remaining slots with best-ranked. Returns
  // an array of candidate objects of length k, or null if impossible.
  const buildGenderValidCombo = (cands, k) => {
    const needMale  = Math.max(0, genReq.male   - existingGender.male);
    const needFemale= Math.max(0, genReq.female - existingGender.female);
    if(needMale + needFemale > k) return null; // can't fit required genders in available slots
    const males   = cands.filter(c=>genderOf(c.cleanerId)==='m');
    const females = cands.filter(c=>genderOf(c.cleanerId)==='f');
    if(males.length < needMale || females.length < needFemale) return null;
    const chosen=[]; const taken=new Set();
    males.slice(0,needMale).forEach(c=>{chosen.push(c);taken.add(c.cleanerId);});
    females.slice(0,needFemale).forEach(c=>{chosen.push(c);taken.add(c.cleanerId);});
    for(const c of cands){ if(chosen.length>=k) break; if(!taken.has(c.cleanerId)){ chosen.push(c); taken.add(c.cleanerId); } }
    if(chosen.length<k) return null;
    // Preserve score order in the final combo for display.
    chosen.sort((a,b)=>a.score-b.score);
    return chosen;
  };

  const comboValidForGender = combo => {
    if(!hasGenderReq) return true;
    const teamIds = [...existingIds, ...combo.map(c=>c.cleanerId)];
    return genderRequirementMet(targetJob, teamIds);
  };

  let recommended = null;
  let alternatives = [];

  if(needed===1){
    // Gender validation must test the candidate ALONE (as a fresh replacement team),
    // not existingIds + candidate — existingIds may be invalid/unavailable.
    const singleTeamValid = c => {
      if(!hasGenderReq) return true;
      return genderRequirementMet(safeTargetJob, [c.cleanerId]);
    };
    // Exclude candidates already assigned to this job — recommending/applying the
    // same cleaner again would be a no-op (UI says "applied" but nothing changes).
    const notAlreadyAssigned = c => !existingTargetIds.has(c.cleanerId);
    const pool = (hasGenderReq ? validCandidates.filter(singleTeamValid) : validCandidates).filter(notAlreadyAssigned);
    if(pool[0]){
      recommended = {...pool[0], action:{type:'assign',jobId:safeTargetJob.id,cleanerIds:[pool[0].cleanerId]}};
    }
    alternatives = pool.slice(1,3).map(c=>({...c,action:{type:'assign',jobId:safeTargetJob.id,cleanerIds:[c.cleanerId]}}));
  } else {
    // Multi-cleaner. Two modes:
    // replacementMode: job already has a full team — build a fresh replacement team of `needed`.
    // partial fill:    job is short on cleaners — keep existingIds and add `missing` more.
    const replacementMode = existingIds.length >= needed;
    const baseIds   = replacementMode ? [] : existingIds;
    const baseGender= countTeamGender(baseIds);
    const missing   = replacementMode ? needed : Math.max(0, needed - existingIds.length);

    // Local combo builder: respects baseGender so the same code handles both modes.
    const comboFor = (cands, k) => {
      if(k <= 0) return [];
      if(!hasGenderReq) return cands.length >= k ? cands.slice(0, k) : null;
      const needM = Math.max(0, genReq.male   - baseGender.male);
      const needF = Math.max(0, genReq.female - baseGender.female);
      if(needM + needF > k) return null;
      const males   = cands.filter(c=>genderOf(c.cleanerId)==='m');
      const females = cands.filter(c=>genderOf(c.cleanerId)==='f');
      if(males.length < needM || females.length < needF) return null;
      const chosen=[]; const taken=new Set();
      males.slice(0,needM).forEach(c=>{chosen.push(c);taken.add(c.cleanerId);});
      females.slice(0,needF).forEach(c=>{chosen.push(c);taken.add(c.cleanerId);});
      for(const c of cands){ if(chosen.length>=k) break; if(!taken.has(c.cleanerId)){chosen.push(c);taken.add(c.cleanerId);} }
      if(chosen.length<k) return null;
      chosen.sort((a,b)=>a.score-b.score);
      return chosen;
    };
    const comboValid = combo => {
      if(!hasGenderReq) return true;
      const teamIds = [...baseIds, ...combo.map(c=>c.cleanerId)];
      return genderRequirementMet(safeTargetJob, teamIds);
    };

    // Partial-fill mode (replacementMode=false): a candidate already in safeTargetJob's
    // team must never be picked to fill a "missing" slot — that's a no-op (the cleaner
    // is already there). Replacement mode keeps the full candidate pool unchanged:
    // existing cleaners are still valid picks for a fresh replacement team.
    const candidatePoolForCombo = replacementMode
      ? validCandidates
      : validCandidates.filter(c=>!existingTargetIds.has(c.cleanerId));

    const combo = comboFor(candidatePoolForCombo, missing);
    if(combo && combo.length >= missing && (missing === 0 || combo.length > 0) && comboValid(combo)){
      const finalCleanerIds = [...baseIds, ...combo.map(c=>c.cleanerId)];
      // Guard: combo[0] is only accessed when combo.length > 0 (missing > 0).
      const leadCleaner = combo[0] || candidatePoolForCombo[0];
      if(leadCleaner){
        recommended = {
          cleanerId: leadCleaner.cleanerId,
          cleanerName: combo.length > 0 ? combo.map(c=>c.cleanerName).join(' + ') : leadCleaner.cleanerName,
          score: combo.length > 0 ? combo.reduce((s,c)=>s+c.score,0)/combo.length : leadCleaner.score,
          reason: combo.length > 0 ? combo.map(c=>c.reason).join(' | ') : leadCleaner.reason,
          action:{type:'assign',jobId:safeTargetJob.id,cleanerIds:finalCleanerIds},
        };
        const usedIds = new Set(combo.map(c=>c.cleanerId));
        const rest = candidatePoolForCombo.filter(c=>!usedIds.has(c.cleanerId));
        const altCombo = comboFor(rest, missing);
        if(altCombo && altCombo.length >= missing && comboValid(altCombo)){
          const finalAltCleanerIds = [...baseIds, ...altCombo.map(c=>c.cleanerId)];
          const altLead = altCombo[0];
          if(altLead){
            alternatives = [{
              cleanerId: altLead.cleanerId,
              cleanerName: altCombo.map(c=>c.cleanerName).join(' + '),
              score: altCombo.reduce((s,c)=>s+c.score,0)/altCombo.length,
              reason: altCombo.map(c=>c.reason).join(' | '),
              action:{type:'assign',jobId:safeTargetJob.id,cleanerIds:finalAltCleanerIds},
            }];
          }
        }
      }
    }
    if(!recommended){
      rejectedCandidates.unshift({cleanerId:'',cleanerName:'—',reason:`Servono ${needed} cleaners, disponibili solo ${validCandidates.length} validi`});
    }
  }

  let escalation = null;
  if(!recommended){
    // Distinguish a pure gender shortfall from a general availability shortfall.
    let reason;
    if(hasGenderReq){
      const availM=validCandidates.filter(c=>genderOf(c.cleanerId)==='m').length;
      const availF=validCandidates.filter(c=>genderOf(c.cleanerId)==='f').length;
      const needMale  = Math.max(0, genReq.male   - existingGender.male);
      const needFemale= Math.max(0, genReq.female - existingGender.female);
      if(availM<needMale || availF<needFemale){
        reason = `Requisito genere non soddisfabile per ${getJobDisplayName(targetJob)} ${targetJob.startTime}–${m2t(jE)} ${DAY_IT[targetJob.day]}: servono ${genReq.male} uomini e ${genReq.female} donne, disponibili (eleggibili) ${availM} uomini e ${availF} donne.`;
      } else {
        reason = `Servono ${needed} cleaners (con requisito genere ${genReq.male}M/${genReq.female}F), non c'è una combinazione valida senza conflitti per ${getJobDisplayName(targetJob)} ${targetJob.startTime}–${m2t(jE)} ${DAY_IT[targetJob.day]}`;
      }
    } else {
      reason = needed>1 && validCandidates.length>0
        ? `Servono ${needed} cleaners, disponibili solo ${validCandidates.length} senza conflitti per ${getJobDisplayName(targetJob)} ${targetJob.startTime}–${m2t(jE)} ${DAY_IT[targetJob.day]}`
        : `Nessuna cleaner disponibile per ${getJobDisplayName(targetJob)} ${targetJob.startTime}–${m2t(jE)} ${DAY_IT[targetJob.day]}`;
    }
    escalation = {
      reason,
      options:['Spostare orario','Chiamare cleaner extra','Riassegnare manualmente un job esistente'],
    };
  }

  // ── Rescue Split ─────────────────────────────────────────────────────────
  // Calculated only when: no normal recommendation, target requires exactly 1 cleaner,
  // and RESCUE_SPLIT_ENABLED. Suggestion-only — never auto-applied.
  const minsToHHMM = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  let rescueOptions = [];
  if(!recommended && RESCUE_SPLIT_ENABLED && getJobRequiredCleaners(safeTargetJob)===1){
    const tStart   = t2m(safeTargetJob.startTime);
    const tEnd     = getJobOperationalEndMinutes(safeTargetJob);
    const tProp    = PROPERTIES.find(p=>p.id===safeTargetJob.propertyId);
    const tArea    = tProp?.area||'';
    const tName    = tProp?.name||safeTargetJob.propertyId||'';
    const genReq   = getJobGenderRequirement(safeTargetJob);
    const needsM   = (genReq.male||0)>0;
    const needsF   = (genReq.female||0)>0;
    const needsTrn = jobRequiresTraining(safeTargetJob);
    const tISO     = safeTargetJob.dateISO||toISODateLocal(getWeekDates(weekOffset)[DAYS.indexOf(safeTargetJob.day)]||new Date());

    safeJobs.forEach(donor=>{
      if(donor.id===safeTargetJob.id) return;
      if(donor.day!==safeTargetJob.day) return;
      const dIds=(donor.cleanerIds||[]);
      if(dIds.length<1) return;
      if(dIds.length-1 < RESCUE_MIN_REMAINING_CLEANERS) return;

      // Guard: donor must have a valid startTime and positive duration
      if(!isValidHHMM(donor.startTime)) return;
      const dDurH = getJobOperationalDuration(donor);
      if(!dDurH || dDurH <= 0) return;

      const trvMins = getTravelBufferMinutes(donor, safeTargetJob);
      const latestRel = tStart - trvMins;
      const dStart  = t2m(donor.startTime);
      const dEnd    = getJobOperationalEndMinutes(donor);
      const dDurMins= dEnd - dStart;
      if(latestRel <= dStart) return;
      if(latestRel >= dEnd)   return;
      const workedMins  = latestRel - dStart;
      const completedPct= workedMins / dDurMins;
      if(completedPct < RESCUE_MIN_SOURCE_COMPLETION_PCT) return;

      const dProp    = PROPERTIES.find(p=>p.id===donor.propertyId);
      const dArea    = dProp?.area||'';
      const dName    = dProp?.name||donor.propertyId||'';
      const sameArea = !!(tArea && dArea && tArea===dArea);
      const dOrigTeam= dIds.map(id=>{ const c=CLEANERS.find(c=>c.id===id); return c?c.name:id; });
      const donorGenReq = getJobGenderRequirement(donor);

      // RESCUE_MAX_RELEASED_PER_DONOR_JOB is an apply-time constraint, not a display limit.
      // For suggestion-only: show every eligible single-cleaner option from this donor.
      // Each option is mutually exclusive — only one can ever be applied.
      for(const cId of dIds){
        const cl=CLEANERS.find(c=>c.id===cId); if(!cl) continue;
        // Target training — HARD
        if(needsTrn&&!(TRAINING[cId]||[]).includes(safeTargetJob.propertyId)) continue;
        // Target gender — HARD
        const clG=cl.gender||'';
        if(needsM&&clG!=='m') continue;
        if(needsF&&clG!=='f') continue;
        // Day / holiday / daysOff
        if(!cl.days.includes(safeTargetJob.day)) continue;
        if(isCleanerUnavailableOnDate(cl,tISO)) continue;
        if((constraints[cId]?.daysOff||[]).includes(safeTargetJob.day)) continue;
        // MaxEndTime
        const maxEnd=constraints[cId]?.maxEndTime;
        if(maxEnd&&tEnd>t2m(maxEnd)) continue;
        // Overlap with other same-day jobs (excluding donor and target)
        if(safeJobs.some(j=>j.id!==donor.id&&j.id!==safeTargetJob.id&&
            (j.cleanerIds||[]).includes(cId)&&j.day===safeTargetJob.day&&
            tStart<getJobOperationalEndMinutes(j)&&tEnd>t2m(j.startTime))) continue;
        // Late-rest 9h (donor is the last committed job for this cleaner)
        if(getLateShiftRestIssue(cl.name, donor, safeTargetJob, cId)) continue;

        // Source gender relaxation (SOFT — allowed because completedPct >= 50%)
        const remIds=dIds.filter(id=>id!==cId);
        let sourceGenderRelaxed=false;
        if((donorGenReq.male||0)>0||(donorGenReq.female||0)>0){
          const remG=remIds.map(id=>{ const c=CLEANERS.find(c=>c.id===id); return c?c.gender:''; });
          if(remG.filter(g=>g==='m').length<(donorGenReq.male||0)||
             remG.filter(g=>g==='f').length<(donorGenReq.female||0))
            sourceGenderRelaxed=true;
        }
        const remNames=remIds.map(id=>{ const c=CLEANERS.find(c=>c.id===id); return c?c.name:id; });
        const lostMins=dEnd-latestRel;
        const arrSlack=tStart-(latestRel+trvMins);
        const warnings=['Rescue Split è un compromesso operativo. Decisione supervisore richiesta.'];
        if(sourceGenderRelaxed) warnings.push('Requisito genere fonte rilassato (completamento ≥50%).');
        // Score: area dominates → travel → slack → completion → lost hrs → seniority → load
        const score=(sameArea?0:100000)+trvMins*100-arrSlack-(completedPct*10)+lostMins+
                    (cl.type==='senior'?1:0)+(dailyHrs[cId]?.[safeTargetJob.day]||0)+(weeklyHrs[cId]||0)/10;
        rescueOptions.push({
          score, cleanerId:cId, cleanerName:cl.name,
          donorJobId:donor.id, donorPropertyName:dName,
          donorStartTime:donor.startTime, donorEndTime:minsToHHMM(dEnd),
          donorOriginalTeamNames:dOrigTeam,
          releaseTime:minsToHHMM(latestRel), completedPct:Math.round(completedPct*1000)/1000,
          targetJobId:safeTargetJob.id, targetPropertyName:tName,
          targetStartTime:safeTargetJob.startTime, targetEndTime:minsToHHMM(tEnd),
          travelMinutes:trvMins, sameArea, remainingCleanerNames:remNames,
          lostWorkerMinutes:Math.round(lostMins),
          targetTrainingOk:!needsTrn||(TRAINING[cId]||[]).includes(safeTargetJob.propertyId),
          targetGenderOk:!needsM&&!needsF||(needsM&&clG==='m')||(needsF&&clG==='f'),
          sourceGenderRelaxed, warnings,
        });
      }
    });
    rescueOptions.sort((a,b)=>a.score-b.score);
  }

  return {targetJobId:safeTargetJob.id,recommended,alternatives,rejected:rejectedCandidates,escalation,rescueOptions};
};

// ── AI OPTIONAL EXPLAINER ────────────────────────────────────────────────────
const explainLocalLastMinuteOptionsWithAI = async (options, apiKey) => {
  if(!AI_ENABLED) return null;
  if(!apiKey) return null;
  const lines = [];
  if(options.recommended) lines.push(`Consigliata: ${options.recommended.cleanerName} (${options.recommended.reason})`);
  options.alternatives.forEach(a=>lines.push(`Alternativa: ${a.cleanerName} (${a.reason})`));
  if(options.escalation) lines.push(`Escalation: ${options.escalation.reason}`);
  const prompt = `Sei l'assistente scheduling di CleanFlow.\nRiscrivi in italiano operativo questa soluzione. Non aggiungere cleaner o orari non presenti nei dati. Massimo 4 righe.\n\n${lines.join('\n')}`;
  try{
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{role:'user',parts:[{text:prompt}]}],
          generationConfig:{maxOutputTokens:250,temperature:0.1},
        })}
    );
    if(!res.ok) return null;
    const data = await res.json();
    const candidate = data?.candidates?.[0];
    if(candidate?.finishReason && candidate.finishReason!=='STOP') return null;
    const text = (candidate?.content?.parts||[]).map(p=>p.text||'').join('').trim();
    // Validate: must mention at least one name from recommended/alternatives
    const knownNames = [options.recommended?.cleanerName,...options.alternatives.map(a=>a.cleanerName)].filter(Boolean);
    const mentionsKnown = knownNames.some(n=>text.includes(n.split(' ')[0]));
    return (text && mentionsKnown) ? text : null;
  }catch(e){ return null; }
};


// ── JOB HELPERS ─────────────────────────────────────────────────────────────
// Is a cleaner on holiday/off on a given date? OffFrom/OffTo are inclusive,
// YYYY-MM-DD. OffFrom only = single-day absence. Both empty = available.
// ── TRAVEL BUFFER (area-based) ──────────────────────────────────────────────
// Normalize an area name: trim, lowercase, strip accents.
const normArea = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

// Parse the TravelBuffers tab (FromArea | ToArea | BufferMinutes) → directional lookup
// { "fromarea→toarea": minutes }. Skips invalid rows / non-positive minutes / header.
const parseTravelBuffersCSV = rows => {
  const map={};
  (Array.isArray(rows)?rows:[]).forEach(r=>{
    const from=normArea(r[0]); const to=normArea(r[1]); const mins=parseInt(r[2]);
    if(!from||!to) return;
    if(from==='fromarea'||from==='from area') return; // header row
    if(isNaN(mins)||mins<=0) return;
    map[from+'→'+to]=mins;
  });
  return map;
};

// Directional travel buffer (minutes) required between jobA's location and jobB's.
// Falls back to OP_SETTINGS.defaultTravelBufferMinutes when areas/properties/tab missing.
const getTravelBufferMinutes = (jobA, jobB) => {
  const def = OP_SETTINGS.defaultTravelBufferMinutes;
  const pa = PROPERTIES.find(p=>p.id===jobA?.propertyId);
  const pb = PROPERTIES.find(p=>p.id===jobB?.propertyId);
  // Temporary/custom job without a real property → default.
  if(!pa || !pb) return def;
  const a = normArea(pa.area); const b = normArea(pb.area);
  if(!a || !b) return def; // area not set on one side → default
  const exact = TRAVEL_BUFFERS[a+'→'+b];
  if(typeof exact === 'number') return exact; // covers same-area explicit value too
  return def;
};

// Returns a travel-buffer issue between two same-cleaner, same-day jobs, or null.
// Existing OVERLAP is handled elsewhere; this only flags insufficient gap when the
// two jobs do NOT overlap. cleanerName is used for the message.
// FIX 10M-D STEP 2 regression fix A: optional cleanerId — when provided, uses THAT
// cleaner's own operational start/end (their manual override, if any) instead of the
// job-wide duty window. Omitting cleanerId reproduces the exact prior job-wide behavior
// (used by scheduler/optimizer/fallback call sites, which are intentionally unchanged).
const getTravelBufferIssue = (cleanerName, jobA, jobB, cleanerId=null) => {
  if(!jobA || !jobB) return null;
  const aS = cleanerId ? getCleanerOperationalStartMinutes(jobA,cleanerId) : t2m(jobA.startTime);
  const aE = cleanerId ? getCleanerOperationalEndMinutes(jobA,cleanerId) : getJobOperationalEndMinutes(jobA);
  const bS = cleanerId ? getCleanerOperationalStartMinutes(jobB,cleanerId) : t2m(jobB.startTime);
  const bE = cleanerId ? getCleanerOperationalEndMinutes(jobB,cleanerId) : getJobOperationalEndMinutes(jobB);
  if(aS<bE && bS<aE) return null; // overlap → handled by overlap logic, not here
  // Determine order: earlier job → later job (buffer is directional on that order).
  let earlier, later, earlierEnd, laterStart;
  if(aE<=bS){ earlier=jobA; later=jobB; earlierEnd=aE; laterStart=bS; }
  else      { earlier=jobB; later=jobA; earlierEnd=bE; laterStart=aS; }
  const needed=getTravelBufferMinutes(earlier, later);
  const gap=laterStart-earlierEnd;
  if(gap < needed){
    return {
      needed, gap,
      msg:`${cleanerName}: stacco insufficiente da ${getJobDisplayName(earlier)} a ${getJobDisplayName(later)} — servono ${needed} min, disponibili ${gap} min`,
    };
  }
  return null;
};

const isCleanerUnavailableOnDate = (cleaner, dateISO) => {
  if(!cleaner || !dateISO) return false;
  const from = cleaner.offFrom || '';
  const to   = cleaner.offTo || '';
  if(!from && !to) return false;
  if(from && to)   return dateISO>=from && dateISO<=to;  // inclusive range
  if(from && !to)  return dateISO===from;                // single-day absence
  if(!from && to)  return dateISO===to;                  // defensive: only OffTo set
  return false;
};

// For property-based jobs, CURRENT Properties is authoritative (so a job created
// when the property needed 1 cleaner picks up a later change to 2). Job-stored
// values are only used for temporary/custom jobs without a valid property.
const isPropertyBasedJob = job => !!(job && job.propertyId && PROPERTIES.find(p=>p.id===job.propertyId));

// A job's config (duration / cleaners) is taken from CURRENT Properties only when it
// is a property-driven job (template / hostaway_api / hostaway_csv / checkout / checkin).
// Extra and last-minute jobs carry their OWN custom config even when placed on a real
// property, so they are NOT property-config-authoritative.
const isCustomConfigJob = job =>
  job && (job.source==='extra' || job.source==='last_minute' || job.type==='extra' || job.type==='last_minute');
const isPropertyConfigAuthoritativeJob = job =>
  isPropertyBasedJob(job) && !isCustomConfigJob(job);

// Duration: custom extra/last_minute keep their own; property-driven use current Properties.
const getJobDuration = job => {
  // Fallback-materialized jobs carry their actual (fallback) duration directly.
  if(job.fallbackUsed && job.duration && Number(job.duration) > 0) return Number(job.duration);
  if(isCustomConfigJob(job) && job.duration && Number(job.duration) > 0) return Number(job.duration);
  const prop = PROPERTIES.find(p => p.id === job.propertyId);
  // Check-in clean: use check-in specific duration, NOT checkout duration.
  if(job.type==='checkin' || job.serviceTypeId===HOSTAWAY_ST_CHECKIN){
    if(job.duration && Number(job.duration) > 0) return Number(job.duration);
    if(prop?.checkinTaskDuration && Number(prop.checkinTaskDuration) > 0) return Number(prop.checkinTaskDuration);
    if(prop?.duration && Number(prop.duration) > 0) return Number(prop.duration);
    return 2;
  }
  if(isPropertyConfigAuthoritativeJob(job) && prop){
    // Checkout/back-to-back use checkoutDuration; otherwise property duration.
    const d = prop.checkoutDuration || prop.duration;
    if(d && Number(d)>0) return Number(d);
  }
  if(job.duration && Number(job.duration) > 0) return Number(job.duration);
  return prop?.duration || 0;
};

// Required cleaners: custom extra/last_minute keep their own; property-driven use current Properties.
const getJobRequiredCleaners = job => {
  // Fallback-materialized jobs carry their actual (fallback) cleanersRequired directly.
  if(job.fallbackUsed && job.cleanersRequired && Number(job.cleanersRequired)>0) return Number(job.cleanersRequired);
  if(isCustomConfigJob(job) && job.cleanersRequired && Number(job.cleanersRequired)>0) return Number(job.cleanersRequired);
  const prop=PROPERTIES.find(p=>p.id===job.propertyId);
  // Check-in clean: use check-in specific cleaner count, NOT checkout cleaners.
  if(job.type==='checkin' || job.serviceTypeId===HOSTAWAY_ST_CHECKIN){
    if(job.cleanersRequired && Number(job.cleanersRequired)>0) return Number(job.cleanersRequired);
    if(prop?.checkinCleanersRequired && Number(prop.checkinCleanersRequired)>0) return Number(prop.checkinCleanersRequired);
    if(prop?.cleanersRequired && Number(prop.cleanersRequired)>0) return Number(prop.cleanersRequired);
    return 1;
  }
  if(isPropertyConfigAuthoritativeJob(job) && prop){
    if(prop.checkoutCleanersRequired && Number(prop.checkoutCleanersRequired)>0) return Number(prop.checkoutCleanersRequired);
    if(prop.cleanersRequired && Number(prop.cleanersRequired)>0) return Number(prop.cleanersRequired);
    if(prop.requires2) return 2;
    return 1;
  }
  if(job.cleanersRequired && Number(job.cleanersRequired)>0) return Number(job.cleanersRequired);
  return 1;
};

// ── GENDER REQUIREMENTS ─────────────────────────────────────────────────────
// Required male/female cleaners for a job, from the CURRENT property (0/0 if none).
const getJobGenderRequirement = job => {
  const prop = PROPERTIES.find(p=>p.id===job?.propertyId);
  if(!prop) return { male:0, female:0 };
  return {
    male:   Number(prop.requiredMaleCleaners)   || 0,
    female: Number(prop.requiredFemaleCleaners) || 0,
  };
};

// Job scheduling priority based on male requirement.
// Male-required jobs (requiredMaleCleaners > 0) return 0 (higher priority);
// all other jobs return 1. Used to sort the unassigned queue so male-required
// jobs are processed first while male cleaners are still fresh.
const getMaleRequirementPriority = job => {
  const req = getJobGenderRequirement(job);
  return Number(req.male) > 0 ? 0 : 1;
};

// Soft score penalty added when ranking candidates for a job that has NO male
// requirement. Penalises male cleaners so females are preferred, without
// hard-blocking males (they can still fill the spot if no female is eligible).
const getMaleScarcityPenalty = (cleaner, job) => {
  const req = getJobGenderRequirement(job);
  if(Number(req.male) > 0) return 0;   // male-required job — no penalty
  return cleaner.gender === 'm' ? 25 : 0;
};

// Senior-required job priority: senior-required jobs sort before normal ones (Fix 10M-B).
const getSeniorRequirementPriority = job => {
  const req = getJobSeniorRequirement(job);
  return Number(req.senior) > 0 ? 0 : 1;
};

// Senior-scarcity penalty: on non-senior-required jobs, senior cleaners rank lower
// so they are preserved for senior-required jobs. Soft only — never hard-blocks seniors.
// Penalty 35 > male-scarcity 25 so senior preservation ranks ahead of male preservation.
const getSeniorScarcityPenalty = (cleaner, job) => {
  const req = getJobSeniorRequirement(job);
  if(Number(req.senior) > 0) return 0;   // senior-required job — no penalty
  return isSeniorCleaner(cleaner) ? 35 : 0;
};

// Soft capacity-preservation ranking helpers (Fix 10I).
// Returns the number of distinct properties a cleaner is trained for.
// Higher breadth = more flexible cleaner = preserved for later jobs.
const getCleanerTrainingBreadth = cleaner => {
  if(!cleaner?.id) return 0;
  const trained = Array.isArray(TRAINING[cleaner.id]) ? TRAINING[cleaner.id] : [];
  return new Set(trained.map(String).filter(Boolean)).size;
};

// Soft sort penalty: cleaners with more training breadth rank LOWER
// (i.e. are preserved for later jobs that may need them).
// Returns 0 for temporary/custom locations so those jobs are unaffected.
const getCleanerFlexibilityPenalty = (cleaner, job) => {
  if(!cleaner || !job) return 0;
  if(!jobRequiresTraining(job)) return 0;
  return getCleanerTrainingBreadth(cleaner);
};


const countTeamGender = cleanerIds => {
  let male=0, female=0;
  (cleanerIds||[]).forEach(id=>{
    const cl=CLEANERS.find(c=>c.id===id);
    if(!cl) return;
    if(cl.gender==='m') male++;
    else if(cl.gender==='f') female++;
  });
  return { male, female };
};

// True only when the team meets BOTH the required male and required female counts.
const genderRequirementMet = (job, cleanerIds) => {
  const req=getJobGenderRequirement(job);
  if(req.male===0 && req.female===0) return true; // no gender requirement
  const have=countTeamGender(cleanerIds);
  return have.male>=req.male && have.female>=req.female;
};

// Returns a gender-requirement issue object, or null if met / no requirement.
const getGenderRequirementIssue = (job, cleanerIds) => {
  const req=getJobGenderRequirement(job);
  if(req.male===0 && req.female===0) return null;
  const have=countTeamGender(cleanerIds);
  if(have.male>=req.male && have.female>=req.female) return null;
  return {
    req, have,
    msg:`Requisito genere non soddisfatto: servono ${req.male} uomini e ${req.female} donne, team assegnato ha ${have.male} uomini e ${have.female} donne.`,
  };
};

// ── SENIORITY HELPERS (Fix 10M-A — diagnostic only, no scheduling effect) ────
// These helpers expose seniority data for display/diagnostics. They are NOT called
// by runAutoSchedule, buildEligibleForSlot, pickGenderAware, or any scheduling gate.
const isSeniorCleaner = cleaner =>
  cleaner?.isSenior === true ||
  String(cleaner?.role || '').trim().toLowerCase() === 'senior' ||
  (!cleaner?.role && String(cleaner?.type || '').trim().toLowerCase() === 'senior');

const getJobSeniorRequirement = job => {
  const prop = PROPERTIES.find(p => p.id === job?.propertyId);
  return { senior: Math.max(0, Number(prop?.requiredSeniorCleaners) || 0) };
};

const countTeamSenior = cleanerIds => {
  let senior = 0;
  dedupeCleanerIds(cleanerIds).forEach(id => {
    const cleaner = CLEANERS.find(c => c.id === id);
    if(isSeniorCleaner(cleaner)) senior++;
  });
  return { senior };
};

const seniorRequirementMet = (job, cleanerIds) => {
  const req = getJobSeniorRequirement(job);
  if(req.senior <= 0) return true;
  return countTeamSenior(cleanerIds).senior >= req.senior;
};

const getSeniorRequirementIssue = (job, cleanerIds) => {
  const req = getJobSeniorRequirement(job);
  if(req.senior <= 0) return null;
  const have = countTeamSenior(cleanerIds);
  if(have.senior >= req.senior) return null;
  return {
    req, have,
    msg: `Requisito senior non soddisfatto: servono ${req.senior} senior, team assegnato ne ha ${have.senior}.`,
  };
};

// ── COMBINED-REQUIREMENT HELPERS (Fix 10M-B) ─────────────────────────────────
// Calculates unmet gender+senior deficits for a partial team.
const getTeamRequirementDeficits = (job, cleanerIds) => {
  const genderReq = getJobGenderRequirement(job);
  const seniorReq = getJobSeniorRequirement(job);
  const genderHave = countTeamGender(cleanerIds);
  const seniorHave = countTeamSenior(cleanerIds);
  return {
    male:   Math.max(0, Number(genderReq.male)   - genderHave.male),
    female: Math.max(0, Number(genderReq.female) - genderHave.female),
    senior: Math.max(0, Number(seniorReq.senior) - seniorHave.senior),
  };
};
const allTeamRequirementsMet = (job, cleanerIds) =>
  genderRequirementMet(job, cleanerIds) && seniorRequirementMet(job, cleanerIds);

// How many currently-unmet requirements this cleaner satisfies (0–3).
// A senior male can score 2 if both senior+male are still needed.
const getCleanerRequirementContribution = (cleaner, deficits) => {
  let score = 0;
  if(deficits.senior > 0 && isSeniorCleaner(cleaner)) score++;
  if(deficits.male   > 0 && cleaner.gender === 'm') score++;
  if(deficits.female > 0 && cleaner.gender === 'f') score++;
  return score;
};

// A template job is LOCKED (authoritative, untouchable) once it has its full team.
// Flexible template jobs (flexibleWindow=true) are NEVER locked — the scheduler must
// always be allowed to choose their start time within the window.
const isLockedTemplateJob = job =>
  job && job.type==='template' && !job.flexibleWindow &&
  (job.cleanerIds||[]).length >= getJobRequiredCleaners(job) &&
  // Only treat as locked if the cleaners came from the Sheet (not auto-assigned).
  // templateLockedFromSheet is stamped at template parse time (see parseTemplateCSVWithDiagnostics).
  // Backward compat: jobs restored from published/draft before this patch have
  // templateLockedFromSheet===undefined — treated as locked (safe default).
  // Jobs parsed after this patch: false=empty/partial at import → never locked by auto-assign.
  job.templateLockedFromSheet !== false;

// Unified status: 'assigned' only if count ok AND gender ok.
// Locked complete templates are exempt from the gender check (they are authoritative).
const calcJobStatus = job => {
  const ids = job.cleanerIds || [];
  const countOk = ids.length >= getJobRequiredCleaners(job);
  if(isLockedTemplateJob(job)) return countOk ? 'assigned' : 'needs_review';
  const genderOk = genderRequirementMet(job, ids);
  const seniorOk = seniorRequirementMet(job, ids);
  return countOk && genderOk && seniorOk ? 'assigned' : 'needs_review';
};

// Scheduling window for a job. Flexible jobs (Hostaway API) carry windowStartTime/
// windowEndTime; the scheduler may place the job anywhere in [start, end-duration].
// Non-flexible jobs (templates, restaurants, offices) keep their fixed startTime.
const getJobSchedulingWindow = job => {
  const validHHMM = v => /^\d{1,2}:\d{2}$/.test(String(v||'').trim());
  if(!job || !job.flexibleWindow){
    return { flexible:false, start: job?.startTime || '', end:'' };
  }
  const start = validHHMM(job.windowStartTime) ? String(job.windowStartTime).trim() : (job.startTime || '');
  // If window end is missing/invalid, treat as non-window-flexible for the END constraint
  // (no late bound), but keep the flexible start handling.
  const end = validHHMM(job.windowEndTime) ? String(job.windowEndTime).trim() : '';
  return { flexible:true, start, end };
};
// Training check only applies to jobs with a known property
const jobRequiresTraining = job => !!job.propertyId;
// Use job.displayName, temporaryLocationName, or property name
const getJobDisplayName = job => {
  if(job.displayName) return job.displayName;
  if(job.temporaryLocationName) return job.temporaryLocationName;
  const prop = PROPERTIES.find(p => p.id === job.propertyId);
  return prop?.name || 'Unknown location';
};

// ── DUPLICATE JOB DIAGNOSTICS ────────────────────────────────────────────────
// Helpers for surfacing duplicate-looking jobs in the schedule. Diagnostic only —
// never used by the scheduler, export, or conflict engine to auto-delete jobs.

// Strict key: same date/property/startTime/serviceTypeId/type → exact duplicate.
const getDuplicateJobKey = job => [
  job.dateISO || job.day || '',
  job.propertyId || job.displayName || job.temporaryLocationName || '',
  job.startTime || '',
  job.serviceTypeId || '',
  job.type || '',
].join('|');

// Loose key: same date/property/startTime → visual duplicate (may differ by source/type/serviceTypeId).
const getLooseDuplicateJobKey = job => [
  job.dateISO || job.day || '',
  job.propertyId || job.displayName || job.temporaryLocationName || '',
  job.startTime || '',
].join('|');

// Returns { exact: [...groups], loose: [...groups] }.
// Exact groups: getDuplicateJobKey count > 1.
// Loose groups: getLooseDuplicateJobKey count > 1 (may include Template+Hostaway overlaps).
// Each group has full diagnostic fields to identify source without guessing.
const findDuplicateJobs = jobs => {
  const arr = Array.isArray(jobs) ? jobs.filter(isMeaningfulJob) : [];
  const buildGroups = (keyFn, minCount=2) => {
    const map = new Map();
    arr.forEach(job => {
      const k = keyFn(job);
      if(!map.has(k)) map.set(k, []);
      map.get(k).push(job);
    });
    return [...map.entries()]
      .filter(([,group]) => group.length >= minCount)
      .map(([key, group]) => ({
        key,
        count: group.length,
        propertyId: group[0].propertyId || '',
        displayName: getJobDisplayName(group[0]),
        dateISO: group[0].dateISO || '',
        day: group[0].day || '',
        startTime: group[0].startTime || '',
        serviceTypeIds: [...new Set(group.map(j=>j.serviceTypeId||''))],
        types: [...new Set(group.map(j=>j.type||''))],
        sources: [...new Set(group.map(j=>j.source||''))],
        ids: group.map(j=>j.id),
        sample: group.map(j=>({
          id:j.id, source:j.source, type:j.type, serviceTypeId:j.serviceTypeId,
          propertyId:j.propertyId, displayName:j.displayName,
          day:j.day, dateISO:j.dateISO, startTime:j.startTime, note:j.note,
        })),
      }));
  };
  const exact = buildGroups(getDuplicateJobKey);
  // Loose groups: only include groups where loose matches span more than one distinct exact key
  // (i.e. not just the same exact duplicates already counted above — those are handled there).
  const looseAll = buildGroups(getLooseDuplicateJobKey);
  const loose = looseAll.filter(g => {
    const distinctExactKeys = new Set(
      g.sample.map(j => getDuplicateJobKey(j))
    );
    return distinctExactKeys.size > 1;
  });
  return { exact, loose };
};

// ── GUEST SUMMARY (display-only) ─────────────────────────────────────────────
// Returns a compact human-readable guest count string for Hostaway jobs.
// Returns '' for jobs with no guest metadata (template, extra, manual, etc.).
// NEVER read by scheduler, conflict engine, export WIW, or any operational logic.
const getGuestSummary = job => {
  const adults   = Number(job?.guestAdults)   || 0;
  const children = Number(job?.guestChildren) || 0;
  const infants  = Number(job?.guestInfants)  || 0;
  const pets     = Number(job?.guestPets)     || 0;
  const explicitGuestCount = Number(job?.guestCount) || 0;
  const derivedGuestCount  = adults + children + infants;
  const guestCount = explicitGuestCount || derivedGuestCount;
  if(!guestCount && !pets) return '';
  const parts = [];
  if(guestCount > 0)  parts.push(`👥 ${guestCount} guest${guestCount===1?'':'s'}`);
  if(adults   > 0)    parts.push(`${adults} adult${adults===1?'':'s'}`);
  if(children > 0)    parts.push(`${children} child${children===1?'':'ren'}`);
  if(infants  > 0)    parts.push(`${infants} infant${infants===1?'':'s'}`);
  if(pets     > 0)    parts.push(`${pets} pet${pets===1?'':'s'}`);
  return parts.join(' · ');
};

// ── ARRIVAL GUEST DISPLAY SOURCE (Sprint 2C) ─────────────────────────────────
// Arrival guest display only. Used by tool UI (via getArrivalGuestSummary) and
// supervisor export (via getSupervisorGuestCompact). Never used by scheduler,
// optimizer, fallback, conflict engine, WIW export, or any operational logic.
// Pure, read-only — never mutates the job, never writes to state, never touches
// Hostaway import data.
//
// Single shared rule: guests are shown ONLY when the job represents a guest ARRIVAL
// (the property being prepared FOR someone), never the guests who are leaving.
//   BACK_TO_BACK                    → incoming* fields (deterministically matched at
//                                      import time in generateApiJobsFromReservations —
//                                      never a "next booking" heuristic). If absent
//                                      (legacy job imported before Sprint 2A), NO
//                                      fallback to the departing guest* fields — null.
//   PREPARE_FOR_GUEST / CHECKIN_ONLY /
//   job.type === 'checkin'          → the job's own guest* fields already represent
//                                      the arriving reservation (built directly from
//                                      it) — returned as-is.
//   Everything else (plain checkout, restaurant, office, refresh, maintenance,
//   training, other, template/extra/manual non-arrival jobs) → null, even if legacy
//   guest* fields happen to still be present on the job.
const getArrivalGuestDisplaySource = job => {
  if(!job) return null;
  if(job.serviceTypeId === HOSTAWAY_ST_BACK_TO_BACK){
    const hasIncoming = job.incomingGuestCount!=null || job.incomingAdults!=null ||
                         job.incomingChildren!=null || job.incomingInfants!=null || job.incomingPets!=null;
    if(!hasIncoming) return null;
    return {
      guestCount:    job.incomingGuestCount,
      guestAdults:   job.incomingAdults,
      guestChildren: job.incomingChildren,
      guestInfants:  job.incomingInfants,
      guestPets:     job.incomingPets,
    };
  }
  if(job.serviceTypeId === HOSTAWAY_ST_CHECKIN || job.serviceTypeId === 'CHECKIN_ONLY' || job.type === 'checkin'){
    return job;
  }
  return null;
};

// UI-facing composition of the shared decision above with the existing human-readable
// formatter (getGuestSummary is a pure formatter and stays that way — it never decides
// arrival vs. departure itself). Every UI surface showing guests should call this
// instead of getGuestSummary(job) directly, so the decision can never drift out of
// sync between call sites.
const getArrivalGuestSummary = job => getGuestSummary(getArrivalGuestDisplaySource(job));


// Display-only. Returns a short muted label explaining the origin/decision for
// a job card. Never affects scheduling, export, or conflict logic.
const getJobDecisionLabel = job => {
  if(!job) return '';
  if(job.status === 'needs_review') return 'needs review';
  if((job.cleanerIds||[]).length === 0) return 'unassigned';
  if(job.rescueUsed === true || job.schedulerDecisionCode === 'rescue_split')
    return 'used rescue split';
  if(job.fallbackUsed === true)
    return `used fallback${job.fallbackOriginalCleanersRequired ? `: ${job.cleanersRequired} cleaners / ${job.duration}h` : ''}`;
  if(job.manualEdited === true || job.schedulerDecisionCode === 'manual_edit')
    return 'manual edit';
  if(isLockedTemplateJob(job))
    return 'sheet locked from template';
  if(job.type === 'template' && job.templateLockedFromSheet === false)
    return 'auto-filled template';
  if(job.schedulerDecisionCode === 'auto_filled_template')
    return 'auto-filled template';
  if(job.source === 'hostaway_api' || job.source === 'hostaway_csv')
    return 'according scheduler · Hostaway';
  if(job.source === 'extra') return 'extra duty';
  if(job.source === 'last_minute' || job.type === 'last_minute') return 'last-minute job';
  if(job.type === 'template') return 'template';
  return 'according scheduler';
};

// ── CLEANER WORKED-DAYS DIAGNOSTICS ─────────────────────────────────────────
// Display-only helper: returns a breakdown of what contributed to each worked
// day for a cleaner, grouped by day, with source/type/locked info per job.
// Used exclusively by the "Turni per cleaner" shift view card.
const getCleanerWorkedDaysDiagnostics = (cleaner, jobs) => {
  const clJobs = (jobs||[]).filter(j => (j.cleanerIds||[]).includes(cleaner.id));

  // Build dayBreakdown first, filtering out jobs with missing or invalid day values.
  // workedDays is then derived from dayBreakdown so the two are always consistent.
  const dayBreakdown = {};
  clJobs.forEach(job => {
    if(!job.day || !DAYS.includes(job.day)) return; // guard: blank or invalid day
    if(!dayBreakdown[job.day]) dayBreakdown[job.day] = [];
    const isLocked = isLockedTemplateJob(job);
    const category =
      isLocked ? 'sheet-locked'
      : (job.type === 'template' && job.templateLockedFromSheet === false) ? 'auto-filled'
      : (job.rescueUsed || job.schedulerDecisionCode === 'rescue_split') ? 'rescue'
      : (job.fallbackUsed) ? 'fallback'
      : (job.manualEdited || job.schedulerDecisionCode === 'manual_edit') ? 'manual'
      : (job.source === 'hostaway_api' || job.source === 'hostaway_csv') ? 'hostaway'
      : (job.source === 'extra') ? 'extra'
      : (job.source === 'last_minute' || job.type === 'last_minute') ? 'last-minute'
      : 'scheduler';
    dayBreakdown[job.day].push({ job, category, isLocked });
  });

  // workedDaysList preserves Mon→Sun order and is the single source of truth.
  const workedDaysList = DAYS.filter(d => dayBreakdown[d]);
  const workedDays = workedDaysList.length;
  const maxDays = getEffectiveMaxWorkedDays(cleaner);
  const daysOver = workedDays > maxDays;
  const excessDays = new Set(workedDaysList.slice(maxDays));

  return { workedDays, maxDays, daysOver, dayBreakdown, excessDays };
};


// serialisation bugs or corrupted state. Filter them at every restore boundary
// so they never reach jobs state and produce phantom export rows.
const isMeaningfulJob = job => {
  if(!job || typeof job !== 'object' || Array.isArray(job)) return false;
  return !!(
    job.propertyId ||
    job.displayName ||
    job.temporaryLocationName ||
    job.day ||
    job.dateISO ||
    job.startTime ||
    job.source ||
    job.type ||
    job.serviceTypeId
  );
};
const cleanRestoredJobs = (jobs, label='jobs') => {
  const arr = Array.isArray(jobs) ? jobs : [];
  const cleaned = arr.filter(isMeaningfulJob);
  const removed = arr.length - cleaned.length;
  if(removed > 0) {
    console.warn(`[CleanFlow] Removed ${removed} empty restored jobs from ${label}`);
  }
  return cleaned;
};

// ── PROPERTY DISPLAY ORDER (display-only — never read by scheduler/export/conflicts) ──
const getPropertyDisplayOrder = propertyId => {
  const p = PROPERTIES.find(p => p.id === propertyId);
  return Number.isFinite(Number(p?.displayOrder)) ? Number(p.displayOrder) : 9999;
};
const sortJobsByPropertyDisplayOrder = (a,b) => {
  const oa = getPropertyDisplayOrder(a.propertyId);
  const ob = getPropertyDisplayOrder(b.propertyId);
  if(oa !== ob) return oa - ob;
  const ta = t2m(a.startTime || '00:00');
  const tb = t2m(b.startTime || '00:00');
  if(ta !== tb) return ta - tb;
  return getJobDisplayName(a).localeCompare(getJobDisplayName(b));
};

// ── EXTRA DUTIES PARSER ──────────────────────────────────────────────────────
// Columns: Date | Property | Temporary Location | Service Type | Start Time |
//          Duration | Cleaner 1 | Cleaner 2 | Cleaner 3 | Priority | Notes
// Row 1=title, Row 2=subtitle, Row 3=header, Row 4+=data
const parseExtraDutiesCSVWithDiagnostics = (rows, weekOffset=0, propertiesList=PROPERTIES, cleanersList=CLEANERS) => {
  const weekDates = getWeekDates(weekOffset);
  const weekMon = weekDates[0];
  const weekSun = weekDates[6];
  weekMon.setHours(0,0,0,0);
  weekSun.setHours(23,59,59,999);

  const parseDate = s => {
    const clean = (s||'').trim();
    // DD/MM/YYYY or D/M/YYYY
    const dmy = clean.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if(dmy) return new Date(parseInt(dmy[3]), parseInt(dmy[2])-1, parseInt(dmy[1]));
    // YYYY-MM-DD
    const ymd = clean.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
    if(ymd) return new Date(parseInt(ymd[1]), parseInt(ymd[2])-1, parseInt(ymd[3]));
    return null;
  };

  const dataRows = rows.slice(3).filter(r => r.some(c => (c||'').trim()));
  const totalRows = dataRows.length;

  const unresolvedProperties=[], unresolvedCleaners=[], invalidServiceTypes=[];
  const rowsWithoutLocation=[], rowsWithNoCleaner=[];
  const serviceTypeCounts={}, priorityCounts={};
  const jobs=[];
  let rowsInSelectedWeek=0;

  dataRows.forEach(r => {
    const dateRaw = (r[0]||'').trim();
    const date = parseDate(dateRaw);
    if(!date || isNaN(date.getTime())) return;
    if(date < weekMon || date > weekSun) return;
    rowsInSelectedWeek++;

    const propRaw = (r[1]||'').trim();
    const tempLoc = (r[2]||'').trim();
    const stRaw   = (r[3]||'').trim();
    const startTime = (r[4]||'09:00').trim();
    const duration  = parseFloat(r[5])||0;
    const priority  = (r[9]||'Normal').trim()||'Normal';
    const note      = (r[10]||'').trim();

    // Resolve property
    let propertyId = '';
    if(propRaw){
      propertyId = resolvePropertyId(propRaw, propertiesList);
      if(!propertyId) unresolvedProperties.push(propRaw);
    }

    // Must have property or temporary location
    if(!propertyId && !tempLoc){
      rowsWithoutLocation.push(dateRaw);
      return;
    }

    // Resolve cleaners
    const cleanerIds = [r[6],r[7],r[8]].map(c => {
      const raw = (c||'').trim();
      if(!raw) return null;
      const id = resolveCleanerId(raw, cleanersList);
      if(!id && raw.toLowerCase()!=='da assegnare') unresolvedCleaners.push(raw);
      return id;
    }).filter(Boolean);

    // Normalize service type — infer from context
    const normalized = normalizeServiceTypeId(stRaw);
    let serviceTypeId = normalized;
    if(!serviceTypeId){
      if(stRaw) invalidServiceTypes.push(stRaw);
      if(propertyId){
        const prop = propertiesList.find(p=>p.id===propertyId);
        if(prop?.type==='office') serviceTypeId='OFFICE_CLEAN';
        else if(prop?.type==='restaurant') serviceTypeId='RESTAURANT_CLEAN';
        else serviceTypeId='OTHER';
      } else {
        serviceTypeId='OTHER';
      }
    }

    if(cleanerIds.length===0) rowsWithNoCleaner.push(`${dateRaw} — ${propRaw||tempLoc}`);
    serviceTypeCounts[serviceTypeId]=(serviceTypeCounts[serviceTypeId]||0)+1;
    priorityCounts[priority]=(priorityCounts[priority]||0)+1;

    // Build day key
    const dow = date.getDay(); // 0=Sun
    const dayKey = DAYS[dow===0?6:dow-1];

    // Display name
    const prop = propertiesList.find(p=>p.id===propertyId);
    const displayName = prop?.name || tempLoc || propRaw || 'Unknown';

    // ISO date string
    const pad = n => String(n).padStart(2,'0');
    const dateISO = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;

    jobs.push({
      id: uid(),
      day: dayKey,
      dateISO,
      propertyId,
      temporaryLocationName: tempLoc,
      displayName,
      serviceTypeId,
      cleanerIds,
      startTime,
      duration,
      priority,
      note,
      type: 'extra',
      source: 'extra',
    });
  });

  return {
    jobs,
    diagnostics:{
      totalRows,
      rowsInSelectedWeek,
      importedRows: jobs.length,
      skippedRows: rowsInSelectedWeek - jobs.length,
      unresolvedProperties: [...new Set(unresolvedProperties)],
      unresolvedCleaners: [...new Set(unresolvedCleaners)],
      invalidServiceTypes: [...new Set(invalidServiceTypes)],
      rowsWithoutLocation,
      rowsWithNoCleaner,
      serviceTypeCounts,
      priorityCounts,
    },
  };
};

// ── Late-shift rest rule ─────────────────────────────────────────────────────
// If a cleaner finishes a shift AFTER 22:00, they need at least 9 hours rest
// before their next shift starts. Cross-day aware via absolute minute offsets.
const LATE_SHIFT_END_THRESHOLD_MINUTES = 22 * 60;  // 22:00 in minutes
const MIN_REST_AFTER_LATE_SHIFT_MINUTES = 9 * 60;  // 9 hours — hard block (CEO rule)

// Convert a YYYY-MM-DD string to an absolute day number (days since 2000-01-01).
// Used only for ordering jobs across different weeks/days.
const dateISOToAbsDay = iso => {
  if(!iso||!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return -1;
  const [y,m,d]=iso.split('-').map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/86400000);
};
// Absolute start in minutes. Prefers dateISO; falls back to DAYS index × 1440.
const getJobAbsStartMinutes = job => {
  const absDay = job.dateISO ? dateISOToAbsDay(job.dateISO) : -1;
  const dayOffset = absDay>=0 ? absDay : DAYS.indexOf(job.day);
  return Math.max(0,dayOffset)*1440 + t2m(job.startTime||'00:00');
};
const getJobAbsEndMinutes = job => getJobAbsStartMinutes(job) + getJobOperationalDuration(job)*60;
// FIX 10M-D STEP 2 regression fix B: cleaner-specific absolute start/end, mirroring
// getJobAbsStartMinutes/getJobAbsEndMinutes but using THIS cleaner's own operational
// window (manual cleaner override, if any) instead of the job-wide duty window.
const getCleanerAbsStartMinutes = (job, cleanerId) => {
  const absDay = job.dateISO ? dateISOToAbsDay(job.dateISO) : -1;
  const dayOffset = absDay>=0 ? absDay : DAYS.indexOf(job.day);
  return Math.max(0,dayOffset)*1440 + getCleanerOperationalStartMinutes(job, cleanerId);
};
const getCleanerAbsEndMinutes = (job, cleanerId) => {
  const absDay = job.dateISO ? dateISOToAbsDay(job.dateISO) : -1;
  const dayOffset = absDay>=0 ? absDay : DAYS.indexOf(job.day);
  return Math.max(0,dayOffset)*1440 + getCleanerOperationalEndMinutes(job, cleanerId);
};

// Format minutes as e.g. "8h30" or "9h".
const formatMinutesAsHours = mins => {
  const h=Math.floor(mins/60), m=mins%60;
  return m>0 ? `${h}h${String(m).padStart(2,'0')}` : `${h}h`;
};

// Returns null if valid; otherwise returns an issue object:
// { type:'late_rest', severity:'hard', available:gapMinutes, needed:540, msg:'...' }
// The function is order-agnostic: it determines which job is earlier internally.
// FIX 10M-D STEP 2 regression fix B: optional cleanerId — when provided, uses THAT
// cleaner's own operational/absolute window (their manual override, if any). Omitting
// cleanerId reproduces the exact prior job-wide behavior (scheduler/optimizer/fallback
// call sites are intentionally left passing no cleanerId — unchanged).
const getLateShiftRestIssue = (cleanerName, jobA, jobB, cleanerId=null) => {
  const aStart = cleanerId ? getCleanerAbsStartMinutes(jobA,cleanerId) : getJobAbsStartMinutes(jobA);
  const aEnd   = cleanerId ? getCleanerAbsEndMinutes(jobA,cleanerId)   : getJobAbsEndMinutes(jobA);
  const bStart = cleanerId ? getCleanerAbsStartMinutes(jobB,cleanerId) : getJobAbsStartMinutes(jobB);
  const bEnd   = cleanerId ? getCleanerAbsEndMinutes(jobB,cleanerId)   : getJobAbsEndMinutes(jobB);
  let earlyEnd, laterStart, earlyJob, lateJob;
  if(aEnd<=bStart){
    earlyEnd=aEnd; laterStart=bStart; earlyJob=jobA; lateJob=jobB;
  } else if(bEnd<=aStart){
    earlyEnd=bEnd; laterStart=aStart; earlyJob=jobB; lateJob=jobA;
  } else {
    return null; // overlapping — handled by overlap/travel checks
  }
  // Rule triggers only when the earlier job ends STRICTLY after 22:00 on its day.
  // Use start+duration (not modulo) so cross-midnight shifts are handled correctly.
  const earlyRelEnd = cleanerId ? getCleanerOperationalEndMinutes(earlyJob,cleanerId) : getJobOperationalEndMinutes(earlyJob);
  if(earlyRelEnd <= LATE_SHIFT_END_THRESHOLD_MINUTES) return null;
  const gap = laterStart - earlyEnd;
  if(gap<0||gap>=MIN_REST_AFTER_LATE_SHIFT_MINUTES) return null;
  const earlyName=earlyJob.displayName||earlyJob.propertyId||'';
  const lateName =lateJob.displayName ||lateJob.propertyId ||'';
  const msg=`${cleanerName}: riposo insufficiente dopo turno serale (${earlyName} → ${lateName}) — minimo 9h, disponibili ${formatMinutesAsHours(gap)}`;
  return { type:'late_rest', severity:'hard', available:gap, needed:MIN_REST_AFTER_LATE_SHIFT_MINUTES, msg };
};

const fetchPublishedSchedule = async (weekStartISO) => {

// POST current jobs to the backend. Replaces the entire week atomically server-side.
const publishScheduleToBackend = async (weekStartISO, weekEndISO, publishedBy, jobs, baseSnapshotId=null) => {
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), 30000);
  try {
    const res = await fetch(PUBLISHED_API_URL, {
      method:'POST',
      redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain to avoid CORS preflight
      body: JSON.stringify({ weekStartISO, weekEndISO, publishedBy, jobs, baseSnapshotId }),
      signal: controller.signal,
    });
    if(!res.ok) return { ok:false, error:`HTTP ${res.status}` };
    const data = await res.json();
    // Pass through conflict payload as-is so the caller can show details.
    if(!data || data.ok!==true) return data && data.error ? data : { ok:false, error:(data&&data.error)||'Unknown API error' };
    return data; // { ok, snapshotId, publishedAt, rowCount, weekStartISO, weekEndISO }
  } catch(e) {
    if(e.name==='AbortError') return { ok:false, error:'Timeout pubblicazione: backend non ha risposto entro 30s' };
    return { ok:false, error: String(e.message||e) };
  } finally {
    clearTimeout(timer);
  }
};

// ─── Operational job normalization for dirty-comparison ────────────────────
// Compare only the fields that matter operationally. Sort deterministically so
// reordering or non-operational metadata changes do not cause false dirty flags.
const OPERATIONAL_FIELDS = ['id','day','dateISO','propertyId','temporaryLocationName','displayName','serviceTypeId','startTime','duration','manualEndTime','cleanerTimeOverrides','cleanersRequired','cleanerIds','priority','note','type','source','status'];
const normalizeJobsForCompare = (jobs) => {
  if(!Array.isArray(jobs)) return '[]';
  const normalized = jobs.map(j=>{
    const o = {};
    OPERATIONAL_FIELDS.forEach(k=>{
      let v = j[k];
      if(k==='cleanerIds') v = Array.isArray(v) ? [...v].map(String).sort() : [];
      else if(k==='duration') v = Number(v)||0;
      else if(k==='cleanersRequired') v = parseInt(v,10) || 1;
      // cleanerTimeOverrides is an object keyed by cleanerId — serialize deterministically
      // (sorted keys) so key-insertion order never causes a false dirty flag.
      else if(k==='cleanerTimeOverrides'){
        const ov = (v && typeof v==='object') ? v : {};
        v = Object.keys(ov).sort().map(id=>`${id}:${ov[id]?.startTime||''}-${ov[id]?.endTime||''}`).join(',');
      }
      else if(v===undefined || v===null) v = '';
      else v = String(v);
      o[k] = v;
    });
    return o;
  });
  // Deterministic sort by composite key
  normalized.sort((a,b)=>{
    const ka = `${a.dateISO}|${a.day}|${a.startTime}|${a.propertyId}|${a.displayName}|${a.id}`;
    const kb = `${b.dateISO}|${b.day}|${b.startTime}|${b.propertyId}|${b.displayName}|${b.id}`;
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  return JSON.stringify(normalized);
};

// Italian relative time for the banner. Compact, supervisor-friendly.
const formatRelativeTimeIt = (isoString) => {
  if(!isoString) return '—';
  const then = new Date(isoString);
  if(isNaN(then.getTime())) return '—';
  const now = new Date();
  const diffMs = now - then;
  const diffSec = Math.round(diffMs / 1000);
  const diffMin = Math.round(diffSec / 60);
  const diffHour = Math.round(diffMin / 60);
  const diffDay = Math.round(diffHour / 24);
  if(diffSec < 60) return 'poco fa';
  if(diffMin < 60) return `${diffMin} min fa`;
  if(diffHour < 6) return `${diffHour} ${diffHour===1?'ora':'ore'} fa`;
  // Same calendar day
  const sameDay = then.toDateString() === now.toDateString();
  if(sameDay) return `oggi ${then.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
  // Yesterday
  const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
  if(then.toDateString() === yesterday.toDateString()){
    return `ieri ${then.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
  }
  if(diffDay < 7) return `${diffDay} giorni fa`;
  return then.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
};

// Format DD/MM date for a week range label
// Parse a YYYY-MM-DD string into a LOCAL Date (no UTC shift). Returns null if invalid.
const parseISODateLocal = iso => {
  const [y,m,d] = String(iso || '').split('-').map(Number);
  if(!y || !m || !d) return null;
  return new Date(y, m - 1, d);
};

// Stable operational identity of a job, independent of its generated id.
// Used to de-duplicate published jobs against local last-minute jobs.
const getJobOperationalKey = (job) => {
  if(!job) return '';
  const loc = job.propertyId || job.temporaryLocationName || job.displayName || '';
  const dur = Number(job.duration) || 0;
  return [
    job.dateISO || '',
    job.startTime || '',
    loc,
    job.serviceTypeId || '',
    dur,
  ].join('|');
};

// ── HOSTAWAY API → CleanFlow jobs (frontend mapping + rules) ───────────────
// Convert a Hostaway hour (number 16, or "16:00", or null) to "HH:MM" or fallback.
const hostawayHourToHHMM = (value, fallback) => {
  if(value === null || value === undefined || value === '') return fallback;
  if(typeof value === 'number' && isFinite(value)){
    const h = Math.floor(value);
    if(h < 0 || h > 23) return fallback;
    return String(h).padStart(2,'0') + ':00';
  }
  const s = String(value).trim();
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if(m){
    const h = parseInt(m[1],10);
    if(h>=0 && h<=23) return String(h).padStart(2,'0') + ':' + m[2];
  }
  const n = parseInt(s,10);
  if(!isNaN(n) && n>=0 && n<=23) return String(n).padStart(2,'0') + ':00';
  return fallback;
};

// Derive Hostaway workflow flags from a set of restored jobs, so the workflow UI
// reflects that Hostaway jobs are already present after a published/draft restore.
const deriveHostawayWf = (jobsArr) => {
  const arr = Array.isArray(jobsArr) ? jobsArr : [];
  const hasApi = arr.some(j => j.source==='hostaway_api');
  const hasCsv = arr.some(j => j.source==='hostaway_csv');
  return {
    hostawayLoaded: hasApi || hasCsv,
    hostawaySource: hasApi ? 'hostaway_api' : (hasCsv ? 'hostaway_csv' : null),
  };
};

const dayFromISO = iso => {
  const d = parseISODateLocal(iso);
  if(!d) return '';
  const dow = d.getDay(); // 0=Sun..6=Sat
  return DAYS[dow===0 ? 6 : dow-1];
};

// Pure function: reservations (from backend) → { jobs, diagnostics }.
// Applies HOSTAWAY_MAP_BY_ID, Ignore, back-to-back detection and check-in clean.
// Does NOT mutate state and does NOT import — the modal previews then imports.
const generateApiJobsFromReservations = (reservations, weekOffset=0, mapById=HOSTAWAY_MAP_BY_ID, propertiesList=PROPERTIES) => {
  const monISO = getWeekStartISO(weekOffset);
  const sunISO = getWeekEndISO(weekOffset);
  const inWeek = iso => iso && iso>=monISO && iso<=sunISO;
  const list = Array.isArray(reservations) ? reservations : [];

  const diagnostics = {
    fetched: list.length,
    active: 0,
    generatedJobs: 0,
    checkoutJobs: 0,
    backToBackJobs: 0,
    checkinCleanJobs: 0,
    checkinCleanSuppressed: 0,
    ignored: 0,
    unmapped: 0,
    warnings: [],
    ignoredList: [],
    unmappedList: [],
  };

  // Resolve mapping for a reservation. Returns {status:'ok'|'ignored'|'unmapped', mapping, property}.
  const resolve = (r) => {
    const idKey = r.listingId != null ? String(r.listingId) : '';
    const mapping = idKey && mapById ? mapById[idKey] : null;
    const displayName = (r.listingName || idKey || '(senza nome)');
    if(!mapping){
      return { status:'unmapped', displayName };
    }
    if(mapping.ignore === true){
      return { status:'ignored', mapping, displayName };
    }
    if(!mapping.propertyId){
      return { status:'unmapped', mapping, displayName }; // Ignore FALSE but no propertyId
    }
    const property = propertiesList.find(p => p.id === mapping.propertyId) || null;
    return { status:'ok', mapping, property, displayName };
  };

  // First pass: classify reservations, collect resolved (active, mapped, in-week) ones.
  const resolved = []; // { r, mapping, property, displayName }
  for(let i=0;i<list.length;i++){
    const r = list[i];
    diagnostics.active++; // backend already excluded cancelled; treat all received as active
    const res = resolve(r);
    if(res.status === 'ignored'){
      diagnostics.ignored++;
      diagnostics.ignoredList.push({ listingId:r.listingId, name:res.displayName, reason: (res.mapping&&res.mapping.notes)||'Ignore' });
      continue;
    }
    if(res.status === 'unmapped'){
      diagnostics.unmapped++;
      diagnostics.unmappedList.push({ listingId:r.listingId, name:res.displayName });
      continue;
    }
    if(!res.property){
      diagnostics.warnings.push(`PropertyId "${res.mapping.propertyId}" non trovato nel tab Properties (listing ${res.displayName}) — uso valori di default`);
    }
    resolved.push({ r, mapping:res.mapping, property:res.property, displayName: res.mapping.cleanFlowName || (res.property&&res.property.name) || res.displayName });
  }

  // Build a map of "arrival reservation by property+date" to detect back-to-back
  // AND to source the check-in time from the ARRIVING reservation (not the departing one).
  const arrivalByPropertyDate = {}; // key propertyId|dateISO → arrival reservation
  resolved.forEach(({ r, mapping }) => {
    if(inWeek(r.arrivalDate)) arrivalByPropertyDate[mapping.propertyId + '|' + r.arrivalDate] = r;
  });

  // Build a complete Set of property+date keys that will have a checkout clean
  // (CHECKOUT_COMPLETE or BACK_TO_BACK) generated this week. Must be pre-built
  // across ALL resolved reservations before the check-in clean block runs,
  // because arrival and departure records may be in any order.
  const checkoutCleanByPropertyDate = new Set();
  resolved.forEach(({ r, mapping }) => {
    if(inWeek(r.departureDate) && mapping.propertyId) {
      checkoutCleanByPropertyDate.add(mapping.propertyId + '|' + r.departureDate);
    }
  });

  const jobs = [];
  const seen = {}; // internal dedup: dateISO|propertyId|serviceTypeId|hostawayId|type
  const pushJob = (job, hostawayId, type) => {
    const key = [job.dateISO, job.propertyId, job.serviceTypeId, hostawayId, type].join('|');
    if(seen[key]) return false;
    seen[key] = true;
    jobs.push(job);
    return true;
  };

  resolved.forEach(({ r, mapping, property, displayName }) => {
    const pid = mapping.propertyId;
    const dur = (property && (property.checkoutDuration || property.duration)) || 2;
    const checkoutCleaners = (property && (property.checkoutCleanersRequired || property.cleanersRequired)) || 1;

    // ── Checkout job (on departureDate, in-week) ──
    if(inWeek(r.departureDate)){
      const arrivalRes = arrivalByPropertyDate[pid + '|' + r.departureDate];
      const isB2B = !!arrivalRes;
      let startTime, serviceTypeId, note, constraintEndTime;
      if(isB2B){
        // Start = THIS reservation's checkout time. End = the ARRIVING reservation's check-in time.
        startTime = hostawayHourToHHMM(r.checkOutTime, (property&&property.checkoutTime) || '10:00');
        constraintEndTime = hostawayHourToHHMM(arrivalRes.checkInTime, '16:00');
        serviceTypeId = HOSTAWAY_ST_BACK_TO_BACK;
        note = `Hostaway checkout · Res ${r.hostawayId}${r.channelName?' · '+r.channelName:''} · BACK-TO-BACK: must clean between checkout and check-in (${startTime}–${constraintEndTime})`;
      } else {
        // Normal checkout: guests are still inside until their checkout time, so the
        // clean must start at the actual checkout time — NOT cleaningWindowStart (that
        // is only for check-in/prepare-for-guest tasks). Prefer the reservation's
        // checkOutTime, then property.checkoutTime, then 10:00.
        startTime = hostawayHourToHHMM(r.checkOutTime, (property && property.checkoutTime) || '10:00');
        serviceTypeId = HOSTAWAY_ST_CHECKOUT;
        note = `Hostaway checkout · Res ${r.hostawayId}${r.channelName?' · '+r.channelName:''}`;
      }
      const job = {
        propertyId: pid,
        day: dayFromISO(r.departureDate),
        dateISO: r.departureDate,
        displayName: displayName,
        startTime: startTime,
        duration: dur,
        cleanersRequired: checkoutCleaners,
        cleanerIds: [],
        type: 'checkout',
        source: 'hostaway_api',
        serviceTypeId: serviceTypeId,
        status: 'unassigned',
        note: note,
        // Flexible window: earliest start is the checkout time (never cleaningWindowStart);
        // latest finish is the window end (b2b: arriving check-in; normal: cleaningWindowEnd).
        flexibleWindow: true,
        windowStartTime: startTime,
        windowEndTime: isB2B ? constraintEndTime : ((property && property.cleaningWindowEnd) || '16:00'),
        // Guest metadata — display only, never read by scheduler or operational logic.
        guestCount:    Number(r.numberOfGuests) || null,
        guestAdults:   Number(r.adults)         || null,
        guestChildren: Number(r.children)       || null,
        guestInfants:  Number(r.infants)        || null,
        guestPets:     Number(r.pets)           || null,
      };
      if(isB2B){
        job.constraintStartTime = startTime;
        job.constraintEndTime = constraintEndTime;
        // Sprint 2A: incoming (arriving) reservation's guest metadata — display-only,
        // supervisor-export-exclusive. arrivalRes is the SAME deterministically-matched
        // reservation (same propertyId + exact departureDate===arrivalDate key) already
        // used above for isB2B/constraintEndTime — not a new or heuristic lookup.
        // The legacy guest*/guestCount fields above (the DEPARTING reservation) are
        // left completely untouched.
        job.incomingGuestCount = Number(arrivalRes.numberOfGuests) || null;
        job.incomingAdults     = Number(arrivalRes.adults)         || null;
        job.incomingChildren   = Number(arrivalRes.children)       || null;
        job.incomingInfants    = Number(arrivalRes.infants)        || null;
        job.incomingPets       = Number(arrivalRes.pets)           || null;
      }
      if(pushJob(job, r.hostawayId, 'checkout')){
        diagnostics.checkoutJobs++;
        if(isB2B) diagnostics.backToBackJobs++;
      }
    }

    // ── Check-in clean (on arrivalDate, in-week, only if property requires it) ──
    if(inWeek(r.arrivalDate) && property && property.requiresCheckinClean === true){
      // Suppress check-in clean when a checkout/back-to-back clean already exists for
      // the same property on the same arrival date. The checkout clean already prepares
      // the property for the arriving guest — generating a separate check-in clean
      // would create two teams in the same house simultaneously.
      const sameDayCheckoutKey = pid + '|' + r.arrivalDate;
      if(checkoutCleanByPropertyDate.has(sameDayCheckoutKey)){
        diagnostics.checkinCleanSuppressed++;
        diagnostics.warnings.push(
          `Check-in clean skipped for ${displayName} ${r.arrivalDate}: same-day checkout/back-to-back clean already exists.`
        );
        // Skip to next reservation — do not push the PREPARE_FOR_GUEST job.
      } else {
      const ciDur = (property.checkinTaskDuration || property.duration) || 2;
      const ciCleaners = (property.checkinCleanersRequired || property.cleanersRequired) || 1;
      const arrivalHH = hostawayHourToHHMM(r.checkInTime, '16:00');
      // FIX 2.3.3: "Default Checkin Task Time" is the START time of the clean,
      // not a deadline. Priority: checkinTaskTime → cleaningWindowStart → '08:30'.
      const startTime = isValidHHMM(property.checkinTaskTime) ? String(property.checkinTaskTime).trim()
                      : (isValidHHMM(property.cleaningWindowStart) ? String(property.cleaningWindowStart).trim() : '08:30');
      // Window end = the earlier of: guest arrival time OR cleaningWindowEnd.
      // Do NOT use checkinTaskTime as a deadline — that is now the start.
      const cleaningEnd = isValidHHMM(property.cleaningWindowEnd) ? String(property.cleaningWindowEnd).trim() : '16:00';
      const ciWindowEnd = t2m(arrivalHH) < t2m(cleaningEnd) ? arrivalHH : cleaningEnd;
      const job = {
        propertyId: pid,
        day: dayFromISO(r.arrivalDate),
        dateISO: r.arrivalDate,
        displayName: displayName,
        startTime: startTime,
        duration: ciDur,
        cleanersRequired: ciCleaners,
        cleanerIds: [],
        type: 'checkin',
        source: 'hostaway_api',
        serviceTypeId: HOSTAWAY_ST_CHECKIN,
        status: 'unassigned',
        note: `Hostaway check-in clean · Res ${r.hostawayId} · arrival ${arrivalHH}`,
        flexibleWindow: true,
        windowStartTime: startTime,
        windowEndTime: ciWindowEnd,
        // Guest metadata — display only, never read by scheduler or operational logic.
        guestCount:    Number(r.numberOfGuests) || null,
        guestAdults:   Number(r.adults)         || null,
        guestChildren: Number(r.children)       || null,
        guestInfants:  Number(r.infants)        || null,
        guestPets:     Number(r.pets)           || null,
      };
      if(pushJob(job, r.hostawayId, 'checkin')) diagnostics.checkinCleanJobs++;
      } // end else (no same-day checkout clean)
    }
  });

  diagnostics.generatedJobs = jobs.length;
  return { jobs, diagnostics };
};

const formatDayMonth = (isoString) => {
  if(!isoString) return '—';
  const d = parseISODateLocal(isoString);
  if(!d || isNaN(d.getTime())) return isoString;
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
};

const getDeployGeminiKey = () => window.__CF_CONFIG__?.geminiKey?.trim() || '';
const getLocalGeminiKey = () => localStorage.getItem('cf_gemini_key')?.trim() || '';
const t2m = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const m2t = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const tAdd = (t,h) => m2t((t2m(t)+h*60)%(24*60));
const fmtAMPM = t => { const [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; return `${h%12||12}:${String(m).padStart(2,'0')} ${ap}`; };

// ── FIX 10M-D STEP 1 — Manual Duty End-Time Override ────────────────────────
// Job-level operational end-time override. When job.manualEndTime is a valid
// HH:MM strictly after job.startTime, it becomes the REAL operational end for
// overlap / travel-buffer / late-rest / hours / export purposes. getJobDuration()
// itself is NEVER modified — it still reflects the configured/property duration.
const getJobDefaultEndMinutes = job => t2m(job.startTime||'00:00') + getJobDuration(job)*60;
const getJobOperationalEndMinutes = job => {
  if(
    job?.manualEndTime &&
    isValidHHMM(job.manualEndTime) &&
    t2m(job.manualEndTime) > t2m(job.startTime||'00:00')
  ){
    return t2m(job.manualEndTime);
  }
  return getJobDefaultEndMinutes(job);
};
const getJobOperationalDuration = job =>
  Math.max(0, (getJobOperationalEndMinutes(job)-t2m(job.startTime||'00:00'))/60);
// Job-wide operational start. Today this is always just the configured startTime (STEP 1
// only introduced an END-time override), but named for symmetry with the other two
// job-wide helpers and so future duty-start overrides would have a single place to land.
const getJobOperationalStartMinutes = job => t2m(job.startTime||'00:00');
const uid = () => { try{return crypto.randomUUID();}catch{return 'j'+Date.now().toString(36)+Math.random().toString(36).slice(2,9);} };
const getTodayKey = () => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
