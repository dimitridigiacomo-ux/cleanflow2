const getMondayOf = (offset=0) => { const now=new Date(); const dow=now.getDay(); const m=new Date(now); m.setDate(now.getDate()-(dow===0?6:dow-1)+offset*7); m.setHours(0,0,0,0); return m; };
const getWeekDates = (offset=0) => { const m=getMondayOf(offset); return DAYS.map((_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return d; }); };
// Local-timezone-safe YYYY-MM-DD (avoid UTC shift on dates near midnight in Malta/Europe)
const toISODateLocal = d => {
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const getDateISOForDay = (day, weekOffset=0) => {
  const dates=getWeekDates(weekOffset);
  const idx=DAYS.indexOf(day);
  return idx>=0?toISODateLocal(dates[idx]):'';
};
const fmtWeek = offset => {
  const dates=getWeekDates(offset); const mon=dates[0]; const sun=dates[6];
  if(mon.getMonth()===sun.getMonth()) return `${mon.getDate()}–${sun.getDate()} ${MON_IT[mon.getMonth()]} ${mon.getFullYear()}`;
  return `${mon.getDate()} ${MON_IT[mon.getMonth()]} – ${sun.getDate()} ${MON_IT[sun.getMonth()]} ${sun.getFullYear()}`;
};
const fmtDate = d => `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;

const useWindowWidth = () => {
  const [w, setW] = useState(typeof window!=='undefined'?window.innerWidth:1200);
  useEffect(() => { const h=()=>setW(window.innerWidth); window.addEventListener('resize',h); return()=>window.removeEventListener('resize',h); },[]);
  return w;
};

// Dedupe a cleanerIds array: drop falsy entries, coerce to string, remove duplicates.
const dedupeCleanerIds = ids => [...new Set((Array.isArray(ids) ? ids : []).filter(Boolean).map(String))];

// ── CONFLICT ENGINE ─────────────────────────────────────────────────────────────
const detectConflicts = jobs => {
  const out = new Map();
  const add = (id, issue) => { if(!out.has(id)) out.set(id,[]); out.get(id).push(issue); };
  jobs.forEach(job => {
    const jobCleanerIds=dedupeCleanerIds(job.cleanerIds);
    const required=getJobRequiredCleaners(job);
    if(jobCleanerIds.length<required)
      add(job.id,{type:'staffing',msg:`Richiede ${required} cleaner${required>1?'s':''} — assegnate solo ${jobCleanerIds.length}`});
    // Gender requirement: enforced for NON-locked jobs only. Locked template jobs are
    // authoritative and never blocked on gender (diagnostic-only).
    {
      const genReq=getJobGenderRequirement(job);
      if(genReq.male>0 || genReq.female>0){
        const have=countTeamGender(jobCleanerIds);
        const locked=isLockedTemplateJob(job);
        const pass=have.male>=genReq.male && have.female>=genReq.female;
        const prop=PROPERTIES.find(p=>p.id===job.propertyId);
        if(typeof console!=='undefined') console.debug('[gender]',{property:prop?.name||job.propertyId,jobId:job.id,source:job.source,type:job.type,requiredMale:genReq.male,requiredFemale:genReq.female,assignedMale:have.male,assignedFemale:have.female,lockedTemplate:locked,result:pass?'pass':'fail'});
        if(!pass && !locked){
          add(job.id,{type:'gender',msg:`Requisito genere non soddisfatto: servono ${genReq.male} uomini e ${genReq.female} donne, team assegnato ha ${have.male} uomini e ${have.female} donne.`});
        }
      }
    }
    // Seniority requirement (Fix 10M-A): diagnostic only, review-only type.
    // Locked template jobs are exempt (same policy as gender).
    {
      const seniorReq = getJobSeniorRequirement(job);
      if(seniorReq.senior > 0){
        const have = countTeamSenior(jobCleanerIds);
        const locked = isLockedTemplateJob(job);
        if(have.senior < seniorReq.senior && !locked){
          add(job.id,{type:'seniority',msg:`Requisito senior non soddisfatto: servono ${seniorReq.senior} senior, team assegnato ne ha ${have.senior}.`});
        }
      }
    }
    // Window conflict (flexible jobs only). Fixed jobs are never window-constrained.
    if(job.flexibleWindow){
      const win=getJobSchedulingWindow(job);
      const jStart=t2m(job.startTime), jEnd=getJobOperationalEndMinutes(job);
      if(win.end){
        const wEnd=t2m(win.end);
        if(jEnd>wEnd) add(job.id,{type:'window',msg:`Fuori finestra pulizia: il turno deve finire entro ${win.end}.`});
      }
      if(win.start && /^\d{1,2}:\d{2}$/.test(win.start)){
        const wStart=t2m(win.start);
        if(jStart<wStart) add(job.id,{type:'window',msg:`Fuori finestra pulizia: il turno non può iniziare prima di ${win.start}.`});
      }
    }
    jobCleanerIds.forEach(cId=>{
      const cl=CLEANERS.find(c=>c.id===cId); if(!cl) return;
      if(!cl.days.includes(job.day)) add(job.id,{type:'unavailable',cId,msg:`${cl.name}: non disponibile ${DAY_IT[job.day]}`});
      // Holiday / off period — only checkable when the job carries a concrete date.
      if(job.dateISO && isCleanerUnavailableOnDate(cl, job.dateISO))
        add(job.id,{type:'unavailable',cId,msg:`${cl.name}: assente/ferie il ${job.dateISO}`});
      // Training check only for jobs with a known property
      if(jobRequiresTraining(job)&&!TRAINING[cId]?.includes(job.propertyId))
        add(job.id,{type:'untrained',cId,msg:`${cl.name}: non formata per ${getJobDisplayName(job)}`});
      // Overlap: temporary jobs block cleaner slots too — no prop required.
      // Flag BOTH overlapping jobs so each job's card shows the conflict
      // (previously only the earlier job was flagged).
      // STEP 2: uses THIS cleaner's own operational window (cleaner override, if any,
      // beats the job-wide window — e.g. a cleaner starting later may no longer overlap).
      const cJS=getCleanerOperationalStartMinutes(job,cId), cJE=getCleanerOperationalEndMinutes(job,cId);
      jobs.filter(o=>o.id!==job.id&&o.day===job.day&&o.cleanerIds.includes(cId)
      ).forEach(o=>{
        const oS=getCleanerOperationalStartMinutes(o,cId), oE=getCleanerOperationalEndMinutes(o,cId);
        if(cJS<oE&&cJE>oS) add(job.id,{type:'overlap',cId,msg:`${cl.name}: già a ${getJobDisplayName(o)} (${m2t(oS)}–${m2t(oE)})`});
        else {
          // Non-overlapping: check travel buffer. Flag only on THIS job when it is the
          // later one (so each adjacent pair produces one message per job, not duplicated).
          if(cJS>=oE){
            const issue=getTravelBufferIssue(cl.name, o, job, cId);
            if(issue) add(job.id,{type:'travel',cId,msg:issue.msg});
          }
        }
      });
      // Late-shift rest rule (cross-day). Flag only on the LATER job to avoid
      // double-reporting; the earlier job is processed when its own iteration runs.
      jobs.filter(o=>o.id!==job.id&&o.cleanerIds.includes(cId)&&
        getJobAbsStartMinutes(o)<getJobAbsStartMinutes(job)
      ).forEach(o=>{
        const issue=getLateShiftRestIssue(cl.name, o, job, cId);
        if(issue) add(job.id,{type:'late_rest',severity:'hard',cId,msg:issue.msg});
      });
    });
  });
  return out;
};

// ── Real-conflict taxonomy (display-only; detectConflicts() itself is untouched) ──
// detectConflicts() lumps staffing/gender shortfalls into the same Map as true
// scheduling clashes (overlap, travel, late_rest, unavailable, untrained, window).
// These helpers split that out for display purposes so "Conflitti" UI elements can
// show only real operational clashes, while staffing/gender stay under "Da rivedere".
// Shared by WeekView and Sidebar to avoid the two drifting out of sync.
const REVIEW_ONLY_CONFLICT_TYPES = new Set(['staffing','gender','seniority']);
const isRealConflictIssue = issue => issue && !REVIEW_ONLY_CONFLICT_TYPES.has(issue.type);
const getRealConflictIssues = (conflicts, jobId) => (conflicts?.get?.(jobId)||[]).filter(isRealConflictIssue);
const getRealConflictCount = (jobs, conflicts) => jobs.filter(j => getRealConflictIssues(conflicts, j.id).length > 0).length;

// Only flag offices and restaurants as "uncovered" — short-let without checkout is normal
const getUncovered = jobs => PROPERTIES.filter(p=>
  (p.type==='office'||p.type==='restaurant') && !jobs.some(j=>j.propertyId===p.id)
);
// All properties without any job this week (informational only)
const getAllUncovered = jobs => PROPERTIES.filter(p=>!jobs.some(j=>j.propertyId===p.id));
const computeCleanerStats = jobs => CLEANERS.map(cl=>{
  const assignedHrs=jobs.filter(j=>j.cleanerIds.includes(cl.id)).reduce((s,j)=>s+getCleanerEffectiveJobDuration(j,cl.id),0);
  const availDays=DAYS.filter(d=>cl.days.includes(d)).length;
  const capacityHrs=cl.weeklyHrs||availDays*MAX_HRS[cl.type];
  const pct=capacityHrs>0?Math.min(100,Math.round(assignedHrs/capacityHrs*100)):0;
  const daysWorked=new Set(jobs.filter(j=>j.cleanerIds.includes(cl.id)).map(j=>j.day)).size;
  const daysOverLimit=cl.workDays>0&&daysWorked>cl.workDays;
  return {cl,assignedHrs,capacityHrs,availDays,pct,daysWorked,daysOverLimit};
});

// ── RICHIESTE EXTRA PARSER ─────────────────────────────────────────────────────
// Reads free Italian text, extracts operational constraints.
// Returns: { daysOff, maxWeeklyHrs, maxDailyHrs, maxEndTime, parsed[] }
const parseExtraRequests = (text, weekOffset) => {
  const result = { daysOff:[], maxWeeklyHrs:null, maxDailyHrs:null, maxEndTime:null, parsed:[] };
  if (!text?.trim()) return result;

  const t = text.toLowerCase();

  // Week validity check — format "19/05/2026 – 25/05/2026" or "19/05 – 25/05"
  // (called separately, parser always runs regardless)

  // Day name map — Italian full + abbreviation
  const DAY_MAP = {
    'lunedì':'Mon','lunedi':'Mon','lun':'Mon',
    'martedì':'Tue','martedi':'Tue','mar':'Tue',
    'mercoledì':'Wed','mercoledi':'Wed','mer':'Wed',
    'giovedì':'Thu','giovedi':'Thu','gio':'Thu',
    'venerdì':'Fri','venerdi':'Fri','ven':'Fri',
    'sabato':'Sat','sab':'Sat',
    'domenica':'Sun','dom':'Sun',
  };

  // Context words that signal unavailability
  const OFF_CTX = ['riposa','riposo','fuori','non disponibile','assente','off','pausa','libera','libero'];

  // For each day name found, check if preceded (within 40 chars) by an off-context word
  Object.entries(DAY_MAP).forEach(([it,en])=>{
    const idx = t.indexOf(it);
    if(idx === -1) return;
    const before = t.slice(Math.max(0,idx-40), idx);
    if(OFF_CTX.some(ctx => before.includes(ctx)) || t.includes(`riposa ${it}`) || t.includes(`fuori ${it}`)){
      if(!result.daysOff.includes(en)){
        result.daysOff.push(en);
        result.parsed.push(`Non disponibile ${DAY_FULL[en]}`);
      }
    }
  });

  // Max daily hours: "max 6 ore al giorno", "max 6 ore giornaliere", "max 6h"
  const dailyM = t.match(/max(?:imo)?\s+(\d+(?:[.,]\d+)?)\s*(?:h\b|ore?\s*(?:al\s*giorno|giornali)?)/);
  if(dailyM){ result.maxDailyHrs=parseFloat(dailyM[1].replace(',','.')); result.parsed.push(`Max ${result.maxDailyHrs}h/giorno`); }

  // Max weekly hours: "max 30 ore questa settimana" / "max 30 ore settimanali"
  const weeklyM = t.match(/max(?:imo)?\s+(\d+)\s*ore?\s*(?:questa\s*)?settimana(?:li)?/);
  if(weeklyM){ result.maxWeeklyHrs=parseInt(weeklyM[1]); result.parsed.push(`Max ${result.maxWeeklyHrs}h/settimana`); }

  // Max end time: "max fino alle 15", "fino alle 15:30", "solo mattina" → 13:00
  const endM = t.match(/(?:max\s+)?fino\s+alle\s+(\d{1,2})(?::(\d{2}))?/);
  if(endM){ result.maxEndTime=`${endM[1].padStart(2,'0')}:${endM[2]||'00'}`; result.parsed.push(`Fine max ${result.maxEndTime}`); }
  else if(t.includes('solo mattina')||t.includes('solo la mattina')){ result.maxEndTime='13:00'; result.parsed.push('Solo mattina (max 13:00)'); }

  return result;
};

// Check if a "Valida per settimana" date range covers the current week
const isWeekValid = (weekStr, weekOffset) => {
  if(!weekStr?.trim()) return false;
  const dates = getWeekDates(weekOffset);
  const weekMon = dates[0]; const weekSun = dates[6];
  // Parse dates like "19/05/2026" or "19/05"
  const parts = weekStr.split(/[–\-—]/);
  const parseDate = s => {
    const clean = s.trim();
    const m = clean.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{4}))?/);
    if(!m) return null;
    const year = m[3] ? parseInt(m[3]) : weekMon.getFullYear();
    return new Date(year, parseInt(m[2])-1, parseInt(m[1]));
  };
  if(parts.length < 2) return false;
  const from = parseDate(parts[0]); const to = parseDate(parts[1]);
  if(!from||!to) return false;
  // Overlap: week range overlaps with validity range
  return from <= weekSun && to >= weekMon;
};

// Build constraint map: { cId: parsedResult } — only for valid weeks
const buildConstraints = (weekOffset) => {
  const out = {};
  CLEANERS.forEach(cl => {
    if(!cl.extraRequests?.trim()) return;
    const valid = !cl.extraWeek?.trim() || isWeekValid(cl.extraWeek, weekOffset);
    if(!valid) return;
    const parsed = parseExtraRequests(cl.extraRequests, weekOffset);
    if(parsed.daysOff.length||parsed.maxDailyHrs||parsed.maxWeeklyHrs||parsed.maxEndTime)
      out[cl.id] = { ...parsed, cleanerName: cl.name };
  });
  return out;
};

// ── EFFECTIVE DAILY LIMIT ─────────────────────────────────────────────────────
// Returns the hard cumulative daily-hours ceiling for a cleaner, taking the most
// restrictive of: the cleaner's DailyHours sheet value, the ExtraRequests constraint
// for this week, and the absolute 8h cap. Used as a hard REJECT gate in the
// auto-scheduler (not a soft penalty).
const getEffectiveDailyLimit = (cleaner, constraints={}) => {
  const cleanerLimit = Number(cleaner?.dailyHrs) > 0 ? Number(cleaner.dailyHrs) : 8;
  const constraintLimit = Number(constraints?.[cleaner?.id]?.maxDailyHrs) > 0
    ? Number(constraints[cleaner.id].maxDailyHrs)
    : cleanerLimit;
  return Math.min(cleanerLimit, constraintLimit, 8);
};

// Returns the hard max number of distinct days a cleaner may work in one week.
// Priority: maxWorkedDays (sheet-parsed) → workDays → 7-restDaysRequired → 7.
const getEffectiveMaxWorkedDays = cleaner => {
  if(Number(cleaner?.maxWorkedDays) > 0) return Number(cleaner.maxWorkedDays);
  if(Number(cleaner?.workDays) > 0) return Number(cleaner.workDays);
  if(Number(cleaner?.restDaysRequired) >= 0) return Math.max(0, 7 - Number(cleaner.restDaysRequired));
  return 7;
};

// ── AUTO-SCHEDULER — soft limits + richieste extra ─────────────────────────────
// ── SCHEDULER RESET HELPERS ────────────────────────────────────────────────────
// Determines whether a job's cleaner assignments were made by the auto-scheduler
// (and therefore should be cleared before a fresh Generate run).
// Sheet-locked templates, manual edits, and rescue splits are never cleared.
const isSchedulerOwnedAssignment = job => {
  if(!job) return false;
  if(isLockedTemplateJob(job)) return false;
  if(job.manualEdited === true || job.schedulerDecisionCode === 'manual_edit') return false;
  if(job.rescueUsed === true || job.schedulerDecisionCode === 'rescue_split') return false;
  if(job.schedulerDecisionCode === 'scheduler') return true;
  if(job.schedulerDecisionCode === 'auto_filled_template') return true;
  if(job.schedulerDecisionCode === 'fallback') return true;
  if(job.type === 'template' && job.templateLockedFromSheet === false) return true;
  if(job.source === 'hostaway_api' || job.source === 'hostaway_csv') return true;
  if(job.source === 'extra' && !job.manualEdited) return true;
  return false;
};
const resetSchedulerOwnedAssignments = jobs => (jobs || []).map(job => {
  if(!isSchedulerOwnedAssignment(job)) return job;
  return {
    ...job,
    cleanerIds: [],
    status: 'unassigned',
    softLimitWarning: null,
    windowWarning: null,
    fallbackWarning: null,
    fallbackUsed: false,
    fallbackOriginalCleanersRequired: null,
    fallbackOriginalDuration: null,
    schedulerDecisionCode: null,
    earlyLeaveSuggestions: null,
  };
});

// ── CONTROLLED MALE PARTIAL COVERAGE ─────────────────────────────────────────
// Male cleaners on male-required jobs may be assigned even if they can only
// cover ≥ 50 % of the shift due to daily-hours cap. An early-leave suggestion
// is generated so the supervisor knows when to send the cleaner home.
// NEVER applies to: females, female-required jobs, optional slots, normal jobs.
const MIN_CONTROLLED_MALE_PARTIAL_COVERAGE_RATIO = 0.5;

const getControlledMalePartialCoverage = (cleaner, job, candidateJob, effectiveDur, currentDaily, constraints) => {
  const req = getJobGenderRequirement(job);
  if(Number(req.male) <= 0) return null;   // only for male-required jobs
  if(cleaner.gender !== 'm') return null;  // only for male cleaners
  const dailyLimit = getEffectiveDailyLimit(cleaner, constraints);
  const remainingDaily = Math.max(0, dailyLimit - currentDaily);
  if(remainingDaily >= effectiveDur) return null; // already fits — no partial needed
  if(remainingDaily <= 0) return null;
  const coverageRatio = remainingDaily / effectiveDur;
  if(coverageRatio < MIN_CONTROLLED_MALE_PARTIAL_COVERAGE_RATIO) return null;
  const startMin = t2m(candidateJob.startTime);
  const suggestedLeaveTime = m2t(startMin + Math.round(remainingDaily * 60));
  const missingMinutes = Math.round((effectiveDur - remainingDaily) * 60);
  return {
    cleanerId:   cleaner.id,
    cleanerName: cleaner.name,
    availableHours: Math.round(remainingDaily * 100) / 100,
    shiftHours:     Math.round(effectiveDur  * 100) / 100,
    coverageRatio:  Math.round(coverageRatio * 100) / 100,
    missingMinutes,
    dailyLimit,
    currentDaily,
    suggestedLeaveTime,
  };
};

// ── FIX 10M-D STEP 2 — Manual Cleaner Time Overrides ────────────────────────
// Per-cleaner start/end override, layered on top of STEP 1's job-level override.
// Priority (highest wins, each level only consulted if the ones above are absent):
//   1. Manual cleaner override   (job.cleanerTimeOverrides[cleanerId])
//   2. Manual duty override      (job.manualEndTime — already folded into
//                                 getJobOperationalEndMinutes/getJobOperationalDuration)
//   3. Early-leave suggestion    (job.earlyLeaveSuggestions, scheduler-generated)
//   4. Configured duty           (getJobDuration() via the duty start/end)
// getJobDuration() and getJobOperationalEndMinutes()/getJobOperationalDuration() (job-wide,
// STEP 1) are NEVER modified by any of this — cleaner overrides only affect per-cleaner reads.

// Re-validates a stored cleaner override against the CURRENT duty window (defensive —
// mirrors how getJobOperationalEndMinutes re-checks manualEndTime>startTime on every read,
// so a stale/impossible override never silently produces a negative or out-of-window slot).
// Rules: cleaner start >= duty start; cleaner end > cleaner start; cleaner end <= duty end.
// A partial override (only one side set) has the missing side inherited from the duty window
// before validation, per spec ("inherit missing side from duty").
const getValidCleanerTimeOverride = (job, cleanerId) => {
  const ov = job?.cleanerTimeOverrides?.[cleanerId];
  if(!ov) return null;
  const dutyStart = getJobOperationalStartMinutes(job);
  const dutyEnd = getJobOperationalEndMinutes(job);
  const hasStart = ov.startTime && isValidHHMM(ov.startTime);
  const hasEnd = ov.endTime && isValidHHMM(ov.endTime);
  if(!hasStart && !hasEnd) return null;
  const startMin = hasStart ? t2m(ov.startTime) : dutyStart;
  const endMin = hasEnd ? t2m(ov.endTime) : dutyEnd;
  if(!(startMin >= dutyStart && endMin > startMin && endMin <= dutyEnd)) return null;
  return { startMin, endMin };
};

const getCleanerOperationalStartMinutes = (job, cleanerId) => {
  const v = getValidCleanerTimeOverride(job, cleanerId);
  if(v) return v.startMin;
  return getJobOperationalStartMinutes(job);
};

const getCleanerOperationalEndMinutes = (job, cleanerId) => {
  const v = getValidCleanerTimeOverride(job, cleanerId);
  if(v) return v.endMin; // priority 1 — manual cleaner override wins outright
  // No cleaner-specific override: priority 2 (duty override, already baked into
  // getJobOperationalEndMinutes) combined with priority 3 (early-leave suggestion,
  // which can only further REDUCE the duty-derived window, never extend it).
  const dutyStart = getJobOperationalStartMinutes(job);
  const dutyEnd = getJobOperationalEndMinutes(job);
  const suggestion = (job.earlyLeaveSuggestions || []).find(s => s.cleanerId === cleanerId);
  if(!suggestion) return dutyEnd; // priority 4 — configured/operational duty end
  const opDur = (dutyEnd - dutyStart) / 60;
  const cappedDur = Math.max(0, Math.min(opDur, Number(suggestion.availableHours) || 0));
  return dutyStart + cappedDur * 60;
};

const getCleanerOperationalDuration = (job, cleanerId) =>
  Math.max(0, (getCleanerOperationalEndMinutes(job, cleanerId) - getCleanerOperationalStartMinutes(job, cleanerId)) / 60);

// Backward-compat alias: every scheduler/optimizer/fallback/export call site introduced in
// STEP 1 and the micro-correction already calls this exact name for cleaner-specific hour
// accounting. Keeping it as a thin wrapper means the STEP 2 priority hierarchy applies
// everywhere automatically, with zero changes to scheduler/optimizer/fallback call sites.
const getCleanerEffectiveJobDuration = (job, cleanerId) => getCleanerOperationalDuration(job, cleanerId);

// Italian-language early-leave warning for JobCard display.
const formatEarlyLeaveSuggestion = s =>
  `${s.cleanerName} copre ${s.availableHours}h su ${s.shiftHours}h. Consigliato farlo uscire alle ${s.suggestedLeaveTime}.`;

// ── WORKLOAD FAIRNESS HELPERS (Fix 10L-A) ────────────────────────────────────
// Pure, deterministic, soft-ranking only.  Never alter eligibility.
// Penalty values are tuned for readability; adjust here to re-tune globally.
const WF_UTIL_PENALTY_MAX    = 30;  // max penalty for near-capacity utilization
const WF_UTIL_THRESHOLD_HI   = 0.90; // above 90 % of cap → full penalty
const WF_UTIL_THRESHOLD_MID  = 0.75; // 75–90 % → proportional
const WF_DAY_PENALTY_5TH     = 3;   // soft penalty for opening the 5th worked day
const WF_DAY_PENALTY_6TH     = 8;   // soft penalty for opening the 6th
const WF_DAY_PENALTY_7TH     = 15;  // soft penalty for opening the 7th
const WF_PROP_REPEAT_PENALTY = 2;   // per extra same-property assignment in this week

// Number of distinct days the cleaner currently has >0 hours.
const getCleanerCurrentWorkedDays = (cleanerId, dailyHrsMap) => {
  const d = dailyHrsMap[cleanerId];
  if(!d) return 0;
  return DAYS.filter(day => (d[day] || 0) > 0).length;
};

// Utilization ratio: current weekly hours / effective weekly capacity.
// Part-time cleaners scale proportionally so a 20 h/wk cleaner at 18 h
// ranks as more loaded than a 40 h/wk cleaner at 24 h.
const getCleanerWeeklyUtilization = (cleaner, weeklyHrsMap, constraintsMap) => {
  const current = weeklyHrsMap[cleaner.id] || 0;
  const cap = Math.max(1,
    (constraintsMap[cleaner.id]?.maxWeeklyHrs || 0) > 0
      ? constraintsMap[cleaner.id].maxWeeklyHrs
      : (Number(cleaner.weeklyHrs) > 0 ? Number(cleaner.weeklyHrs) : 40)
  );
  return current / cap;
};

// How many times has this cleaner already been committed to the same property
// this week (from assignedJobsByCleaner, which is updated after each commitTeam)?
const getCleanerPropertyFrequency = (cleanerId, propertyId, assignedJobsByCleanerMap) => {
  if(!propertyId) return 0;
  const jobs = assignedJobsByCleanerMap[cleanerId] || [];
  return jobs.filter(j => j.propertyId === propertyId).length;
};

// Composite soft fairness penalty.  Lower = prefer.
// Applied AFTER all scarcity and flexibility criteria so it never overrides them.
const getCleanerFairnessPenalty = (cleaner, job, weeklyHrsMap, dailyHrsMap, constraintsMap, assignedJobsByCleanerMap) => {
  // 1. Utilization penalty (0–WF_UTIL_PENALTY_MAX)
  const util = getCleanerWeeklyUtilization(cleaner, weeklyHrsMap, constraintsMap);
  let utilizationPenalty = 0;
  if(util >= WF_UTIL_THRESHOLD_HI){
    utilizationPenalty = WF_UTIL_PENALTY_MAX;
  } else if(util >= WF_UTIL_THRESHOLD_MID){
    utilizationPenalty = Math.round(
      WF_UTIL_PENALTY_MAX * (util - WF_UTIL_THRESHOLD_MID) /
      (WF_UTIL_THRESHOLD_HI - WF_UTIL_THRESHOLD_MID)
    );
  }

  // 2. Worked-days penalty — soft push-back when opening a 5th/6th/7th day.
  const workedDays = getCleanerCurrentWorkedDays(cleaner.id, dailyHrsMap);
  const alreadyWorksToday = (dailyHrsMap[cleaner.id]?.[job.day] || 0) > 0;
  let workedDaysPenalty = 0;
  if(!alreadyWorksToday){
    const newTotal = workedDays + 1;
    if(newTotal === 7)      workedDaysPenalty = WF_DAY_PENALTY_7TH;
    else if(newTotal === 6) workedDaysPenalty = WF_DAY_PENALTY_6TH;
    else if(newTotal === 5) workedDaysPenalty = WF_DAY_PENALTY_5TH;
  }

  // 3. Same-property repetition penalty (proportional to extra occurrences).
  const propFreq = getCleanerPropertyFrequency(cleaner.id, job.propertyId, assignedJobsByCleanerMap);
  const samePropertyPenalty = propFreq * WF_PROP_REPEAT_PENALTY;

  return utilizationPenalty + workedDaysPenalty + samePropertyPenalty;
};

// ── COVERAGE SAFETY COMPARISON (Fix 10L-A correction) ────────────────────────
// Compares two scheduler results and returns the one with better operational quality.
// Uses strict lexicographic precedence: unassigned → needs_review → staffing →
// gender → seniority → real conflicts. Fairness metrics only as final tie-break.
// The fairness plan is returned ONLY when it does not worsen any coverage metric.
// ── FIX 10L-C: WEEKLY DEMAND-AWARE REST PLANNING ──────────────────────────────
// Analyzes full-week demand before mutable scheduling to distribute rest days toward
// lighter days, preserving cleaner capacity on high-demand days like Sunday.
const REST_PLANNING_DEBUG = false; // set true for diagnostic console output
// Anita Dawdi exception: her visible 7/7 includes one shift covered by external relief.
// Populate with her actual cleaner ID from production data when confirmed.
// Other cleaners with the same first name are unaffected (ID-based, not name-based).
const REST_PLANNING_EXEMPT_CLEANER_IDS = new Set([
  // 'c_anita_dawdi_actual_id'  ← placeholder; replace with real cleaner ID
]);
// Soft penalty for assigning a cleaner on their provisionally planned rest day.
// Placed between training-flexibility (Fix 10I) and future-criticality in the sort.
// Never hard-blocks: cleaner may still be used when no alternative exists.
const REST_PLAN_VIOLATION_PENALTY = 18;

// Builds a per-day demand snapshot from all known jobs for the week.
// Pure and deterministic — does not mutate any state.
// Shared planning-level eligibility check for a single cleaner on a single job.
// Used by both estimateJobEligibleCleaners and getPlanningResidualRequirement.
// Validates against immutable-only constraints (same logic, reusable).
// allowSelfJob: if true, the cleaner's assignment to THIS job is excluded from overlap checks
// (needed for retained-team assessment).
const isCleanerValidForPlanningJob = (cleaner, job, allJobs, constraints, weekOffset, allowSelfJob) => {
  const dur=getJobOperationalDuration(job), jS=t2m(job.startTime), jE=getJobOperationalEndMinutes(job);
  const dates=getWeekDates(weekOffset), dayIdx=DAYS.indexOf(job.day);
  const dateISO=dates[dayIdx]?toISODateLocal(dates[dayIdx]):'';
  if(!(cleaner.days||[]).includes(job.day))return false;
  if(dateISO&&isCleanerUnavailableOnDate(cleaner,dateISO))return false;
  if((constraints[cleaner.id]?.daysOff||[]).includes(job.day))return false;
  if(jobRequiresTraining(job)&&!(TRAINING[cleaner.id]||[]).includes(job.propertyId))return false;
  const mxEnd=constraints[cleaner.id]?.maxEndTime;if(mxEnd&&jE>t2m(mxEnd))return false;
  // Same-day immutable jobs: overlap, travel buffer, daily cap.
  const immSameDay=allJobs.filter(j=>j.day===job.day&&!isMutableSchedulerJob(j)&&(allowSelfJob?j.id!==job.id:true));
  const clImmSameDay=immSameDay.filter(j=>dedupeCleanerIds(j.cleanerIds||[]).includes(cleaner.id));
  for(const o of clImmSameDay){
    const oS=getCleanerOperationalStartMinutes(o,cleaner.id),oE=getCleanerOperationalEndMinutes(o,cleaner.id);
    if(jS<oE&&jE>oS)return false;
    const earlier=jS<oS?job:o,later=jS<oS?o:job;
    if((jS<oS?oS-jE:jS-oE)<getTravelBufferMinutes(earlier,later))return false;
  }
  const immHrs=clImmSameDay.reduce((s,j)=>s+getCleanerEffectiveJobDuration(j,cleaner.id),0);
  if(immHrs+dur>getEffectiveDailyLimit(cleaner,constraints))return false;
  const immWD=new Set(allJobs.filter(j=>!isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(cleaner.id)&&j.day).map(j=>j.day));
  if(!immWD.has(job.day)&&immWD.size>=getEffectiveMaxWorkedDays(cleaner))return false;
  // Cross-day late-rest: check ALL immutable assignments for this cleaner across the week.
  // getLateShiftRestIssue uses absolute day offsets (dateISOToAbsDay) for correct cross-day checks.
  const allClImm=allJobs.filter(j=>!isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(cleaner.id));
  for(const o of allClImm){
    if(getLateShiftRestIssue(cleaner.name,o,job,cleaner.id))return false;
    if(getLateShiftRestIssue(cleaner.name,job,o,cleaner.id))return false;
  }
  return true;
};

// Computes the residual (unmet) staffing requirement for a single mutable job.
// Valid retained cleaners already in the partial team reduce the residual.
// Invalid retained cleaners (unavailable, untrained, etc.) are excluded.
// Does NOT reject a partial team merely because it is not yet complete.
// Pure and deterministic.
const getPlanningResidualRequirement = (job, allJobs, constraints, weekOffset) => {
  if(!isMutableSchedulerJob(job)){
    return{general:0,male:0,female:0,senior:0,retainedCleanerIds:[]};
  }
  const req=getJobRequiredCleaners(job);
  const gReq=getJobGenderRequirement(job);
  const sReq=getJobSeniorRequirement(job);
  const existingIds=dedupeCleanerIds(job.cleanerIds||[]);
  if(!existingIds.length){
    return{general:req,male:gReq.male||0,female:gReq.female||0,senior:sReq.senior||0,retainedCleanerIds:[]};
  }
  // Validate each retained cleaner individually against planning-level hard eligibility.
  // allowSelfJob=true: don't count this job's own immutable overlap for retained members.
  const validRetainedIds=existingIds.filter(id=>{
    const cl=CLEANERS.find(c=>c.id===id);
    if(!cl)return false;
    return isCleanerValidForPlanningJob(cl,job,allJobs,constraints,weekOffset,true);
  });
  // If ALL retained cleaners are invalid, or the team is scheduler-owned and was reset,
  // return full requirement.
  if(!validRetainedIds.length){
    return{general:req,male:gReq.male||0,female:gReq.female||0,senior:sReq.senior||0,retainedCleanerIds:[]};
  }
  // Count valid retained coverage per role.
  const retainedMale=validRetainedIds.filter(id=>{const c=CLEANERS.find(c=>c.id===id);return c?.gender==='m';}).length;
  const retainedFemale=validRetainedIds.filter(id=>{const c=CLEANERS.find(c=>c.id===id);return c?.gender==='f';}).length;
  const retainedSenior=validRetainedIds.filter(id=>{const c=CLEANERS.find(c=>c.id===id);return isSeniorCleaner(c);}).length;
  // A team with gender/senior COMPLETE violation (no path to fix via adding more) must be rebuilt.
  // But a partial team (not yet complete) is fine — do not reject on incomplete count checks.
  // Detect only a COMPLETE-and-still-invalid existing team situation.
  const isCompleteTeam=validRetainedIds.length>=req;
  if(isCompleteTeam&&(!genderRequirementMet(job,validRetainedIds)||!seniorRequirementMet(job,validRetainedIds))){
    return{general:req,male:gReq.male||0,female:gReq.female||0,senior:sReq.senior||0,retainedCleanerIds:[]};
  }
  return{
    general:Math.max(0,req-validRetainedIds.length),
    male:Math.max(0,(gReq.male||0)-retainedMale),
    female:Math.max(0,(gReq.female||0)-retainedFemale),
    senior:Math.max(0,(sReq.senior||0)-retainedSenior),
    retainedCleanerIds:validRetainedIds,
  };
};

const buildWeeklyDemandSnapshot = (allJobs, constraints, weekOffset) => {
  return DAYS.map((day, dayIdx) => {
    const dayJobs = allJobs.filter(j => isMeaningfulJob(j) && j.day === day);
    const mutableDayJobs = dayJobs.filter(j => isMutableSchedulerJob(j));
    const immutableDayJobs = dayJobs.filter(j => !isMutableSchedulerJob(j));
    const requiredCleanerSlots = dayJobs.reduce((s,j)=>s+getJobRequiredCleaners(j),0);
    const currentlyLockedCleanerSlots = immutableDayJobs.reduce((s,j)=>s+dedupeCleanerIds(j.cleanerIds||[]).length,0);
    const mutableRequiredSlots = mutableDayJobs.reduce((s,j)=>s+getJobRequiredCleaners(j),0);
    const totalWorkerHoursDemand = dayJobs.reduce((s,j)=>s+getJobOperationalDuration(j)*getJobRequiredCleaners(j),0);
    const mutableWorkerHoursDemand = mutableDayJobs.reduce((s,j)=>s+getJobOperationalDuration(j)*getJobRequiredCleaners(j),0);
    const maleRequiredSlots = dayJobs.reduce((s,j)=>s+(getJobGenderRequirement(j).male||0),0);
    const femaleRequiredSlots = dayJobs.reduce((s,j)=>s+(getJobGenderRequirement(j).female||0),0);
    const seniorRequiredSlots = dayJobs.reduce((s,j)=>s+(getJobSeniorRequirement(j).senior||0),0);
    // 30-minute concurrency buckets: peak required slots in any 30-min window
    // Total buckets include ALL meaningful jobs (immutable + mutable) for pressure metrics.
    // Mutable-only buckets are separate residual floors for rest allocation.
    const bkts={},maleBkts={},femaleBkts={},seniorBkts={};
    const mutableBkts={},mutableMaleBkts={},mutableFemaleBkts={},mutableSeniorBkts={};
    dayJobs.forEach(j=>{
      const jS=t2m(j.startTime),jE=getJobOperationalEndMinutes(j);
      const req=getJobRequiredCleaners(j);
      const male=(getJobGenderRequirement(j).male||0);
      const female=(getJobGenderRequirement(j).female||0);
      const senior=(getJobSeniorRequirement(j).senior||0);
      for(let t=jS;t<jE;t+=30){
        bkts[t]=(bkts[t]||0)+req;
        maleBkts[t]=(maleBkts[t]||0)+male;
        femaleBkts[t]=(femaleBkts[t]||0)+female;
        seniorBkts[t]=(seniorBkts[t]||0)+senior;
      }
      // Mutable-only residual buckets: only scheduler-owned mutable jobs.
      // Use getPlanningResidualRequirement to account for valid retained partial teams.
      if(isMutableSchedulerJob(j)){
        const residual=getPlanningResidualRequirement(j,allJobs,constraints,weekOffset);
        for(let t=jS;t<jE;t+=30){
          mutableBkts[t]=(mutableBkts[t]||0)+residual.general;
          mutableMaleBkts[t]=(mutableMaleBkts[t]||0)+residual.male;
          mutableFemaleBkts[t]=(mutableFemaleBkts[t]||0)+residual.female;
          mutableSeniorBkts[t]=(mutableSeniorBkts[t]||0)+residual.senior;
        }
      }
    });
    const peakConcurrentRequiredSlots=Object.values(bkts).length?Math.max(...Object.values(bkts)):0;
    const peakConcurrentMaleRequiredSlots=Object.values(maleBkts).length?Math.max(...Object.values(maleBkts)):0;
    const peakConcurrentFemaleRequiredSlots=Object.values(femaleBkts).length?Math.max(...Object.values(femaleBkts)):0;
    const peakConcurrentSeniorRequiredSlots=Object.values(seniorBkts).length?Math.max(...Object.values(seniorBkts)):0;
    // Mutable residual peaks: used as rest reserve floors (never double-count immutable).
    const peakConcurrentMutableRequiredSlots=Object.values(mutableBkts).length?Math.max(...Object.values(mutableBkts)):0;
    const peakConcurrentMutableMaleRequiredSlots=Object.values(mutableMaleBkts).length?Math.max(...Object.values(mutableMaleBkts)):0;
    const peakConcurrentMutableFemaleRequiredSlots=Object.values(mutableFemaleBkts).length?Math.max(...Object.values(mutableFemaleBkts)):0;
    const peakConcurrentMutableSeniorRequiredSlots=Object.values(mutableSeniorBkts).length?Math.max(...Object.values(mutableSeniorBkts)):0;
    return{day,dayIdx,jobsCount:dayJobs.length,mutableJobsCount:mutableDayJobs.length,immutableJobsCount:immutableDayJobs.length,requiredCleanerSlots,currentlyLockedCleanerSlots,mutableRequiredSlots,totalWorkerHoursDemand,mutableWorkerHoursDemand,maleRequiredSlots,femaleRequiredSlots,seniorRequiredSlots,peakConcurrentRequiredSlots,peakConcurrentMaleRequiredSlots,peakConcurrentFemaleRequiredSlots,peakConcurrentSeniorRequiredSlots,peakConcurrentMutableRequiredSlots,peakConcurrentMutableMaleRequiredSlots,peakConcurrentMutableFemaleRequiredSlots,peakConcurrentMutableSeniorRequiredSlots};
  });
};

// Uses only hard constraints and immutable assignments as a conservative lower bound.
// Pure — does not mutate state. Does not use controlled partial coverage.
// Estimates individually eligible cleaners for a single job before mutable scheduling.
// Delegates per-cleaner hard eligibility to isCleanerValidForPlanningJob (shared helper).
// Pure — does not mutate state. Does not use controlled partial coverage.
const estimateJobEligibleCleaners = (job, allJobs, constraints, weekOffset) => {
  const eligibleCleanerIds=[];
  const eligibleMaleIds=[];
  const eligibleFemaleIds=[];
  const eligibleSeniorIds=[];
  CLEANERS.forEach(cl=>{
    // Delegate all eligibility checks to the shared planning-validity helper.
    // allowSelfJob=false: cleaner is not yet assigned to this job.
    if(!isCleanerValidForPlanningJob(cl,job,allJobs,constraints,weekOffset,false))return;
    eligibleCleanerIds.push(cl.id);
    if(cl.gender==='m')eligibleMaleIds.push(cl.id);
    if(cl.gender==='f')eligibleFemaleIds.push(cl.id);
    if(isSeniorCleaner(cl))eligibleSeniorIds.push(cl.id);
  });
  return{
    totalEligible:eligibleCleanerIds.length,
    maleEligible:eligibleMaleIds.length,
    femaleEligible:eligibleFemaleIds.length,
    seniorEligible:eligibleSeniorIds.length,
    eligibleCleanerIds,
    eligibleMaleIds,
    eligibleFemaleIds,
    eligibleSeniorIds,
  };
};

// How operationally critical is it for this cleaner to remain available on this day.
// Only adds scarcity contribution for jobs where the cleaner is actually eligible.
const getCleanerDayCriticality = (cleaner, day, allJobs, eligibilityByJob) => {
  let crit=0;
  allJobs.filter(j=>j.day===day&&isMutableSchedulerJob(j)).forEach(j=>{
    const e=eligibilityByJob.get(j.id);if(!e)return;
    // Only score jobs this cleaner can actually cover.
    if(!e.eligibleCleanerIds.includes(cleaner.id))return;
    const req=getJobRequiredCleaners(j), slack=e.totalEligible-req;
    if(slack<=0)crit+=10;else if(slack===1)crit+=5;else if(slack===2)crit+=2;
    const gReq=getJobGenderRequirement(j);
    if(gReq.male>0&&e.eligibleMaleIds.includes(cleaner.id)&&e.maleEligible<=gReq.male+1)crit+=8;
    if(gReq.female>0&&e.eligibleFemaleIds.includes(cleaner.id)&&e.femaleEligible<=gReq.female+1)crit+=8;
    const sReq=getJobSeniorRequirement(j);
    if(sReq.senior>0&&e.eligibleSeniorIds.includes(cleaner.id)&&e.seniorEligible<=sReq.senior+1)crit+=8;
    if(jobRequiresTraining(j)&&(TRAINING[cleaner.id]||[]).includes(j.propertyId)&&e.totalEligible<=req+1)crit+=4;
  });
  return crit;
};

// Deterministic day-pressure comparator. Higher-pressure day sorts first.
const compareDayPressure = (dA, dB) => {
  if(!dA||!dB) return 0;
  if(dA.zeroSlackJobs!==dB.zeroSlackJobs) return dB.zeroSlackJobs-dA.zeroSlackJobs;
  const rsA=(dA.maleScarcityJobs||0)+(dA.femaleScarcityJobs||0)+(dA.seniorScarcityJobs||0);
  const rsB=(dB.maleScarcityJobs||0)+(dB.femaleScarcityJobs||0)+(dB.seniorScarcityJobs||0);
  if(rsA!==rsB) return rsB-rsA;
  if(dA.peakConcurrentRequiredSlots!==dB.peakConcurrentRequiredSlots) return dB.peakConcurrentRequiredSlots-dA.peakConcurrentRequiredSlots;
  if(dA.minimumSlack!==dB.minimumSlack) return dA.minimumSlack-dB.minimumSlack;
  if(dA.requiredCleanerSlots!==dB.requiredCleanerSlots) return dB.requiredCleanerSlots-dA.requiredCleanerSlots;
  if(dA.totalWorkerHoursDemand!==dB.totalWorkerHoursDemand) return dB.totalWorkerHoursDemand-dA.totalWorkerHoursDemand;
  return DAYS.indexOf(dA.day)-DAYS.indexOf(dB.day);
};

// Enriches the base demand snapshot with per-day scarcity metrics and broad eligibility ID sets.
const buildEnrichedDemandSnapshot = (baseSnapshot, allJobs, eligibilityByJob) => {
  return baseSnapshot.map(snap => {
    const dayMutableJobs=allJobs.filter(j=>j.day===snap.day&&isMutableSchedulerJob(j));
    let zeroSlackJobs=0,oneSlackJobs=0,minimumSlack=Infinity;
    let maleScarcityJobs=0,femaleScarcityJobs=0,seniorScarcityJobs=0;
    const broadIds=new Set(),broadMaleIds=new Set(),broadFemaleIds=new Set(),broadSeniorIds=new Set();
    dayMutableJobs.forEach(j=>{
      const e=eligibilityByJob.get(j.id);if(!e)return;
      const req=getJobRequiredCleaners(j),slack=e.totalEligible-req;
      if(slack<=0)zeroSlackJobs++;
      if(slack===1)oneSlackJobs++;
      if(slack<minimumSlack)minimumSlack=slack;
      const gReq=getJobGenderRequirement(j);
      if(gReq.male>0&&e.maleEligible<=gReq.male+1)maleScarcityJobs++;
      if(gReq.female>0&&e.femaleEligible<=gReq.female+1)femaleScarcityJobs++;
      const sReq=getJobSeniorRequirement(j);
      if(sReq.senior>0&&e.seniorEligible<=sReq.senior+1)seniorScarcityJobs++;
      e.eligibleCleanerIds.forEach(id=>broadIds.add(id));
      e.eligibleMaleIds.forEach(id=>broadMaleIds.add(id));
      e.eligibleFemaleIds.forEach(id=>broadFemaleIds.add(id));
      e.eligibleSeniorIds.forEach(id=>broadSeniorIds.add(id));
    });
    return{...snap,zeroSlackJobs,oneSlackJobs,minimumSlack:minimumSlack===Infinity?999:minimumSlack,maleScarcityJobs,femaleScarcityJobs,seniorScarcityJobs,broadEligibleCleanerIds:[...broadIds],broadMaleEligibleIds:[...broadMaleIds],broadFemaleEligibleIds:[...broadFemaleIds],broadSeniorEligibleIds:[...broadSeniorIds]};
  });
};

// Builds a provisional rest-day plan using globally coordinated allocation.
// Each committed rest immediately updates projected available sets so later cleaners
// see updated reserves. Diagnostics: projectedReserveByDay, restsByDay.
// Now accepts a pre-built planningContext (from buildWeeklyPlanningContext) to avoid
// re-computing eligibility. Also uses concurrency-based reserve floors (Fix 10L-C SC2).
const buildProvisionalRestPlan = (allJobs, constraints, planningContext, weekOffset) => {
  const dates=getWeekDates(weekOffset);
  const dateByDay=Object.fromEntries(DAYS.map((d,i)=>[d,dates[i]?toISODateLocal(dates[i]):'']));
  // Reuse precomputed eligibility from planning context; never recompute here.
  const eligibilityByJob=planningContext.eligibilityByJob;
  const enrichedByDay=planningContext.enrichedByDay;
  const pressureRankByDay=planningContext.pressureRankByDay;
  // Projected available sets: start from broad eligibility; updated as rests committed.
  const projectedAvailableIdsByDay=Object.fromEntries(DAYS.map(d=>[d,new Set(enrichedByDay[d]?.broadEligibleCleanerIds||[])]));
  const projectedMaleIdsByDay=Object.fromEntries(DAYS.map(d=>[d,new Set(enrichedByDay[d]?.broadMaleEligibleIds||[])]));
  const projectedFemaleIdsByDay=Object.fromEntries(DAYS.map(d=>[d,new Set(enrichedByDay[d]?.broadFemaleEligibleIds||[])]));
  const projectedSeniorIdsByDay=Object.fromEntries(DAYS.map(d=>[d,new Set(enrichedByDay[d]?.broadSeniorEligibleIds||[])]));
  const restsByDay=Object.fromEntries(DAYS.map(d=>[d,0]));
  // Male-rest dispersion tracker: soft penalty discourages multiple males resting
  // on the same day when mutable male demand exists and reserve is tight.
  const maleRestsByDay=Object.fromEntries(DAYS.map(d=>[d,0]));
  const records=[];
  CLEANERS.forEach(cl=>{
    if(REST_PLANNING_EXEMPT_CLEANER_IDS.has(cl.id))return;
    const maxDays=getEffectiveMaxWorkedDays(cl),targetRestDays=Math.max(0,7-maxDays);
    const immutableWorkedDays=[...new Set(allJobs.filter(j=>!isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(cl.id)&&j.day).map(j=>j.day))];
    const unavailDays=DAYS.filter(d=>{if(!(cl.days||[]).includes(d))return true;const dISO=dateByDay[d];if(dISO&&isCleanerUnavailableOnDate(cl,dISO))return true;if((constraints[cl.id]?.daysOff||[]).includes(d))return true;return false;});
    const guaranteedRest=new Set([...DAYS.filter(d=>!(cl.days||[]).includes(d)),...unavailDays]).size;
    const additionalRestNeeded=Math.max(0,targetRestDays-guaranteedRest);
    const candidateRestDays=DAYS.filter(d=>!immutableWorkedDays.includes(d)&&!unavailDays.includes(d));
    const weeklyCriticality=DAYS.reduce((s,d)=>s+getCleanerDayCriticality(cl,d,allJobs,eligibilityByJob),0);
    records.push({cl,targetRestDays,additionalRestNeeded,immutableWorkedDays,unavailDays,candidateRestDays,weeklyCriticality,preferredRestDays:[],reasonByDay:{}});
  });
  records.sort((a,b)=>b.additionalRestNeeded-a.additionalRestNeeded||a.candidateRestDays.length-b.candidateRestDays.length||b.weeklyCriticality-a.weeklyCriticality||String(a.cl.id).localeCompare(String(b.cl.id)));
  for(const rec of records){
    let remaining=rec.additionalRestNeeded;
    while(remaining>0){
      const candidates=rec.candidateRestDays.filter(d=>!rec.preferredRestDays.includes(d));
      if(!candidates.length)break;
      let bestDay=null,bestSafe=false,bestTuple=null;
      for(const d of candidates){
        const snap=enrichedByDay[d];if(!snap)continue;
        const genAfter=projectedAvailableIdsByDay[d].size-(projectedAvailableIdsByDay[d].has(rec.cl.id)?1:0);
        const maleAfter=projectedMaleIdsByDay[d].size-(projectedMaleIdsByDay[d].has(rec.cl.id)?1:0);
        const femaleAfter=projectedFemaleIdsByDay[d].size-(projectedFemaleIdsByDay[d].has(rec.cl.id)?1:0);
        const seniorAfter=projectedSeniorIdsByDay[d].size-(projectedSeniorIdsByDay[d].has(rec.cl.id)?1:0);
        // Fix 10L-C SC3: use MUTABLE residual concurrency peaks for reserve floors.
        // Total operational peaks remain for day-pressure metrics only.
        // Locked/manual/rescue staffing is already committed — not counted again.
        const genDeficit=Math.max(0,(snap.peakConcurrentMutableRequiredSlots||0)-genAfter);
        const maleDeficit=Math.max(0,(snap.peakConcurrentMutableMaleRequiredSlots||0)-maleAfter);
        const femaleDeficit=Math.max(0,(snap.peakConcurrentMutableFemaleRequiredSlots||0)-femaleAfter);
        const seniorDeficit=Math.max(0,(snap.peakConcurrentMutableSeniorRequiredSlots||0)-seniorAfter);
        const totalDeficit=genDeficit+maleDeficit+femaleDeficit+seniorDeficit;
        const safe=totalDeficit===0;
        // Buffer shortfalls: prefer genAfter >= mutablePeak+1 and maleAfter >= mutableMalePeak+1 (soft).
        const bufferShortfall=Math.max(0,(snap.peakConcurrentMutableRequiredSlots||0)+1-genAfter);
        const maleBufferShortfall=(snap.peakConcurrentMutableMaleRequiredSlots||0)>0
          ?Math.max(0,(snap.peakConcurrentMutableMaleRequiredSlots||0)+1-maleAfter)
          :0;
        // Relevant role reserve after: tightest mutable role margin.
        const roleReserveAfter=Math.min(
          (snap.peakConcurrentMutableMaleRequiredSlots||0)>0?maleAfter:Infinity,
          (snap.peakConcurrentMutableFemaleRequiredSlots||0)>0?femaleAfter:Infinity,
          (snap.peakConcurrentMutableSeniorRequiredSlots||0)>0?seniorAfter:Infinity
        );
        const roleReserveVal=isFinite(roleReserveAfter)?roleReserveAfter:genAfter;
        const crit=getCleanerDayCriticality(rec.cl,d,allJobs,eligibilityByJob);
        // pressureRankByDay: higher rank = lower pressure = better rest day.
        const dayPressureRank=pressureRankByDay[d]??0;
        // Tuning 10L #1: soft male-rest concentration penalty.
        // Discourages multiple male rests on same day when mutable male demand is present
        // and reserve is tight. Never overrides deficit or buffer shortfall.
        const isMaleCleaner=rec.cl.gender==='m';
        const maleDemandExists=(snap.peakConcurrentMutableMaleRequiredSlots||0)>0;
        const maleReserveMargin=maleAfter-(snap.peakConcurrentMutableMaleRequiredSlots||0);
        let maleRestConcentrationPenalty=0;
        if(isMaleCleaner&&maleDemandExists){
          const existingMaleRests=maleRestsByDay[d]||0;
          if(existingMaleRests>=1){
            maleRestConcentrationPenalty=maleReserveMargin<=1?existingMaleRests*3:existingMaleRests;
          }
        }
        // Deterministic lexicographic tuple:
        // 1=safe, 2=totalDeficit, 3=crit,
        // 4=generalBufferShortfall, 5=maleBufferShortfall, 6=maleRestConcentrationPenalty,
        // 7=dayPressureRank(desc), 8=genAfter(desc), 9=roleReserveVal(desc),
        // 10=restsAlreadyPlanned, 11=workerHoursDemand, 12=totalConcurrency, 13=weekdayIdx
        const tuple=[
          safe?0:1,                      // safe first
          totalDeficit,                  // smaller deficit better (known coverage)
          crit,                          // smaller criticality better
          bufferShortfall,               // smaller general buffer shortfall better
          maleBufferShortfall,           // smaller male buffer shortfall better
          maleRestConcentrationPenalty,  // smaller concentration penalty better (soft)
          -dayPressureRank,              // larger rank = lower pressure = better (negate)
          -genAfter,                     // larger genAfter better (negate)
          -roleReserveVal,               // larger role reserve better (negate)
          restsByDay[d],                 // fewer existing rests better
          snap.totalWorkerHoursDemand,
          snap.peakConcurrentRequiredSlots,
          DAYS.indexOf(d),
        ];
        if(!bestDay||(!bestSafe&&safe)||(bestSafe===safe&&(()=>{for(let i=0;i<tuple.length;i++){if(tuple[i]!==bestTuple[i])return tuple[i]<bestTuple[i];}return false;})())){
          bestDay=d;bestSafe=safe;bestTuple=tuple;
        }
      }
      if(!bestDay)break;
      rec.preferredRestDays.push(bestDay);
      rec.reasonByDay[bestDay]=bestSafe?'demand_aware':'reserve_relaxed';
      restsByDay[bestDay]+=1;
      if(rec.cl.gender==='m') maleRestsByDay[bestDay]+=1;
      projectedAvailableIdsByDay[bestDay].delete(rec.cl.id);
      projectedMaleIdsByDay[bestDay].delete(rec.cl.id);
      projectedFemaleIdsByDay[bestDay].delete(rec.cl.id);
      projectedSeniorIdsByDay[bestDay].delete(rec.cl.id);
      remaining--;
    }
  }
  const byCleaner=Object.fromEntries(records.map(r=>[r.cl.id,{preferredRestDays:r.preferredRestDays,protectedWorkDays:r.immutableWorkedDays,targetRestDays:r.targetRestDays,immutableWorkedDays:r.immutableWorkedDays,candidateRestDays:r.candidateRestDays,reasonByDay:r.reasonByDay}]));
  const dayRestTargets=Object.fromEntries(DAYS.map(day=>[day,restsByDay[day]]));
  const projectedReserveByDay=Object.fromEntries(DAYS.map(day=>[day,{general:projectedAvailableIdsByDay[day].size,male:projectedMaleIdsByDay[day].size,female:projectedFemaleIdsByDay[day].size,senior:projectedSeniorIdsByDay[day].size}]));
  if(REST_PLANNING_DEBUG)console.log('[10L-C T1]','restsByDay',restsByDay,'maleRestsByDay',maleRestsByDay,'pressureRanks',pressureRankByDay);
  return{byCleaner,dayRestTargets,projectedReserveByDay,restsByDay,maleRestsByDay,reserveFloorType:'concurrency_peak'};
};


// Returns the soft penalty for assigning this cleaner to job.day when that day
// is their provisionally planned rest day. Returns 0 if no plan, no preference,
// or the cleaner already has an immutable assignment that day (rest already lost).
const getProvisionalRestPenalty = (cleaner, job, provisionalRestPlan) => {
  if(!provisionalRestPlan)return 0;
  const plan=provisionalRestPlan.byCleaner?.[cleaner.id];
  if(!plan||!plan.preferredRestDays.includes(job.day))return 0;
  if(plan.immutableWorkedDays.includes(job.day))return 0; // rest already lost to immutable
  return REST_PLAN_VIOLATION_PENALTY;
};


// ── COVERAGE SAFETY COMPARISON (Fix 10L-A correction) ────────────────────────
// Compares two scheduler results and returns the one with better operational quality.
// Uses strict lexicographic precedence: unassigned → needs_review → staffing →
// gender → seniority → real conflicts. Fairness metrics only as final tie-break.
// The fairness plan is returned ONLY when it does not worsen any coverage metric.
const chooseSaferSchedulePlan = (baseline, fairPlan) => {
  const score = (plan) => {
    const jobs = plan.jobs || [];
    const conflicts = detectConflicts(jobs);
    let unassigned=0, needsReview=0, staffing=0, gender=0, seniority=0, realConflicts=0;
    jobs.forEach(j => {
      const ids = dedupeCleanerIds(j.cleanerIds);
      if(ids.length === 0 && isMeaningfulJob(j)) { unassigned++; return; }
      const required = getJobRequiredCleaners(j);
      if(ids.length < required) staffing++;
      if(!isLockedTemplateJob(j) && !genderRequirementMet(j, ids)) gender++;
      if(!isLockedTemplateJob(j) && !seniorRequirementMet(j, ids)) seniority++;
      const jobConflicts = (conflicts.get(j.id) || []).filter(isRealConflictIssue);
      if(jobConflicts.length > 0) realConflicts++;
      if(j.status === 'needs_review') needsReview++;
    });
    // Fairness metrics (only used when coverage is identical)
    const workedDaysByCleaners = {};
    const weeklyHrsByCleaners = {};
    jobs.forEach(j => {
      dedupeCleanerIds(j.cleanerIds).forEach(id => {
        workedDaysByCleaners[id] = workedDaysByCleaners[id] || new Set();
        workedDaysByCleaners[id].add(j.day);
        weeklyHrsByCleaners[id] = (weeklyHrsByCleaners[id]||0) + getCleanerEffectiveJobDuration(j, id);
      });
    });
    const cleanerDays = Object.values(workedDaysByCleaners).map(s=>s.size);
    const sevenDayCt = cleanerDays.filter(d=>d>=7).length;
    const utils = CLEANERS.map(cl => (weeklyHrsByCleaners[cl.id]||0) / Math.max(1, Number(cl.weeklyHrs)||40));
    const maxUtil = utils.length ? Math.max(...utils) : 0;
    const utilizationSpread = utils.length ? Math.max(...utils)-Math.min(...utils) : 0;
    return { unassigned, needsReview, staffing, gender, seniority, realConflicts, sevenDayCt, maxUtil, utilizationSpread };
  };
  const b = score(baseline);
  const f = score(fairPlan);
  // Safety-first comparison: return fairness plan only when coverage is no worse.
  if(f.unassigned     > b.unassigned)     return baseline;
  if(f.needsReview    > b.needsReview)    return baseline;
  if(f.staffing       > b.staffing)       return baseline;
  if(f.gender         > b.gender)         return baseline;
  if(f.seniority      > b.seniority)      return baseline;
  if(f.realConflicts  > b.realConflicts)  return baseline;
  // Coverage identical — pick by fairness metrics (strict lexicographic, conservative).
  // At each metric: if fair is better → fairPlan; if worse → baseline; if equal → continue.
  // Return baseline on a complete tie to avoid unnecessary schedule churn.
  if(f.sevenDayCt !== b.sevenDayCt)
    return f.sevenDayCt < b.sevenDayCt ? fairPlan : baseline;
  if(f.maxUtil !== b.maxUtil)
    return f.maxUtil < b.maxUtil ? fairPlan : baseline;
  if(f.utilizationSpread !== b.utilizationSpread)
    return f.utilizationSpread < b.utilizationSpread ? fairPlan : baseline;
  return baseline; // conservative default on complete tie
};

// ── FIX 10L-C SAFETY CORRECTION #2 ──────────────────────────────────────────
// Single-pass planning context to avoid recomputing estimateJobEligibleCleaners
// more than once per scheduler candidate run.
const buildWeeklyPlanningContext = (baseJobs, constraints, weekOffset) => {
  const demandSnapshot = buildWeeklyDemandSnapshot(baseJobs, constraints, weekOffset);
  const eligibilityByJob = new Map();
  baseJobs.filter(j=>isMeaningfulJob(j)&&isMutableSchedulerJob(j)).forEach(j=>{
    eligibilityByJob.set(j.id, estimateJobEligibleCleaners(j, baseJobs, constraints, weekOffset));
  });
  const enrichedDemandSnapshot = buildEnrichedDemandSnapshot(demandSnapshot, baseJobs, eligibilityByJob);
  const enrichedByDay = Object.fromEntries(enrichedDemandSnapshot.map(d=>[d.day,d]));
  // Precompute day pressure rank (lower rank = more critical = prefer NOT to rest here).
  const pressureSortedDays = [...enrichedDemandSnapshot].sort(compareDayPressure);
  const pressureRankByDay = Object.fromEntries(pressureSortedDays.map((d,i)=>[d.day,i]));
  return{demandSnapshot,eligibilityByJob,enrichedDemandSnapshot,enrichedByDay,pressureRankByDay};
};

// Legacy mutable-job comparator: strict weekday-first ordering identical to pre-10L-C.
const compareLegacyMutableJobs = (a, b, difficultyMap) => {
  const dd = DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
  if(dd!==0) return dd;
  const sp = getSeniorRequirementPriority(a)-getSeniorRequirementPriority(b);
  if(sp!==0) return sp;
  const gp = getMaleRequirementPriority(a)-getMaleRequirementPriority(b);
  if(gp!==0) return gp;
  const da = difficultyMap.get(a.id)??999;
  const db = difficultyMap.get(b.id)??999;
  if(da!==db) return da-db;
  const td = t2m(a.startTime)-t2m(b.startTime);
  if(td!==0) return td;
  return String(a.id).localeCompare(String(b.id));
};

// Demand-aware mutable-job comparator: uses precomputed jobMeta (raw unclamped slack).
const compareDemandAwareMutableJobs = (a, b, jobMeta) => {
  const mA = jobMeta.get(a.id), mB = jobMeta.get(b.id);
  const slackDiff = (mA?.minimumSlack??999)-(mB?.minimumSlack??999);
  if(slackDiff!==0) return slackDiff;
  const reqDiff = (mB?.activeReqCount??0)-(mA?.activeReqCount??0);
  if(reqDiff!==0) return reqDiff;
  const dpDiff = compareDayPressure(mA?.daySnap, mB?.daySnap);
  if(dpDiff!==0) return dpDiff;
  const clDiff = (mB?.requiredCleaners??0)-(mA?.requiredCleaners??0);
  if(clDiff!==0) return clDiff;
  const concDiff = (mB?.concurrencyBurden??0)-(mA?.concurrencyBurden??0);
  if(concDiff!==0) return concDiff;
  const sp = getSeniorRequirementPriority(a)-getSeniorRequirementPriority(b);
  if(sp!==0) return sp;
  const gp = getMaleRequirementPriority(a)-getMaleRequirementPriority(b);
  if(gp!==0) return gp;
  const dd = DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
  if(dd!==0) return dd;
  const td = t2m(a.startTime)-t2m(b.startTime);
  if(td!==0) return td;
  return String(a.id).localeCompare(String(b.id));
};

const runAutoSchedule = (allJobs, weekOffset=0, _opts={}) => {
  // _opts.fairnessEnabled (default true): disables fairness/rest penalties when false.
  // _opts.demandAwareEnabled (default true): disables full-week ordering + rest plan when false.
  // External callers never pass _opts — backward-compatible.
  const fairnessEnabled = _opts.fairnessEnabled !== false;
  const demandAwareEnabled = _opts.demandAwareEnabled !== false;
  // Reset all scheduler-owned assignments to a clean base before scheduling.
  // Sheet-locked templates, manual edits, and rescue splits are preserved.
  const baseJobs = resetSchedulerOwnedAssignments(allJobs);
  const constraints = buildConstraints(weekOffset);

  // Fix 10L-C SC3: build planning context only when demand-aware; never duplicate the
  // demand snapshot. Legacy baseline pays zero 10L-C planning overhead.
  const planningContext = demandAwareEnabled
    ? buildWeeklyPlanningContext(baseJobs, constraints, weekOffset)
    : null;
  // weeklyDemandSnapshot is a byproduct of the planning context when demand-aware.
  // It is not needed in the legacy baseline (demandAwareEnabled:false).
  const weeklyDemandSnapshot = planningContext?.demandSnapshot || null;
  const provisionalRestPlan = (fairnessEnabled && demandAwareEnabled)
    ? buildProvisionalRestPlan(baseJobs, constraints, planningContext, weekOffset)
    : null;

  // A job counts as fully assigned only if it has enough cleaners for its requirement
  const isFullyAssigned = job => (job.cleanerIds||[]).length >= getJobRequiredCleaners(job);

  const weeklyHrs = Object.fromEntries(CLEANERS.map(cl=>[cl.id,0]));
  const dailyHrs  = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,0]))]));
  const daySched  = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,[]]))]));
  // Per-cleaner/per-day list of assigned JOB OBJECTS (needed for travel-buffer checks
  // within the SAME generation run — daySched only holds time slots, not areas).
  const dayJobs   = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,[]]))]));
  // Cross-day committed jobs per cleaner — used by the late-shift rest rule.
  // dayJobs is per-day; this covers all days so the 22:00 rule works across midnight.
  const assignedJobsByCleaner = Object.fromEntries(CLEANERS.map(cl=>[cl.id,[]]));

  // Map each weekday to its ISO date for this week, for off/holiday checks.
  const weekDates = getWeekDates(weekOffset);
  const dayToISO = Object.fromEntries(DAYS.map((d,i)=>[d, toISODateLocal(weekDates[i])]));
  const jobDateISO = job => job.dateISO || dayToISO[job.day] || '';

  // A job needs (more) work if it is short on count, OR it is a NON-locked job whose
  // team doesn't meet the gender requirement. Locked template jobs (full team) are
  // authoritative and never re-touched, even if their gender mix differs.
  // Flexible template jobs always need scheduling — the scheduler must determine startTime.
  const needsWork = j =>
    !isLockedTemplateJob(j) &&
    ( j.flexibleWindow ||
      (j.cleanerIds||[]).length < getJobRequiredCleaners(j) ||
      !genderRequirementMet(j, j.cleanerIds) ||
      !seniorRequirementMet(j, j.cleanerIds) );

  // STEP 6: commit ONLY jobs that do NOT need work, at their fixed times. Jobs that
  // need work are NOT pre-committed at their old startTime (flexible jobs may move),
  // so we don't block their old slot or double-count their existing cleaners here.
  baseJobs.filter(j=>!needsWork(j) && (j.cleanerIds||[]).length>0).forEach(job=>{
    job.cleanerIds.forEach(cId=>{
      const effDur=getCleanerEffectiveJobDuration(job,cId);
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+effDur;
      if(dailyHrs[cId] && dailyHrs[cId][job.day] !== undefined) dailyHrs[cId][job.day]+=effDur;
      daySched[cId]?.[job.day]?.push({start:getCleanerOperationalStartMinutes(job,cId),end:getCleanerOperationalEndMinutes(job,cId)});
      dayJobs[cId]?.[job.day]?.push(job);
      assignedJobsByCleaner[cId]?.push(job);
    });
  });

  // Commit a finalized job's team into the hour/overlap/dayJobs maps at its (possibly
  // moved) startTime. Only the NEW picks are committed for hours (existing of a partial
  // job were never pre-committed, so for needsWork jobs we commit the WHOLE final team).
  const commitTeam = (finalJob, idsToCommit, earlyLeaveSugs=[]) => {
    // Materialize earlyLeaveSuggestions onto a shallow copy so the shared
    // getCleanerEffectiveJobDuration helper (operational-duration-aware) can be reused
    // instead of duplicating its cap logic here.
    const committedJob = { ...finalJob, earlyLeaveSuggestions: earlyLeaveSugs.length ? earlyLeaveSugs : null };
    idsToCommit.forEach(cId=>{
      // For overlap/travel blocking use THIS cleaner's own operational window — a manual
      // cleaner-time override (STEP 2) takes priority over the job-wide committed time.
      daySched[cId]?.[finalJob.day]?.push({start:getCleanerOperationalStartMinutes(committedJob,cId),end:getCleanerOperationalEndMinutes(committedJob,cId)});
      dayJobs[cId]?.[finalJob.day]?.push(finalJob);
      assignedJobsByCleaner[cId]?.push(finalJob);
      // For hour totals use effective cleaner duration (respects early-leave suggestions
      // and manualEndTime, via the shared helper).
      const effectiveCleanerDur = getCleanerEffectiveJobDuration(committedJob, cId);
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+effectiveCleanerDur;
      if(dailyHrs[cId] && dailyHrs[cId][finalJob.day] !== undefined) dailyHrs[cId][finalJob.day]+=effectiveCleanerDur;
    });
  };

  // Build the eligible-and-ranked candidate list for a job AT a specific candidate slot
  // (candidateJob carries the candidate startTime). Pure: does not mutate maps.
  // Validates a single already-assigned cleaner against a candidate slot.
  // Mirrors the filter chain in buildEligibleForSlot without the "not in existing" step.
  // Used to verify pre-assigned team members before filling gaps with new cleaners.
  // effectiveDur must be passed explicitly so fallback duration overrides are respected.
  const isCleanerEligibleForCandidateSlot = (cl, job, candidateJob, effectiveDur) => {
    const cjS=t2m(candidateJob.startTime), cjE=cjS+effectiveDur*60;
    const dISO=jobDateISO(job);
    if(jobRequiresTraining(job)&&!TRAINING[cl.id]?.includes(job.propertyId)) return false;
    if(!cl.days.includes(job.day)) return false;
    if(isCleanerUnavailableOnDate(cl, dISO)) return false;
    if((constraints[cl.id]?.daysOff||[]).includes(job.day)) return false;
    // Overlap with already-committed slots (exclude this job's own id)
    if((daySched[cl.id]?.[job.day]||[]).some(s=>cjS<s.end&&cjE>s.start)) return false;
    // Direction-aware travel buffer (exclude this job's own id)
    if((dayJobs[cl.id]?.[job.day]||[]).some(o=>{
      if(o.id===job.id) return false;
      const oS=getCleanerOperationalStartMinutes(o,cl.id), oE=getCleanerOperationalEndMinutes(o,cl.id);
      if(cjS<oE&&cjE>oS) return false; // overlap handled above
      const candidateAfterExisting=oE<=cjS;
      const needed=candidateAfterExisting?getTravelBufferMinutes(o,candidateJob):getTravelBufferMinutes(candidateJob,o);
      const gap=candidateAfterExisting?cjS-oE:oS-cjE;
      return gap<needed;
    })) return false;
    // MaxEndTime constraint
    const maxEnd=constraints[cl.id]?.maxEndTime;
    if(maxEnd&&cjE>t2m(maxEnd)) return false;
    // Hard cumulative daily-hours cap: reject if this job would push the cleaner over
    // their effective daily limit (min of DailyHours, ExtraRequests, and 8h hard cap).
    // This is a hard gate — never assign over the limit even if no other candidate exists.
    const currentDaily = dailyHrs[cl.id]?.[job.day] || 0;
    const withinDailyCap = currentDaily + effectiveDur <= getEffectiveDailyLimit(cl, constraints);
    if(!withinDailyCap && !getControlledMalePartialCoverage(cl, job, candidateJob, effectiveDur, currentDaily, constraints))
      return false;
    // Hard max worked-days cap: reject if this job would open a NEW working day
    // beyond the cleaner's effective weekly day limit (RestDaysRequired / maxWorkedDays).
    // Same-day additional assignments are allowed — they don't add a new worked day.
    {
      const alreadyWorksThisDay = (dailyHrs[cl.id]?.[job.day] || 0) > 0;
      if(!alreadyWorksThisDay){
        const projectedDays = new Set(
          Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)
        );
        projectedDays.add(job.day);
        if(projectedDays.size > getEffectiveMaxWorkedDays(cl)) return false;
      }
    }
    // Late-shift 9h rest rule (cross-day, uses assignedJobsByCleaner)
    if((assignedJobsByCleaner[cl.id]||[]).some(o=>getLateShiftRestIssue(cl.name,o,candidateJob,cl.id))) return false;
    return true;
  };

  const buildEligibleForSlot = (job, candidateJob, existing, durationOverride=null) => {
    const effectiveDur = durationOverride !== null ? durationOverride : getJobOperationalDuration(candidateJob);
    const cjS=t2m(candidateJob.startTime), cjE=cjS+effectiveDur*60;
    const dISO=jobDateISO(job);
    // Collect all hard-eligible candidates (all existing filters unchanged).
    const filtered = CLEANERS
      .filter(cl=>!existing.includes(cl.id))
      .filter(cl=>!jobRequiresTraining(job)||TRAINING[cl.id]?.includes(job.propertyId))
      .filter(cl=>cl.days.includes(job.day))
      .filter(cl=>!isCleanerUnavailableOnDate(cl, dISO))
      .filter(cl=>!(constraints[cl.id]?.daysOff||[]).includes(job.day))
      .filter(cl=>!(daySched[cl.id]?.[job.day]||[]).some(s=>cjS<s.end&&cjE>s.start))
      // Travel buffer: inline gap calc uses effectiveDur so fallback duration AND
      // manualEndTime overrides are respected for the candidate slot itself.
      // (getTravelBufferIssue is used elsewhere for already-committed jobs; here we need
      // the in-flight candidateJob's slot, which getTravelBufferIssue can't see yet.)
      .filter(cl=>!(dayJobs[cl.id]?.[job.day]||[]).some(o=>{
        if(o.id===job.id) return false;
        const oS=getCleanerOperationalStartMinutes(o,cl.id), oE=getCleanerOperationalEndMinutes(o,cl.id);
        if(cjS<oE&&cjE>oS) return false; // overlap — handled by the overlap filter above
        const candidateAfterExisting = oE<=cjS;
        const needed = candidateAfterExisting ? getTravelBufferMinutes(o, candidateJob) : getTravelBufferMinutes(candidateJob, o);
        const gap = candidateAfterExisting ? cjS-oE : oS-cjE;
        return gap<needed;
      }))
      .filter(cl=>{
        const maxEnd=constraints[cl.id]?.maxEndTime;
        return !maxEnd || cjE <= t2m(maxEnd);
      })
      // Late-shift rest rule: reject cleaner if any already-committed job would violate
      // the 9-hour rest requirement after a shift ending after 22:00.
      .filter(cl=>!(assignedJobsByCleaner[cl.id]||[]).some(o=>
        getLateShiftRestIssue(cl.name, o, candidateJob, cl.id)
      ))
      // Daily-hours cap: full coverage required for all cleaners EXCEPT male cleaners
      // on male-required jobs, where controlled partial coverage (≥50%) is allowed.
      .filter(cl=>{
        const currentDaily = dailyHrs[cl.id]?.[job.day] || 0;
        const withinDailyCap = currentDaily + effectiveDur <= getEffectiveDailyLimit(cl, constraints);
        if(withinDailyCap) return true;
        return !!getControlledMalePartialCoverage(cl, job, candidateJob, effectiveDur, currentDaily, constraints);
      })
      // Hard max worked-days cap: reject if assigning this job would open a new worked day
      // beyond the cleaner's effective weekly day limit. Same-day additions are allowed.
      .filter(cl=>{
        const alreadyWorksThisDay = (dailyHrs[cl.id]?.[job.day] || 0) > 0;
        if(alreadyWorksThisDay) return true; // same day — no new day opened
        const projectedDays = new Set(
          Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)
        );
        projectedDays.add(job.day);
        return projectedDays.size <= getEffectiveMaxWorkedDays(cl);
      });
    return filtered.sort((a,b)=>{
        // aDaysOver/bDaysOver removed — over-days candidates are now hard-filtered above.
        const aWeeklyLim = constraints[a.id]?.maxWeeklyHrs ?? a.weeklyHrs;
        const bWeeklyLim = constraints[b.id]?.maxWeeklyHrs ?? b.weeklyHrs;
        const aWOver = aWeeklyLim && (weeklyHrs[a.id]||0)+effectiveDur > aWeeklyLim ? 1 : 0;
        const bWOver = bWeeklyLim && (weeklyHrs[b.id]||0)+effectiveDur > bWeeklyLim ? 1 : 0;
        if(aWOver!==bWOver) return aWOver-bWOver;
        // Partial coverage penalty: full-coverage male ranks before partial-coverage male;
        // smaller early-leave gap ranks before larger gap.
        const aDailyBefore = dailyHrs[a.id]?.[job.day] || 0;
        const bDailyBefore = dailyHrs[b.id]?.[job.day] || 0;
        const aPartial = getControlledMalePartialCoverage(a, job, candidateJob, effectiveDur, aDailyBefore, constraints);
        const bPartial = getControlledMalePartialCoverage(b, job, candidateJob, effectiveDur, bDailyBefore, constraints);
        const aMissing = aPartial ? aPartial.missingMinutes : 0;
        const bMissing = bPartial ? bPartial.missingMinutes : 0;
        if(aMissing !== bMissing) return aMissing - bMissing;
        // Senior scarcity: preserve senior cleaners for senior-required jobs (Fix 10M-B).
        // Penalty 35 ranks before male-scarcity 25. Soft only.
        const aSeniorP = getSeniorScarcityPenalty(a, job);
        const bSeniorP = getSeniorScarcityPenalty(b, job);
        if(aSeniorP !== bSeniorP) return aSeniorP - bSeniorP;
        // Male scarcity: on jobs with no male requirement, male cleaners rank
        // below females so they are preserved for male-required jobs. Soft only —
        // does not block males when no eligible female exists.
        const aPenalty = getMaleScarcityPenalty(a, job);
        const bPenalty = getMaleScarcityPenalty(b, job);
        if(aPenalty!==bPenalty) return aPenalty-bPenalty;
        // Capacity-preservation (Fix 10I): among equally-ranked candidates,
        // prefer the cleaner with fewer trained properties so highly flexible
        // cleaners are preserved for later male-required or specialised jobs.
        // Soft only — never filters or overrides earlier criteria.
        const aFlex = getCleanerFlexibilityPenalty(a, job);
        const bFlex = getCleanerFlexibilityPenalty(b, job);
        if(aFlex !== bFlex) return aFlex - bFlex;
        // Workload fairness (Fix 10L-A): soft only, gated by fairnessEnabled.
        // Never applied during the baseline run of the coverage-safety gate.
        if(fairnessEnabled){
          // Provisional rest-plan preference (Fix 10L-C): prefer cleaners who are
          // not on their planned rest day. Soft only — never changes eligibility.
          const aRestPen = getProvisionalRestPenalty(a, job, provisionalRestPlan);
          const bRestPen = getProvisionalRestPenalty(b, job, provisionalRestPlan);
          if(aRestPen !== bRestPen) return aRestPen - bRestPen;
          // Lightweight future-criticality signal (Part A): prefer consuming a cleaner
          // who covers many easy future jobs over one who is the only eligible person
          // for remaining hard jobs (difficulty=0). Approximated as: for each remaining
          // unscheduled job with difficulty=0, check if this candidate is uniquely trained.
          // Lower = more likely critical = prefer not to use now.
          const remainingHard = unassigned.filter(j=>
            j.id !== job.id &&
            !processedJobIds.has(j.id) &&
            (difficultyMap.get(j.id)??999)<=1
          );
          const critA = remainingHard.filter(j=>jobRequiresTraining(j)&&TRAINING[a.id]?.includes(j.propertyId)).length;
          const critB = remainingHard.filter(j=>jobRequiresTraining(j)&&TRAINING[b.id]?.includes(j.propertyId)).length;
          // Higher criticality (more hard-job coverage) → prefer NOT to use now → penalty.
          // Cap at a moderate value so it doesn't override fairness entirely.
          const aCritPenalty = Math.min(critA * 4, 20);
          const bCritPenalty = Math.min(critB * 4, 20);
          if(aCritPenalty !== bCritPenalty) return aCritPenalty - bCritPenalty;
          // Workload fairness score.
          const aFair = getCleanerFairnessPenalty(a, job, weeklyHrs, dailyHrs, constraints, assignedJobsByCleaner);
          const bFair = getCleanerFairnessPenalty(b, job, weeklyHrs, dailyHrs, constraints, assignedJobsByCleaner);
          if(aFair !== bFair) return aFair - bFair;
        }
        return (weeklyHrs[a.id]||0)-(weeklyHrs[b.id]||0) ||
               String(a.id).localeCompare(String(b.id)); // Fix 10L-C: stable tie-break
      });
  };

  // Combined-requirement picker (Fix 10M-B): selects cleaners satisfying senior+gender
  // requirements simultaneously. A senior male satisfies both senior AND male slots.
  // Replaces the earlier gender-only picker while preserving all existing cap rules.
  const pickGenderAware = (job, eligible, existing, missing, candidateJob, effectiveDur, dailyHrsMap, constraintsMap) => {
    if(missing <= 0) return [];
    const canFitCleaner = (cl) => {
      const currentDaily = dailyHrsMap[cl.id]?.[job.day] || 0;
      const withinCap = currentDaily + effectiveDur <= getEffectiveDailyLimit(cl, constraintsMap);
      const partialOk = !!getControlledMalePartialCoverage(cl, job, candidateJob, effectiveDur, currentDaily, constraintsMap);
      return withinCap || partialOk;
    };
    const canFitFullCap = (cl) => {
      const currentDaily = dailyHrsMap[cl.id]?.[job.day] || 0;
      return currentDaily + effectiveDur <= getEffectiveDailyLimit(cl, constraintsMap);
    };

    const picked = [];
    const taken = new Set();
    const existingIds = Array.isArray(existing) ? existing : [];

    // Greedy phase: fill requirement-satisfying slots first.
    // Iterate until requirements met or no more contributing cleaners found.
    let currentIds = [...existingIds];
    let iters = 0;
    while(picked.length < missing && iters++ < 30){
      const deficits = getTeamRequirementDeficits(job, currentIds);
      const hasReqs = deficits.senior > 0 || deficits.male > 0 || deficits.female > 0;
      // Find the best contributing cleaner not yet taken.
      let best = null; let bestScore = -1;
      for(let i = 0; i < eligible.length; i++){
        const cl = eligible[i];
        if(taken.has(cl.id) || existingIds.includes(cl.id)) continue;
        const score = hasReqs ? getCleanerRequirementContribution(cl, deficits) : 0;
        // In requirement phase, skip cleaners that contribute nothing.
        if(hasReqs && score === 0) continue;
        // Male-on-required-male slot may use partial coverage; all others need full cap.
        const isMaleRequired = deficits.male > 0 && cl.gender === 'm';
        const capOk = isMaleRequired ? canFitCleaner(cl) : canFitFullCap(cl);
        if(!capOk) continue;
        if(score > bestScore){ best = cl; bestScore = score; }
        else if(score === bestScore && best) break; // prefer earlier-ranked (eligible order)
      }
      if(!best) break;
      picked.push(best); taken.add(best.id);
      currentIds = [...currentIds, best.id];
    }

    // Optional-slot phase: fill remaining slots with any eligible cleaner (full cap only).
    // Senior-scarcity preference (Fix 10F/10M-B): prefer non-senior on non-senior-required
    // jobs; male-scarcity preference: prefer non-male on non-male-required jobs.
    const genReq = getJobGenderRequirement(job);
    const seniorReq = getJobSeniorRequirement(job);
    const remDeficits = getTeamRequirementDeficits(job, [...existingIds, ...picked.map(c=>c.id)]);
    const reservedSlots = remDeficits.male + remDeficits.female + remDeficits.senior > 0
      ? Math.max(remDeficits.male, remDeficits.senior) + remDeficits.female
      : 0;
    const maxOptional = Math.max(0, missing - picked.length - reservedSlots);
    const optEligible = eligible.filter(cl => {
      if(taken.has(cl.id) || existingIds.includes(cl.id)) return false;
      return canFitFullCap(cl);
    });
    const optPreferred = optEligible.filter(cl => cl.gender !== 'm' && !isSeniorCleaner(cl));
    const optSeniorOnly = optEligible.filter(cl => isSeniorCleaner(cl) && cl.gender !== 'm');
    const optMaleOnly   = optEligible.filter(cl => cl.gender === 'm' && !isSeniorCleaner(cl));
    const optSeniorMale = optEligible.filter(cl => isSeniorCleaner(cl) && cl.gender === 'm');
    // Optional pool: prefer normal females/unknowns, then senior non-males (only if needed),
    // then normal males, then senior males — lowest scarcity-impact first.
    const optPool = Number(genReq.male) > 0 || Number(seniorReq.senior) > 0
      ? [...optPreferred, ...optSeniorOnly, ...optMaleOnly, ...optSeniorMale]
      : optEligible;
    let optCount = 0;
    for(const cl of optPool){
      if(optCount >= maxOptional) break;
      picked.push(cl); taken.add(cl.id); optCount++;
    }
    return picked;
  };

  // Schedule jobs that need work. For flexible jobs we try candidate start times across
  // the window (30-min steps) and choose the first slot that yields a valid full team.
  const unassigned=[...baseJobs.filter(needsWork)];
  // Initialized here so it is in scope during difficulty pre-computation
  // (buildEligibleForSlot reads it via the fairness criticality signal).
  const processedJobIds = new Set();

  // ── Job difficulty pre-computation ────────────────────────────────────────
  // Harder jobs (fewer eligible cleaners relative to required count) are
  // scheduled first so scarce cleaners are assigned where they're most needed
  // before easy jobs consume them. Computed ONCE as a stable snapshot after
  // reset and precommit — deterministic, not recalculated after each job.
  // Uses buildEligibleForSlot directly — no duplicate eligibility logic.
  const getJobDifficultyScore = job => {
    const candidateJob = { ...job };
    const eligible = buildEligibleForSlot(job, candidateJob, []);
    const required = getJobRequiredCleaners(job);
    const req = getJobGenderRequirement(job);
    const reqSenior = getJobSeniorRequirement(job);
