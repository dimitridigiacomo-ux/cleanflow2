<script type="text/babel">const { useState, useRef, useEffect, useCallback, useMemo } = React;

const C = {
  bg:'#F5F2EE', card:'#FFFFFF', nav:'#050505', accent:'#A66A43',

};
const TYPE_COLOR = { 'short-let':'#3B7DD8', restaurant:'#D97B4A', office:'#5B8A6C' };
const TI = t => t==='short-let'?'🏠':t==='restaurant'?'🍽️':'🏢';
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_IT={Mon:'Lun',Tue:'Mar',Wed:'Mer',Thu:'Gio',Fri:'Ven',Sat:'Sab',Sun:'Dom'};
const DAY_EN={Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};
const DAY_FULL={Mon:'Lunedì',Tue:'Martedì',Wed:'Mercoledì',Thu:'Giovedì',Fri:'Venerdì',Sat:'Sabato',Sun:'Domenica'};
const MON_IT=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const MON_EN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── GOOGLE SHEETS URLS ────────────────────────────────────────────────────────
const SHEET_URLS = {

  training:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWZiTAgCvUWivDlG0u1m5afdnnZNrldRXJMuEfEtCwb_Xb5xmEVIr6stRPEMRKQ2TWy2-1a_t-JYs2/pub?gid=1263547040&single=true&output=csv',

  travelBuffers: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWZiTAgCvUWivDlG0u1m5afdnnZNrldRXJMuEfEtCwb_Xb5xmEVIr6stRPEMRKQ2TWy2-1a_t-JYs2/pub?gid=889852745&single=true&output=csv',
};

const CL_PALETTE=['#E8734A','#4A90D9','#7B68EE','#3DAB6D','#D9A84A','#C2506F','#4ABFBF','#8B7355','#E85D5D','#5DAE8B','#9B59B6','#E67E22','#1ABC9C','#3498DB','#E74C3C','#2ECC71','#F39C12','#8E44AD','#16A085','#D35400','#27AE60'];

// ── CSV PARSER ─────────────────────────────────────────────────────────────────
const parseCSV = text => {
  const rows=[]; let row=[], field='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){if(inQ&&n==='"'){field+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(field.trim());field='';}
    else if((c==='\n'||(c==='\r'&&n==='\n'))&&!inQ){
      if(c==='\r')i++;
      row.push(field.trim());
      if(row.some(f=>f)) rows.push(row);
      row=[];field='';
    } else field+=c;
  }
  if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);}
  return rows;
};

// ── SHEET PARSERS ──────────────────────────────────────────────────────────────
// ── Small safe helpers for the expanded Sheet data model ───────────────────
// HH:MM validity (00:00–23:59). Used only to validate new cleaning-window cols.
const isValidHHMM = value => {
  const m = String(value||'').trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return false;
  const h=parseInt(m[1]), min=parseInt(m[2]);
  return h>=0 && h<=23 && min>=0 && min<=59;
};
// Normalize a gender cell to 'm' | 'f' | '' (blank = no constraint).
const normalizeGender = value => {
  const v = String(value||'').trim().toLowerCase();
  if(v==='m'||v==='male'||v==='man'||v==='maschio'||v==='uomo') return 'm';
  if(v==='f'||v==='female'||v==='woman'||v==='femmina'||v==='donna') return 'f';
  return ''; // blank/unknown — does NOT count as male or female
};
// Truthy-string parser for boolean Sheet cells.
const parseBool = value => {
  const v = String(value||'').trim().toLowerCase();
  return v==='true'||v==='yes'||v==='y'||v==='1'||v==='si'||v==='sì';
};

// ── CLEANER ROLE / SENIORITY NORMALISATION (Fix 10M-A) ───────────────────────
// Normalises the raw Role column value from the Cleaners sheet.
// Returns 'senior', 'cleaner', or '' (unrecognised / blank).
// type='senior' is handled separately as a backward-compat fallback.
const normalizeCleanerRole = value => {
  const v = String(value || '').trim().toLowerCase();
  if(['senior','supervisor','team lead','teamlead','lead'].includes(v)) return 'senior';
  if(['cleaner','normal','junior'].includes(v)) return 'cleaner';
  return '';
};

const parseCleanersCSV = rows => {
  rows = Array.isArray(rows) ? rows : [];
  // Normalize a header cell: trim, lowercase, strip accents, collapse separators.
  const norm = s => String(s||'')
    .trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[\s_\-\/]+/g,' ').trim();

  // Find the header row: first row that has an ID-ish header AND a name/type header.
  const ID_ALIASES   = ['id','cleaner id','cleanerid'];
  const NAME_ALIASES = ['full name','fullname','name','cleaner name'];
  const TYPE_ALIASES = ['type'];
  const isHeaderRow = r => {
    const cells=(r||[]).map(norm);
    const has=al=>cells.some(c=>al.includes(c));
    return has(ID_ALIASES) && (has(NAME_ALIASES)||has(TYPE_ALIASES));
  };
  let headerIdx=-1;
  for(let i=0;i<Math.min(rows.length,5);i++){ if(isHeaderRow(rows[i])){ headerIdx=i; break; } }

  // Build header→column map (normalized → column index).
  const headerMap={};
  if(headerIdx>=0){
    (rows[headerIdx]||[]).forEach((cell,ci)=>{ const n=norm(cell); if(n && !(n in headerMap)) headerMap[n]=ci; });
  }
  const col = aliases => { for(const a of aliases){ if(a in headerMap) return headerMap[a]; } return -1; };

  // Field → header aliases (all normalized).
  const IDX = {
    id:          col(['id','cleaner id','cleanerid']),
    name:        col(['full name','fullname','name','cleaner name']),
    type:        col(['type']),
    role:        col(['role']),
    weekly:      col(['weeklyhours','weekly hours','weekly hrs','weeklyhrs',
                      'ore settimana','ore settimanali']),
    daily:       col(['dailyhours','daily hours','daily hrs','dailyhrs',
                      'ore giorno','ore giornaliere']),
    workable:    col(['workabledays','workable days','max giorni assegnabili','giorni lavorabili']),
    restDays:    col(['restdaysrequired','rest days required','restdaystarget',
                      'rest days target','rest days','giorni riposo','giorni di riposo']),
    availFrom:   col(['available from','availablefrom']),
    availTo:     col(['available to','availableto']),
    extraReq:    col(['extrarequests','extra requests','richieste extra']),
    extraWeek:   col(['extraweek','valid week','validforweek','valid for week',
                      'valida per settimana']),
    gender:      col(['gender','sesso']),
    offFrom:     col(['offfrom','off from','ferie da','assente da']),
    offTo:       col(['offto','off to','ferie a','assente a']),
    wiwUserId:   col(['wiw user id','wiwuserid','wiw id','when i work user id']),
    notes:       col(['notes','note']),
  };
  // Backward-compatible fixed-index fallback (used ONLY when no header is detected).
  const FALLBACK = {
    id:0,name:1,type:2,role:-1,weekly:3,daily:4,workable:5,restDays:9,
    availFrom:-1,availTo:-1,extraReq:6,extraWeek:7,gender:8,
    offFrom:10,offTo:11,wiwUserId:-1,notes:-1,
  };
  const get = (r,field) => {
    if(headerIdx>=0){ const i=IDX[field]; return i>=0?r[i]:undefined; }
    const i=FALLBACK[field]; return i>=0?r[i]:undefined;
  };

  // Pre-pass: count IDs to detect duplicates for warning.
  const idCount={};
  rows.forEach(r=>{ const v=get(r,'id'); if(v&&/^c\d+$/.test(String(v).trim())){ const id=String(v).trim(); idCount[id]=(idCount[id]||0)+1; } });

  const isISO  = v => /^\d{4}-\d{2}-\d{2}$/.test(String(v||'').trim());
  const isHHMM = v => /^\d{1,2}:\d{2}$/.test(String(v||'').trim());
  const nonBlank = v => v!==undefined && String(v||'').trim()!=='';

  // colPresent: true only when the column physically exists in the sheet.
  // Header mode: the alias resolved to a column index.
  // Fallback mode: the fixed index is defined AND at least one data row is long enough.
  const fallbackColExists = f => {
    const i=FALLBACK[f]; if(i<0) return false;
    return rows.some(r=>Array.isArray(r)&&r.length>i);
  };
  const colPresent = f => headerIdx>=0 ? IDX[f]>=0 : fallbackColExists(f);

  const seen=new Set();
  return rows.filter(r=>{ const v=get(r,'id'); return v&&/^c\d+$/.test(String(v).trim()); }).filter(r=>{
    const id=String(get(r,'id')).trim(); if(seen.has(id)) return false; seen.add(id); return true;
  }).map(r=>{
    const warns=[];
    const id=String(get(r,'id')).trim();
    const name=String(get(r,'name')||'').trim();
    const parts=name.split(' ');
    const initials=parts.map(p=>p[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
    // colPresent is pre-computed above (closed over IDX, FALLBACK, headerIdx, rows).

    // 1. WorkableDays — HARD availability pattern (5/6/7 only).
    const workableRaw=get(r,'workable');
    const workableParsed=parseInt(workableRaw);
    const workableDays=(workableParsed===5||workableParsed===6||workableParsed===7)?workableParsed:7;
    if(colPresent('workable')&&!nonBlank(workableRaw))
      warns.push('WorkableDays mancante — usato 7 (tutti i giorni).');
    else if(nonBlank(workableRaw)&&!(workableParsed===5||workableParsed===6||workableParsed===7))
      warns.push(`WorkableDays "${workableRaw}" non valido (solo 5, 6, 7 accettati) — usato 7.`);
    const days = workableDays===5?['Mon','Tue','Wed','Thu','Fri']
               : workableDays===6?['Mon','Tue','Wed','Thu','Fri','Sat']
               : DAYS;

    // 2. RestDaysRequired — soft rest target (0–3).
    const restRaw=get(r,'restDays');
    const restParsed=parseInt(restRaw);
    const restDaysRequired=(!isNaN(restParsed)&&restParsed>=0&&restParsed<=3)?restParsed:null;
    if(colPresent('restDays')&&!nonBlank(restRaw))
      warns.push('RestDaysRequired mancante — nessun limite riposo applicato.');
    else if(nonBlank(restRaw)&&restDaysRequired===null)
      warns.push(`RestDaysRequired "${restRaw}" non valido (0–3 accettati).`);

    // 3. maxWorkedDays = min(workableDays, 7 - restDaysRequired) when RestDaysRequired is
    // configured; otherwise workableDays===7 defaults to a max of 6 (a 7/7 schedule is
    // never implied just because a cleaner is AVAILABLE every day of the week — a rest
    // day must still be assumed absent explicit configuration saying otherwise).
    // SINGLE SOURCE OF TRUTH: workDays (legacy field name, kept for backward
    // compatibility with any code still reading it) is now always EQUAL to
    // maxWorkedDays — computed once, never two independently-derived values that can
    // diverge. getEffectiveMaxWorkedDays() reads maxWorkedDays first, so this fix closes
    // the exact path that previously allowed an unconfigured cleaner to be scheduled 7/7.
    const maxWorkedDays=restDaysRequired!==null?Math.min(workableDays,7-restDaysRequired):(workableDays===7?6:workableDays);
    const workDays=maxWorkedDays;
    if(maxWorkedDays<1)
      warns.push(`RestDaysRequired (${restDaysRequired}) porta maxWorkedDays a ${maxWorkedDays} — controlla la configurazione.`);

    // 11. WeeklyHours.
    const weeklyRaw=get(r,'weekly');
    const weeklyParsed=parseFloat(weeklyRaw);
    const weeklyHrs=(!isNaN(weeklyParsed)&&weeklyParsed>0)?weeklyParsed:40;
    if(colPresent('weekly')&&!nonBlank(weeklyRaw))
      warns.push('WeeklyHours mancante — usato 40h.');
    else if(nonBlank(weeklyRaw)&&(isNaN(weeklyParsed)||weeklyParsed<=0))
      warns.push(`WeeklyHours "${weeklyRaw}" non valido — usato 40h.`);

    // 12. DailyHours.
    const dailyRaw=get(r,'daily');
    const dailyParsed=parseFloat(dailyRaw);
    const dailyHrs=(!isNaN(dailyParsed)&&dailyParsed>0)?dailyParsed:8;
    if(colPresent('daily')&&!nonBlank(dailyRaw))
      warns.push('DailyHours mancante — usato 8h.');
    else if(nonBlank(dailyRaw)&&(isNaN(dailyParsed)||dailyParsed<=0))
      warns.push(`DailyHours "${dailyRaw}" non valido — usato 8h.`);

    // AvailableFrom / AvailableTo (HH:MM).
    const availFromRaw=get(r,'availFrom'); const availToRaw=get(r,'availTo');
    const availableFrom=isHHMM(availFromRaw)?String(availFromRaw).trim():'';
    const availableTo  =isHHMM(availToRaw)  ?String(availToRaw).trim()  :'';
    if(nonBlank(availFromRaw)&&!availableFrom) warns.push(`AvailableFrom "${availFromRaw}" non è un orario HH:MM valido.`); // 7 (repurposed)
    if(nonBlank(availToRaw)&&!availableTo)     warns.push(`AvailableTo "${availToRaw}" non è un orario HH:MM valido.`);   // 8
    if(availableFrom&&!availableTo)  warns.push('AvailableFrom presente ma AvailableTo mancante — fine finestra non specificata.'); // 4
    if(availableTo&&!availableFrom)  warns.push('AvailableTo presente ma AvailableFrom mancante — inizio finestra non specificato.'); // 5
    if(availableFrom&&availableTo&&t2m(availableFrom)>=t2m(availableTo))
      warns.push(`AvailableFrom (${availableFrom}) >= AvailableTo (${availableTo}) — finestra non valida.`); // 6

    // OffFrom / OffTo (YYYY-MM-DD).
    const offFromRaw=get(r,'offFrom'); const offToRaw=get(r,'offTo');
    const offFrom=isISO(offFromRaw)?String(offFromRaw).trim():'';
    const offTo  =isISO(offToRaw)  ?String(offToRaw).trim()  :'';
    if(nonBlank(offFromRaw)&&!offFrom) warns.push(`OffFrom "${offFromRaw}" non è una data YYYY-MM-DD valida.`); // 7
    if(nonBlank(offToRaw)&&!offTo)     warns.push(`OffTo "${offToRaw}" non è una data YYYY-MM-DD valida.`);    // 8
    if(offFrom&&offTo&&offFrom>offTo)  warns.push(`OffFrom (${offFrom}) > OffTo (${offTo}) — periodo non valido.`); // 9

    // 10. Gender.
    const genderRaw=get(r,'gender');
    const gender=normalizeGender(genderRaw);
    if(nonBlank(genderRaw)&&!gender)
      warns.push(`Gender "${genderRaw}" non riconosciuto — ignorato.`);

    // 11. Seniority (Fix 10M-A, corrected by micro-correction).
    const roleRaw = String(get(r,'role') || '').trim();
    const normalizedRole = normalizeCleanerRole(roleRaw);
    const typeRaw = String(get(r,'type') || '').trim().toLowerCase();
    const roleIsBlank = roleRaw === '';
    if(roleRaw && !normalizedRole)
      warns.push(`Role "${roleRaw}" non riconosciuto — seniority ignorata.`);
    if(normalizedRole === 'cleaner' && typeRaw === 'senior')
      warns.push(`Role "cleaner" prevale su Type "senior".`);
    const isSenior =
      normalizedRole === 'senior' ||
      (roleIsBlank && typeRaw === 'senior');

    // 13. Duplicate ID.
    if((idCount[id]||0)>1)
      warns.push(`ID "${id}" duplicato nel tab Cleaners.`);

    return {
      id, name, initials,
      type:String(get(r,'type')||'full-time').trim(),
      role: normalizedRole || roleRaw,   // normalized role wins; raw as fallback
      isSenior,
      gender,
      weeklyHrs, dailyHrs,
      workableDays,
      days,       // HARD availability (weekday pattern)
      workDays,   // SOFT per-week upper limit (preserved field)
      restDaysRequired,
      maxWorkedDays,
      availableFrom, availableTo,
      offFrom, offTo,
      extraRequests:String(get(r,'extraReq')||'').trim(),
      extraWeek:String(get(r,'extraWeek')||'').trim(),
      wiwUserId:String(get(r,'wiwUserId')||'').trim(),
      notes:String(get(r,'notes')||'').trim(),
      cleanerWarnings:warns,
    };
  });
};

const parsePropertiesCSV = rows => {
  // ── Header detection ──────────────────────────────────────────────────────
  // Normalize a header cell: trim, lowercase, strip accents, collapse all
  // separators (spaces, underscores, hyphens, slashes) to single space.
  const normH = s => String(s||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[\s_\-\/\.\(\)]+/g,' ').trim();

  // Header row must contain 'id' AND ('name' OR 'type').
  const ID_AL   = ['id','property id'];
  const NAME_AL = ['name','property name'];
  const TYPE_AL = ['type','property type'];
  let headerIdx=-1;
  for(let i=0;i<Math.min(rows.length,5);i++){
    const cells=(rows[i]||[]).map(normH);
    if(cells.some(c=>ID_AL.includes(c)) &&
       (cells.some(c=>NAME_AL.includes(c))||cells.some(c=>TYPE_AL.includes(c)))){
      headerIdx=i; break;
    }
  }

  // Build header→column map.
  const headerMap={};
  if(headerIdx>=0){
    (rows[headerIdx]||[]).forEach((cell,ci)=>{
      const n=normH(cell); if(n && !(n in headerMap)) headerMap[n]=ci;
    });
  }
  const col=aliases=>{for(const a of aliases){if(a in headerMap)return headerMap[a];}return -1;};

  // Field aliases (all normalized). CamelCase headers stay concatenated after normH,
  // e.g. "RequiredMaleCleaners" → "requiredmalecleaners"; spaced variants also supported.
  const HDR={
    id:              col(['id','property id']),
    name:            col(['name','property name']),
    type:            col(['type','property type']),
    checkoutDuration:col(['default checkout duration','checkout duration']),
    checkoutCleaners:col(['checkout cleaners required','checkout cleaners']),
    fallbackDuration:col(['checkoutfallbackduration','checkout fallback duration']),
    fallbackCleaners:col(['checkoutfallbackcleaners','checkout fallback cleaners']),
    checkinTaskDur:  col(['default check in task duration','default checkin task duration',
                          'check in task duration','checkin task duration']),
    checkinCleaners: col(['checkin cleaners required','checkin cleaners']),
    checkoutTime:    col(['default checkout time','checkout time']),
    checkinTaskTime: col(['default checkin task time','checkin task time',
                          'default checkin task start time','checkin task start time',
                          'default check in task start time','check in task start time']),
    notes:           col(['notes']),
    cleaningWindowStart: col(['cleaningwindowstart','cleaning window start']),
    cleaningWindowEnd:   col(['cleaningwindowend','cleaning window end']),
    requiredMaleCleaners:   col(['requiredmalecleaners','required male cleaners']),
    requiredFemaleCleaners: col(['requiredfemalecleaners','required female cleaners']),
    requiredSeniorCleaners: col(['requiredseniorcleaners','required senior cleaners',
                                 'seniorcleanersrequired','senior cleaners required',
                                 'required seniors','seniors required']),
    requiresCheckinClean:   col(['requirescheckinclean','requires checkin clean']),
    area:            col(['area']),
    // Display-only ordering — never read by the scheduler, exporter, or conflict engine.
    displayOrder:    col(['displayorder','display order','sortorder','sort order']),
  };

  // Accessor: header-based when header found; fixed-index fallback otherwise.
  // IMPORTANT: when header is detected, ONLY read from the resolved column
  // (never fall back to a fixed index for a missing column — that silently
  // reads the wrong field, which is the exact bug this parser fixes).
  const FB={id:0,name:1,type:2,checkoutDuration:3,checkoutCleaners:4,
            fallbackDuration:5,fallbackCleaners:6,checkinTaskDur:7,checkinCleaners:8,
            checkoutTime:9,checkinTaskTime:10,notes:11,
            cleaningWindowStart:12,cleaningWindowEnd:13,
            requiredMaleCleaners:14,requiredFemaleCleaners:15,
            requiresCheckinClean:16,area:17};
  const get=(r,f)=>{
    if(headerIdx>=0){const i=HDR[f];return i>=0?r[i]:undefined;}
    const i=FB[f];return i>=0?r[i]:undefined;
  };

  // Diagnostics for missing critical headers (when header detected).
  const globalParserWarnings=[];
  if(headerIdx>=0){
    ['id','name','type','checkoutDuration','checkoutCleaners'].forEach(f=>{
      if(HDR[f]<0) globalParserWarnings.push(`Header "${f}" non trovato nel tab Properties — colonna non letta.`);
    });
  }

  const isTimeLike=v=>/^\d{1,2}:\d{2}$/.test(String(v||'').trim());

  const seen=new Set();
  // Data rows: valid property IDs (/^p\d+$/) read from the resolved 'id' column.
  return rows.filter(r=>{
    const v=get(r,'id');
    return v && /^p\d+$/.test(String(v).trim());
  }).filter(r=>{
    const id=String(get(r,'id')).trim();
    if(seen.has(id)) return false; seen.add(id); return true;
  }).map(r=>{
    const rawCheckoutDur=parseFloat(get(r,'checkoutDuration'));
    const hasCheckoutDur=!isNaN(rawCheckoutDur)&&rawCheckoutDur>0;
    const checkoutCleaners=parseInt(get(r,'checkoutCleaners'))||1;
    const rawCheckinDur=parseFloat(get(r,'checkinTaskDur'));
    const checkinTaskDuration=!isNaN(rawCheckinDur)&&rawCheckinDur>0?rawCheckinDur:null;
    const checkinCleaners=parseInt(get(r,'checkinCleaners'))||1;

    // Per-property parser warnings (time-like value in numeric field).
    const parserWarnings=[...globalParserWarnings];
    const rawMale=get(r,'requiredMaleCleaners'); const rawFemale=get(r,'requiredFemaleCleaners');
    if(isTimeLike(rawMale))
      parserWarnings.push(`RequiredMaleCleaners "${rawMale}" sembra un orario — verifica l'ordine delle colonne.`);
    if(isTimeLike(rawFemale))
      parserWarnings.push(`RequiredFemaleCleaners "${rawFemale}" sembra un orario — verifica l'ordine delle colonne.`);

    // Fix 10M-A: required senior cleaners (strict integer parsing).
    const rawSenior = get(r,'requiredSeniorCleaners');
    const rawSeniorStr = String(rawSenior == null ? '' : rawSenior).trim();
    const seniorIsValidInteger = /^\d+$/.test(rawSeniorStr);
    const parsedSenior = seniorIsValidInteger ? Number(rawSeniorStr) : NaN;
    const requiredSeniorCleaners =
      Number.isInteger(parsedSenior) && parsedSenior >= 0 ? parsedSenior : 0;
    if(rawSeniorStr && !seniorIsValidInteger)
      parserWarnings.push(`RequiredSeniorCleaners "${rawSeniorStr}" non valido — usato 0.`);

    // Checkout window (safe parse: validate HH:MM).
    const cwsRaw=get(r,'cleaningWindowStart'); const cweRaw=get(r,'cleaningWindowEnd');
    const cleaningWindowStart=isValidHHMM(cwsRaw)?String(cwsRaw).trim():'10:00';
    const cleaningWindowEnd  =isValidHHMM(cweRaw)?String(cweRaw).trim():'16:00';

    // Fallback IIFE — TDZ-safe: checkoutCl/checkoutDur/reqM/reqF declared before usable.
    const fallbackResult=(()=>{
      const fbDRaw=get(r,'fallbackDuration'); const fbCRaw=get(r,'fallbackCleaners');
      const fbD=parseFloat(fbDRaw); const fbC=parseInt(fbCRaw);
      const hasFbC=!isNaN(fbC)&&fbC>0; const hasFbD=!isNaN(fbD)&&fbD>0;
      const checkoutFallbackActive=hasFbC&&hasFbD;
      const checkoutCl=checkoutCleaners;
      const checkoutDur=hasCheckoutDur?rawCheckoutDur:2;
      const reqM=parseInt(rawMale)||0;
      const reqF=parseInt(rawFemale)||0;
      const checkoutFallbackUsable=hasFbC&&hasFbD
        &&fbC<checkoutCl&&fbD>=checkoutDur
        &&(reqM+reqF===0||fbC>=reqM+reqF);
      const fbWarnings=[];
      if(hasFbC&&!hasFbD) fbWarnings.push(`CheckoutFallbackCleaners (${fbC}) fornito ma CheckoutFallbackDuration mancante — fallback non attivo.`);
      if(hasFbD&&!hasFbC) fbWarnings.push(`CheckoutFallbackDuration (${fbD}h) fornita ma CheckoutFallbackCleaners mancante — fallback non attivo.`);
      if(hasFbC&&fbC>=checkoutCl) fbWarnings.push(`CheckoutFallbackCleaners (${fbC}) >= Checkout Cleaners Required (${checkoutCl}) — il fallback dovrebbe essere un team ridotto.`);
      if(hasFbD&&checkoutDur>0&&fbD<checkoutDur) fbWarnings.push(`CheckoutFallbackDuration (${fbD}h) < Checkout Duration (${checkoutDur}h) — durata incoerente.`);
      if(hasFbC&&(reqM+reqF)>0&&fbC<reqM+reqF) fbWarnings.push(`CheckoutFallbackCleaners (${fbC}) < RequiredMaleCleaners + RequiredFemaleCleaners (${reqM}+${reqF}=${reqM+reqF}) — il fallback non può soddisfare i requisiti di genere.`);
      return {
        checkoutFallbackCleaners:hasFbC?fbC:null,
        checkoutFallbackDuration:hasFbD?fbD:null,
        checkoutFallbackActive,checkoutFallbackUsable,
        checkoutFallbackWarnings:fbWarnings,
      };
    })();

    return {
      id:String(get(r,'id')).trim(),
      name:String(get(r,'name')||'').trim(),
      type:String(get(r,'type')||'short-let').trim(),
      duration:hasCheckoutDur?rawCheckoutDur:2,
      durationMissing:!hasCheckoutDur,
      cleanersRequired:checkoutCleaners,
      requires2:checkoutCleaners>=2,
      checkoutTime:String(get(r,'checkoutTime')||'10:00').trim(),
      notes:String(get(r,'notes')||'').trim(),
      checkoutDuration:hasCheckoutDur?rawCheckoutDur:2,
      checkoutCleanersRequired:checkoutCleaners,
      checkinTaskDuration,
      checkinCleanersRequired:checkinCleaners,
      checkinTaskTime:String(get(r,'checkinTaskTime')||'').trim(),
      cleaningWindowStart,cleaningWindowEnd,
      requiredMaleCleaners:  parseInt(rawMale)||0,
      requiredFemaleCleaners:parseInt(rawFemale)||0,
      requiredSeniorCleaners: (() => {
        if(requiredSeniorCleaners > checkoutCleaners)
          parserWarnings.push(`RequiredSeniorCleaners (${requiredSeniorCleaners}) > Checkout Cleaners Required (${checkoutCleaners}) — configurazione impossibile.`);
        return requiredSeniorCleaners;
      })(),
      requiresCheckinClean:  parseBool(get(r,'requiresCheckinClean')),
      area:String(get(r,'area')||'').trim(),
      // Display-only — supervisor-controlled visual ordering. Blank/invalid → 9999
      // so unordered properties sort after explicitly-ordered ones, never before.
      // (Number('') === 0, not NaN, so blank must be checked explicitly first.)
      displayOrder:(()=>{
        const raw=get(r,'displayOrder');
        const s=String(raw==null?'':raw).trim();
        if(!s) return 9999;
        const n=Number(s);
        return Number.isFinite(n)?n:9999;
      })(),
      parserWarnings,
      ...fallbackResult,
    };
  });
};

const parseTrainingCSV = rows => {
  // rows[2] = header row: corner | c01\nName | c02\nName | ...
  // rows[3]+ = data: "p01 — Villa Foca" | x | | x | ...
  if(rows.length<3) return {};
  const headers=rows[2]||[];
  // Extract cleaner IDs from header (format "c01\nAnita A." or "c01")
  const clIds=headers.slice(1).map(h=>{
    const m=(h||'').match(/^(c\d+)/);
    return m?m[1]:null;
  }).filter(Boolean);

  const training={};
  rows.slice(3).forEach(row=>{
    if(!row[0]) return;
    // Extract property ID from "p01 — Villa Foca"
    const pm=row[0].match(/^(p\d+)/);
    if(!pm) return;
    const pid=pm[1];
    clIds.forEach((cid,j)=>{
      const val=(row[j+1]||'').trim().toLowerCase();
      if(val==='x'||val==='✓'){
        if(!training[cid]) training[cid]=[];
        if(!training[cid].includes(pid)) training[cid].push(pid);
      }
    });
  });
  return training;
};

const normalizeName = v => (v||'').toString().trim().toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');

const resolvePropertyId = (propRaw, propertiesList=PROPERTIES) => {
  const raw=(propRaw||'').trim();
  if(!raw) return '';
  // a) ID prefix — only return if it actually exists in the list
  const idMatch=raw.match(/^(p\d+)/i);
  if(idMatch){
    const id=idMatch[1].toLowerCase();
    return propertiesList.some(p=>p.id===id)?id:'';
  }
  // b) Exact normalized name match
  const wanted=normalizeName(raw);
  const exact=propertiesList.find(p=>normalizeName(p.name)===wanted);
  if(exact) return exact.id;
  // c+d) Loose match — only if unique. Multiple matches → unresolved.
  const matches=propertiesList.filter(p=>{
    const n=normalizeName(p.name);
    return n.includes(wanted)||wanted.includes(n);
  });
  if(matches.length===1) return matches[0].id;
  if(matches.length>1){
    console.warn('[CleanFlow] Ambiguous property match:', raw, '->', matches.map(p=>p.name));
  }
  return '';
};

const resolveCleanerId = (cleanerRaw, cleanersList=CLEANERS) => {
  const raw=(cleanerRaw||'').trim();
  if(!raw) return null;
  // a) ID prefix — only return if it actually exists in the list
  const idMatch=raw.match(/^(c\d+)/i);
  if(idMatch){
    const id=idMatch[1].toLowerCase();
    return cleanersList.some(c=>c.id===id)?id:null;
  }
  // b) Exact normalized name match
  const wanted=normalizeName(raw);
  const exact=cleanersList.find(c=>normalizeName(c.name)===wanted);
  if(exact) return exact.id;
  // c+d) Loose match — only if unique
  const matches=cleanersList.filter(c=>{
    const n=normalizeName(c.name);
    return n.includes(wanted)||wanted.includes(n);
  });
  if(matches.length===1) return matches[0].id;
  if(matches.length>1){
    console.warn('[CleanFlow] Ambiguous cleaner match:', raw, '->', matches.map(c=>c.name));
  }
  return null;
};

const SERVICE_TYPE_IDS = new Set([
  'CHECKOUT_COMPLETE','BACK_TO_BACK','PREPARE_FOR_GUEST',
  'CHECKIN_ONLY','REFRESH_CLEAN','OFFICE_CLEAN',
  'RESTAURANT_CLEAN','MAINTENANCE','TRAINING','OTHER'
]);
const normalizeServiceTypeId = v => {
  const s=(v||'').trim().toUpperCase().replace(/\s+/g,'_').replace(/-/g,'_');
  return SERVICE_TYPE_IDS.has(s)?s:'';
};
const inferServiceTypeId = (propertyId, note='', propertiesList=PROPERTIES) => {
  const prop=propertiesList.find(p=>p.id===propertyId);
  const n=(note||'').toLowerCase();
  if(prop?.type==='office') return 'OFFICE_CLEAN';
  if(prop?.type==='restaurant') return 'RESTAURANT_CLEAN';
  if(n.includes('back to back')) return 'BACK_TO_BACK';
  if(n.includes('prepare for guest')) return 'PREPARE_FOR_GUEST';
  if(n.includes('check in')||n.includes('check-in')) return 'CHECKIN_ONLY';
  if(n.includes('refresh')) return 'REFRESH_CLEAN';
  if(prop?.type==='short-let') return 'CHECKOUT_COMPLETE';
  return 'OTHER';
};

const parseTemplateCSVWithDiagnostics = (rows, propertiesList=PROPERTIES, cleanersList=CLEANERS) => {
  // New column structure (rows[0-2] = title/subtitle/header, rows[3]+ = data):
  // A=Day B=Property C=Service Type D=Start Time E=End Time(info)
  // F=Cleaner1 G=Cleaner2 H=Cleaner3 I=Note [J=Window Start K=Window End optional]
  // Backward-compat: if r[2] looks like HH:MM → legacy format
  const validDays=new Set(DAYS);
  const candidateRows=rows.slice(3).filter(r=>validDays.has((r[0]||'').trim()));
  const totalRows=candidateRows.length;

  // ── Window column detection (header-driven, row index 2) ─────────────
  const headerRow = rows[2] || [];
  const normH = s => String(s||'').trim().toLowerCase().replace(/[\s_\-\/]+/g,' ');
  const WIN_START_ALIASES = ['windowstart','window start','cleaning window start','winstart','win start'];
  const WIN_END_ALIASES   = ['windowend',  'window end', 'cleaning window end',  'winend',  'win end'];
  const findCol = aliases => { for(let i=0;i<headerRow.length;i++){ if(aliases.includes(normH(headerRow[i]))) return i; } return -1; };
  const winStartCol = findCol(WIN_START_ALIASES);
  const winEndCol   = findCol(WIN_END_ALIASES);

  const unresolvedProperties=[];
  const unresolvedCleaners=[];
  const invalidServiceTypes=[];
  const rowsWithNoCleaner=[];
  const windowWarnings=[];
  const serviceTypeCounts={};
  let flexibleJobCount=0;
  const jobs=[];

  candidateRows.forEach(r=>{
    const day=r[0].trim();
    const propRaw=(r[1]||'').trim();
    const propertyId=resolvePropertyId(propRaw,propertiesList);

    if(!propertyId){
      if(propRaw) unresolvedProperties.push(propRaw);
      return; // skip row
    }

    const col2=(r[2]||'').trim();
    const isLegacy=/^\d{1,2}:\d{2}$/.test(col2);

    let rawServiceTypeId, rawStartTime, endTimeInfo, rawCleaners, note;
    if(isLegacy){
      rawServiceTypeId='';
      rawStartTime=col2; // may be valid HH:MM or empty
      endTimeInfo='';
      rawCleaners=[r[4],r[5],r[6]];
      note=(r[7]||'').trim();
    } else {
      rawServiceTypeId=col2;
      rawStartTime=(r[3]||'').trim();
      endTimeInfo=(r[4]||'').trim();
      rawCleaners=[r[5],r[6],r[7]];
      note=(r[8]||'').trim();
    }

    // ── Window fields (from detected header columns) ────────────────────
    const rawWinStart = winStartCol>=0 ? (r[winStartCol]||'').trim() : '';
    const rawWinEnd   = winEndCol  >=0 ? (r[winEndCol]  ||'').trim() : '';
    const validWinStart = isValidHHMM(rawWinStart);
    const validWinEnd   = isValidHHMM(rawWinEnd);

    // ── Determine startTime and flexibility ─────────────────────────────
    const isSTBlank = !isValidHHMM(rawStartTime);
    let startTime, flexibleWindow=false, windowStartTime, windowEndTime;

    if(!isSTBlank){
      // Fixed job — use Start Time as-is (Rule 1)
      startTime = rawStartTime;
    } else if(validWinStart && validWinEnd){
      // Flexible job — window drives scheduling (Rule 2 + 3)
      startTime     = rawWinStart;
      flexibleWindow  = true;
      windowStartTime = rawWinStart;
      windowEndTime   = rawWinEnd;
      flexibleJobCount++;
    } else if(rawWinStart || rawWinEnd){
      // Partial window — warn and fall back (Rule 7)
      const detail = `WindowStart=${rawWinStart||'—'} WindowEnd=${rawWinEnd||'—'}`;
      windowWarnings.push(`${day} — ${propRaw}: Start Time assente, finestra incompleta (${detail}) — usato 09:00.`);
      startTime = '09:00';
    } else {
      // No Start Time, no window — silent default (Rule 7 safe fallback)
      startTime = '09:00';
    }

    // Resolve cleaners — track unresolved names
    const cleanerIds=rawCleaners.map(c=>{
      const raw=(c||'').trim();
      if(!raw) return null;
      const id=resolveCleanerId(raw,cleanersList);
      if(!id && raw && raw.toLowerCase()!=='da assegnare') unresolvedCleaners.push(raw);
      return id;
    }).filter(Boolean);

    if(cleanerIds.length===0) rowsWithNoCleaner.push(`${day} — ${propRaw}`);

    // Normalize service type → fallback to infer
    const normalized=normalizeServiceTypeId(rawServiceTypeId);
    const serviceTypeId=normalized||inferServiceTypeId(propertyId,note,propertiesList);
    if(rawServiceTypeId&&!normalized) invalidServiceTypes.push(rawServiceTypeId);

    serviceTypeCounts[serviceTypeId]=(serviceTypeCounts[serviceTypeId]||0)+1;

    const job = {
      day, propertyId, serviceTypeId, cleanerIds, startTime, endTimeInfo, note,
      type:'template',
      // Stamp whether this job was already assigned in the Google Sheet at import time.
      // cleanerIds here contains ONLY what the Sheet provided — nothing auto-assigned yet.
      // This field persists through draft/publish and prevents auto-scheduler-assigned
      // template jobs from being treated as Sheet-locked on subsequent runAutoSchedule calls.
      // false = empty/partial template row (auto-scheduler must fill it)
      // true  = Sheet-assigned cleaner(s) present at import time
      templateLockedFromSheet: cleanerIds.length > 0,
    };
    if(flexibleWindow){
      job.flexibleWindow  = true;
      job.windowStartTime = windowStartTime;
      job.windowEndTime   = windowEndTime;
    }
    jobs.push(job);
  });

  return {
    jobs,
    diagnostics:{
      totalRows,
      importedRows:jobs.length,
      skippedRows:totalRows-jobs.length,
      unresolvedProperties:[...new Set(unresolvedProperties)],
      unresolvedCleaners:[...new Set(unresolvedCleaners)],
      invalidServiceTypes:[...new Set(invalidServiceTypes)],
      rowsWithNoCleaner,
      windowWarnings,
      flexibleJobCount,
      serviceTypeCounts,
    },
  };
};

// Wrapper for backward-compat — returns only jobs array
const parseTemplateCSV = (rows, propertiesList=PROPERTIES, cleanersList=CLEANERS) =>
  parseTemplateCSVWithDiagnostics(rows, propertiesList, cleanersList).jobs;


// Hostaway Map parser. Supports TWO schemas, auto-detected from the header rows:
//  - NEW (6 cols): HostawayListingId | HostawayListingName | CleanFlowPropertyId
//                  | CleanFlowPropertyName | Ignore | Notes
//  - OLD (2 cols): HostawayListingName | CleanFlowPropertyId
// Returns { nameMap, byId }:
//  - nameMap: { hostawayListingNameLower: propId }  (used by CSV import via PROP_NAME_MAP)
//  - byId:    { hostawayListingId: { hostawayListingId, hostawayListingName,
//               propertyId, cleanFlowName, ignore, notes } }  (used by API import)
const parseHostawayMapCSV = rows => {
  const nameMap = {};
  const byId = {};
  // Detect new schema: any of the first 3 rows mention the new header names.
  const headerBlob = rows.slice(0, 3).map(r => (r || []).join('|').toLowerCase()).join(' ');
  const isNewSchema = headerBlob.indexOf('hostawaylistingid') !== -1
    && headerBlob.indexOf('cleanflowpropertyid') !== -1;

  rows.slice(3).forEach(r => {
    if (isNewSchema) {
      const listingId   = (r[0] || '').trim();
      const listingName = (r[1] || '').trim();
      const propId      = (r[2] || '').trim();
      const cleanName   = (r[3] || '').trim();
      const ignore      = parseBool(r[4]);
      const notes       = (r[5] || '').trim();
      if (listingId) {
        byId[listingId] = {
          hostawayListingId: listingId,
          hostawayListingName: listingName,
          propertyId: propId,
          cleanFlowName: cleanName,
          ignore: ignore,
          notes: notes,
        };
      }
      // Keep name→propId for CSV-import backward compatibility (only when mapped & not ignored).
      if (listingName && propId && !ignore) nameMap[listingName.toLowerCase()] = propId;
    } else {
      // OLD schema: r[0]=name, r[1]=propId.
      const hostName = (r[0] || '').trim().toLowerCase();
      const propId   = (r[1] || '').trim();
      if (hostName && propId) nameMap[hostName] = propId;
    }
  });
  return { nameMap: nameMap, byId: byId };
};
