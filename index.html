    const totalSlack = eligible.length - required;
    // Gender-aware bottleneck (Fix 10J).
    const maleEligible   = eligible.filter(cl => cl.gender === 'm').length;
    const femaleEligible = eligible.filter(cl => cl.gender === 'f').length;
    // Senior-aware bottleneck (Fix 10M-B): a senior male counts in both senior+male.
    const seniorEligible = eligible.filter(cl => isSeniorCleaner(cl)).length;
    const bottlenecks = [totalSlack];
    if(Number(req.male)        > 0) bottlenecks.push(maleEligible   - Number(req.male));
    if(Number(req.female)      > 0) bottlenecks.push(femaleEligible - Number(req.female));
    if(Number(reqSenior.senior)> 0) bottlenecks.push(seniorEligible - Number(reqSenior.senior));
    return Math.max(0, Math.min(...bottlenecks));
  };
  const difficultyMap = new Map();
  for(const job of unassigned){
    difficultyMap.set(job.id, getJobDifficultyScore(job));
  }

  // Pre-compute per-job planning metadata for full-week job ordering (Fix 10L-C SC2).
  // Only computed in demand-aware runs; legacy baseline uses compareLegacyMutableJobs.
  const planningEligibilityByJob = planningContext?.eligibilityByJob || null;
  const enrichedSnapByDay = planningContext?.enrichedByDay || {};
  const jobMeta = new Map();
  if(demandAwareEnabled){
    unassigned.forEach(j => {
      const e = planningEligibilityByJob?.get(j.id);
      const req = getJobRequiredCleaners(j);
      const gReq = getJobGenderRequirement(j);
      const sReq = getJobSeniorRequirement(j);
      // Raw unclamped minimumSlack: negative values preserved for correct ordering.
      const rawSlacks = [
        e ? (e.totalEligible - req) : (difficultyMap.get(j.id)??999),
      ];
      if(gReq.male > 0) rawSlacks.push(e ? (e.maleEligible - gReq.male) : 999);
      if(gReq.female > 0) rawSlacks.push(e ? (e.femaleEligible - gReq.female) : 999);
      if(sReq.senior > 0) rawSlacks.push(e ? (e.seniorEligible - sReq.senior) : 999);
      const minimumSlack = Math.min(...rawSlacks);
      const activeReqCount =
        (gReq.male > 0 ? 1 : 0) +
        (gReq.female > 0 ? 1 : 0) +
        (sReq.senior > 0 ? 1 : 0);
      const daySnap = enrichedSnapByDay[j.day] || {};
      const jS = t2m(j.startTime), jE = getJobOperationalEndMinutes(j);
      const concurrencyBurden = unassigned.filter(o =>
        o.id !== j.id && o.day === j.day &&
        jS < getJobOperationalEndMinutes(o) && jE > t2m(o.startTime)
      ).length;
      jobMeta.set(j.id, {minimumSlack,activeReqCount,requiredCleaners:req,daySnap,concurrencyBurden});
    });
  }

  if(demandAwareEnabled){
    unassigned.sort((a,b) => compareDemandAwareMutableJobs(a, b, jobMeta));
  } else {
    unassigned.sort((a,b) => compareLegacyMutableJobs(a, b, difficultyMap));
  }

  const newlyScheduled = unassigned.map(job=>{
    const needed = getJobRequiredCleaners(job);
    const originalExisting = (job.cleanerIds||[]).slice();
    const genReq = getJobGenderRequirement(job);
    const hasGenderReq = genReq.male > 0 || genReq.female > 0;
    const hasSeniorReq = getJobSeniorRequirement(job).senior > 0;
    // Rebuild full non-locked team if it violates gender OR senior requirements (Fix 10M-B).
    const requirementsInvalidExisting =
      (hasGenderReq || hasSeniorReq) &&
      !isLockedTemplateJob(job) &&
      originalExisting.length >= needed &&
      (!genderRequirementMet(job, originalExisting) || !seniorRequirementMet(job, originalExisting));
    const existing = requirementsInvalidExisting ? [] : originalExisting;
    const missing = Math.max(0, needed - existing.length);
    const jobDur = getJobOperationalDuration(job);

    // Build candidate start times. Flexible + valid end → step from window.start to the
    // latest start that still finishes by window.end, in 30-min increments. Otherwise
    // just the job's current startTime (fixed behaviour).
    const win=getJobSchedulingWindow(job);
    let candidateStarts;
    if(win.flexible && win.end){
      const wS=t2m(win.start), wEnd=t2m(win.end);
      const latestStart=wEnd - jobDur*60;
      candidateStarts=[];
      for(let t=wS; t<=latestStart; t+=30) candidateStarts.push(t);
      if(candidateStarts.length===0) candidateStarts=[wS]; // window too short for duration; try start anyway
    } else if(win.flexible){
      candidateStarts=[t2m(win.start || job.startTime)]; // flexible start, no end bound
    } else {
      candidateStarts=[t2m(job.startTime)]; // fixed
    }

    // Try each candidate slot; pick the FIRST that yields a full, gender-valid team.
    let chosen=null;
    for(const cs of candidateStarts){
      const candidateJob={...job, startTime:m2t(cs)};
      // Validate pre-assigned cleaners against this candidate slot first.
      // If any existing cleaner can't work here (overlap / travel / rest / holiday),
      // skip this slot — try the next one. Vacuously true when existing is empty.
      const existingValid=existing.every(id=>{
        const cl=CLEANERS.find(c=>c.id===id);
        return cl&&isCleanerEligibleForCandidateSlot(cl,job,candidateJob,jobDur);
      });
      if(!existingValid) continue;
      const eligible=buildEligibleForSlot(job, candidateJob, existing);
      const pickNew=pickGenderAware(job, eligible, existing, missing, candidateJob, jobDur, dailyHrs, constraints);
      const teamIds=[...existing, ...pickNew.map(c=>c.id)];
      const countOk=teamIds.length>=needed;
      const genderOk=genderRequirementMet(job, teamIds);
      const seniorOk=seniorRequirementMet(job, teamIds);
      if(countOk && genderOk && seniorOk){ chosen={cs, candidateJob, pickNew, teamIds}; break; }
      // Remember the best partial (first valid-existing slot) as fallback.
      if(!chosen) chosen={cs, candidateJob, pickNew, teamIds, partial:true};
    }
    // If every slot was skipped (existing team invalid everywhere), fall back to
    // first candidate so the job is marked needs_review rather than crashing.
    if(!chosen){
      const fbCs=candidateStarts[0];
      chosen={cs:fbCs,candidateJob:{...job,startTime:m2t(fbCs)},pickNew:[],teamIds:[...existing],partial:true};
    }

    // ── CHECKOUT FALLBACK TRIAL (Patch 2) ──────────────────────────────────
    // If no valid full team was found with the normal requirement, and this job
    // is eligible for fallback, retry using the fallback team size / duration.
    // All eligibility filters still apply; the fallback just uses smaller team + longer time.
    const normalTrialFailed = !!chosen.partial;
    // Fix 10M-C: senior-required jobs may now use fallback; the picker and final
    // success check enforce the senior requirement for the fallback team.
    if(normalTrialFailed && isCheckoutFallbackEligibleJob(job)){
      const fbCfg=getCheckoutFallbackConfig(job);
      if(fbCfg){
        const fbNeeded=fbCfg.cleaners;
        const fbDur=fbCfg.duration;
        // Recompute candidate start times using the fallback (longer) duration.
        // CRITICAL: if fallback duration does not fit inside the window, do NOT force
        // any start — a fallback job that would exceed windowEnd must not be scheduled.
        let fbCandidateStarts;
        if(win.flexible && win.end){
          const wS=t2m(win.start), wEnd=t2m(win.end);
          const fbLatest=wEnd-fbDur*60;
          fbCandidateStarts=[];
          if(fbLatest>=wS){ // only generate starts if fallback fits inside the window
            for(let t=wS; t<=fbLatest; t+=30) fbCandidateStarts.push(t);
          }
          // If empty: fallback duration > window → skip fallback trial entirely.
        } else {
          fbCandidateStarts=candidateStarts;
        }
        for(const cs of fbCandidateStarts){  // loop body never runs when empty
          const fbCandidateJob={...job, startTime:m2t(cs)};
          // Build an ordered candidate pool for fallback team selection:
          // 1. Existing cleaners that are individually valid for fallback duration (soft preference)
          // 2. Additional eligible cleaners from buildEligibleForSlot
          // Existing cleaners are NOT automatically retained when existing.length > fbNeeded.
          const existingValidForFb = existing.filter(id=>{
            const cl=CLEANERS.find(c=>c.id===id);
            return cl&&isCleanerEligibleForCandidateSlot(cl,job,fbCandidateJob,fbDur);
          });
          const newEligible=buildEligibleForSlot(job, fbCandidateJob, existingValidForFb, fbDur);
          // Unified candidate pool: valid existing first (stability preference), then new, deduped.
          const existingValidCls=existingValidForFb.map(id=>CLEANERS.find(c=>c.id===id)).filter(Boolean);
          const fbCandidatePool=[...existingValidCls, ...newEligible];
          // Select exactly fbNeeded cleaners using the combined senior+gender-aware picker.
          // pickGenderAware receives existing=[] so it selects a fresh team of fbNeeded from pool.
          const pickNw=pickGenderAware(job, fbCandidatePool, [], fbNeeded, fbCandidateJob, fbDur, dailyHrs, constraints);
          const teamIds=dedupeCleanerIds(pickNw.map(c=>c.id));
          const countOk=teamIds.length===fbNeeded;  // strict equality — no overstaff
          const genderOk=genderRequirementMet(job, teamIds);
          const seniorOk=seniorRequirementMet(job, teamIds);
          if(countOk && genderOk && seniorOk){
            // Fallback succeeded — override chosen with fallback data.
            chosen={cs, candidateJob:fbCandidateJob, pickNew:pickNw, teamIds,
                    fbMeta:{needed:fbNeeded, dur:fbDur, origNeeded:needed, origDur:jobDur}};
            break;
          }
        }
      }
    }

    const useFallback=!!chosen.fbMeta;
    const effectiveNeeded = useFallback ? chosen.fbMeta.needed : needed;

    const finalStart=m2t(chosen.cs);
    const finalJob={
      ...job,
      startTime:finalStart,
      ...(useFallback ? {
        duration:               chosen.fbMeta.dur,
        cleanersRequired:       chosen.fbMeta.needed,
        fallbackUsed:           true,
        fallbackOriginalCleanersRequired: chosen.fbMeta.origNeeded,
        fallbackOriginalDuration:         chosen.fbMeta.origDur,
        fallbackWarning: `Fallback: team ridotto ${chosen.fbMeta.needed} cleaners, durata ${chosen.fbMeta.dur}h`,
      } : {}),
    };
    const pickNew=chosen.pickNew;
    // For fallback: finalIds comes directly from the exact team already selected inside
    // the fallback block (chosen.teamIds = dedupeCleanerIds(pickNw.map(c=>c.id))).
    // Do NOT re-add all existing cleaners — that would overstaff and double-count hours.
    // For normal scheduling: keep existing behaviour of combining existing + new picks.
    const finalIds = useFallback
      ? dedupeCleanerIds(chosen.teamIds || [])
      : dedupeCleanerIds([...existing, ...pickNew.map(c=>c.id)]);
    const countOk=finalIds.length>=effectiveNeeded;
    const genderOk=genderRequirementMet(job, finalIds);
    const seniorOk=seniorRequirementMet(job, finalIds);

    // Compute early-leave suggestions BEFORE committing (dailyHrs not yet updated).
    const dailyBeforeByCleaner = Object.fromEntries(
      finalIds.map(id => [id, dailyHrs[id]?.[finalJob.day] || 0])
    );
    const earlyLeaveSuggestions = finalIds.map(id => {
      const cl = CLEANERS.find(c => c.id === id);
      if(!cl) return null;
      return getControlledMalePartialCoverage(
        cl, job, finalJob, getJobOperationalDuration(finalJob), dailyBeforeByCleaner[id] || 0, constraints
      );
    }).filter(Boolean);

    // Commit the WHOLE final team at the chosen start (existing of needsWork jobs were
    // never pre-committed). This blocks the correct (possibly moved) slot for later jobs.
    // Use effective cleaner duration for hour accounting (partial coverage respected).
    commitTeam(finalJob, finalIds, earlyLeaveSuggestions);

    // Soft-limit warnings (computed against the now-updated maps for the picked cleaners).
    const warnings=[];
    pickNew.forEach(cl=>{
      const c=constraints[cl.id];
      const dailyLim = c?.maxDailyHrs ?? cl.dailyHrs;
      const weeklyLim = c?.maxWeeklyHrs ?? cl.weeklyHrs;
      const daily = (dailyHrs[cl.id]?.[job.day]||0);
      const weekly = (weeklyHrs[cl.id]||0);
      const projDays = new Set(Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)); projDays.add(job.day);
      if(dailyLim && daily > dailyLim) warnings.push(`${cl.name}: ${daily}h/${dailyLim}h/giorno`);
      else if(weeklyLim && weekly > weeklyLim) warnings.push(`${cl.name}: ${weekly}h/${weeklyLim}h/sett.`);
      else if(cl.workDays && projDays.size > cl.workDays) warnings.push(`${cl.name}: ${projDays.size}/${cl.workDays} giorni`);
    });

    const result={
      ...finalJob,
      cleanerIds:finalIds,
      status: (!chosen.partial && countOk && genderOk && seniorOk) ? 'assigned' : 'needs_review',
      softLimitWarning: warnings.length>0 ? warnings.join(' · ') : null,
      // Decision label metadata (display-only, never read by scheduler/export).
      schedulerDecisionCode: useFallback ? 'fallback'
        : (finalJob.type === 'template' && finalJob.templateLockedFromSheet === false)
          ? 'auto_filled_template'
          : 'scheduler',
      earlyLeaveSuggestions: earlyLeaveSuggestions.length ? earlyLeaveSuggestions : null,
    };
    // If flexible with a window and no valid slot was found (or team incomplete), flag clearly.
    if(win.flexible && win.end && (chosen.partial || !(countOk && genderOk && seniorOk))){
      result.windowWarning=`Nessuno slot valido nella finestra pulizia ${win.start}–${win.end}`;
      // If fallback was attempted but also failed (or couldn't fit), clarify.
      if(normalTrialFailed && isCheckoutFallbackEligibleJob(job)){
        const fbCfg2=getCheckoutFallbackConfig(job);
        if(fbCfg2){
          const wEnd2=win.end?t2m(win.end):null;
          const fbFitsInWindow = !wEnd2 || (t2m(win.start)+fbCfg2.duration*60 <= wEnd2);
          result.fallbackWarning = fbFitsInWindow
            ? 'Nessun team valido trovato (né ideale né fallback) nella finestra pulizia.'
            : `Fallback (${fbCfg2.duration}h) non si adatta alla finestra pulizia ${win.start}–${win.end}.`;
        }
      }
    } else if(result.windowWarning){
      delete result.windowWarning;
    }
    processedJobIds.add(job.id); // mark this job as processed for the criticality signal
    return result;
  });

  const schedulerResult = {
    jobs: [
      // Untouched jobs = everything NOT in the needsWork set (locked template jobs, and
      // jobs already complete on count + gender). Keep their team; set status by validity.
      ...baseJobs.filter(j=>!needsWork(j)).map(j=>({
        ...j,
        status: 'assigned',
      })),
      ...newlyScheduled,
    ],
    constraints,
  };

  // ── COVERAGE SAFETY GATE (Fix 10L-C SC2) ──────────────────────────────────
  // Baseline uses demandAwareEnabled:false to reproduce exact pre-10L-C behavior.
  // This ensures the safety comparison detects if demand-aware ordering itself
  // worsens coverage (which the old fairnessEnabled-only baseline could not catch).
  if(fairnessEnabled && demandAwareEnabled){
    const baseline = runAutoSchedule(allJobs, weekOffset, {
      fairnessEnabled: false,
      demandAwareEnabled: false,
    });
    const winner = chooseSaferSchedulePlan(baseline, schedulerResult);
    // Fix 10L-B: run global optimizer once on the selected plan.
    const optimized = optimizeGlobalSchedule(winner, allJobs, weekOffset);
    const finalResult = chooseSaferOptimizedPlan(winner, optimized);
    // EMERGENCY PATCH: explicit blocking/review diagnostics for the plan actually
    // returned — never computed for the discarded baseline/candidate plans, only here.
    finalResult.hardValidation = validateFinalScheduleHardConstraints(finalResult.jobs, finalResult.constraints);
    return finalResult;
  }
  schedulerResult.hardValidation = validateFinalScheduleHardConstraints(schedulerResult.jobs, schedulerResult.constraints);
  return schedulerResult;
};

// ── GLOBAL SUPERVISOR OPTIMIZER (Fix 10L-B) ──────────────────────────────────
// Post-scheduling bounded optimizer: fills coverage gaps, balances workload,
// performs safe direct swaps. Runs once after the fairness safety gate.
// Never modifies locked templates, manual edits or rescue splits.
const OPT_MAX_PASSES = 3;
const OPT_MAX_MOVES  = 25;

const isMutableSchedulerJob = job => {
  if(!job) return false;
  if(isLockedTemplateJob(job)) return false;
  if(job.manualEdited === true || job.schedulerDecisionCode === 'manual_edit') return false;
  if(job.rescueUsed === true   || job.schedulerDecisionCode === 'rescue_split') return false;
  return true;
};

// Build per-cleaner maps from a complete job list for optimizer validation.
const buildOptimizerMaps = (jobs, constraints) => {
  const weeklyHrs={}, dailyHrs={}, workedDays={}, jobsByCleaner={};
  CLEANERS.forEach(cl=>{
    weeklyHrs[cl.id]=0;
    dailyHrs[cl.id]=Object.fromEntries(DAYS.map(d=>[d,0]));
    workedDays[cl.id]=new Set();
    jobsByCleaner[cl.id]=[];
  });
  jobs.forEach(j=>{
    dedupeCleanerIds(j.cleanerIds||[]).forEach(id=>{
      const dur=getCleanerEffectiveJobDuration(j,id);
      if(weeklyHrs[id]!==undefined){
        weeklyHrs[id]+=dur;
        if(j.day){dailyHrs[id][j.day]=(dailyHrs[id][j.day]||0)+dur;workedDays[id].add(j.day);}
        jobsByCleaner[id].push(j);
      }
    });
  });
  return{weeklyHrs,dailyHrs,workedDays,jobsByCleaner};
};

// Full-plan eligibility check: can this cleaner be added to this job given the plan?
// Uses the same hard gates as the main scheduler, evaluated against plan-level maps.
const canAddCleanerInPlan = (cleaner, job, maps, constraints) => {
  const dur = getJobOperationalDuration(job);
  if(jobRequiresTraining(job) && !TRAINING[cleaner.id]?.includes(job.propertyId)) return false;
  if(!cleaner.days.includes(job.day)) return false;
  if(job.dateISO && isCleanerUnavailableOnDate(cleaner, job.dateISO)) return false;
  if((constraints[cleaner.id]?.daysOff||[]).includes(job.day)) return false;
  const jS=t2m(job.startTime), jE=getJobOperationalEndMinutes(job);
  const maxEnd=constraints[cleaner.id]?.maxEndTime;
  if(maxEnd && jE>t2m(maxEnd)) return false;
  const curDaily=(maps.dailyHrs[cleaner.id]||{})[job.day]||0;
  if(curDaily+dur>getEffectiveDailyLimit(cleaner,constraints)) return false;
  const wd=maps.workedDays[cleaner.id]||new Set();
  if(!wd.has(job.day) && wd.size>=getEffectiveMaxWorkedDays(cleaner)) return false;
  for(const o of (maps.jobsByCleaner[cleaner.id]||[])){
    if(o.id===job.id) continue;
    const oS=getCleanerOperationalStartMinutes(o,cleaner.id), oE=getCleanerOperationalEndMinutes(o,cleaner.id);
    if(o.day===job.day){
      if(jS<oE&&jE>oS) return false; // overlap
      const earlier=jS<oS?job:o, later=jS<oS?o:job;
      const gap=jS<oS?oS-jE:jS-oE;
      if(gap<getTravelBufferMinutes(earlier,later)) return false; // travel
    }
    if(getLateShiftRestIssue(cleaner.name,o,job,cleaner.id)) return false; // late-rest (cross-day)
    if(getLateShiftRestIssue(cleaner.name,job,o,cleaner.id)) return false;
  }
  return true;
};

// Check that removing one cleaner doesn't break gender/senior requirements.
const jobStillMeetsRequirementsWithout = (job, removedId) => {
  const ids = dedupeCleanerIds((job.cleanerIds||[]).filter(id=>id!==removedId));
  return genderRequirementMet(job,ids) && seniorRequirementMet(job,ids);
};

// ── EMERGENCY PATCH — SCHEDULE FAIRNESS METRICS (micro-corrected) ───────────
// Pure, read-only diagnostic. Computes per-cleaner and whole-week workload metrics for
// an already-built job list. Never mutates jobs. General-purpose — no cleaner name or
// ID is ever referenced by this function's LOGIC (cleanerName is only carried through
// as a display convenience for diagnostics/reports).
//
// MICRO-CORRECTION #2: a cleaner with workedDays===0 is no longer excluded from
// "severely under-utilized" — she is exactly the most under-utilized case there is.
// This function only flags a CANDIDATE for rebalancing; it never claims she is
// concretely eligible for any specific job. Real eligibility (training, per-date
// availability/off, gender, seniority, overlap, travel, late-rest, daily/weekly hours,
// max days, maxEndTime) is always re-checked job-specifically downstream by
// canAddCleanerInPlan at transfer time — never assumed here.
const SEVERE_UNDER_UTILIZATION_RATIO = 0.35;
const OVER_UTILIZATION_RATIO = 0.90;
const getScheduleFairnessMetrics = (jobs, constraints={}) => {
  const perCleaner = {};
  CLEANERS.forEach(cl=>{
    const cap = Math.max(1, (constraints[cl.id]?.maxWeeklyHrs||0)>0 ? constraints[cl.id].maxWeeklyHrs : (Number(cl.weeklyHrs)||40));
    perCleaner[cl.id] = {
      cleanerId: cl.id,
      cleanerName: cl.name,
      assignedWorkerHours: 0,
      workedDays: 0,
      maxWorkedDays: getEffectiveMaxWorkedDays(cl),
      weeklyCapacity: cap,
      utilizationRatio: 0,
      isZeroDay: true,
      isSeverelyUnderUtilized: false,
      isHighlyUtilized: false,
      isAtMaxDays: false,
      isOverMaxDays: false,
    };
  });
  const workedDaySets = {};
  (jobs||[]).forEach(j=>{
    dedupeCleanerIds(j?.cleanerIds||[]).forEach(id=>{
      if(!perCleaner[id]) return;
      perCleaner[id].assignedWorkerHours += getCleanerEffectiveJobDuration(j, id);
      (workedDaySets[id] = workedDaySets[id] || new Set()).add(j.day);
    });
  });
  CLEANERS.forEach(cl=>{
    const m = perCleaner[cl.id];
    m.workedDays = (workedDaySets[cl.id]||new Set()).size;
    m.assignedWorkerHours = Math.round(m.assignedWorkerHours*100)/100;
    m.utilizationRatio = m.weeklyCapacity>0 ? Math.round((m.assignedWorkerHours/m.weeklyCapacity)*1000)/1000 : 0;
    m.isZeroDay = m.workedDays === 0;
    // Broadly-available gate relaxed to "any configured availability" (>=1 workable day
    // pattern) so a zero-day cleaner is never excluded purely for having no jobs YET —
    // she may simply never have been offered one. Positive weekly capacity still
    // required (an intentionally near-zero-hours part-timer is never "under-utilized").
    const hasAvailabilityPattern = (cl.days||[]).length >= 1;
    const hasCapacity = m.weeklyCapacity > 0;
    m.isSeverelyUnderUtilized = hasAvailabilityPattern && hasCapacity && m.utilizationRatio < SEVERE_UNDER_UTILIZATION_RATIO;
    m.isHighlyUtilized = m.utilizationRatio > OVER_UTILIZATION_RATIO;
    m.isAtMaxDays = m.maxWorkedDays>0 && m.workedDays === m.maxWorkedDays;
    m.isOverMaxDays = m.workedDays > m.maxWorkedDays;
  });
  const list = Object.values(perCleaner);
  const withHours = list.filter(m=>m.workedDays>0);
  const hoursArr = withHours.map(m=>m.assignedWorkerHours);
  const minimumAssignedHours = hoursArr.length ? Math.min(...hoursArr) : 0;
  const maximumAssignedHours = hoursArr.length ? Math.max(...hoursArr) : 0;
  const sortedHours = [...hoursArr].sort((a,b)=>a-b);
  const medianHours = sortedHours.length
    ? (sortedHours.length%2 ? sortedHours[(sortedHours.length-1)/2]
       : (sortedHours[sortedHours.length/2-1]+sortedHours[sortedHours.length/2])/2)
    : 0;
  const daysArr = list.map(m=>m.workedDays);
  const minWorkedDays = daysArr.length ? Math.min(...daysArr) : 0;
  const maxWorkedDaysObserved = daysArr.length ? Math.max(...daysArr) : 0;
  const utilArr = list.filter(m=>m.weeklyCapacity>0).map(m=>m.utilizationRatio);
  const meanUtil = utilArr.length ? utilArr.reduce((s,v)=>s+v,0)/utilArr.length : 0;
  const utilizationVariance = utilArr.length
    ? Math.round((utilArr.reduce((s,v)=>s+(v-meanUtil)*(v-meanUtil),0)/utilArr.length)*10000)/10000
    : 0;
  // "At max days AND high load" — a donor signal (Trigger B): already at her day cap
  // and either clearly over-utilized by hours or above the week's median hours.
  const atMaxDaysHighLoadCount = list.filter(m=>
    m.isAtMaxDays && (m.isHighlyUtilized || m.assignedWorkerHours > medianHours)
  ).length;
  return {
    perCleaner: list,
    medianAssignedHours: Math.round(medianHours*100)/100,
    minimumAssignedHours,
    maximumAssignedHours,
    hoursRange: Math.round((maximumAssignedHours-minimumAssignedHours)*100)/100,
    workedDaysRange: maxWorkedDaysObserved-minWorkedDays,
    utilizationVariance,
    overMaxDaysCount: list.filter(m=>m.isOverMaxDays).length,
    atMaxDaysHighLoadCount,
    severelyUnderUtilizedCount: list.filter(m=>m.isSeverelyUnderUtilized).length,
    zeroDayAvailableCount: list.filter(m=>m.isZeroDay && (m.weeklyCapacity>0) && (CLEANERS.find(c=>c.id===m.cleanerId)?.days||[]).length>=1).length,
  };
};

// Deterministic plan-quality score. Lower = better.
// Operational metrics have strict lexicographic precedence over fairness.
const scoreOptPlan = (jobs, constraints) => {
  const dc=detectConflicts(jobs);
  let unassigned=0,needsReview=0,staffing=0,gender=0,seniority=0,realConflicts=0;
  jobs.forEach(j=>{
    const ids=dedupeCleanerIds(j.cleanerIds||[]);
    if(ids.length===0&&isMeaningfulJob(j)){unassigned++;return;}
    if(ids.length<getJobRequiredCleaners(j))staffing++;
    if(!isLockedTemplateJob(j)&&!genderRequirementMet(j,ids))gender++;
    if(!isLockedTemplateJob(j)&&!seniorRequirementMet(j,ids))seniority++;
    if((dc.get(j.id)||[]).some(isRealConflictIssue))realConflicts++;
    if(j.status==='needs_review')needsReview++;
  });
  const maps=buildOptimizerMaps(jobs,constraints);
  // Hard workload violations: daily-cap and max-worked-days only.
  // Weekly hours are soft in current production semantics → counted in fairness only (aboveCap/overHrs).
  let hardWorkloadViolations=0;
  CLEANERS.forEach(cl=>{
    const wd=maps.workedDays[cl.id]||new Set();
    if(wd.size>getEffectiveMaxWorkedDays(cl))hardWorkloadViolations++;
    DAYS.forEach(day=>{
      const dh=(maps.dailyHrs[cl.id]||{})[day]||0;
      if(dh>getEffectiveDailyLimit(cl,constraints))hardWorkloadViolations++;
    });
  });
  let belowTarget=0,underHrs=0,aboveCap=0,overHrs=0,sevenDayCt=0,sumDev=0;
  CLEANERS.forEach(cl=>{
    const cap=Math.max(1,(constraints[cl.id]?.maxWeeklyHrs||0)>0?constraints[cl.id].maxWeeklyHrs:(Number(cl.weeklyHrs)||40));
    const target=Math.min(30,cap*0.75);
    const used=maps.weeklyHrs[cl.id]||0;
    if(used>cap){aboveCap++;overHrs+=used-cap;}
    if(used<target&&(cl.days||[]).length>=5){belowTarget++;underHrs+=target-used;}
    sumDev+=Math.abs(used-target);
    if((maps.workedDays[cl.id]||new Set()).size>=7)sevenDayCt++;
  });
  const utils=CLEANERS.map(cl=>{const cap=Math.max(1,(constraints[cl.id]?.maxWeeklyHrs||0)>0?constraints[cl.id].maxWeeklyHrs:(Number(cl.weeklyHrs)||40));return(maps.weeklyHrs[cl.id]||0)/cap;});
  const maxUtil=utils.length?Math.max(...utils):0;
  const utilSpread=utils.length?Math.max(...utils)-Math.min(...utils):0;
  return{unassigned,needsReview,staffing,gender,seniority,realConflicts,hardWorkloadViolations,aboveCap,overHrs,belowTarget,underHrs:Math.round(underHrs*10)/10,sevenDayCt,maxUtil:Math.round(maxUtil*1000)/1000,utilSpread:Math.round(utilSpread*1000)/1000,sumDev:Math.round(sumDev*10)/10};
};

const compareOptScores = (a,b) => {
  const ops=['unassigned','needsReview','staffing','gender','seniority','realConflicts','hardWorkloadViolations'];
  for(const k of ops){if(a[k]!==b[k])return a[k]<b[k]?-1:1;}
  const fair=['aboveCap','overHrs','belowTarget','underHrs','sevenDayCt'];
  for(const k of fair){if(Math.abs(a[k]-b[k])>0.001)return a[k]<b[k]?-1:1;}
  if(Math.abs(a.maxUtil-b.maxUtil)>0.001)return a.maxUtil<b.maxUtil?-1:1;
  if(Math.abs(a.utilSpread-b.utilSpread)>0.001)return a.utilSpread<b.utilSpread?-1:1;
  return 0;
};

// Hard safety barrier: rejects any candidate that worsens even one operational metric.
// Complements compareOptScores — prevents one improvement from masking another regression.
const OPT_OPERATIONAL_METRICS = [
  'unassigned','needsReview','staffing','gender','seniority','realConflicts','hardWorkloadViolations',
];
const hasOperationalRegression = (candidateScore, currentScore) =>
  OPT_OPERATIONAL_METRICS.some(
    k => Number(candidateScore?.[k]||0) > Number(currentScore?.[k]||0)
  );

// Combination search helper for PATH A atomic fills.
// Generates combinations of `size` elements from `pool`, up to `maxResults`.
// Deterministic: preserves pool order. Never mutates pool.
const OPT_COMBO_POOL_MAX = 12;  // max candidate pool size considered
const OPT_COMBO_MAX = 150;       // max combinations evaluated per job
const buildCombinations = (pool, size, maxResults) => {
  const results = [];
  const n = Math.min(pool.length, OPT_COMBO_POOL_MAX);
  const capped = pool.slice(0, n);
  const gen = (start, current) => {
    if(results.length >= maxResults) return;
    if(current.length === size){ results.push([...current]); return; }
    const remaining = size - current.length;
    for(let i = start; i <= capped.length - remaining; i++){
      if(results.length >= maxResults) return;
      current.push(capped[i]);
      gen(i + 1, current);
      current.pop();
    }
  };
  gen(0, []);
  return results;
};

// Bounded global optimizer: runs at most OPT_MAX_PASSES passes × OPT_MAX_MOVES moves.
const optimizeGlobalSchedule = (selected, allJobs, weekOffset) => {
  if(!selected||!Array.isArray(selected.jobs)||!selected.jobs.length) return selected;
  const constraints=selected.constraints||buildConstraints(weekOffset);
  let bestJobs=selected.jobs.map(j=>({...j}));
  let bestScore=scoreOptPlan(bestJobs,constraints);
  let totalMoves=0;

  for(let pass=0; pass<OPT_MAX_PASSES&&totalMoves<OPT_MAX_MOVES; pass++){
    let passImproved=false;
    const maps=buildOptimizerMaps(bestJobs,constraints);
    const cap_=cl=>Math.max(1,(constraints[cl.id]?.maxWeeklyHrs||0)>0?constraints[cl.id].maxWeeklyHrs:(Number(cl.weeklyHrs)||40));
    const tgt_=cl=>Math.min(30,cap_(cl)*0.75);

    // ── PHASE 2: Coverage fills ────────────────────────────────────────────────
    // PATH A: Jobs with true staffing shortfall — add exactly missing cleaners, never exceed required.
    // PATH B: Full-count jobs with gender/senior requirements unmet — replacement only, no append.
    const staffingShort=bestJobs
      .filter(j=>{if(!isMeaningfulJob(j)||!isMutableSchedulerJob(j))return false;const ids=dedupeCleanerIds(j.cleanerIds||[]);return ids.length<getJobRequiredCleaners(j);})
      .sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||t2m(a.startTime)-t2m(b.startTime)||(a.id>b.id?1:-1));
    const reqInvalid=bestJobs
      .filter(j=>{if(!isMeaningfulJob(j)||!isMutableSchedulerJob(j))return false;const ids=dedupeCleanerIds(j.cleanerIds||[]);if(ids.length<getJobRequiredCleaners(j))return false;return !genderRequirementMet(j,ids)||!seniorRequirementMet(j,ids);})
      .sort((a,b)=>{// senior deficit first, then gender, then day
        const da=getTeamRequirementDeficits(a,dedupeCleanerIds(a.cleanerIds||[]));
        const db=getTeamRequirementDeficits(b,dedupeCleanerIds(b.cleanerIds||[]));
        const sa=(da.senior>0)?0:1, sb=(db.senior>0)?0:1;
        if(sa!==sb)return sa-sb;
        return DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||t2m(a.startTime)-t2m(b.startTime)||(a.id>b.id?1:-1);
      });

    // PATH A: atomic fill — find exactly `missing` cleaners and add them all at once.
    // Never commits an intermediate partial state. One accepted fill = one optimizer move.
    for(const job of staffingShort){
      if(totalMoves>=OPT_MAX_MOVES)break;
      const required=getJobRequiredCleaners(job);
      const curIds=dedupeCleanerIds(job.cleanerIds||[]);
      if(curIds.length>=required)continue;
      const missing=required-curIds.length;
      // Build candidate pool: not already assigned, sorted by deficit contribution desc,
      // then weekly hours asc (underutilized first), then stable ID.
      const deficits=getTeamRequirementDeficits(job,curIds);
      const pool=CLEANERS
        .filter(cl=>!curIds.includes(cl.id))
        .sort((a,b)=>getCleanerRequirementContribution(b,deficits)-getCleanerRequirementContribution(a,deficits)||(maps.weeklyHrs[a.id]||0)-(maps.weeklyHrs[b.id]||0)||(a.id>b.id?1:-1));
      const combos=buildCombinations(pool, missing, OPT_COMBO_MAX);
      let accepted=false;
      for(const combo of combos){
        if(totalMoves>=OPT_MAX_MOVES)break;
        // Validate each cleaner in the combination incrementally.
        // After each tentative addition, rebuild maps so the next candidate is validated
        // against the updated state (catches overlap/cap/travel between combo members).
        let tempJobs=bestJobs;
        let valid=true;
        for(const cl of combo){
          const tempMaps=buildOptimizerMaps(tempJobs,constraints);
          if(!canAddCleanerInPlan(cl,job,tempMaps,constraints)){valid=false;break;}
          tempJobs=tempJobs.map(j=>j.id===job.id?{...j,cleanerIds:dedupeCleanerIds([...(j.cleanerIds||[]),cl.id])}:j);
        }
        if(!valid)continue;
        // Validate final complete team for requirements and count.
        const finalIds=dedupeCleanerIds([...curIds,...combo.map(c=>c.id)]);
        if(finalIds.length!==required)continue;
        if(!genderRequirementMet(job,finalIds)||!seniorRequirementMet(job,finalIds))continue;
        const newJob={...job,cleanerIds:finalIds,status:calcJobStatus({...job,cleanerIds:finalIds}),globalOptimizerApplied:true,globalOptimizerReason:'coverage_fill'};
        const newJobs=bestJobs.map(j=>j.id===job.id?newJob:j);
        const ns=scoreOptPlan(newJobs,constraints);
        if(hasOperationalRegression(ns,bestScore))continue;
        if(compareOptScores(ns,bestScore)<0){
          bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;accepted=true;
          // Update in-pass maps for subsequent jobs
          const dur=getJobOperationalDuration(job);
          combo.forEach(cl=>{
            maps.weeklyHrs[cl.id]=(maps.weeklyHrs[cl.id]||0)+dur;
            if(maps.dailyHrs[cl.id])maps.dailyHrs[cl.id][job.day]=(maps.dailyHrs[cl.id][job.day]||0)+dur;
            maps.workedDays[cl.id]?.add(job.day);
            (maps.jobsByCleaner[cl.id]=maps.jobsByCleaner[cl.id]||[]).push(newJob);
          });
          break;
        }
      }
    }

    // PATH B: replacement for full-count jobs with unmet gender/senior (never append)
    for(const job of reqInvalid){
      if(totalMoves>=OPT_MAX_MOVES)break;
      const required=getJobRequiredCleaners(job);
      const curIds=dedupeCleanerIds(job.cleanerIds||[]);
      if(curIds.length<required)continue; // now short — skip (PATH A handles it)
      const deficits=getTeamRequirementDeficits(job,curIds);
      // Identify candidate replacements: incoming cleaner ranked by deficit contribution
      const incomingCands=CLEANERS
        .filter(cl=>!curIds.includes(cl.id))
        .sort((a,b)=>getCleanerRequirementContribution(b,deficits)-getCleanerRequirementContribution(a,deficits)||(maps.weeklyHrs[a.id]||0)-(maps.weeklyHrs[b.id]||0)||(a.id>b.id?1:-1));
      for(const inCl of incomingCands){
        if(totalMoves>=OPT_MAX_MOVES)break;
        const contribScore=getCleanerRequirementContribution(inCl,deficits);
        if(contribScore===0)continue; // incoming must address at least one deficit
        // Try each mutable outgoing cleaner. Do NOT gate on stillMetsWithout here —
        // PATH B specifically repairs failing requirements; the final nIds checks
        // (genderRequirementMet + seniorRequirementMet) are the correct gate.
        for(const outId of curIds){
          if(totalMoves>=OPT_MAX_MOVES)break;
          const outJob={...job,cleanerIds:curIds};
          if(!isMutableSchedulerJob(outJob))continue; // job is immutable
          const idsWithoutOut=curIds.filter(id=>id!==outId);
          const newIds=dedupeCleanerIds([...idsWithoutOut,inCl.id]);
          if(newIds.length!==required)continue; // must stay exactly at required
          if(newIds.includes(outId)?newIds.length>required:false)continue; // no dup guard
          if(!genderRequirementMet(job,newIds)||!seniorRequirementMet(job,newIds))continue;
          // Validate inCl against maps without outId's contribution to this job
          const tempJobs=bestJobs.map(j=>j.id===job.id?{...j,cleanerIds:idsWithoutOut}:j);
          const tempMaps=buildOptimizerMaps(tempJobs,constraints);
          if(!canAddCleanerInPlan(inCl,job,tempMaps,constraints))continue;
          const newJob={...job,cleanerIds:newIds,status:calcJobStatus({...job,cleanerIds:newIds}),globalOptimizerApplied:true,globalOptimizerReason:'coverage_fill'};
          const newJobs=bestJobs.map(j=>j.id===job.id?newJob:j);
          const ns=scoreOptPlan(newJobs,constraints);
          if(hasOperationalRegression(ns,bestScore))continue;
          if(compareOptScores(ns,bestScore)<0){
            bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;
            break;
          }
        }
        if(passImproved)break;
      }
    }

    // ── EXCESS WORKED-DAY REPAIR (Fix 10L-B Atomic Rest-Day Repair) ──────────────
    // Three issues corrected here:
    // 1. Fresh restMaps at phase start (not stale maps from pass beginning).
    // 2. True DFS backtracking across all affected jobs (not greedy per-job).
    // 3. earlyLeaveSuggestions kept as array, not converted to object.
    const OPT_REST_DAY_MAX_AFFECTED_JOBS = 4;
    const OPT_REST_DAY_POOL_MAX = 12;
    const OPT_REST_DAY_MAX_STATES = 300;
    if(totalMoves<OPT_MAX_MOVES){
      // ISSUE 1 FIX: build fresh maps from current bestJobs, not the stale maps from pass start.
      const restMaps=buildOptimizerMaps(bestJobs,constraints);
      const overByDays=CLEANERS
        .filter(cl=>{const wd=restMaps.workedDays[cl.id]?.size||0;return wd>getEffectiveMaxWorkedDays(cl);})
        .sort((a,b)=>{
          const exA=(restMaps.workedDays[a.id]?.size||0)-getEffectiveMaxWorkedDays(a);
          const exB=(restMaps.workedDays[b.id]?.size||0)-getEffectiveMaxWorkedDays(b);
          if(exA!==exB)return exB-exA;
          const hA=restMaps.weeklyHrs[a.id]||0,hB=restMaps.weeklyHrs[b.id]||0;
          if(hA!==hB)return hB-hA;
          return a.id>b.id?1:-1;
        });
      outerRestDay:
      for(const overCl of overByDays){
        if(totalMoves>=OPT_MAX_MOVES)break;
        // Find eligible release days: all assignments on that day must be mutable.
        const workedDaysList=[...(restMaps.workedDays[overCl.id]||new Set())];
        const eligibleDays=workedDaysList.filter(day=>{
          const dayJobs=bestJobs.filter(j=>j.day===day&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id));
          return dayJobs.length>0&&dayJobs.length<=OPT_REST_DAY_MAX_AFFECTED_JOBS&&dayJobs.every(j=>isMutableSchedulerJob(j));
        }).sort((a,b)=>{
          const jA=bestJobs.filter(j=>j.day===a&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id));
          const jB=bestJobs.filter(j=>j.day===b&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id));
          if(jA.length!==jB.length)return jA.length-jB.length;
          const hA=jA.reduce((s,j)=>s+getCleanerEffectiveJobDuration(j,overCl.id),0);
          const hB=jB.reduce((s,j)=>s+getCleanerEffectiveJobDuration(j,overCl.id),0);
          if(hA!==hB)return hA-hB;
          return DAYS.indexOf(a)-DAYS.indexOf(b);
        });
        for(const targetDay of eligibleDays){
          if(totalMoves>=OPT_MAX_MOVES)break;
          const affectedJobs=bestJobs.filter(j=>j.day===targetDay&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id)&&isMutableSchedulerJob(j));
          // Remove overCl from all affected jobs in the base temporary plan.
          const baseJobs=bestJobs.map(j=>{
            if(!affectedJobs.some(aj=>aj.id===j.id))return j;
            return{...j,cleanerIds:dedupeCleanerIds((j.cleanerIds||[]).filter(id=>id!==overCl.id))};
          });
          // ISSUE 2 FIX: DFS backtracking across all affected jobs.
          // Sort affected jobs: fewer individually eligible candidates first (harder jobs first),
          // then larger missing count, then start time, then ID — so the most constrained slot
          // is allocated first, reducing wasted branches.
          const sortedAffected=[...affectedJobs].sort((a,b)=>{
            // Estimate eligible pool size for each job in the base state
            const poolA=CLEANERS.filter(c=>c.id!==overCl.id&&!dedupeCleanerIds((baseJobs.find(j=>j.id===a.id)?.cleanerIds||[])).includes(c.id)).length;
            const poolB=CLEANERS.filter(c=>c.id!==overCl.id&&!dedupeCleanerIds((baseJobs.find(j=>j.id===b.id)?.cleanerIds||[])).includes(c.id)).length;
            if(poolA!==poolB)return poolA-poolB; // fewer candidates first
            const misA=getJobRequiredCleaners(a)-(baseJobs.find(j=>j.id===a.id)?.cleanerIds||[]).length;
            const misB=getJobRequiredCleaners(b)-(baseJobs.find(j=>j.id===b.id)?.cleanerIds||[]).length;
            if(misA!==misB)return misB-misA; // larger missing first
            return t2m(a.startTime)-t2m(b.startTime)||(a.id>b.id?1:-1);
          });
          // DFS state: {jobIdx, tempJobs}
          // Global state counter across the entire cleaner/day repair attempt.
          let exploredStates=0;
          let completeSolution=null;
          const dfsStack=[{jobIdx:0,tempJobs:baseJobs}];
          while(dfsStack.length>0&&completeSolution===null&&exploredStates<OPT_REST_DAY_MAX_STATES){
            const {jobIdx,tempJobs}=dfsStack.pop();
            exploredStates++;
            if(jobIdx>=sortedAffected.length){
              // Terminal node — all jobs processed
              completeSolution=tempJobs;
              break;
            }
            const affJob=sortedAffected[jobIdx];
            const curState=tempJobs.find(j=>j.id===affJob.id);
            const curIds=dedupeCleanerIds(curState?.cleanerIds||[]);
            const required=getJobRequiredCleaners(affJob);
            const missing=required-curIds.length;
            if(missing<=0){
              // No fill needed for this job; validate then push next
              if(!genderRequirementMet(affJob,curIds)||!seniorRequirementMet(affJob,curIds))continue;
              dfsStack.push({jobIdx:jobIdx+1,tempJobs});
              continue;
            }
            // Build pool: individually hard-eligible, excluding overCl and already-assigned.
            const sMaps=buildOptimizerMaps(tempJobs,constraints);
            const defs=getTeamRequirementDeficits(affJob,curIds);
            const rawPool=CLEANERS.filter(c=>{
              if(c.id===overCl.id||curIds.includes(c.id))return false;
              if(!canAddCleanerInPlan(c,affJob,sMaps,constraints))return false;
              return true;
            }).sort((a,b)=>{
              const wdA=sMaps.workedDays[a.id]?.size||0,wdB=sMaps.workedDays[b.id]?.size||0;
              const mxA=getEffectiveMaxWorkedDays(a),mxB=getEffectiveMaxWorkedDays(b);
              const exA=wdA>mxA?1:0,exB=wdB>mxB?1:0;
              if(exA!==exB)return exA-exB; // not-over first
              const cA=getCleanerRequirementContribution(a,defs),cB=getCleanerRequirementContribution(b,defs);
              if(cA!==cB)return cB-cA; // higher contribution first
              // Already-working-that-day before opening new day
              const wksA=wdA>0&&(sMaps.workedDays[a.id]?.has(affJob.day))?0:1;
              const wksB=wdB>0&&(sMaps.workedDays[b.id]?.has(affJob.day))?0:1;
              if(wksA!==wksB)return wksA-wksB;
              if(wdA!==wdB)return wdA-wdB;
              const hA=sMaps.weeklyHrs[a.id]||0,hB=sMaps.weeklyHrs[b.id]||0;
              if(hA!==hB)return hA-hB;
              return a.id>b.id?1:-1;
            }).slice(0,OPT_REST_DAY_POOL_MAX);
            if(rawPool.length<missing)continue; // not enough candidates
            // Generate combinations of size `missing` from pre-filtered pool.
            const combos=buildCombinations(rawPool,missing,OPT_REST_DAY_MAX_STATES-exploredStates);
            // Push states in REVERSE so DFS explores first combo first.
            for(let ci=combos.length-1;ci>=0;ci--){
              const combo=combos[ci];
              // Validate combo incrementally.
              let innerJobs=tempJobs;let valid=true;
              for(const cand of combo){
                const iMaps=buildOptimizerMaps(innerJobs,constraints);
                const iCS=innerJobs.find(j=>j.id===affJob.id);
                if(!canAddCleanerInPlan(cand,iCS||affJob,iMaps,constraints)){valid=false;break;}
                innerJobs=innerJobs.map(j=>j.id===affJob.id?{...j,cleanerIds:dedupeCleanerIds([...(j.cleanerIds||[]),cand.id])}:j);
              }
              if(!valid)continue;
              const fS=innerJobs.find(j=>j.id===affJob.id);
              const finalIds=dedupeCleanerIds(fS?.cleanerIds||[]);
              if(finalIds.length!==required)continue;
              if(!genderRequirementMet(affJob,finalIds)||!seniorRequirementMet(affJob,finalIds))continue;
              // Valid combo for this job — push as next DFS state
              dfsStack.push({jobIdx:jobIdx+1,tempJobs:innerJobs});
            }
          }
          if(!completeSolution)continue;
          // Verify overCl is truly off targetDay in the solution.
          if(completeSolution.some(j=>j.day===targetDay&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id)))continue;
          // Build final candidate plan with status + metadata.
          const candidateJobs=completeSolution.map(j=>{
            const isAffected=affectedJobs.some(aj=>aj.id===j.id);
            if(!isAffected)return j;
            const ids=dedupeCleanerIds(j.cleanerIds||[]);
            // ISSUE 3 FIX: earlyLeaveSuggestions is an array — filter by cleanerId, do not use Object.entries.
            const filteredELS=Array.isArray(j.earlyLeaveSuggestions)
              ?j.earlyLeaveSuggestions.filter(s=>s&&ids.includes(s.cleanerId))
              :j.earlyLeaveSuggestions;
            const els=Array.isArray(filteredELS)?(filteredELS.length?filteredELS:null):filteredELS;
            return{...j,cleanerIds:ids,status:calcJobStatus({...j,cleanerIds:ids}),globalOptimizerApplied:true,globalOptimizerReason:'rest_day_repair',earlyLeaveSuggestions:els};
          });
          const ns=scoreOptPlan(candidateJobs,constraints);
          if(hasOperationalRegression(ns,bestScore))continue;
          if(ns.hardWorkloadViolations>=bestScore.hardWorkloadViolations)continue;
          if(compareOptScores(ns,bestScore)<0){
            bestJobs=candidateJobs;bestScore=ns;totalMoves++;passImproved=true;
            continue outerRestDay;
          }
        }
      }
    }

    // ── PHASE 3: Load-balancing substitutions ─────────────────────────────────
    if(totalMoves<OPT_MAX_MOVES){
      const overloaded=CLEANERS
        .filter(cl=>(maps.weeklyHrs[cl.id]||0)>cap_(cl))
        .sort((a,b)=>(maps.weeklyHrs[b.id]||0)-(maps.weeklyHrs[a.id]||0))
        .slice(0,5);
      const underused=CLEANERS
        .filter(cl=>(maps.weeklyHrs[cl.id]||0)<tgt_(cl))
        .sort((a,b)=>(maps.weeklyHrs[a.id]||0)-(maps.weeklyHrs[b.id]||0))
        .slice(0,8);

      outerSub:
      for(const overCl of overloaded){
        if(totalMoves>=OPT_MAX_MOVES)break;
        const clJobs=bestJobs
          .filter(j=>isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id))
          .sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||t2m(a.startTime)-t2m(b.startTime));
        for(const job of clJobs){
          if(totalMoves>=OPT_MAX_MOVES)break;
          if(!jobStillMeetsRequirementsWithout(job,overCl.id))continue;
          const curIds=dedupeCleanerIds(job.cleanerIds||[]);
          const mapsNoOver=buildOptimizerMaps(bestJobs.map(j=>j.id===job.id?{...j,cleanerIds:curIds.filter(id=>id!==overCl.id)}:j),constraints);
          for(const underCl of underused){
            if(underCl.id===overCl.id||curIds.includes(underCl.id))continue;
            if(!canAddCleanerInPlan(underCl,job,mapsNoOver,constraints))continue;
            const newIds=dedupeCleanerIds([...curIds.filter(id=>id!==overCl.id),underCl.id]);
            if(!genderRequirementMet(job,newIds)||!seniorRequirementMet(job,newIds))continue;
            if(newIds.length<getJobRequiredCleaners(job))continue;
            const newJob={...job,cleanerIds:newIds,status:calcJobStatus({...job,cleanerIds:newIds}),globalOptimizerApplied:true,globalOptimizerReason:'workload_rebalance'};
            const newJobs=bestJobs.map(j=>j.id===job.id?newJob:j);
            const ns=scoreOptPlan(newJobs,constraints);
            if(hasOperationalRegression(ns,bestScore))continue;
            if(compareOptScores(ns,bestScore)<0){
              bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;
              continue outerSub;
            }
          }
        }
      }
    }

    // ── PHASE 3B (EMERGENCY PATCH, micro-corrected): Two-trigger workload relief ──
    // PHASE 3 above only treats a cleaner as "overloaded" by WEEKLY HOURS vs cap — blind
    // to day-count extremes and to imbalance that stays within everyone's formal limits.
    // This phase adds two distinct triggers, sharing one transfer-validation stack:
    //   Trigger A (absolute priority): cleaner OVER her hard max-worked-days limit — the
    //     same hard metric scoreOptPlan already counts as hardWorkloadViolations.
    //   Trigger B: severe imbalance WITHIN formal limits — a donor who is either highly
    //     utilized by hours (>90%) or already AT her own max-days limit with
    //     above-median hours (e.g. 6 days/45h next to a 2-day/5h colleague — neither
    //     value alone is a hard violation, but the imbalance is real).
    // Receiver pool (both triggers): cleaners flagged isSeverelyUnderUtilized by
    // getScheduleFairnessMetrics — which, after MICRO-CORRECTION #2, explicitly INCLUDES
    // zero-day cleaners (workedDays===0 is no longer excluded from the receiver pool).
    // Real per-job eligibility is never assumed from this pool membership alone — every
    // candidate transfer is still fully re-validated by canAddCleanerInPlan (training,
    // per-date availability/off, gender, seniority, overlap, travel, late-rest,
    // daily/weekly hours, max days, maxEndTime) exactly as before.
    // Never touches locked/manual/rescue jobs (isMutableSchedulerJob). No cleaner is
    // ever selected by name or ID.
    if(totalMoves<OPT_MAX_MOVES){
      const tryWorkloadRelief = (donorCandidates, receiverCandidates, reasonTag) => {
        outerRelief:
        for(const overCl of donorCandidates){
          if(totalMoves>=OPT_MAX_MOVES) return;
          const jobsByDay={};
          bestJobs.forEach(j=>{
            if(isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(overCl.id)){
              (jobsByDay[j.day]=jobsByDay[j.day]||[]).push(j);
            }
          });
          const candidateDays=Object.keys(jobsByDay).sort((a,b)=>jobsByDay[b].length-jobsByDay[a].length);
          for(const day of candidateDays){
            if(totalMoves>=OPT_MAX_MOVES) return;
            for(const job of jobsByDay[day]){
              if(totalMoves>=OPT_MAX_MOVES) return;
              if(!jobStillMeetsRequirementsWithout(job,overCl.id))continue;
              const curIds=dedupeCleanerIds(job.cleanerIds||[]);
              const mapsNoOver=buildOptimizerMaps(bestJobs.map(j=>j.id===job.id?{...j,cleanerIds:curIds.filter(id=>id!==overCl.id)}:j),constraints);
              for(const underCl of receiverCandidates){
                if(underCl.id===overCl.id||curIds.includes(underCl.id))continue;
                if(!canAddCleanerInPlan(underCl,job,mapsNoOver,constraints))continue;
                const newIds=dedupeCleanerIds([...curIds.filter(id=>id!==overCl.id),underCl.id]);
                if(!genderRequirementMet(job,newIds)||!seniorRequirementMet(job,newIds))continue;
                if(newIds.length<getJobRequiredCleaners(job))continue;
                const newJob={...job,cleanerIds:newIds,status:calcJobStatus({...job,cleanerIds:newIds}),globalOptimizerApplied:true,globalOptimizerReason:reasonTag};
                const newJobs=bestJobs.map(j=>j.id===job.id?newJob:j);
                const ns=scoreOptPlan(newJobs,constraints);
                if(hasOperationalRegression(ns,bestScore))continue;
                if(compareOptScores(ns,bestScore)<0){
                  bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;
                  continue outerRelief;
                }
              }
            }
          }
        }
      };

      // Trigger A — hard max-days relief. Runs first, absolute priority.
      const overMaxDaysCleaners = CLEANERS
        .filter(cl=>(maps.workedDays[cl.id]?.size||0) > getEffectiveMaxWorkedDays(cl))
        .sort((a,b)=>(maps.workedDays[b.id]?.size||0)-(maps.workedDays[a.id]?.size||0));
      let fairnessNow = getScheduleFairnessMetrics(bestJobs, constraints);
      let receiverPool = CLEANERS
        .filter(cl=>fairnessNow.perCleaner.find(m=>m.cleanerId===cl.id)?.isSeverelyUnderUtilized)
        .sort((a,b)=>(maps.weeklyHrs[a.id]||0)-(maps.weeklyHrs[b.id]||0));
      tryWorkloadRelief(overMaxDaysCleaners, receiverPool, 'day_limit_relief');

      // Trigger B — severe imbalance relief WITHIN formal limits. Recomputes maps/
      // fairness fresh since Trigger A may already have moved jobs.
      if(totalMoves<OPT_MAX_MOVES){
        const mapsAfterA = buildOptimizerMaps(bestJobs, constraints);
        fairnessNow = getScheduleFairnessMetrics(bestJobs, constraints);
        const fmByCId = Object.fromEntries(fairnessNow.perCleaner.map(m=>[m.cleanerId,m]));
        const imbalancedDonors = CLEANERS
          .filter(cl=>{
            const m=fmByCId[cl.id]; if(!m) return false;
            return m.isHighlyUtilized || (m.isAtMaxDays && m.assignedWorkerHours > fairnessNow.medianAssignedHours);
          })
          .sort((a,b)=>(mapsAfterA.weeklyHrs[b.id]||0)-(mapsAfterA.weeklyHrs[a.id]||0));
        receiverPool = CLEANERS
          .filter(cl=>fmByCId[cl.id]?.isSeverelyUnderUtilized)
          .sort((a,b)=>(mapsAfterA.weeklyHrs[a.id]||0)-(mapsAfterA.weeklyHrs[b.id]||0));
        tryWorkloadRelief(imbalancedDonors, receiverPool, 'severe_imbalance_relief');
      }
    }

    // ── PHASE 4: Two-job direct swaps ─────────────────────────────────────────
    if(totalMoves<OPT_MAX_MOVES){
      const aCands=CLEANERS.filter(cl=>(maps.weeklyHrs[cl.id]||0)>tgt_(cl)*1.15).sort((a,b)=>(maps.weeklyHrs[b.id]||0)-(maps.weeklyHrs[a.id]||0)).slice(0,4);
      const bCands=CLEANERS.filter(cl=>(maps.weeklyHrs[cl.id]||0)<tgt_(cl)*0.85).sort((a,b)=>(maps.weeklyHrs[a.id]||0)-(maps.weeklyHrs[b.id]||0)).slice(0,4);
      outerSwap:
      for(const aCl of aCands){
        if(totalMoves>=OPT_MAX_MOVES)break;
        for(const bCl of bCands){
          if(aCl.id===bCl.id||totalMoves>=OPT_MAX_MOVES)continue;
          const aJobs=bestJobs.filter(j=>isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(aCl.id)).slice(0,5);
          const bJobs=bestJobs.filter(j=>isMutableSchedulerJob(j)&&dedupeCleanerIds(j.cleanerIds||[]).includes(bCl.id)).slice(0,5);
          for(const jobA of aJobs){
            for(const jobB of bJobs){
              if(jobA.id===jobB.id||totalMoves>=OPT_MAX_MOVES)continue;
              const idsA=dedupeCleanerIds(jobA.cleanerIds||[]);
              const idsB=dedupeCleanerIds(jobB.cleanerIds||[]);
              if(idsA.includes(bCl.id)||idsB.includes(aCl.id))continue;
              if(!jobStillMeetsRequirementsWithout(jobA,aCl.id))continue;
              if(!jobStillMeetsRequirementsWithout(jobB,bCl.id))continue;
              const newIdsA=dedupeCleanerIds([...idsA.filter(id=>id!==aCl.id),bCl.id]);
              const newIdsB=dedupeCleanerIds([...idsB.filter(id=>id!==bCl.id),aCl.id]);
              if(!genderRequirementMet(jobA,newIdsA)||!seniorRequirementMet(jobA,newIdsA))continue;
              if(!genderRequirementMet(jobB,newIdsB)||!seniorRequirementMet(jobB,newIdsB))continue;
              if(newIdsA.length<getJobRequiredCleaners(jobA)||newIdsB.length<getJobRequiredCleaners(jobB))continue;
              // Validate both cleaners using removal-only maps: only the two outgoing cleaners
              // are removed; neither incoming cleaner has been inserted yet → no double-counting.
              const removalOnlyJobs=bestJobs.map(j=>
                j.id===jobA.id?{...j,cleanerIds:idsA.filter(id=>id!==aCl.id)}:
                j.id===jobB.id?{...j,cleanerIds:idsB.filter(id=>id!==bCl.id)}:j
              );
              const removalMaps=buildOptimizerMaps(removalOnlyJobs,constraints);
              if(!canAddCleanerInPlan(bCl,jobA,removalMaps,constraints))continue;
              if(!canAddCleanerInPlan(aCl,jobB,removalMaps,constraints))continue;
              const newJobA={...jobA,cleanerIds:newIdsA,status:calcJobStatus({...jobA,cleanerIds:newIdsA}),globalOptimizerApplied:true,globalOptimizerReason:'direct_swap'};
              const newJobB={...jobB,cleanerIds:newIdsB,status:calcJobStatus({...jobB,cleanerIds:newIdsB}),globalOptimizerApplied:true,globalOptimizerReason:'direct_swap'};
              const newJobs=bestJobs.map(j=>j.id===jobA.id?newJobA:j.id===jobB.id?newJobB:j);
              const ns=scoreOptPlan(newJobs,constraints);
              if(hasOperationalRegression(ns,bestScore))continue;
              if(compareOptScores(ns,bestScore)<0){
                bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;
                continue outerSwap;
              }
            }
          }
        }
      }
    }

    // ── PHASE 5 (EMERGENCY PATCH, micro-corrected): Real-conflict repair ────────
    // PHASES 2–4 above only REJECT a candidate move that would make conflicts worse
    // (via hasOperationalRegression) — none of them actively searches for an existing
    // real conflict (overlap/travel/late_rest/unavailable/untrained — see
    // isRealConflictIssue) already present in bestJobs and tries to fix it. This phase
    // does exactly that.
    // MICRO-CORRECTION #3: the job and its conflicts are now re-read from bestJobs on
    // EVERY single repair attempt (currentJob/currentConflicts/currentIssues below) —
    // never reused from a snapshot taken before an earlier accepted repair on the same
    // job. Previously a stale job/curIds pair from before a first repair could be reused
    // for a second cleaner's repair attempt, risking overwriting the first fix or
    // reintroducing a cleaner that had just been removed. A deterministic per-job
    // attempt cap (REPAIR_MAX_ATTEMPTS_PER_JOB) replaces any possibility of looping.
    // Never touches locked/manual/rescue jobs (isMutableSchedulerJob).
    if(totalMoves<OPT_MAX_MOVES){
      const dcRepairInitial=detectConflicts(bestJobs);
      const conflictedJobIds=new Set();
      bestJobs.forEach(j=>{ if(getRealConflictIssues(dcRepairInitial,j.id).length>0) conflictedJobIds.add(j.id); });
      const REPAIR_MAX_ATTEMPTS_PER_JOB=4;

      for(const jobId of conflictedJobIds){
        if(totalMoves>=OPT_MAX_MOVES)break;
        let attempts=0;
        while(attempts<REPAIR_MAX_ATTEMPTS_PER_JOB && totalMoves<OPT_MAX_MOVES){
          attempts++;
          // Always re-read: current job object, current cleanerIds, current conflicts.
          const currentJob=bestJobs.find(j=>j.id===jobId);
          if(!currentJob||!isMutableSchedulerJob(currentJob))break;
          const currentConflicts=detectConflicts(bestJobs);
          const currentIssues=getRealConflictIssues(currentConflicts,jobId);
          if(currentIssues.length===0)break; // already resolved by a previous attempt
          const badId=currentIssues.map(i=>i.cId).filter(Boolean)[0];
          if(!badId)break; // no cleaner-attributable issue left (defensive)
          const curIds=dedupeCleanerIds(currentJob.cleanerIds||[]);
          if(!curIds.includes(badId))break; // conflict no longer involves an assigned cleaner here

          let resolvedThisAttempt=false;
          // Try 1: plain removal — no replacement needed if the team is still valid.
          if(jobStillMeetsRequirementsWithout(currentJob,badId)){
            const newIds=curIds.filter(id=>id!==badId);
            const newJob={...currentJob,cleanerIds:newIds,status:calcJobStatus({...currentJob,cleanerIds:newIds}),globalOptimizerApplied:true,globalOptimizerReason:'conflict_repair_remove'};
            const newJobs=bestJobs.map(j=>j.id===currentJob.id?newJob:j);
            const ns=scoreOptPlan(newJobs,constraints);
            if(!hasOperationalRegression(ns,bestScore)&&compareOptScores(ns,bestScore)<0){
              bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;
              resolvedThisAttempt=true;
            }
          }
          // Try 2: replace with an eligible cleaner not already on the job.
          if(!resolvedThisAttempt){
            const mapsNoBad=buildOptimizerMaps(bestJobs.map(j=>j.id===currentJob.id?{...j,cleanerIds:curIds.filter(id=>id!==badId)}:j),constraints);
            const replacementPool=CLEANERS
              .filter(cl=>cl.id!==badId&&!curIds.includes(cl.id))
              .sort((a,b)=>(maps.weeklyHrs[a.id]||0)-(maps.weeklyHrs[b.id]||0));
            for(const repl of replacementPool){
              if(totalMoves>=OPT_MAX_MOVES)break;
              if(!canAddCleanerInPlan(repl,currentJob,mapsNoBad,constraints))continue;
              const newIds=dedupeCleanerIds([...curIds.filter(id=>id!==badId),repl.id]);
              if(!genderRequirementMet(currentJob,newIds)||!seniorRequirementMet(currentJob,newIds))continue;
              if(newIds.length<getJobRequiredCleaners(currentJob))continue;
              const newJob={...currentJob,cleanerIds:newIds,status:calcJobStatus({...currentJob,cleanerIds:newIds}),globalOptimizerApplied:true,globalOptimizerReason:'conflict_repair_replace'};
              const newJobs=bestJobs.map(j=>j.id===currentJob.id?newJob:j);
              const ns=scoreOptPlan(newJobs,constraints);
              if(hasOperationalRegression(ns,bestScore))continue;
              if(compareOptScores(ns,bestScore)<0){
                bestJobs=newJobs;bestScore=ns;totalMoves++;passImproved=true;
                resolvedThisAttempt=true;
                break;
              }
            }
          }
          if(!resolvedThisAttempt)break; // no valid move found — stop, never retry blindly
        }
      }
    }

    if(!passImproved)break; // Early stop: no improvement this pass
  }
  return{jobs:bestJobs,constraints};
};

// Final safety gate: only return optimized plan when it doesn't worsen coverage.
const chooseSaferOptimizedPlan = (original, optimized) => {
  if(!optimized||!Array.isArray(optimized.jobs)) return original;
  const origScore=scoreOptPlan(original.jobs||[],original.constraints||{});
  const optScore =scoreOptPlan(optimized.jobs||[],optimized.constraints||{});
  if(hasOperationalRegression(optScore,origScore)) return original;
  return compareOptScores(optScore,origScore)<=0 ? optimized : original;
};

// ── EMERGENCY PATCH — FINAL HARD VALIDATION ──────────────────────────────────
// Pure, read-only diagnostic run against the FINAL job list actually being returned by
// runAutoSchedule. Classifies every detected issue into blocking vs. review-only using
// the SAME distinction already established elsewhere in this file (isRealConflictIssue /
// REVIEW_ONLY_CONFLICT_TYPES for detectConflicts issues; scoreOptPlan's own
// hardWorkloadViolations definition — daily-cap and max-worked-days only — for workload).
// Overlap/travel/late_rest/unavailable/untrained/window are blocking (they are exactly
// the set isRealConflictIssue already treats as "real"); staffing/gender/seniority stay
// review-only (REVIEW_ONLY_CONFLICT_TYPES, unchanged). Weekly-hours breaches are reported
// but kept review-only, consistent with the pre-existing "weekly hours are soft in
// current production semantics" comment in scoreOptPlan — this patch does not silently
// redefine that as a new hard constraint. Never mutates jobs.
const validateFinalScheduleHardConstraints = (jobs, constraints={}) => {
  const dc = detectConflicts(jobs||[]);
  const maps = buildOptimizerMaps(jobs||[], constraints);
  const blocking = [];
  const reviewOnly = [];

  (jobs||[]).forEach(job=>{
    (dc.get(job.id)||[]).forEach(issue=>{
      const entry = { jobId: job.id, propertyId: job.propertyId, day: job.day, cId: issue.cId, type: issue.type, msg: issue.msg };
      (isRealConflictIssue(issue) ? blocking : reviewOnly).push(entry);
    });
  });

  CLEANERS.forEach(cl=>{
    const wd = maps.workedDays[cl.id]?.size||0;
    const maxDays = getEffectiveMaxWorkedDays(cl);
    if(wd>maxDays){
      blocking.push({cleanerId:cl.id,cleanerName:cl.name,type:'max_worked_days',msg:`${cl.name}: ${wd} giorni lavorati, massimo ${maxDays}`});
    }
    DAYS.forEach(day=>{
      const dh=(maps.dailyHrs[cl.id]||{})[day]||0;
      const dailyLimit=getEffectiveDailyLimit(cl,constraints);
      if(dh>dailyLimit+0.001){
        blocking.push({cleanerId:cl.id,cleanerName:cl.name,day,type:'daily_hours',msg:`${cl.name}: ${Math.round(dh*10)/10}h il ${day}, massimo ${dailyLimit}h`});
      }
    });
    const weeklyCap=Math.max(1,(constraints[cl.id]?.maxWeeklyHrs||0)>0?constraints[cl.id].maxWeeklyHrs:(Number(cl.weeklyHrs)||40));
    if((maps.weeklyHrs[cl.id]||0)>weeklyCap+0.001){
      reviewOnly.push({cleanerId:cl.id,cleanerName:cl.name,type:'weekly_hours',msg:`${cl.name}: ${Math.round((maps.weeklyHrs[cl.id]||0)*10)/10}h settimanali, oltre ${weeklyCap}h`});
    }
  });

  return {
    ok: blocking.length===0,
    blocking,
    reviewOnly,
    blockingCount: blocking.length,
    reviewOnlyCount: reviewOnly.length,
  };
};

// ── EMERGENCY PATCH — HARD GATE HELPER (MICRO-CORRECTION #4) ─────────────────
// Shared block/warn helper for Publish, Supervisor export, and WIW export. ALWAYS
// recomputes validateFinalScheduleHardConstraints against the jobs/weekOffset passed in
// at call time — never trusts a hardValidation object computed at generation time,
// because the supervisor may have edited the plan manually (reassigned a cleaner,
// changed a time) since then. Returns true when it is safe to proceed; when blocked, it
// shows the alert + toast itself and returns false. Save/Draft are NEVER gated by this —
// only Publish and the two export actions call it.
const guardScheduleHardValidationOrBlock = (jobs, weekOffset, showToast) => {
  const currentConstraints = buildConstraints(weekOffset);
  const hv = validateFinalScheduleHardConstraints(jobs, currentConstraints);
  if(hv.ok) return true;
  const preview = hv.blocking.slice(0,6).map(b=>{
    const cleanerName = b.cleanerName || (b.cId ? CLEANERS.find(c=>c.id===b.cId)?.name : '') || '';
    const propName = b.propertyId ? (PROPERTIES.find(p=>p.id===b.propertyId)?.name||b.propertyId) : '';
    return '• '+[cleanerName, propName, b.day, b.type].filter(Boolean).join(' — ');
  }).join('\n');
  alert(
    'Impossibile procedere: il piano contiene conflitti bloccanti.\n'+
    'Risolvi overlap, disponibilità, training, travel, riposo o limiti giornalieri prima di continuare.\n\n'+
    preview + (hv.blockingCount>6?`\n… e altri ${hv.blockingCount-6}`:'')
  );
  if(showToast) showToast(`Bloccato: ${hv.blockingCount} conflitti bloccanti`,'error');
  return false;
};


const buildSystemPrompt=(jobs,weekOffset)=>{
  const dates=getWeekDates(weekOffset);
  const sched=DAYS.map((day,i)=>{
    const dj=jobs.filter(j=>j.day===day).sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
    const ds=`${dates[i].getDate()} ${MON_IT[dates[i].getMonth()]}`;
    if(!dj.length) return `${DAY_FULL[day]} ${ds}: nessun turno`;
    return `${DAY_FULL[day]} ${ds}:\n`+dj.map(j=>{
      const name=getJobDisplayName(j);
      const dur=getJobOperationalDuration(j);
      const n=j.cleanerIds.map(id=>CLEANERS.find(c=>c.id===id)?.name).filter(Boolean).join(' + ');
      return `  • ${name} ${j.startTime}–${m2t(getJobOperationalEndMinutes(j))} → ${n||'NON ASSEGNATO'} [${j.type}]${j.note?' ('+j.note+')':''}`;
    }).join('\n');
  }).join('\n');
  const ci=CLEANERS.map(c=>{
    const t=(TRAINING[c.id]||[]).map(pid=>PROPERTIES.find(p=>p.id===pid)?.name).filter(Boolean);
    return `${c.name} (${c.type==='senior'?'SENIOR':c.type}, disp: ${c.days.map(d=>DAY_IT[d]).join('/')}): → ${t.join(', ')}`;
  }).join('\n');
  const uncov=getUncovered(jobs).map(p=>p.name).join(', ')||'nessuna';
  const extras=CLEANERS.filter(cl=>cl.extraRequests&&(!cl.extraWeek||isWeekValid(cl.extraWeek,weekOffset)))
    .map(cl=>`${cl.name}: "${cl.extraRequests}"${cl.extraWeek?' (valida '+cl.extraWeek+')':''}`).join('\n')||'nessuna';
  const propsStr=PROPERTIES.map(p=>{const req=p.cleanersRequired&&p.cleanersRequired>1?' · RICHIEDE '+p.cleanersRequired+' CLEANERS':'';return p.name+' (id:'+p.id+', '+p.type+', '+p.duration+'h'+req+(p.notes?' · '+p.notes:'')+')';}).join('\n');
  const actionBlock='[AZIONI]\n{"suggestions":[{"label":"Descrizione breve","actions":[{"type":"add|reassign|remove","propertyId":"pX","day":"Mon","startTime":"HH:MM","cleanerIds":["cX"],"note":""}]}]}\n['+'/AZIONI]';
  const seniors=CLEANERS.filter(c=>c.type==='senior').map(c=>c.name).join(', ')||'nessuna';
  return `Sei l'assistente scheduling di una cleaning company a Malta. Rispondi SEMPRE in italiano, conciso e operativo.\n\nCLEANERS:\n${ci}\n\nPROPRIETÀ:\n${propsStr}\n\nTURNI (${fmtWeek(weekOffset)}):\n${sched}\n\nRICHIESTE EXTRA QUESTA SETTIMANA:\n${extras}\n\nPROPRIETÀ NON COPERTE: ${uncov}\n\nREGOLE: 1) Solo cleaners formate per training matrix 2) No doppia assegnazione stesso orario 3) Rispetta cleanersRequired 4) Rispetta disponibilità e richieste extra 5) Senior cleaners: ${seniors} — non assumere siano formate su tutto: usa solo la training matrix\n\nQUANDO SUGGERISCI MODIFICHE AI TURNI: dopo la spiegazione in italiano, includi SEMPRE un blocco strutturato:\n${actionBlock}\n\nSolo per add: propertyId, day, startTime, cleanerIds, note.\nSolo per reassign: propertyId, day, startTime, cleanerIds (nuovi).\nSolo per remove: propertyId, day, startTime.\nMax 3 suggestions. Ometti il blocco se non stai suggerendo modifiche specifiche.`;
};

// ── WIW EXPORT VALIDATION HELPERS ─────────────────────────────────────────────
// Used by both WIWExportModal (to block/warn before download) and exportWIW
// (last-line-of-defense guards). Defined here so they're in scope for both.
const isExportHHMM = v => /^\d{1,2}:\d{2}$/.test(String(v||'').trim());

const getExportJobIssues = job => {
  const issues = [];
  const dayOk = DAYS.indexOf(job?.day) >= 0;
  const parsedDate = job?.dateISO ? parseISODateLocal(job.dateISO) : null;
  const dateOk = !!parsedDate || dayOk;
  const timeOk = isExportHHMM(job?.startTime);
  const siteName = getJobDisplayName(job || {});
  const hasSite =
    !!(siteName && siteName !== 'Unknown location') ||
    !!(job?.displayName) ||
    !!(job?.temporaryLocationName) ||
    !!(job?.propertyId);
  if(!dateOk) issues.push('missing/invalid date or day');
  if(!timeOk) issues.push('missing/invalid start time');
  if(!hasSite) issues.push('missing/invalid job site');
  return issues;
};


// ── FALLBACK REALLOCATION SUGGESTIONS (Fix 10K-A) ────────────────────────────
// Second-pass, suggestion-only analysis.
// Inspects the schedule AFTER runAutoSchedule and looks for "donor" checkout
// jobs that could convert to fallback, releasing cleaners to fix "target" jobs.
// NEVER mutates jobs or applies changes — supervisors confirm via UI.
const buildFallbackReallocationSuggestions = (jobs, weekOffset = 0) => {
  const diagnostics = { targetCount:0, donorCount:0, simulationsTried:0, validSuggestions:0 };
  if(!Array.isArray(jobs) || jobs.length === 0) return { suggestions:[], diagnostics };

  const constraints = buildConstraints(weekOffset);
  const dates = getWeekDates(weekOffset);
  const dayToISO = Object.fromEntries(DAYS.map((d,i)=>[d, dates[i]?toISODateLocal(dates[i]):'']));
  const jobDateISO_ = j => j.dateISO || dayToISO[j.day] || '';

  // ── Targets ────────────────────────────────────────────────────────────────
  const targetJobs = jobs.filter(job => {
    if(!isMeaningfulJob(job)) return false;
    if(isLockedTemplateJob(job)) return false;
    const ids = dedupeCleanerIds(job.cleanerIds);
    const countOk  = ids.length >= getJobRequiredCleaners(job);
    const genderOk = genderRequirementMet(job, ids);
    const seniorOk = seniorRequirementMet(job, ids); // Fix 10M-C
    return !countOk || !genderOk || !seniorOk || job.status === 'needs_review';
  });
  diagnostics.targetCount = targetJobs.length;
  if(targetJobs.length === 0) return { suggestions:[], diagnostics };

  // ── Donors ────────────────────────────────────────────────────────────────
  const donorJobs = jobs.filter(job => {
    if(!isMeaningfulJob(job)) return false;
    if(isLockedTemplateJob(job)) return false;
    if(job.manualEdited || job.rescueUsed) return false;
    if(['last_minute','extra','checkin'].includes(job.type)) return false;
    if(!isCheckoutFallbackEligibleJob(job)) return false;
    const fbConfig = getCheckoutFallbackConfig(job);
    if(!fbConfig) return false;
    if(job.fallbackUsed === true) return false;
    const ids = dedupeCleanerIds(job.cleanerIds);
    // Donor must currently be fully valid (count + gender + senior) to be a healthy source.
    if(!genderRequirementMet(job, ids) || ids.length < getJobRequiredCleaners(job)) return false;
    if(!seniorRequirementMet(job, ids)) return false; // Fix 10M-C
    if(ids.length <= fbConfig.cleaners) return false;
    const winEnd = job.windowEndTime || (PROPERTIES.find(p=>p.id===job.propertyId)||{}).cleaningWindowEnd || '22:00';
    if(t2m(job.startTime) + fbConfig.duration * 60 > t2m(winEnd)) return false;
    return true;
  });
  diagnostics.donorCount = donorJobs.length;
  if(donorJobs.length === 0) return { suggestions:[], diagnostics };

  // ── FIX 3: pure helper — compute cleaner hours from a simulated job array ──
  const computeCleanerHoursFromJobs = (cleanerId, simulatedJobs) => {
    let weekly = 0;
    const daily = Object.fromEntries(DAYS.map(d=>[d,0]));
    const workedDays = new Set();
    simulatedJobs.forEach(job => {
      if(!(job.cleanerIds||[]).includes(cleanerId)) return;
      const dur = getCleanerEffectiveJobDuration(job, cleanerId);
      weekly += dur;
      if(DAYS.includes(job.day)){ daily[job.day] += dur; workedDays.add(job.day); }
    });
    return { weekly, daily, workedDays };
  };

  // ── FIX 6: baseline conflicts computed once before the loop ────────────────
  const baselineConflicts = detectConflicts(jobs);
  const getRealIssues = (conflictMap, jobId) =>
    (conflictMap.get(jobId)||[]).filter(isRealConflictIssue);

  // ── Validate donor cleaner against fallback slot (FIX 8) ──────────────────
  const isDonorCleanerValidForFallback = (cleaner, donor, fbConfig, simJobs) => {
    if(jobRequiresTraining(donor) && !(TRAINING[cleaner.id]||[]).includes(donor.propertyId)) return false;
    if(!cleaner.days.includes(donor.day)) return false;
    if(isCleanerUnavailableOnDate(cleaner, jobDateISO_(donor))) return false;
    if((constraints[cleaner.id]?.daysOff||[]).includes(donor.day)) return false;
    const hrs = computeCleanerHoursFromJobs(cleaner.id, simJobs);
    const dS = t2m(donor.startTime), dE = dS + fbConfig.duration * 60;
    // FIX 2: correct max-end units
    const maxEnd = constraints[cleaner.id]?.maxEndTime;
    if(maxEnd && dE > t2m(maxEnd)) return false;
    // Daily cap
    if((hrs.daily[donor.day]||0) + fbConfig.duration > getEffectiveDailyLimit(cleaner, constraints)) return false;
    // Max worked-days
    if(!hrs.workedDays.has(donor.day) && hrs.workedDays.size >= getEffectiveMaxWorkedDays(cleaner)) return false;
    // Overlap + travel + late-rest with other jobs on same day
    const other = simJobs.filter(j => j.id!==donor.id && (j.cleanerIds||[]).includes(cleaner.id) && j.day===donor.day);
    for(const oj of other){
      const oS=getCleanerOperationalStartMinutes(oj,cleaner.id), oE=getCleanerOperationalEndMinutes(oj,cleaner.id);
      if(dS<oE && dE>oS) return false;
      const earlier = dS<oS ? {startTime:donor.startTime,duration:fbConfig.duration,propertyId:donor.propertyId} : oj;
      const later   = dS<oS ? oj : {startTime:donor.startTime,duration:fbConfig.duration,propertyId:donor.propertyId};
      // FIX 1: correct travel units (both already in minutes)
      const gap = t2m(later.startTime) - (t2m(earlier.startTime) + getJobDuration(earlier)*60);
      if(gap < getTravelBufferMinutes(earlier, later)) return false;
      if(getLateShiftRestIssue(cleaner.name, earlier, later, cleaner.id)) return false;
    }
    return true;
  };

  // ── Validate whether a cleaner can be added to a target job ───────────────
  const canAddCleanerToTarget = (cleaner, target, simJobsAfterDonorConvert) => {
    const dISO = jobDateISO_(target);
    if(jobRequiresTraining(target) && !(TRAINING[cleaner.id]||[]).includes(target.propertyId)) return false;
    if(!cleaner.days.includes(target.day)) return false;
    if(isCleanerUnavailableOnDate(cleaner, dISO)) return false;
    if((constraints[cleaner.id]?.daysOff||[]).includes(target.day)) return false;
    const tS = t2m(target.startTime), tE = getJobOperationalEndMinutes(target);
    // FIX 2: correct max-end units
    const maxEnd = constraints[cleaner.id]?.maxEndTime;
    if(maxEnd && tE > t2m(maxEnd)) return false;
    // FIX 3: use simulated hours (donor already removed from cleaner's daily hours)
    const hrs = computeCleanerHoursFromJobs(cleaner.id, simJobsAfterDonorConvert);
    if((hrs.daily[target.day]||0) + getJobOperationalDuration(target) > getEffectiveDailyLimit(cleaner, constraints)) return false;
    if(!hrs.workedDays.has(target.day) && hrs.workedDays.size >= getEffectiveMaxWorkedDays(cleaner)) return false;
    // Overlap + travel + late-rest on target day
    const other = simJobsAfterDonorConvert.filter(j=>j.id!==target.id&&(j.cleanerIds||[]).includes(cleaner.id)&&j.day===target.day);
    for(const oj of other){
      const oS=getCleanerOperationalStartMinutes(oj,cleaner.id), oE=getCleanerOperationalEndMinutes(oj,cleaner.id);
      if(tS<oE && tE>oS) return false;
      const earlierIsTarget = tS<oS;
      const earlier = earlierIsTarget ? target : oj;
      const later   = earlierIsTarget ? oj : target;
      // FIX 1: correct travel units. gap uses each side's own operational end/start —
      // target has no cleaner override yet (not assigned), oj uses this cleaner's own.
      const earlierEnd = earlierIsTarget ? tE : oE;
      const laterStart = earlierIsTarget ? oS : tS;
      const gap = laterStart - earlierEnd;
      if(gap < getTravelBufferMinutes(earlier, later)) return false;
      if(getLateShiftRestIssue(cleaner.name, earlier, later, cleaner.id)) return false;
    }
    return true;
  };

  // ── Combination generator (FIX 10: generate from sorted, not donorIds) ────
  const MAX_DONOR_COMBINATIONS = 30;
  const getReleaseCombinations = (donorIds, keepCount, target) => {
    const releaseCount = donorIds.length - keepCount;
    if(releaseCount <= 0 || releaseCount >= donorIds.length) return [];
    const req = getJobGenderRequirement(target);
    const existingTargetIds = dedupeCleanerIds(target.cleanerIds);
    const haveM = existingTargetIds.filter(id=>(CLEANERS.find(c=>c.id===id)||{}).gender==='m').length;
    const haveF = existingTargetIds.filter(id=>(CLEANERS.find(c=>c.id===id)||{}).gender==='f').length;
    const needMaleOnTarget   = Math.max(0, Number(req.male)   - haveM) > 0;
    const needFemaleOnTarget = Math.max(0, Number(req.female) - haveF) > 0;
    // FIX 10: sort first, then generate combinations from sorted array
    const sorted = [...donorIds].sort((a,b) => {
      const clA = CLEANERS.find(c=>c.id===a); const clB = CLEANERS.find(c=>c.id===b);
      const scoreA = (needMaleOnTarget && clA?.gender==='m') || (needFemaleOnTarget && clA?.gender==='f') ? 0 : 1;
