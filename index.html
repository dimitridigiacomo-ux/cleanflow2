                boxShadow:'0 1px 5px rgba(0,0,0,0.08)',whiteSpace:'pre-wrap'}}>
                {displayText}
              </div>
              {/* Action suggestion cards */}
              {suggestions.length>0&&(
                <div style={{maxWidth:'92%',display:'flex',flexDirection:'column',gap:6}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.5}}>AZIONI SUGGERITE — clicca per applicare</div>
                  {suggestions.map((sug,si)=>{
                    const key=`${i}-${si}`;
                    const isApplied=applied[key];
                    return(
                      <div key={si} style={{background:isApplied?'#F0FFF4':'white',border:`1.5px solid ${isApplied?'#86EFAC':'#E0DDD8'}`,borderRadius:14,padding:'12px 14px',
                        boxShadow:'0 1px 6px rgba(0,0,0,0.08)',transition:'all 0.2s'}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>{sug.label}</div>
                        {sug.actions&&sug.actions.map((act,ai)=>{
                          const prop=PROPERTIES.find(p=>p.id===act.propertyId);
                          const cls=(act.cleanerIds||[]).map(id=>CLEANERS.find(c=>c.id===id)?.name.split(' ')[0]).filter(Boolean);
                          return(
                            <div key={ai} style={{fontSize:11,color:C.muted,marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
                              <span style={{fontSize:13}}>{act.type==='add'?'➕':act.type==='remove'?'🗑️':'🔄'}</span>
                              <span>
                                {act.type==='add'&&('Aggiungi: '+(prop?.name||act.propertyId)+' · '+DAY_FULL[act.day]+' '+act.startTime+(cls.length?' → '+cls.join(' + '):''))}
                                {act.type==='reassign'&&('Riassegna: '+(prop?.name||act.propertyId)+' · '+DAY_FULL[act.day]+' → '+cls.join(' + '))}
                                {act.type==='remove'&&('Rimuovi: '+(prop?.name||act.propertyId)+' · '+DAY_FULL[act.day]+' '+act.startTime)}
                              </span>
                            </div>
                          );
                        })}
                        <button
                          onClick={()=>{ if(isApplied) return; const ok=onApplySuggestion(sug.actions); if(ok) setApplied(a=>({...a,[key]:true})); }}
                          disabled={isApplied}
                          style={{marginTop:8,width:'100%',padding:'8px',borderRadius:10,border:'none',cursor:isApplied?'default':'pointer',fontFamily:'inherit',fontWeight:800,fontSize:13,
                            background:isApplied?C.ok:C.nav,color:'white',transition:'background 0.2s',
                            display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                          {isApplied?'✓ Applicato':'⚡ Applica'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        {isLoading&&<div style={{display:'flex'}}><div style={{background:C.card,borderRadius:'18px 18px 18px 4px',padding:'12px 16px',boxShadow:'0 1px 5px rgba(0,0,0,0.08)',display:'flex',gap:5,alignItems:'center'}}>{[0,1,2].map(i=><span key={i} style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:'#CCC',animation:`dot 0.8s ${i*0.15}s infinite alternate`}}/>)}</div></div>}
      </div>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes dot{from{transform:translateY(0)}to{transform:translateY(-5px)}}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}`}</style>
      <div style={{display:'flex',gap:6,marginTop:12,overflowX:'auto',paddingBottom:4}}>
        {quick.map(q=><button key={q} onClick={()=>setChatIn(q)} style={{flex:'0 0 auto',padding:'6px 12px',borderRadius:20,background:C.card,border:'1px solid #E0DDD8',fontSize:11,color:'#555',fontWeight:600,whiteSpace:'nowrap',cursor:'pointer',fontFamily:'inherit'}}>{q}</button>)}
      </div>
      <div style={{display:'flex',gap:8,marginTop:10}}>
        <textarea value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend();}}} placeholder="Es: Oggi manca Sara, chi può sostituirla a Villa Foca?" rows={2} style={{flex:1,border:'1.5px solid #E0DDD8',borderRadius:12,padding:'10px 14px',fontSize:14,resize:'none',lineHeight:1.4,background:C.card,fontFamily:'inherit'}}/>
        <button onClick={onSend} disabled={!chatIn.trim()||isLoading} style={{width:48,borderRadius:12,fontSize:22,border:'none',fontFamily:'inherit',background:chatIn.trim()&&!isLoading?C.nav:'#DDD',color:'white',cursor:chatIn.trim()&&!isLoading?'pointer':'default',transition:'background 0.2s'}}>↑</button>
      </div>
    </div>
  );
}

// ── JOB FORM ───────────────────────────────────────────────────────────────────
function JobForm({initial,onSave,onDelete}){
  const [form,setForm]=useState(initial||{propertyId:'',day:'Mon',startTime:'09:00',cleanerIds:[],note:'',type:'extra',manualEndTime:'',cleanerTimeOverrides:{}});
  const [endTimeError,setEndTimeError]=useState('');
  const [cleanerTimeErrors,setCleanerTimeErrors]=useState({});
  const [cleanerTimesOpen,setCleanerTimesOpen]=useState(false);
  const prop=PROPERTIES.find(p=>p.id===form.propertyId);
  const trained=form.propertyId?CLEANERS.filter(c=>TRAINING[c.id]?.includes(form.propertyId)):CLEANERS;
  const required=prop?.cleanersRequired||(prop?.requires2?2:1);
  const needsMore=form.cleanerIds.length>0&&form.cleanerIds.length<required;
  const hasCleanerTimeErrors=Object.values(cleanerTimeErrors).some(Boolean);
  const canSave=!!form.propertyId&&form.cleanerIds.length>0&&!endTimeError&&!hasCleanerTimeErrors;
  // STEP 2: deselecting a cleaner also drops any manual time override they had — an
  // override for a cleaner no longer on the job would be a dangling/meaningless entry.
  const toggle=id=>{
    setForm(f=>{
      const isSel=f.cleanerIds.includes(id);
      const nextIds=isSel?f.cleanerIds.filter(x=>x!==id):[...f.cleanerIds,id];
      let nextOverrides=f.cleanerTimeOverrides;
      if(isSel&&nextOverrides&&nextOverrides[id]){
        nextOverrides={...nextOverrides};
        delete nextOverrides[id];
      }
      return {...f,cleanerIds:nextIds,cleanerTimeOverrides:nextOverrides};
    });
    setCleanerTimeErrors(errs=>{ if(!errs[id]) return errs; const n={...errs}; delete n[id]; return n; });
  };
  const isEdit=!!(initial?.propertyId);

  // FIX 10M-D STEP 1 — Manual Duty End-Time Override (job-level).
  // Default end/duration always reflect getJobDuration()/getJobOperationalDuration();
  // manualEndTime (when valid and after startTime) overrides ONLY the operational end.
  const hasOverride = !!(form.manualEndTime && isValidHHMM(form.manualEndTime) && t2m(form.manualEndTime)>t2m(form.startTime||'00:00'));
  const operationalEndT = hasOverride ? form.manualEndTime : m2t(getJobDefaultEndMinutes(form));
  const operationalDur = getJobOperationalDuration(form);

  // FIX 10M-D STEP 2 regression fix C: whenever the duty window itself changes (Start
  // Time, End Time, or Clear Override), every existing cleanerTimeOverrides entry must be
  // re-validated against the NEW duty window — an override that was valid under the old
  // window can become out-of-range (e.g. cleaner end now falls before the new duty start).
  // Helper logic only — does not touch getValidCleanerTimeOverride or any other helper.
  const computeOperationalEndMin = f => {
    const hasOv = f.manualEndTime && isValidHHMM(f.manualEndTime) && t2m(f.manualEndTime) > t2m(f.startTime||'00:00');
    return hasOv ? t2m(f.manualEndTime) : getJobDefaultEndMinutes(f);
  };
  const revalidateCleanerOverrides = (dutyS, dutyE, overrides) => {
    const errs = {};
    Object.keys(overrides||{}).forEach(cId=>{
      const ov = overrides[cId] || {};
      const hasS = ov.startTime && isValidHHMM(ov.startTime);
      const hasE = ov.endTime && isValidHHMM(ov.endTime);
      const csMin = hasS ? t2m(ov.startTime) : dutyS;
      const ceMin = hasE ? t2m(ov.endTime) : dutyE;
      if(csMin < dutyS) errs[cId] = 'L\'inizio non può precedere l\'inizio del turno';
      else if(ceMin > dutyE) errs[cId] = 'La fine non può superare la fine del turno';
      else if(ceMin <= csMin) errs[cId] = 'La fine deve essere successiva all\'inizio';
      else errs[cId] = '';
    });
    return errs;
  };
  const revalidateForDuty = (newStartTime, newManualEndTime) => {
    const dutyE = computeOperationalEndMin({...form, startTime:newStartTime, manualEndTime:newManualEndTime});
    const dutyS = t2m(newStartTime||'00:00');
    setCleanerTimeErrors(errs=>({...errs, ...revalidateCleanerOverrides(dutyS, dutyE, form.cleanerTimeOverrides)}));
  };
  const handleStartTimeChange = e => {
    const v = e.target.value;
    revalidateForDuty(v, form.manualEndTime);
    setForm(f=>({...f,startTime:v}));
  };
  const handleEndTimeChange = e => {
    const v = e.target.value;
    if(!v){ setEndTimeError(''); revalidateForDuty(form.startTime, ''); setForm(f=>({...f,manualEndTime:''})); return; }
    if(!isValidHHMM(v)){ setEndTimeError('Orario di fine non valido'); return; }
    if(t2m(v) <= t2m(form.startTime||'00:00')){ setEndTimeError('L\'orario di fine deve essere successivo all\'inizio'); return; }
    setEndTimeError('');
    revalidateForDuty(form.startTime, v);
    setForm(f=>({...f,manualEndTime:v}));
  };
  const clearOverride = () => {
    setEndTimeError('');
    revalidateForDuty(form.startTime, '');
    setForm(f=>({...f,manualEndTime:''}));
  };

  // FIX 10M-D STEP 2 — Manual Cleaner Time Overrides.
  // Validation: cleaner start >= duty start; cleaner end > cleaner start; cleaner end <= duty end.
  // Only committed to form.cleanerTimeOverrides when valid (mirrors the job-level End Time
  // field's UX above) — invalid input just shows an inline error and blocks Save.
  const setCleanerOverrideField = (cId, field, rawValue) => {
    const dutyS = t2m(form.startTime||'00:00');
    const dutyE = t2m(operationalEndT);
    if(!rawValue){
      setCleanerTimeErrors(errs=>({...errs,[cId]:''}));
      setForm(f=>{
        const existing={...(f.cleanerTimeOverrides||{})};
        const cur={...(existing[cId]||{})};
        delete cur[field];
        if(!cur.startTime&&!cur.endTime) delete existing[cId]; else existing[cId]=cur;
        return {...f,cleanerTimeOverrides:existing};
      });
      return;
    }
    if(!isValidHHMM(rawValue)){ setCleanerTimeErrors(errs=>({...errs,[cId]:'Orario non valido'})); return; }
    const cur = form.cleanerTimeOverrides?.[cId] || {};
    const csMin = field==='startTime' ? t2m(rawValue) : (cur.startTime&&isValidHHMM(cur.startTime)?t2m(cur.startTime):dutyS);
    const ceMin = field==='endTime' ? t2m(rawValue) : (cur.endTime&&isValidHHMM(cur.endTime)?t2m(cur.endTime):dutyE);
    if(csMin < dutyS){ setCleanerTimeErrors(errs=>({...errs,[cId]:'L\'inizio non può precedere l\'inizio del turno'})); return; }
    if(ceMin > dutyE){ setCleanerTimeErrors(errs=>({...errs,[cId]:'La fine non può superare la fine del turno'})); return; }
    if(ceMin <= csMin){ setCleanerTimeErrors(errs=>({...errs,[cId]:'La fine deve essere successiva all\'inizio'})); return; }
    setCleanerTimeErrors(errs=>({...errs,[cId]:''}));
    setForm(f=>({...f,cleanerTimeOverrides:{...(f.cleanerTimeOverrides||{}),[cId]:{...cur,[field]:rawValue}}}));
  };

  return(<>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>{isEdit?'Modifica Turno':'Nuovo Turno'}</div>
    <Lbl>Proprietà</Lbl>
    <FSelect value={form.propertyId} onChange={e=>{ setForm(f=>({...f,propertyId:e.target.value,cleanerIds:[],cleanerTimeOverrides:{}})); setCleanerTimeErrors({}); }}>
      <option value="">Seleziona proprietà…</option>
      {PROPERTIES.map(p=>{const req=p.cleanersRequired>1?` · ⚠️ ${p.cleanersRequired} pers.`:'';return(<option key={p.id} value={p.id}>{TI(p.type)} {p.name} ({p.duration}h{req})</option>);})}
    </FSelect>
    <Lbl>Giorno</Lbl>
    <FSelect value={form.day} onChange={e=>setForm(f=>({...f,day:e.target.value}))}>{DAYS.map(d=><option key={d} value={d}>{DAY_FULL[d]}</option>)}</FSelect>
    <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
      <div style={{flex:1}}><Lbl>Start Time</Lbl><FInput type="time" value={form.startTime} onChange={handleStartTimeChange}/></div>
      <div style={{flex:1}}>
        <Lbl>End Time{hasOverride?<span style={{color:'#92400E',fontSize:10,fontWeight:700}}> — Manual End-Time Override</span>:null}</Lbl>
        <FInput type="time" value={operationalEndT} onChange={handleEndTimeChange}/>
        {endTimeError&&<div style={{color:C.conflict,fontSize:11,fontWeight:700,marginTop:3}}>⚠️ {endTimeError}</div>}
        {hasOverride&&<button type="button" onClick={clearOverride} style={{marginTop:5,fontSize:11,fontWeight:700,color:C.muted,background:'none',border:'none',cursor:'pointer',padding:0,textDecoration:'underline',fontFamily:'inherit'}}>Clear Override</button>}
      </div>
    </div>
    {form.propertyId&&prop&&<div style={{background:'#F0F7FF',borderRadius:8,padding:'8px 12px',marginTop:10,fontSize:12,color:'#2A5FA0',fontWeight:600}}>⏱ Fine: {operationalEndT} · {operationalDur}h{prop.cleanersRequired>1?` · ⚠️ Richiede ${prop.cleanersRequired} persone`:''}</div>}
    {needsMore&&<div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:8,padding:'8px 12px',marginTop:8,fontSize:12,color:'#856404',fontWeight:700}}>⚠️ Richiede {required} cleaners — seleziona anche {required-form.cleanerIds.length} in più</div>}
    <Lbl>Assegna Cleaner {form.propertyId&&<span style={{color:C.muted,fontSize:10,fontWeight:600}}> — solo formate</span>}</Lbl>
    {form.propertyId&&trained.length===0?<div style={{color:C.conflict,fontSize:13,fontWeight:700,padding:'8px 0'}}>⚠️ Nessuna cleaner formata</div>
      :<div style={{display:'flex',flexWrap:'wrap',gap:8}}>{trained.map(cl=>{const sel=form.cleanerIds.includes(cl.id);const av=cl.days.includes(form.day);return(<button key={cl.id} onClick={()=>toggle(cl.id)} style={{padding:'7px 12px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s',border:av?'none':`1.5px solid ${C.conflict}40`,background:sel?CL_COLOR[cl.id]:av?'#F0EDE8':'#FDE8E8',color:sel?'white':av?C.text:C.conflict}}>{cl.name.split(' ')[0]}{!av?` (off ${DAY_IT[form.day]})`:''}</button>);})}
      </div>}
    {/* FIX 10M-D STEP 2 — per-cleaner start/end overrides. Collapsed by default; only
        shows cleaners currently assigned to this job. */}
    {form.cleanerIds.length>0&&<div style={{marginTop:14}}>
      <button type="button" onClick={()=>setCleanerTimesOpen(o=>!o)} style={{background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',padding:0,display:'flex',alignItems:'center',gap:6}}>
        <span style={{display:'inline-block',transition:'transform 0.15s',transform:cleanerTimesOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
        Edit Cleaner Times
      </button>
      {cleanerTimesOpen&&<div style={{marginTop:8,display:'flex',flexDirection:'column',gap:10,background:'#FAF8F4',borderRadius:10,padding:'10px 12px'}}>
        {form.cleanerIds.map(cId=>{
          const cl=CLEANERS.find(c=>c.id===cId);
          if(!cl) return null;
          const ov=form.cleanerTimeOverrides?.[cId]||{};
          const sVal=ov.startTime&&isValidHHMM(ov.startTime)?ov.startTime:form.startTime;
          const eVal=ov.endTime&&isValidHHMM(ov.endTime)?ov.endTime:operationalEndT;
          const err=cleanerTimeErrors[cId];
          return (
            <div key={cId}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{flex:1,fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                <div style={{width:98}}><FInput type="time" value={sVal} onChange={e=>setCleanerOverrideField(cId,'startTime',e.target.value)}/></div>
                <div style={{width:98}}><FInput type="time" value={eVal} onChange={e=>setCleanerOverrideField(cId,'endTime',e.target.value)}/></div>
              </div>
              {err&&<div style={{color:C.conflict,fontSize:11,fontWeight:700,marginTop:3}}>⚠️ {err}</div>}
            </div>
          );
        })}
      </div>}
    </div>}
    <Lbl>Note (opzionale)</Lbl>
    <FInput type="text" value={form.note||''} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Es: checkout alle 10, porta asciugamani extra…"/>
    {prop?.notes&&<div style={{background:'#FFF8E8',border:'1px solid #FFE082',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#8A6400',fontWeight:600,marginTop:12}}>ℹ️ {prop.notes}</div>}
    <div style={{display:'flex',gap:8,marginTop:20}}>
      {onDelete&&<button onClick={onDelete} style={{padding:'11px 16px',borderRadius:10,background:'#FDE8E8',color:C.conflict,fontWeight:700,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Elimina</button>}
      <button onClick={()=>canSave&&onSave(form)} disabled={!canSave} style={{flex:1,padding:'13px',borderRadius:10,fontWeight:800,fontSize:15,border:'none',cursor:canSave?'pointer':'default',fontFamily:'inherit',background:canSave?C.nav:'#DDD',color:'white',transition:'background 0.2s'}}>{isEdit?'Salva Modifiche':'Aggiungi Turno'}</button>
    </div>
  </>);
}

// ── WIW EXPORT MODAL ───────────────────────────────────────────────────────────
function WIWExportModal({jobs,weekOffset,wf,conflicts,showToast,planningWeekOffset}){
  const [done,setDone]=useState(false);
  const [exportMode,setExportMode]=useState('all'); // 'variable'|'all' — default 'all' (Tutti i turni)
  const [confirmingExport,setConfirmingExport]=useState(false);
  const exportJobs = exportMode==='variable' ? jobs.filter(j=>j.type!=='template') : jobs;
  // Same real-conflict taxonomy as WeekView/Sidebar (staffing/gender shortfalls are
  // "da rivedere", not blocking export-worthy conflicts) — uses the shared helper
  // near detectConflicts() so this count never drifts from what the supervisor sees
  // elsewhere in the app.
  const exportConflictCount=getRealConflictCount(exportJobs, conflicts);
  const weekMismatch = planningWeekOffset!==null && planningWeekOffset!==undefined && planningWeekOffset!==weekOffset;
  const stale=wf.staleGeneration;

  // ── Invalid-job detection ────────────────────────────────────────────────────
  // Jobs with missing/invalid date, startTime, or site are "fantasy" rows that would
  // produce broken XLSX output (blank dates, "12:undefined AM", "Unknown location").
  // Detect them before the download and block export with a visible diagnostic panel.
  const invalidExportJobs = exportJobs
    .map((job, index) => ({ job, index, issues: getExportJobIssues(job) }))
    .filter(x => x.issues.length > 0);

  const logInvalidExportJobs = () => {
    console.table(invalidExportJobs.map(x => ({
      rowIndex: x.index,
      id: x.job.id,
      source: x.job.source,
      type: x.job.type,
      propertyId: x.job.propertyId,
      displayName: x.job.displayName,
      temporaryLocationName: x.job.temporaryLocationName,
      day: x.job.day,
      dateISO: x.job.dateISO,
      startTime: x.job.startTime,
      duration: x.job.duration,
      cleaners: Array.isArray(x.job.cleanerIds) ? x.job.cleanerIds.length : 'invalid',
      issues: x.issues.join(', '),
    })));
  };

  const doExport=()=>{
    // Hard guard — also checked in handle(), but doExport can be reached via the
    // inline conflict-confirmation "Esporta comunque" button, so re-check here.
    if(invalidExportJobs.length > 0){
      logInvalidExportJobs();
      if(showToast) showToast(`Export bloccato: ${invalidExportJobs.length} turni non validi`, 'error');
      return;
    }
    // EMERGENCY PATCH — hard gate (MICRO-CORRECTION #4). Same schedule-level blocking
    // check used by Publish and the Supervisor export, applied to the full week's plan
    // (not just the exported subset) so a blocking conflict elsewhere in the week still
    // stops this export.
    if(!guardScheduleHardValidationOrBlock(jobs, weekOffset, showToast)) return;
    console.log('[WIW export] starting', { jobCount: exportJobs.length, exportMode });
    try {
      exportWIW(exportJobs,weekOffset,conflicts);
      setConfirmingExport(false);
      setDone(true);
      setTimeout(()=>setDone(false),3000);
      if(showToast) showToast('✓ Export XLSX avviato','ok');
      console.log('[WIW export] success');
    } catch(err) {
      console.error('[WIW export] failed', err);
      if(showToast) showToast('Export fallito: ' + String(err.message||err), 'error');
    }
  };
  const handle=()=>{
    if(stale) return;
    if(weekMismatch){showToast&&showToast('Settimana non allineata — torna alla settimana caricata o ricarica i dati','error');return;}
    if(exportJobs.length===0){showToast&&showToast('Nessun turno da esportare in questa modalità','warn');return;}
    // Block if invalid jobs detected — log diagnostic table to console and show toast.
    if(invalidExportJobs.length > 0){
      logInvalidExportJobs();
      showToast&&showToast(`Export bloccato: ${invalidExportJobs.length} turni non validi`, 'error');
      return;
    }
    if(exportConflictCount>0){
      // Use an in-modal confirmation instead of window.confirm() — native confirm()
      // can be silently suppressed (returns false / never shows) in some mobile
      // browsers and installed-PWA contexts, which made export look like it did
      // nothing at all when conflicts were present.
      setConfirmingExport(true);
      return;
    }
    doExport();
  };
  const unassigned=exportJobs.filter(j=>j.cleanerIds.length===0).length;
  const exportBlocked = invalidExportJobs.length > 0;

  return(<>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>📊 Export Turni</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Genera il file XLSX da importare in When I Work</div>

    {stale&&<div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:800,color:'#856404',marginBottom:4}}>⚠️ Turni non rigenerati</div>
      <div style={{fontSize:12,color:'#92400E'}}>Dati importati dopo l'ultima generazione. Rigenera prima di esportare.</div>
    </div>}

    {weekMismatch&&!stale&&<div style={{background:'#FDE8E8',border:`1px solid ${C.conflict}40`,borderRadius:10,padding:'12px 14px',marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:800,color:C.conflict,marginBottom:4}}>⚠️ Settimana non allineata</div>
      <div style={{fontSize:12,color:'#8B1A1A'}}>Stai visualizzando una settimana diversa da quella caricata. Torna alla settimana corretta o ricarica i dati prima di esportare.</div>
    </div>}

    {/* Invalid-job warning panel — shown before conflict/unassigned panels, takes priority */}

// ── ROOT ────────────────────────────────────────────────────────────────────────
function App(){
  const [jobs,         setJobs        ]=useState([]);
  // ── Reactive jobs-state sanitizer ────────────────────────────────────────────
  // Runs after every async restore (published schedule, draft, last-minute) that
  // sets jobs state, catching any phantom empty objects that slipped through the
  // boundary guards. Keyed on jobs.length so it only fires when the array size
  // changes, never loops (if cleaned.length === prev.length, returns prev ref unchanged).
  useEffect(()=>{
    setJobs(prev=>{
      const cleaned=cleanRestoredJobs(prev,'jobs state reactive sanitizer');
      return cleaned.length===prev.length?prev:cleaned;
    });
  },[jobs.length]);
  // ── Diagnostic: log phantom jobs in state ─────────────────────────────────────
  // Temporary — identifies which restore path produced phantoms. Safe to remove
  // once the source is confirmed.
  useEffect(()=>{
    const emptyJobs=jobs.filter(j=>!isMeaningfulJob(j));
    if(emptyJobs.length>0){
      console.warn('[CleanFlow] Phantom jobs currently in state',{
        count:emptyJobs.length,
        sample:emptyJobs.slice(0,5),
      });
    }
  },[jobs]);
  // ── Diagnostic: log duplicate jobs in state ──────────────────────────────────
  // Surfaces exact and loose duplicate groups so supervisors can identify whether
  // a property appearing twice is Template+Hostaway overlap, a restore glitch,
  // or a legitimate two-job scenario — without auto-deleting anything.
  useEffect(()=>{
    const dupes = findDuplicateJobs(jobs);
    if(dupes.exact.length || dupes.loose.length){
      console.warn('[CleanFlow duplicate jobs diagnostic]', dupes);
    }
  },[jobs]);
  // ── Diagnostic: log over-days cleaners with per-job origin detail ─────────────
  // Helps identify whether a cleaner's excess days came from Sheet-locked templates
  // or auto-scheduler assignments. Look for templateLockedFromSheet in the output.
  useEffect(()=>{
    if(!Array.isArray(CLEANERS)||CLEANERS.length===0) return;
    CLEANERS.forEach(cl=>{
      const clJobs=jobs.filter(j=>(j.cleanerIds||[]).includes(cl.id));
      const workedDays=new Set(clJobs.map(j=>j.day)).size;
      const maxDays=getEffectiveMaxWorkedDays(cl);
      if(workedDays>maxDays){
        console.warn('[CleanFlow over-days]',cl.name,`${workedDays}/${maxDays}gg`,
          clJobs.map(j=>({
            day:j.day, startTime:j.startTime, displayName:getJobDisplayName(j),
            type:j.type, serviceTypeId:j.serviceTypeId,
            cleanerIds:j.cleanerIds,
            templateLockedFromSheet:j.templateLockedFromSheet,
            source:j.source, status:j.status, note:j.note,
          }))
        );
      }
    });
  },[jobs]);
  const [tab,          setTab         ]=useState('week');
  const [selDay,       setSelDay      ]=useState(getTodayKey);
  const [weekOffset,   setWeekOffset  ]=useState(1); // default: prossima settimana (planning)
  const [modal,        setModal       ]=useState(null);
  const [editJob,      setEditJob     ]=useState(null);
  const [highlightJob, setHighlightJob]=useState(null);
  const [generateResult,setGenerateResult]=useState(null);
  const getInitialAiMessage = () => {
    if(getGeminiKey()) return `Ciao! 👋 Sono qui per aiutarti con i turni.\n\nL'AI è già configurata. Puoi chiedermi di analizzare conflitti, suggerire riassegnazioni e applicare modifiche direttamente ai turni.`;
    return `Ciao! 👋 Sono qui per aiutarti con i turni.\n\nPer attivare l'AI premi ⚙️ in alto e inserisci una Gemini API key.\n\nSenza key puoi comunque usare template, scheduler ed export WIW.`;
  };
  const [msgs,         setMsgs        ]=useState([{role:'assistant',text:getInitialAiMessage()}]);
  const [chatIn,       setChatIn      ]=useState('');
  const [aiLoad,       setAiLoad      ]=useState(false);
  const [toast,        setToast       ]=useState(null);
  const [apiKeyInput,  setApiKeyInput ]=useState('');
  const [authed,       setAuthed      ]=useState(()=>sessionStorage.getItem('cf_auth')==='1');
  const [pwInput,      setPwInput     ]=useState('');
  const [pwError,      setPwError     ]=useState(false);
  const [sheetStatus,  setSheetStatus ]=useState('loading'); // 'loading'|'ok'|'warn'|'error'
  const [sheetLoading, setSheetLoading]=useState(false);
  const dataReady = sheetStatus==='ok';
  const [sheetInfo,    setSheetInfo   ]=useState('');
  const [templateDiagnostics, setTemplateDiagnostics]=useState(null);
  const [extraDutiesDiagnostics, setExtraDutiesDiagnostics]=useState(null);
  const [lmSolverResult, setLmSolverResult]=useState(null); // {options, aiText, loading}
  const [lmForm, setLmForm]=useState(null); // null or form object when modal open
  const [dataVersion,  setDataVersion ]=useState(0);
  // Workflow state machine
  const [wf, setWf]=useState({templateLoaded:false,hostawayLoaded:false,shiftsGenerated:false,staleGeneration:false});
  // Generate gating: Sheet data + Default Template + Hostaway (API, or CSV fallback)
  // must all be ready before "Genera Turni" is enabled. Returns {enabled, reason}.
  // Declared AFTER wf so it never reads wf in its temporal dead zone.
  const genGate = useMemo(() => {
    if(!dataReady) return { enabled:false, reason:'Aggiorna prima i dati Google Sheet' };
    if(!wf.templateLoaded) return { enabled:false, reason:'Carica prima il Default Template' };
    if(!wf.hostawayLoaded) return { enabled:false, reason:'Importa prima Hostaway API' };
    return { enabled:true, reason:'' };
  }, [dataReady, wf.templateLoaded, wf.hostawayLoaded]);
  const [planningWeekOffset, setPlanningWeekOffset]=useState(null); // week when jobs were loaded

  // ─── Published schedule (shared backend via Apps Script) ─────────────────
  // publishedJobsSnapshot: { jobs:[], meta:{snapshotId,publishedAt,publishedBy,weekStartISO,weekEndISO} } | null
  // publishedStatus: 'idle' | 'loading' | 'loaded' | 'none' | 'error'
  const [publishedJobsSnapshot, setPublishedJobsSnapshot]=useState(null);
  const [publishedStatus, setPublishedStatus]=useState('idle');
  const [publishedError, setPublishedError]=useState('');
  const [publishing, setPublishing]=useState(false);
  const [draftRestored, setDraftRestored]=useState(false);
  // Set true after a publish conflict + snapshot refetch. Makes the NEXT publish
  // confirm carry a strong "you are overwriting a newer version" warning.
  const [serverVersionChanged, setServerVersionChanged]=useState(false);
  // Supervisor name surfaced in UI (label + Cambia action). Mirrors localStorage.
  const [supervisorNameUI, setSupervisorNameUI]=useState(()=>getSupervisorName());
  const changeSupervisorName = () => {
    const entered = prompt('Il tuo nome supervisor:', supervisorNameUI||'');
    if(entered===null) return;            // cancelled → keep existing
    const trimmed = entered.trim();
    if(!trimmed) return;                   // empty → keep existing
    setSupervisorName(trimmed);
    setSupervisorNameUI(trimmed);
  };
  // Initial-load guard: don't autosave during the first published+draft decision
  const initialLoadDoneRef = useRef(false);
  const publishingRef = useRef(false);

  const chatRef=useRef(null);
  const toastTimer=useRef(null);
  const conflictNavTimer=useRef(null);
  const weekOffsetRef=useRef(0);
  const planningWeekOffsetRef=useRef(null);
  useEffect(()=>{ weekOffsetRef.current=weekOffset; },[weekOffset]);
  useEffect(()=>{ planningWeekOffsetRef.current=planningWeekOffset; },[planningWeekOffset]);
  const width=useWindowWidth();
  const isDesktop=width>=DESKTOP_BP;

  // ── Load Google Sheet data — only after login ────────────────────────────
  useEffect(()=>{
    if(!authed) return; // wait for login first
    loadSheetData(weekOffset).then(data=>{
      const loaded=[];
      if(data.cleaners){
        CLEANERS=data.cleaners;
        // Rebuild color map
        const newColors={};
        data.cleaners.forEach((cl,i)=>{newColors[cl.id]=CL_PALETTE[i%CL_PALETTE.length];});
        CL_COLOR=newColors;
        loaded.push('Cleaners: '+data.cleaners.length);
      }
      if(data.properties){
        PROPERTIES=data.properties;
        PROP_NAME_MAP=Object.fromEntries(data.properties.map(p=>[p.name.toLowerCase(),p.id]));
        loaded.push('Properties: '+data.properties.length);
      }
      if(data.training){
        TRAINING=data.training;
        loaded.push('Training: '+Object.keys(data.training).length+' cleaners');
      }
      if(data.template){
        SHEET_TEMPLATE=data.template;
        loaded.push('Template: '+data.template.length+' turni');
      }
      if(data.templateDiagnostics) setTemplateDiagnostics(data.templateDiagnostics);
      if(data.extraDuties){
        EXTRA_DUTIES=data.extraDuties;
        loaded.push('Extra Duties: '+data.extraDuties.length);
      }
      if(data.extraDutiesDiagnostics) setExtraDutiesDiagnostics(data.extraDutiesDiagnostics);
      if(data.hostawayMap){
        Object.assign(PROP_NAME_MAP, data.hostawayMap);
        loaded.push('Hostaway Map: '+Object.keys(data.hostawayMap).length);
      }
      if(data.hostawayMapById){ HOSTAWAY_MAP_BY_ID = data.hostawayMapById; }
      TRAVEL_BUFFERS = data.travelBuffers || {};
      const failedTabs1=[];
      if(!data.cleaners) failedTabs1.push('Cleaners'); if(!data.properties) failedTabs1.push('Properties');
      if(!data.training) failedTabs1.push('Training'); if(!data.template) failedTabs1.push('Template');
      const criticalOk = failedTabs1.length===0;
      setSheetStatus(loaded.length>0?(criticalOk?'ok':'warn'):'error');
      setSheetInfo(loaded.join(' · ')+(criticalOk?'':' ⚠️ Mancanti: '+failedTabs1.join(', ')));
      setDataVersion(v=>v+1);
    }).catch(e=>{
      setSheetStatus('error');
      setSheetInfo('Errore caricamento Google Sheet — premi Aggiorna dati per riprovare');
      setDataVersion(v=>v+1);
    });
  },[authed]);

  // ── Refresh ONLY the week-dependent feed (extra duties) on week change ────
  const initialExtraLoadRef = useRef(true);
  useEffect(()=>{
    if(!authed) return;
    if(initialExtraLoadRef.current){ initialExtraLoadRef.current = false; return; }
    let cancelled=false;
    loadSheetData(weekOffset).then(data=>{
      if(cancelled) return;
      EXTRA_DUTIES = data.extraDuties || [];
      TRAVEL_BUFFERS = data.travelBuffers || {};
      setExtraDutiesDiagnostics(data.extraDutiesDiagnostics || null);
      setDataVersion(v=>v+1);
    }).catch(()=>{
      if(cancelled) return;
      EXTRA_DUTIES = [];
      TRAVEL_BUFFERS = {};
      setExtraDutiesDiagnostics(null);
      setDataVersion(v=>v+1);
    });
    return ()=>{ cancelled=true; };
  },[authed,weekOffset]);

  // Rehydrate last minute from localStorage when authed or weekOffset changes
  useEffect(()=>{
    if(!authed) return;
    const lmJobs=cleanRestoredJobs(loadLastMinuteJobs(weekOffset),'last_minute rehydrate');
    console.log('[CleanFlow restore path]','last_minute rehydrate',{before:loadLastMinuteJobs(weekOffset).length,after:lmJobs.length});
    setJobs(prev=>{
      const withoutLm=prev.filter(j=>j.source!=='last_minute');
      if(lmJobs.length===0&&withoutLm.length===prev.length) return prev;
      return [...withoutLm,...lmJobs];
    });
  },[authed,weekOffset]);

  // ─── Fetch published schedule from backend on auth + week change ─────────
  useEffect(()=>{
    if(!authed) return;
    let cancelled=false;
    initialLoadDoneRef.current = false;
    setDraftRestored(false);
    const weekStartISO=getWeekStartISO(weekOffset);
    setServerVersionChanged(hasPendingOverwriteWarning(weekStartISO));
    setPublishedStatus('loading');
    setPublishedError('');
    fetchPublishedSchedule(weekStartISO).then(result=>{
      if(cancelled) return;
      if(!result.ok){
        setPublishedStatus('error');
        setPublishedError(result.error||'');
        initialLoadDoneRef.current = true;
        return;
      }

      const draft = loadDraft(weekStartISO);

      if(result.exists){
        const meta={
          snapshotId: result.snapshotId,
          publishedAt: result.publishedAt,
          publishedBy: result.publishedBy,
          weekStartISO: result.weekStartISO,
          weekEndISO: result.weekEndISO,
        };
        let loadedJobsForWf = result.jobs;
        const pendingOverwrite = hasPendingOverwriteWarning(weekStartISO);
        const draftHasJobs = draft && Array.isArray(draft.jobs) && draft.jobs.length>0;
        const draftIsValid = draft
          && draft.basePublishedAt === result.publishedAt
          && draft.savedAt && result.publishedAt
          && draft.savedAt > result.publishedAt;
        if(draftIsValid || (pendingOverwrite && draftHasJobs)){
          const cleanDraft = cleanRestoredJobs(draft.jobs, 'draft published week');
          console.log('[CleanFlow restore path]','draft published week',{before:draft.jobs.length,after:cleanDraft.length});
          setJobs(prev=>{
            const draftIds = new Set(cleanDraft.map(j=>j.id));
            const draftKeys = new Set(cleanDraft.map(getJobOperationalKey));
            const localLmKept = prev.filter(j=>j.source==='last_minute' && !draftIds.has(j.id) && !draftKeys.has(getJobOperationalKey(j)));
            return [...cleanDraft, ...localLmKept];
          });
          loadedJobsForWf = cleanDraft;
          setDraftRestored(true);
        } else {
          if(draft) clearDraft(weekStartISO);
          const cleanPublished = cleanRestoredJobs(result.jobs, 'published schedule');
          console.log('[CleanFlow restore path]','published schedule',{before:result.jobs.length,after:cleanPublished.length});
          setJobs(prev=>{
            const publishedIds = new Set(cleanPublished.map(j=>j.id));
            const publishedKeys = new Set(cleanPublished.map(getJobOperationalKey));
            const localLmKept = prev.filter(j=>j.source==='last_minute' && !publishedIds.has(j.id) && !publishedKeys.has(getJobOperationalKey(j)));
            return [...cleanPublished, ...localLmKept];
          });
        }
        setPublishedJobsSnapshot({ jobs: result.jobs, meta });
        setPlanningWeekOffset(weekOffset);
        {
          const hw = deriveHostawayWf(loadedJobsForWf);
          setWf({ templateLoaded:true, hostawayLoaded:hw.hostawayLoaded, hostawaySource:hw.hostawaySource, shiftsGenerated:true, staleGeneration:false });
        }
        setPublishedStatus('loaded');
      } else {
        let restoredLocalDraft = false;
        if(draft && draft.basePublishedAt === null && Array.isArray(draft.jobs) && draft.jobs.length>0){
          const cleanLocalDraft = cleanRestoredJobs(draft.jobs, 'draft local-only');
          console.log('[CleanFlow restore path]','draft local-only',{before:draft.jobs.length,after:cleanLocalDraft.length});
          setJobs(prev=>{
            const draftIds = new Set(cleanLocalDraft.map(j=>j.id));
            const draftKeys = new Set(cleanLocalDraft.map(getJobOperationalKey));
            const localLmKept = prev.filter(j=>j.source==='last_minute' && !draftIds.has(j.id) && !draftKeys.has(getJobOperationalKey(j)));
            return [...cleanLocalDraft, ...localLmKept];
          });
          setPlanningWeekOffset(weekOffset);
          {
            const hw = deriveHostawayWf(cleanLocalDraft);
            setWf({ templateLoaded:true, hostawayLoaded:hw.hostawayLoaded, hostawaySource:hw.hostawaySource, shiftsGenerated:true, staleGeneration:false });
          }
          setDraftRestored(true);
          restoredLocalDraft = true;
        }
        setPublishedJobsSnapshot(prevSnap=>{
          if(prevSnap && !restoredLocalDraft){
            setJobs(prev=>prev.filter(j=>j.source==='last_minute'));
            setPlanningWeekOffset(null);
            setWf({templateLoaded:false,hostawayLoaded:false,shiftsGenerated:false,staleGeneration:false});
            setGenerateResult(null);
            setHighlightJob(null);
          }
          return null;
        });
        if(draft && !draft.basePublishedAt && !restoredLocalDraft) clearDraft(weekStartISO);
        setPublishedStatus('none');
      }
      setTimeout(()=>{ if(!cancelled) initialLoadDoneRef.current = true; }, 0);
    });
    return ()=>{ cancelled=true; };
  },[authed,weekOffset]);

  const conflicts=useMemo(()=>detectConflicts(jobs),[jobs,dataVersion]);
  const totalC=conflicts.size;
  const weekMismatchActive = planningWeekOffset!==null && planningWeekOffset!==weekOffset;

  const dirty = useMemo(()=>{
    if(!publishedJobsSnapshot) return false;
    if(weekMismatchActive) return false;
    return normalizeJobsForCompare(jobs) !== normalizeJobsForCompare(publishedJobsSnapshot.jobs);
  },[jobs, publishedJobsSnapshot, weekMismatchActive]);

  useEffect(()=>{
    if(!authed) return;
    if(!initialLoadDoneRef.current) return;
    if(weekMismatchActive) return;
    const weekStartISO = getWeekStartISO(weekOffset);
    if(publishedJobsSnapshot){
      if(!dirty) return;
      const basePublishedAt = publishedJobsSnapshot.meta.publishedAt;
      const handle = setTimeout(()=>{ saveDraft(weekStartISO, jobs, basePublishedAt); }, 400);
      return ()=>clearTimeout(handle);
    } else {
      const hasLocalWork = jobs.some(j=>j.source!=='last_minute');
      if(!hasLocalWork) return;
      const handle = setTimeout(()=>{ saveDraft(weekStartISO, jobs, null); }, 400);
      return ()=>clearTimeout(handle);
    }
  },[jobs, dirty, publishedJobsSnapshot, weekMismatchActive, authed, weekOffset]);

  useEffect(()=>{
    if(!dirty || !publishedJobsSnapshot) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = '';
      return '';
    };
    window.addEventListener('beforeunload', handler);
    return ()=>window.removeEventListener('beforeunload', handler);
  },[dirty, publishedJobsSnapshot]);

  const visibleJobs = weekMismatchActive ? [] : jobs;
  const visibleConflicts = useMemo(()=>weekMismatchActive?new Map():conflicts,[weekMismatchActive,conflicts]);
  const visibleTotalC = visibleConflicts.size;

  useEffect(()=>{chatRef.current?.scrollTo(0,chatRef.current.scrollHeight);},[msgs]);
  useEffect(()=>()=>{if(toastTimer.current)clearTimeout(toastTimer.current);if(conflictNavTimer.current)clearTimeout(conflictNavTimer.current);},[]);

  const showToast=useCallback((msg,type='ok',onUndo=null)=>{
    if(toastTimer.current)clearTimeout(toastTimer.current);
    setToast({msg,type,onUndo});
    toastTimer.current=setTimeout(()=>setToast(null),onUndo?5000:2500);
  },[]);

  const trainingStatus = useMemo(()=>{
    const propertiesWithoutTraining = PROPERTIES.filter(p=>
      !CLEANERS.some(cl=>TRAINING[cl.id]?.includes(p.id))
    );
    const jobsWithoutTraining = jobs.filter(j=>
      jobRequiresTraining(j) &&
      !CLEANERS.some(cl=>TRAINING[cl.id]?.includes(j.propertyId))
    );
    return {
      ok: propertiesWithoutTraining.length === 0,
      propertiesWithoutTraining,
      jobsWithoutTraining,
    };
  },[jobs, dataVersion]);

  const getExtraDutyKey = job => [
    job.dateISO||'',
    job.startTime||'',
    job.displayName||job.temporaryLocationName||job.propertyId||'',
    job.serviceTypeId||'',
  ].join('|');

  const mergeRefreshedExtraDutiesIntoJobs = (currentJobs, refreshedExtraDuties) => {
    const nonExtra = currentJobs.filter(j=>j.source!=='extra');
    const newExtras = (refreshedExtraDuties||[]).map(j=>{
      const job={...j,id:j.id||uid(),source:'extra',type:'extra'};
      return {...job,status:calcJobStatus(job)};
    });
    return [...nonExtra, ...newExtras];
  };

  const blockIfWeekMismatch = useCallback(() => {
    if(planningWeekOffset!==null && planningWeekOffset!==weekOffset){
      showToast('Settimana non allineata — torna alla settimana caricata o sostituisci con questa settimana','error');
      return true;
    }
    return false;
  },[planningWeekOffset,weekOffset,showToast]);

  // ─── Publish current week's jobs to the shared backend ──────────────────
  const publishCurrentSchedule = async (skipOverwriteModal=false) => {
    if(publishingRef.current) return;
    publishingRef.current = true;
    let publishingStarted = false;
    try {
    if(blockIfWeekMismatch()) return;
    if(publishing) return;
    if(jobs.length===0){ showToast('Nessun turno da pubblicare','warn'); return; }

    // EMERGENCY PATCH — hard gate (MICRO-CORRECTION #4). Never trust a stale
    // hardValidation computed at generation time: the supervisor may have edited the
    // plan manually (or reassigned cleaners) since then, so this is always recalculated
    // against the CURRENT jobs/constraints right before publish.
    if(!guardScheduleHardValidationOrBlock(jobs, weekOffset, showToast)) return;

    const bypassOverwriteModal = skipOverwriteModal === true;
    if(serverVersionChanged && !bypassOverwriteModal){
      setModal('overwriteDiff');
      return;
    }

    let supervisorName = getSupervisorName();
    if(!supervisorName){
      const entered = prompt('Il tuo nome supervisor (apparirà sul piano pubblicato):', '');
      supervisorName = (entered||'').trim();
      if(!supervisorName){
        showToast('Inserisci il tuo nome per pubblicare','warn');
        return;
      }
      setSupervisorName(supervisorName);
      setSupervisorNameUI(supervisorName);
    }

    const issueCount = jobs.filter(j => (conflicts && conflicts.has && conflicts.has(j.id)) || j.status==='needs_review').length;
    const unassignedCount = jobs.filter(j => (j.cleanerIds||[]).length===0).length;
    const overwriteWarning = serverVersionChanged
      ? `⚠️ ATTENZIONE: questa settimana è stata pubblicata da un altro dispositivo dopo che l'hai caricata.\n`+
        `Se continui, SOVRASCRIVI la loro versione più recente con la tua.\n`+
        `Controlla di non perdere modifiche altrui prima di procedere.\n\n`
      : '';
    const confirmMsg =
      overwriteWarning +
      `Stai pubblicando il piano della settimana ${fmtWeek(weekOffset)}.\n`+
      `Turni: ${jobs.length}\n`+
      `Da rivedere/conflitti: ${issueCount}\n`+
      `Non assegnati: ${unassignedCount}\n`+
      `Supervisor: ${supervisorName}\n\n`+
      `Dopo la pubblicazione sarà visibile anche dagli altri dispositivi.\n`+
      `Continuare?`;
    if(!confirm(confirmMsg)) return;

    const weekStartISO = getWeekStartISO(weekOffset);
    const weekEndISO   = getWeekEndISO(weekOffset);
    const baseSnapshotId = publishedJobsSnapshot?.meta?.snapshotId || null;
    setPublishing(true);
    publishingStarted = true;
    console.log('[publish] sending', { weekStartISO, weekEndISO, jobsCount: jobs.length, baseSnapshotId });
    const result = await publishScheduleToBackend(weekStartISO, weekEndISO, supervisorName, jobs, baseSnapshotId);
    console.log('[publish] result', result);
    if(result && result.error==='conflict'){
      const who = result.currentPublishedBy || 'un altro supervisor';
      const when = result.currentPublishedAt ? new Date(result.currentPublishedAt).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) : '—';
      showToast(`Questa settimana è stata pubblicata da ${who} alle ${when}. Ricarico la versione aggiornata…`, 'error');
      const fresh = await fetchPublishedSchedule(weekStartISO);
      if(fresh && fresh.ok && fresh.exists){
        setPublishedJobsSnapshot({
          jobs: fresh.jobs,
          meta: {
            snapshotId: fresh.snapshotId,
            publishedAt: fresh.publishedAt,
            publishedBy: fresh.publishedBy,
            weekStartISO: fresh.weekStartISO,
            weekEndISO: fresh.weekEndISO,
          },
        });
      }
      markPendingOverwriteWarning(weekStartISO);
      setServerVersionChanged(true);
      return;
    }
    if(!result.ok){
      showToast('Errore pubblicazione: ' + (result.error||'sconosciuto'), 'error');
      return;
    }
    const meta = {
      snapshotId: result.snapshotId,
      publishedAt: result.publishedAt,
      publishedBy: supervisorName,
      weekStartISO: result.weekStartISO,
      weekEndISO: result.weekEndISO,
    };
    setPublishedJobsSnapshot({ jobs: jobs.map(j=>({...j})), meta });
    setPublishedStatus('loaded');
    setPlanningWeekOffset(weekOffset);
    setDraftRestored(false);
    setServerVersionChanged(false);
    clearDraft(weekStartISO);
    clearPendingOverwriteWarning(weekStartISO);
    saveLastMinuteJobs(jobs, weekOffset);
    const hhmm = new Date(result.publishedAt).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    showToast(`✓ Turni pubblicati alle ${hhmm} — visibili su altri dispositivi`);
    } catch(e) {
      console.error('[publishCurrentSchedule] Failed', e);
      showToast('Errore pubblicazione: ' + String(e.message||e), 'error');
    } finally {
      publishingRef.current = false;
      if(publishingStarted) setPublishing(false);
    }
  };

  // ─── Discard local draft and restore last published snapshot ─────────────
  const discardLocalDraft = () => {
    const weekStartISO = getWeekStartISO(weekOffset);
    if(!publishedJobsSnapshot){
      if(!confirm('Scartare il lavoro locale non pubblicato di questa settimana?')) return;
      clearDraft(weekStartISO);
      clearLastMinuteJobsForWeek(weekOffset);
      setJobs([]);
      setDraftRestored(false);
      setServerVersionChanged(false);
      clearPendingOverwriteWarning(weekStartISO);
      setWf({templateLoaded:false,hostawayLoaded:false,shiftsGenerated:false,staleGeneration:false});
      setPlanningWeekOffset(null);
      showToast('Lavoro locale scartato');
      return;
    }
    if(!confirm('Scartare la bozza locale e tornare al piano pubblicato?')) return;
    clearDraft(weekStartISO);
    clearLastMinuteJobsForWeek(weekOffset);
    setJobs(publishedJobsSnapshot.jobs.map(j=>({...j})));
    setDraftRestored(false);
    setServerVersionChanged(false);
    clearPendingOverwriteWarning(weekStartISO);
    showToast('Bozza locale scartata — ripristinato piano pubblicato');
  };

  const refreshSheetData = async () => {
    if(blockIfWeekMismatch()) return;
    if(sheetLoading) return;
    setSheetLoading(true);
    try{
      const data = await loadSheetData(weekOffset);
      const loaded=[];
      if(data.cleaners){
        CLEANERS=data.cleaners;
        const newColors={};
        data.cleaners.forEach((cl,i)=>{newColors[cl.id]=CL_PALETTE[i%CL_PALETTE.length];});
        CL_COLOR=newColors;
        loaded.push('Cleaners: '+data.cleaners.length);
      }
      if(data.properties){
        PROPERTIES=data.properties;
        PROP_NAME_MAP=Object.fromEntries(data.properties.map(p=>[p.name.toLowerCase(),p.id]));
        loaded.push('Properties: '+data.properties.length);
      }
      if(data.training){ TRAINING=data.training; }
      if(data.template){ SHEET_TEMPLATE=data.template; }
      if(data.hostawayMap){ Object.assign(PROP_NAME_MAP, data.hostawayMap); }
      if(data.hostawayMapById){ HOSTAWAY_MAP_BY_ID = data.hostawayMapById; }
      TRAVEL_BUFFERS = data.travelBuffers || {};
      if(data.templateDiagnostics) setTemplateDiagnostics(data.templateDiagnostics);
      if(data.extraDuties){
        EXTRA_DUTIES=data.extraDuties;
        loaded.push('Extra Duties: '+data.extraDuties.length);
      } else {
        EXTRA_DUTIES=[];
      }
      if(data.extraDutiesDiagnostics) setExtraDutiesDiagnostics(data.extraDutiesDiagnostics);
      const lmJobs = cleanRestoredJobs(loadLastMinuteJobs(weekOffset), 'last_minute refreshSheetData');
      console.log('[CleanFlow restore path]','last_minute refreshSheetData',{before:loadLastMinuteJobs(weekOffset).length,after:lmJobs.length});
      if(lmJobs.length>0){
        setJobs(prev=>{
          const existingIds = new Set(prev.map(j=>j.id));
          const newLm = lmJobs.filter(j=>!existingIds.has(j.id));
          return newLm.length>0 ? [...prev,...newLm] : prev;
        });
      }

      setJobs(prev=>{
        if(prev.length===0) return prev;
        return mergeRefreshedExtraDutiesIntoJobs(prev, data.extraDuties||[]);
      });

      setWf(w=>w.shiftsGenerated?{...w,staleGeneration:true}:w);

      const failedTabs2=[];
      if(!data.cleaners) failedTabs2.push('Cleaners'); if(!data.properties) failedTabs2.push('Properties');
      if(!data.training) failedTabs2.push('Training'); if(!data.template) failedTabs2.push('Template');
      const criticalOk=failedTabs2.length===0;
      setSheetStatus(loaded.length>0?(criticalOk?'ok':'warn'):'error');
      setSheetInfo(loaded.join(' · ')+(criticalOk?'':' ⚠️ Mancanti: '+failedTabs2.join(', ')));
      setDataVersion(v=>v+1);
      showToast('✓ Dati aggiornati da Google Sheet');
    }catch(e){
      showToast('Errore aggiornamento dati','error');
    } finally {
      setSheetLoading(false);
    }
  };

  const prevJobsRef = React.useRef([]);
  useEffect(()=>{
    if(!initialLoadDoneRef.current){ prevJobsRef.current = jobs; return; }
    const hasLm = jobs.some(j=>j.source==='last_minute');
    const hadLm = prevJobsRef.current.some(j=>j.source==='last_minute');
    if(hasLm||hadLm) saveLastMinuteJobs(jobs, weekOffset);
    prevJobsRef.current = jobs;
  },[jobs, weekOffset]);

  // ── LAST MINUTE: FIND SOLUTION ────────────────────────────────────────────
  const findSolution=async(job)=>{
    if(blockIfWeekMismatch()) return;
    try{
      if(!job||!job.id){
        showToast('Turno non valido — impossibile trovare soluzione','error'); return;
      }
      if(!job.startTime||!/^\d{1,2}:\d{2}$/.test(String(job.startTime))){
        console.error('[Trova soluzione] Invalid job startTime',job);
        showToast('Turno senza orario valido — impossibile trovare soluzione','error'); return;
      }
      if(!Array.isArray(CLEANERS)||CLEANERS.length===0){
        showToast('Cleaners non caricati — premi Aggiorna dati','error'); return;
      }
      const options=buildLocalAssignmentOptions(job,jobs,weekOffset);
      setLmSolverResult({options,aiText:null,loading:AI_ENABLED,jobId:job.id});
      setModal('solver');
      if(!AI_ENABLED) return;
      const apiKey=getGeminiKey();
      if(apiKey){
        const aiText=await explainLocalLastMinuteOptionsWithAI(options,apiKey);
        setLmSolverResult(prev=>prev?{...prev,aiText:aiText||null,loading:false}:prev);
      } else {
        setLmSolverResult(prev=>prev?{...prev,loading:false}:prev);
      }
    }catch(e){
      console.error('[Trova soluzione] Failed',{job,jobsCount:jobs?.length,cleanersCount:CLEANERS?.length,weekOffset,error:e});
      showToast('Errore Trova soluzione: controlla console','error');
    }
  };

  // ── LAST MINUTE: APPLY SOLUTION ───────────────────────────────────────────
  const applySolverAction=(action)=>{
    if(!action||action.type!=='assign') return;
    if(blockIfWeekMismatch()) return;
    const cleanIds = dedupeCleanerIds(action.cleanerIds);
    const currentJob = jobs.find(j=>j.id===action.jobId);
    const currentIds = dedupeCleanerIds(currentJob?.cleanerIds);
    const isNoOp = currentIds.length===cleanIds.length
      && [...currentIds].sort().join(',')===[...cleanIds].sort().join(',');
    if(isNoOp){
      showToast(currentIds.length===1?'Cleaner già presente nel turno':'Nessuna modifica applicata','warn');
      setModal(null);
      setLmSolverResult(null);
      return;
    }
    setJobs(prev=>prev.map(j=>{
      if(j.id!==action.jobId) return j;
      // Stamp rescue metadata if this action came from a rescue split option.
      const isRescue = !!(lmSolverResult?.options?.rescueOptions?.some(ro=>ro.targetJobId===action.jobId));
      const updated={...j,cleanerIds:cleanIds,...(isRescue?{rescueUsed:true,schedulerDecisionCode:'rescue_split'}:{})};
      const required=getJobRequiredCleaners(updated);
      const countOk=cleanIds.length>=required;
      const genderOk=genderRequirementMet(updated, cleanIds);
      updated.status=(countOk && genderOk)?'assigned':'needs_review';
      return updated;
    }));
    setModal(null);
    setLmSolverResult(null);
    showToast('✓ Cleaner assegnata');
  };

  // ── LAST MINUTE MODAL ─────────────────────────────────────────────────────
  const openLastMinuteModal=()=>{
    if(blockIfWeekMismatch()) return;
    const todayDates=getWeekDates(weekOffset);
    const todayISO=toISODateLocal(new Date());
    const inWeek=todayDates.find(d=>toISODateLocal(d)===todayISO);
    const defaultDate=inWeek?todayISO:toISODateLocal(todayDates[0]);
    const defaultDayIdx=todayDates.findIndex(d=>toISODateLocal(d)===defaultDate);
    const defaultDay=DAYS[defaultDayIdx>=0?defaultDayIdx:0];
    setLmForm({
      dateISO:defaultDate,day:defaultDay||selDay||'Mon',
      propertyId:'',temporaryLocationName:'',
      serviceTypeId:'OFFICE_CLEAN',startTime:'15:00',
      duration:3,cleanersRequired:1,
      cleaner1:'',cleaner2:'',cleaner3:'',
      priority:'High',note:'Last minute request',error:'',
    });
    setModal('lastminute');
  };

  const isDateInSelectedWeek=(dateISO,wo)=>{
    if(!dateISO) return false;
    const w=getWeekDates(wo);
    return dateISO>=toISODateLocal(w[0]) && dateISO<=toISODateLocal(w[6]);
  };

  const getPreviewJobIssues=(previewJob,allJobs)=>{
    const previewConflicts=detectConflicts(allJobs);
    const directIssues=previewConflicts.get(previewJob.id)||[];
    const pS=t2m(previewJob.startTime);
    const pE=getJobOperationalEndMinutes(previewJob);
    const overlapIssues=[];
    (previewJob.cleanerIds||[]).forEach(cId=>{
      const cl=CLEANERS.find(c=>c.id===cId);
      allJobs
        .filter(j=>j.id!==previewJob.id && j.day===previewJob.day && (j.cleanerIds||[]).includes(cId))
        .forEach(j=>{
          const jS=getCleanerOperationalStartMinutes(j,cId);
          const jE=getCleanerOperationalEndMinutes(j,cId);
          if(pS<jE && pE>jS){
            overlapIssues.push({
              type:'overlap',
              cId,
              msg:`${cl?.name||cId}: overlap con ${getJobDisplayName(j)} (${m2t(jS)}–${m2t(jE)})`,
            });
          } else {
            const issue=getTravelBufferIssue(cl?.name||cId, j, previewJob, cId);
            if(issue) overlapIssues.push({ type:'travel', cId, msg:issue.msg });
          }
        });
    });
    const seen=new Set();
    return [...directIssues,...overlapIssues].filter(issue=>{
      const key=`${issue.type}|${issue.cId||''}|${issue.msg}`;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  };

  const saveLmJob=()=>{
    if(!lmForm) return;
    if(blockIfWeekMismatch()) return;
    if(!lmForm.propertyId&&!lmForm.temporaryLocationName.trim()){
      setLmForm(f=>({...f,error:'Inserisci una proprietà o una location temporanea.'})); return;
    }
    if(!lmForm.duration||Number(lmForm.duration)<=0){
      setLmForm(f=>({...f,error:'Duration deve essere > 0.'})); return;
    }
    if(Number(lmForm.cleanersRequired)<1){
      setLmForm(f=>({...f,error:'Cleaners richiesti deve essere ≥ 1.'})); return;
    }
    if(!/^\d{1,2}:\d{2}$/.test(lmForm.startTime)){
      setLmForm(f=>({...f,error:'Formato orario non valido (usa HH:MM).'})); return;
    }
    if(!isDateInSelectedWeek(lmForm.dateISO,weekOffset)){
      const w=getWeekDates(weekOffset);
      const monISO=toISODateLocal(w[0]);
      const sunISO=toISODateLocal(w[6]);
      setLmForm(f=>({...f,error:`La data deve essere dentro la settimana selezionata (${monISO} → ${sunISO}).`}));
      return;
    }
    const rawCleaners=[lmForm.cleaner1,lmForm.cleaner2,lmForm.cleaner3]
      .filter(Boolean).map(v=>CLEANERS.find(c=>c.id===v)?.id).filter(Boolean);
    const uniqueCleaners=dedupeCleanerIds(rawCleaners);
    const requiredCleaners=Number(lmForm.cleanersRequired);
    const prop=PROPERTIES.find(p=>p.id===lmForm.propertyId);
    const displayName=prop?.name||lmForm.temporaryLocationName.trim();
    const baseFields={
      source:'last_minute',type:'last_minute',
      day:lmForm.day,dateISO:lmForm.dateISO,
      propertyId:lmForm.propertyId||'',
      temporaryLocationName:lmForm.temporaryLocationName.trim(),
      displayName,serviceTypeId:lmForm.serviceTypeId,
      startTime:lmForm.startTime,duration:Number(lmForm.duration),
      cleanersRequired:requiredCleaners,
      cleanerIds:uniqueCleaners,priority:lmForm.priority,note:lmForm.note,
    };
    baseFields.status = calcJobStatus(baseFields);
    const previewId=lmForm.editingJobId||'preview_last_minute_'+Date.now();
    const previewJob={id:previewId,...baseFields};
    const previewJobs=[...jobs.filter(j=>j.id!==previewId),previewJob];
    const previewKey=getJobOperationalKey(previewJob);
    const dupExists=jobs.some(j=>j.id!==lmForm.editingJobId && getJobOperationalKey(j)===previewKey);
    if(dupExists){
      if(!confirm('Esiste già un turno con stessa data, orario, location, service type e durata. Vuoi salvarlo comunque?')) return;
    }
    const issues=getPreviewJobIssues(previewJob,previewJobs);
    if(issues.length>0){
      const msg=`Questo last minute crea ${issues.length} conflitto/i:\n- ${issues.map(i=>i.msg||i.type||JSON.stringify(i)).join('\n- ')}\n\nVuoi salvarlo comunque?`;
      if(!confirm(msg)) return;
    }
    if(lmForm.editingJobId){
      setJobs(prev=>prev.map(j=>j.id===lmForm.editingJobId?{...j,...baseFields,id:j.id}:j));
      setModal(null);
      showToast('✓ Last minute aggiornato');
      return;
    }
    const job={id:uid(),...baseFields};
    setJobs(prev=>[...prev,job]);
    setModal(null);
    showToast('✓ Richiesta last minute aggiunta');
  };

  const doLoadTemplate=async(merge=false)=>{
    if(blockIfWeekMismatch()) return;
    if(!dataReady){
      showToast('Google Sheet non pronto — premi Aggiorna dati o attendi il caricamento.','error');
      return;
    }
    if(!SHEET_TEMPLATE.length){
      showToast('Template non disponibile — premi Aggiorna dati prima di caricare.','error');
      return;
    }
    const loaded=[];
    if(CLEANERS.length) loaded.push('Cleaners: '+CLEANERS.length);
    if(PROPERTIES.length) loaded.push('Properties: '+PROPERTIES.length);
    if(Object.keys(TRAINING).length) loaded.push('Training: '+Object.keys(TRAINING).length+' cleaners');
    if(SHEET_TEMPLATE.length) loaded.push('Template: '+SHEET_TEMPLATE.length+' turni');
    if(EXTRA_DUTIES.length) loaded.push('Extra Duties: '+EXTRA_DUTIES.length);
    const tplDates=getWeekDates(weekOffset);
    const templateJobs=SHEET_TEMPLATE.map(r=>{
      const dayIdx=DAYS.indexOf(r.day);
      const dateISO=dayIdx>=0?toISODateLocal(tplDates[dayIdx]):'';
      const job={...r,id:uid(),source:'template',dateISO};
      return {...job,status:calcJobStatus(job)};
    });
    const extraJobs=EXTRA_DUTIES.map(r=>{
      const job={...r,id:r.id||uid(),source:'extra',type:'extra'};
      return {...job,status:calcJobStatus(job)};
    });
    setJobs(prev=>{
      const NON_TEMPLATE = j => j.source!=='template';
      let base;
      if(merge){
        base = prev;
      } else {
        base = prev.filter(NON_TEMPLATE);
      }
      const toAddTemplate=templateJobs.filter(nj=>!base.some(e=>e.propertyId===nj.propertyId&&e.day===nj.day&&e.startTime===nj.startTime&&e.source==='template'));
      const toAddExtra=extraJobs.filter(nj=>!base.some(e=>e.source==='extra'&&e.dateISO===nj.dateISO&&e.displayName===nj.displayName&&e.startTime===nj.startTime));
      return [...base,...toAddTemplate,...toAddExtra];
    });
    setWf(w=>({...w,templateLoaded:true,staleGeneration:w.shiftsGenerated?true:w.staleGeneration}));
    setPlanningWeekOffset(weekOffset);
    setModal(null);
    showToast(`✓ Template caricato${merge?' (merge)':''}${EXTRA_DUTIES.length>0?' · '+EXTRA_DUTIES.length+' extra duties':''}`);
  };

  // ── HOSTAWAY IMPORT (source-aware, with stale guard) ──
  const doImportHostaway=(rows)=>{
    if(blockIfWeekMismatch()) return;
    if(!rows || rows.length===0){ showToast('Nessun turno da importare','warn'); return; }

    const importSource = rows[0]?.source==='hostaway_csv' ? 'hostaway_csv' : 'hostaway_api';
    const otherSource  = importSource==='hostaway_api' ? 'hostaway_csv' : 'hostaway_api';

    const weekStartISO=getWeekStartISO(weekOffset);
    const weekEndISO  =getWeekEndISO(weekOffset);
    const inWeek = iso => iso && iso>=weekStartISO && iso<=weekEndISO;

    const otherInWeek = jobs.filter(j=>j.source===otherSource && inWeek(j.dateISO));
    if(otherInWeek.length>0){
      const otherLabel = otherSource==='hostaway_api' ? 'API Hostaway' : 'CSV';
      const thisLabel  = importSource==='hostaway_api' ? 'API Hostaway' : 'CSV';
      const ok = window.confirm(`Per questa settimana ci sono già ${otherInWeek.length} turni da ${otherLabel}. Importando da ${thisLabel} verranno rimossi e sostituiti con questi. Continuare?`);
      if(!ok) return;
    }

    const incoming = rows.map(r=>({
      ...r,
      id:uid(),
      source: importSource,
      status:'unassigned'
    }));

    const isSameJob = (a,b) =>
      a.dateISO===b.dateISO &&
      a.propertyId===b.propertyId &&
      a.startTime===b.startTime;

    setJobs(prev=>{
      const kept = prev.filter(j=>{
        const isHostaway = j.source==='hostaway_api' || j.source==='hostaway_csv';
        if(isHostaway && inWeek(j.dateISO)) return false;
        return true;
      });
      const toAdd = incoming.filter(nj => !kept.some(e => isSameJob(e,nj) && (e.source==='hostaway_api'||e.source==='hostaway_csv')));
      return [...kept, ...toAdd];
    });

    setWf(w=>({
      ...w,
      hostawayLoaded:true,
      hostawaySource:importSource,
      staleGeneration:w.shiftsGenerated?true:w.staleGeneration
    }));

    if(planningWeekOffset===null) setPlanningWeekOffset(weekOffset);
    setModal(null);

    const srcLabel = importSource==='hostaway_api' ? 'Hostaway API' : 'CSV';
    showToast(`✓ ${incoming.length} turni importati da ${srcLabel}`);
  };

  // ── AUTO-SCHEDULE ──
  const handleGenerate=(startDay, endDay)=>{
    if(planningWeekOffset!==null && planningWeekOffset!==weekOffset){
      showToast('Settimana non allineata — torna alla settimana caricata o sostituisci con questa settimana','error');
      return;
    }
    if(!dataReady){showToast('Sheet incompleto — controlla i dati prima di generare','error');return;}
    if(!wf.templateLoaded){showToast('Carica prima il Default Template','warn');return;}
    if(!wf.hostawayLoaded){showToast('Importa prima Hostaway API (o CSV come fallback)','warn');return;}
    if(jobs.length===0){showToast('Carica prima il template o importa da Hostaway','warn');return;}
    if(!startDay){ setGenerateResult(null); setModal('generateResult'); return; }
    try{
      const isFullyAssigned = job => (job.cleanerIds||[]).length >= getJobRequiredCleaners(job);
      const startIdx=DAYS.indexOf(startDay);
      const endIdx  =endDay?DAYS.indexOf(endDay):6;
      const keepBefore=jobs.filter(j=>DAYS.indexOf(j.day)<startIdx);
      const keepAfter =jobs.filter(j=>DAYS.indexOf(j.day)>endIdx);
      const regenJobs =jobs.filter(j=>{const i=DAYS.indexOf(j.day);return i>=startIdx&&i<=endIdx;});
      const lockedJobs=regenJobs.filter(j=>j.type==='template'&&isFullyAssigned(j));
      const jobsToRegen=regenJobs.filter(j=>!(j.type==='template'&&isFullyAssigned(j)));
      const prepared=jobsToRegen.map(j=>{
        const assignedCount=(j.cleanerIds||[]).length;
        const required=getJobRequiredCleaners(j);
        if(assignedCount===0) return {...j,cleanerIds:[],status:'unassigned'};
        if(assignedCount<required) return {...j,status:'needs_review'};
        return {...j,status:'assigned'};
      });
      const result=runAutoSchedule([...keepBefore,...lockedJobs,...prepared,...keepAfter], weekOffset);
      const finalJobs=[
        ...keepBefore,
        ...lockedJobs.map(j=>({...j,status:isFullyAssigned(j)?'assigned':'needs_review'})),
        ...result.jobs.filter(j=>{const i=DAYS.indexOf(j.day);return i>=startIdx&&i<=endIdx&&!(j.type==='template'&&lockedJobs.some(l=>l.id===j.id));}),
        ...keepAfter,
      ];
      setGenerateResult({...result,jobs:finalJobs,startDay,endDay:endDay||'Sun',weekOffset});
      setModal('generateResult');
    }catch(e){
      console.error('runAutoSchedule error:',e);
      showToast('Errore nella generazione: '+e.message,'error');
    }
  };

  const applyGenerate=()=>{
    if(!generateResult) return;
    if(blockIfWeekMismatch()) return;
    if(generateResult.weekOffset!==undefined && generateResult.weekOffset!==weekOffset){
      showToast('Settimana non allineata — rigenera i turni per questa settimana','error');
      return;
    }
    setJobs(generateResult.jobs);
    setWf(w=>({...w,shiftsGenerated:true,staleGeneration:false}));
    setModal(null);
    setGenerateResult(null);
    const nr=generateResult.jobs.filter(j=>j.status==='needs_review').length;
    const sw=generateResult.jobs.filter(j=>j.softLimitWarning).length;
    const fb=generateResult.jobs.filter(j=>j.fallbackUsed).length;
    const fbNote=fb>0?` · Fallback usato su ${fb} checkout`:'';
    const msg = nr>0
      ? '⚡ Turni generati · '+nr+' da rivedere'+(sw>0?' · '+sw+' limite soft':'')+fbNote
      : sw>0 ? '⚡ Turni generati · '+sw+' con limite soft'+fbNote : fb>0?'⚡ Tutti i turni assegnati'+fbNote:'⚡ Tutti i turni assegnati!';
    showToast(msg,(nr>0||sw>0)?'warn':'ok');
  };

  // Validate AI actions before applying
  const validateAIAction = (act, currentJobs) => {
    const errors=[];
    const prop=PROPERTIES.find(p=>p.id===act.propertyId);
    if(!['add','reassign','remove'].includes(act.type)) errors.push('Tipo azione non valido');
    if(!prop) errors.push('Proprietà non trovata: '+act.propertyId);
    if(!DAYS.includes(act.day)) errors.push('Giorno non valido: '+act.day);
    if(act.type!=='remove'&&!/^\d{2}:\d{2}$/.test(act.startTime||'')) errors.push('Orario non valido: '+act.startTime);
    const existingJob=(currentJobs||[]).find(j=>j.propertyId===act.propertyId&&j.day===act.day&&j.startTime===act.startTime);
    if((act.type==='reassign'||act.type==='remove')&&!existingJob) errors.push('Turno non trovato per modifica/rimozione');
    if(act.type==='remove'&&existingJob?.type==='template') errors.push('Non è possibile rimuovere turni template tramite AI');
    if(act.type!=='remove'){
      const required=prop?.cleanersRequired||1;
      if((act.cleanerIds||[]).length<required) errors.push(`Servono ${required} cleaners per ${prop?.name||act.propertyId}`);
      (act.cleanerIds||[]).forEach(cid=>{
        if(!CLEANERS.some(c=>c.id===cid)) errors.push('Cleaner non trovata: '+cid);
        else if(!TRAINING[cid]?.includes(act.propertyId)) errors.push(CLEANERS.find(c=>c.id===cid)?.name+' non formata per '+prop?.name);
      });
    }
    return errors;
  };

  // Apply AI-suggested actions directly to jobs
  const applySuggestion=useCallback((actions)=>{
    if(!actions?.length) return false;
    if(blockIfWeekMismatch()) return false;
    const validationErrors=actions.flatMap((act,i)=>validateAIAction(act,jobs).map(e=>`Azione ${i+1}: ${e}`));
    if(validationErrors.length>0){ showToast('⚠️ '+validationErrors[0],'error'); return false; }
    setJobs(prev=>{
      let updated=[...prev];
      actions.forEach(act=>{
        if(act.type==='add'){
          const exists=updated.some(j=>j.propertyId===act.propertyId&&j.day===act.day&&j.startTime===act.startTime);
          if(!exists){
            const newJob={id:uid(),propertyId:act.propertyId,day:act.day,dateISO:getDateISOForDay(act.day,weekOffset),startTime:act.startTime,cleanerIds:act.cleanerIds||[],note:act.note||'AI suggerimento',type:'extra',source:'ai'};
            updated=[...updated,{...newJob,status:calcJobStatus(newJob)}];
          }
        } else if(act.type==='reassign'){
          updated=updated.map(j=>{
            if(!(j.propertyId===act.propertyId&&j.day===act.day&&j.startTime===act.startTime)) return j;
            const changed={...j,cleanerIds:act.cleanerIds||[]};
            return {...changed,status:calcJobStatus(changed)};
          });
        } else if(act.type==='remove'){
          updated=updated.filter(j=>!(j.propertyId===act.propertyId&&j.day===act.day&&j.startTime===act.startTime));
        }
      });
      return updated;
    });
    setWf(w=>({...w}));
    showToast(`✓ ${actions.length} ${actions.length===1?'modifica applicata':'modifiche applicate'} dall'AI`);
    return true;
  },[jobs,showToast,weekOffset,blockIfWeekMismatch]);

  const goToConflictDay=useCallback((day)=>{
    setSelDay(day);setTab('day');setHighlightJob(null);
    if(conflictNavTimer.current)clearTimeout(conflictNavTimer.current);
    conflictNavTimer.current=setTimeout(()=>{const f=jobs.find(j=>j.day===day&&conflicts.has(j.id));if(f)setHighlightJob(f.id);},50);
  },[jobs,conflicts]);

  const sendChat=async()=>{
    if(!AI_ENABLED) return;
    if(!chatIn.trim()||aiLoad) return;
    if(blockIfWeekMismatch()) return;
    const apiKey = getGeminiKey();
    if(!apiKey){ setModal('apikey'); return; }
    const txt=chatIn.trim();setChatIn('');
    setMsgs(p=>[...p,{role:'user',text:txt}]);setAiLoad(true);

    const callGemini=async(retries=2,delayMs=1500)=>{
      const sysPrompt=buildSystemPrompt(jobs,weekOffset);
      const recentHistory=msgs.slice(-10);
      const contents=recentHistory.map(m=>({
        role:m.role==='assistant'?'model':'user',
        parts:[{text:m.text.replace(/\[AZIONI\][\s\S]*?\[\/AZIONI\]/g,'').trim()}]
      }));
      contents.push({role:'user',parts:[{text:txt}]});
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
        {method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            system_instruction:{parts:[{text:sysPrompt}]},
            contents,
            generationConfig:{maxOutputTokens:1800},
          })}
      );
      if((res.status===429||res.status===403||res.status===503||res.status===502)&&retries>0){
        await new Promise(r=>setTimeout(r,delayMs));
        return callGemini(retries-1,delayMs*1.5);
      }
      if(!res.ok){
        let errMsg='Errore '+res.status;
        try{const errBody=await res.json();const geminiMsg=errBody?.error?.message;if(geminiMsg)errMsg=geminiMsg;console.error('[Gemini]',res.status,errBody);}catch{}
        if(res.status===400) errMsg='API key non valida — controlla nelle impostazioni.';
        else if(res.status===429) errMsg='Quota Gemini esaurita (429) — attendi qualche minuto o usa una key diversa.';
        else if(res.status===503||res.status===502) errMsg='AI momentaneamente sovraccarica — riprova tra qualche minuto.';
        throw new Error(errMsg);
      }
      const data=await res.json();
      const candidate=data?.candidates?.[0];
      const finishReason=candidate?.finishReason;
      const text=(candidate?.content?.parts||[]).map(p=>p.text||'').join('').trim();

      if(!text) throw new Error('Risposta vuota o incompleta — riprova.');

      if(finishReason && finishReason!=='STOP'){
        throw new Error(`Risposta AI interrotta (${finishReason}) — riprova con una richiesta più breve.`);
      }

      const lastWord=text.split(/\s+/).pop()||'';
      const INCOMPLETE_WORDS=new Set(['la','il','lo','le','gli','una','un','di','a','per','con','che','e','è','ma','se','o','in','su','da']);
      const endsWithPunct=/[.!?\]}`'"»]$/.test(text);
      if(!endsWithPunct && INCOMPLETE_WORDS.has(lastWord.toLowerCase().replace(/[^a-zàèéìòù]/g,''))){
        throw new Error('Risposta AI incompleta — riprova. (La risposta si è interrotta a metà frase)');
      }

      return text;
    };

    try{
      const reply=await callGemini();
      setMsgs(p=>[...p,{role:'assistant',text:reply}]);
    }catch(e){
      setMsgs(p=>[...p,{role:'assistant',text:e.message||'Errore di rete. Riprova.'}]);
    } finally {
      setAiLoad(false);
    }
  };

  const buildConflictPrompt=(job,errs)=>{
    const name=getJobDisplayName(job);
    const end=m2t(getJobOperationalEndMinutes(job));
    return `Sei l'assistente scheduling di CleanFlow. Rispondi in italiano.\nRispondi ESATTAMENTE con 3 righe, senza intro, senza markdown, senza JSON:\nSoluzione consigliata: ...\nAlternativa: ...\nPerché: ...\n\nConflitto:\n${DAY_FULL[job.day]} — ${name} ${job.startTime}–${end}\n${errs.map(e=>'- '+e).join('\n')}`;
  };

  const sendQuickConflictAI=async(job,errs)=>{
    if(!AI_ENABLED) return;
    if(blockIfWeekMismatch()) return;
    const apiKey=getGeminiKey();
    if(!apiKey){setModal('apikey');return;}
    const prompt=buildConflictPrompt(job,errs);
    const userMsg=`Ho un conflitto ${DAY_FULL[job.day]} per ${getJobDisplayName(job)} (${job.startTime}–${m2t(getJobOperationalEndMinutes(job))}):\n${errs.map(e=>'• '+e).join('\n')}`;
    setTab('chat');
    setMsgs(p=>[...p,{role:'user',text:userMsg}]);
    setAiLoad(true);
    try{
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
        {method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            contents:[{role:'user',parts:[{text:prompt}]}],
            generationConfig:{maxOutputTokens:250,temperature:0.1},
          })}
      );
      if(!res.ok){
        let errMsg='Errore AI '+res.status;
        try{const b=await res.json();if(b?.error?.message)errMsg=b.error.message;}catch{}
        throw new Error(errMsg);
      }
      const data=await res.json();
      const candidate=data?.candidates?.[0];
      const finishReason=candidate?.finishReason;
      const text=(candidate?.content?.parts||[]).map(p=>p.text||'').join('').trim();

      if(!text) throw new Error('Risposta vuota — riprova.');

      if(finishReason && finishReason!=='STOP'){
        console.warn('[QuickAI] finishReason:', finishReason);
        throw new Error('AI non ha completato la risposta. Riprova o usa il fallback manuale.');
      }

      const hasFormat = text.includes('Soluzione consigliata:')
        && text.includes('Alternativa:')
        && text.includes('Perché:');
      if(!hasFormat) throw new Error('Risposta AI non valida — riprova.');

      setMsgs(p=>[...p,{role:'assistant',text}]);
    }catch(e){
      setMsgs(p=>[...p,{role:'assistant',text:e.message||'Errore AI. Riprova.'}]);

    }

    const overrideIds = Object.keys(job.cleanerTimeOverrides || {});
    if(overrideIds.length===0 || !Array.isArray(job.earlyLeaveSuggestions) || job.earlyLeaveSuggestions.length===0) return job;
    const filtered = job.earlyLeaveSuggestions.filter(s => !overrideIds.includes(s.cleanerId));

                  <strong>Fonte:</strong> {ro.donorPropertyName} {ro.donorStartTime}–{ro.donorEndTime}
                  {' '}· team: {ro.donorOriginalTeamNames.join(', ')}
                  {' '}· completato {Math.round(ro.completedPct*100)}%
                </div>
                <div style={{color:'#78350F',marginBottom:2}}>
                  <strong>Rimanenti sulla fonte:</strong> {ro.remainingCleanerNames.join(', ')||'—'}
                </div>
                <div style={{color:'#78350F',marginBottom:2}}>
                  <strong>Target:</strong> {ro.targetPropertyName} {ro.targetStartTime}–{ro.targetEndTime}
                  {' '}· viaggio {ro.travelMinutes} min
                </div>
                <div style={{color:'#78350F',marginBottom:4,display:'flex',gap:12,flexWrap:'wrap'}}>
                  <span>Formazione: {ro.targetTrainingOk?'✓':'✗'}</span>
                  <span>Genere target: {ro.targetGenderOk?'✓':'✗'}</span>
                  <span>Perdita: {Math.round(ro.lostWorkerMinutes/6)/10}h lavoro</span>
                </div>
                {ro.sourceGenderRelaxed&&<div style={{fontSize:11,color:'#92400E',marginBottom:3}}>ℹ️ Requisito genere fonte rilassato (completamento ≥50%)</div>}
                {ro.warnings.map((w,wi)=><div key={wi} style={{fontSize:11,color:'#B91C1C',fontStyle:'italic',marginTop:2}}>⚠️ {w}</div>)}
              </div>
            ))}
          </div>
        )}
        {lmSolverResult.options.escalation&&<div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:10,padding:'12px',marginBottom:10}}>
          <div style={{fontWeight:800,color:'#856404',fontSize:13,marginBottom:4}}>{lmSolverResult.options.rescueOptions?.length>0?'⚠️ Se nessuna Rescue Split è accettabile:':'⚠️ Escalation richiesta'}</div>
          <div style={{fontSize:12,color:'#92400E',marginBottom:6}}>{lmSolverResult.options.escalation.reason}</div>
          {lmSolverResult.options.escalation.options.map((o,i)=><div key={i} style={{fontSize:12,color:'#92400E'}}>• {o}</div>)}
        </div>}
        {/* Rejected */}
        {lmSolverResult.options.rejected?.length>0&&<details style={{marginTop:8}}>
          <summary style={{fontSize:11,color:C.muted,cursor:'pointer'}}>Cleaners non disponibili ({lmSolverResult.options.rejected.length})</summary>
          <div style={{marginTop:6}}>
            {lmSolverResult.options.rejected.map((r,i)=><div key={i} style={{fontSize:11,color:C.muted,padding:'3px 0'}}>• {r.cleanerName}: {r.reason}</div>)}
          </div>
        </details>}
        <button onClick={()=>{setModal(null);setLmSolverResult(null);}} style={{marginTop:12,width:'100%',padding:'10px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Chiudi</button>
      </Modal>}

      {modal==='wiw'&&<Modal onClose={()=>setModal(null)}><WIWExportModal jobs={jobs} weekOffset={weekOffset} wf={wf} conflicts={conflicts} showToast={showToast} planningWeekOffset={planningWeekOffset}/></Modal>}
      {modal==='overwriteDiff'&&<Modal onClose={()=>setModal(null)}><OverwriteDiffModal localJobs={jobs} publishedJobs={publishedJobsSnapshot?.jobs||[]} onClose={()=>setModal(null)} onConfirm={()=>{setModal(null); publishCurrentSchedule(true);}}/></Modal>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);</script></body></html>
