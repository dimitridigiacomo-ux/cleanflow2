// ── CSV PARSER ─────────────────────────────────────────────────────────────────
const parseCSV = text => {
  const rows=[]; let row=[], field='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){if(inQ&&n==='"'){field+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(field.trim());field='';}
    else if((c==='\n'||(c==='\r'&&n==='\n'))&&!inQ){
      if(c==='\r')i++;
      row.push(field.trim());
      if(row.some(f=>f)) rows.push(row);
      row=[];field='';
    } else field+=c;
  }
  if(field||row.length){row.push(field.trim());if(row.some(f=>f))rows.push(row);}
  return rows;
};

// ── SHEET PARSERS ──────────────────────────────────────────────────────────────
// ── Small safe helpers for the expanded Sheet data model ───────────────────
// HH:MM validity (00:00–23:59). Used only to validate new cleaning-window cols.
const isValidHHMM = value => {
  const m = String(value||'').trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return false;
  const h=parseInt(m[1]), min=parseInt(m[2]);
  return h>=0 && h<=23 && min>=0 && min<=59;
};
// Normalize a gender cell to 'm' | 'f' | '' (blank = no constraint).
const normalizeGender = value => {
  const v = String(value||'').trim().toLowerCase();
  if(v==='m'||v==='male'||v==='maschio') return 'm';
  if(v==='f'||v==='female'||v==='femmina') return 'f';
  return '';
};
// Truthy-string parser for boolean Sheet cells.
const parseBool = value => {
  const v = String(value||'').trim().toLowerCase();
  return v==='true'||v==='yes'||v==='y'||v==='1'||v==='si'||v==='sì';
};

const parseCleanersCSV = rows => {
  rows = Array.isArray(rows) ? rows : [];
  // Normalize a header cell: trim, lowercase, strip accents, collapse separators.
  const norm = s => String(s||'')
    .trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // strip accents
    .replace(/[\s_\-\/]+/g,' ').trim();

  // Find the header row: the first row that has an ID-ish header AND a name/type header.
  const ID_ALIASES   = ['id','cleaner id','cleanerid'];
  const NAME_ALIASES = ['full name','fullname','name','cleaner name'];
  const TYPE_ALIASES = ['type'];
  const isHeaderRow = r => {
    const cells=(r||[]).map(norm);
    const has=al=>cells.some(c=>al.includes(c));
    return has(ID_ALIASES) && (has(NAME_ALIASES)||has(TYPE_ALIASES));
  };
  let headerIdx=-1;
  for(let i=0;i<rows.length;i++){ if(isHeaderRow(rows[i])){ headerIdx=i; break; } }

  // Build header→column map (normalized header name → column index).
  const headerMap={};
  if(headerIdx>=0){
    (rows[headerIdx]||[]).forEach((cell,ci)=>{ const n=norm(cell); if(n && !(n in headerMap)) headerMap[n]=ci; });
  }
  // Resolve a column index from a list of aliases; returns -1 if none present.
  const col = aliases => { for(const a of aliases){ if(a in headerMap) return headerMap[a]; } return -1; };

  // Field → header aliases (all normalized: lowercase, no accents, single spaces).
  const IDX = {
    id:          col(['id','cleaner id','cleanerid']),
    name:        col(['full name','fullname','name','cleaner name']),
    type:        col(['type']),
    weekly:      col(['ore settimana','ore settimanali','weeklyhrs','weekly hours','weekly hrs']),
    daily:       col(['ore giorno','ore giornaliere','dailyhrs','daily hours','daily hrs']),
    workable:    col(['max giorni assegnabili','workabledays','giorni lavorabili','workable days']),
    extraReq:    col(['richieste extra','extrarequests','extra requests']),
    extraWeek:   col(['valida per settimana','extraweek','valid week','validforweek','valid for week']),
    gender:      col(['gender','sesso']),
    restTarget:  col(['restdaystarget','rest days target','rest days','giorni riposo','giorni di riposo']),
    offFrom:     col(['offfrom','off from','ferie da','assente da']),
    offTo:       col(['offto','off to','ferie a','assente a']),
    wiwUserId:   col(['wiw user id','wiwuserid','wiw id','when i work user id']),
  };
  // Per-field accessor. IMPORTANT: when a header row WAS detected, read strictly by
  // resolved header column — never fall back to a fixed index for a single missing
  // column (in a reordered sheet that fixed index would point at the WRONG column).
  // Only when NO header was detected do we use the full legacy fixed-index mapping.
  const FALLBACK = { id:0,name:1,type:2,weekly:3,daily:4,workable:5,extraReq:6,extraWeek:7,gender:8,restTarget:9,offFrom:10,offTo:11,wiwUserId:-1 };
  const get = (r,field) => {
    if(headerIdx>=0){ const i = IDX[field]; return i>=0 ? r[i] : undefined; }
    const i = FALLBACK[field]; return i>=0 ? r[i] : undefined;
  };

  // Data rows = valid cleaner IDs only (unchanged filter), regardless of header position.
  const seen=new Set();
  return rows.filter(r=>{ const v=get(r,'id'); return v && /^c\d+$/.test(String(v).trim()); }).filter(r=>{
    const id=String(get(r,'id')).trim(); if(seen.has(id)) return false; seen.add(id); return true;
  }).map((r,i)=>{
    const id=String(get(r,'id')).trim();
    const name=String(get(r,'name')||'').trim();
    const parts=name.split(' ');
    const initials=parts.map(p=>p[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
    // WorkableDays = HARD availability pattern (which weekdays the cleaner CAN work):
    //   5 → Mon–Fri, 6 → Mon–Sat, 7 → any day. Default 7 (most permissive).
    const workableDays=parseInt(get(r,'workable'));
    const wd = (workableDays===5||workableDays===6||workableDays===7) ? workableDays : 7;
    const days = wd===5 ? ['Mon','Tue','Wed','Thu','Fri']
               : wd===6 ? ['Mon','Tue','Wed','Thu','Fri','Sat']
               : DAYS;
    // RestDaysTarget (optional) → soft upper limit of days worked per week.
    //   present  → workDays = 7 - RestDaysTarget
    //   missing  → 5→5, 6→6, 7→6 (7 means "available any day", soft-capped at 6).
    const restTarget=parseInt(get(r,'restTarget'));
    const workDays = !isNaN(restTarget) ? Math.max(0, 7-restTarget)
                   : (wd===7 ? 6 : wd);
    // Optional off/holiday period (OffFrom/OffTo), YYYY-MM-DD.
    const isISO = v => /^\d{4}-\d{2}-\d{2}$/.test(String(v||'').trim());
    const offFrom = isISO(get(r,'offFrom')) ? String(get(r,'offFrom')).trim() : '';
    const offTo   = isISO(get(r,'offTo'))   ? String(get(r,'offTo')).trim()   : '';
    return {
      id, name, initials,
      type:String(get(r,'type')||'full-time').trim(),
      days, // HARD availability (weekday pattern from WorkableDays)
      weeklyHrs:parseFloat(get(r,'weekly'))||40,
      dailyHrs:parseFloat(get(r,'daily'))||8,
      workDays, // SOFT upper limit (days/week), not a must-work target
      extraRequests:String(get(r,'extraReq')||'').trim(),
      extraWeek:String(get(r,'extraWeek')||'').trim(),
      gender: normalizeGender(get(r,'gender')),
      offFrom, offTo,
      wiwUserId:String(get(r,'wiwUserId')||'').trim(), // parsed only, not used elsewhere
    };
  });
};


const parsePropertiesCSV = rows => {
  // New column structure (A–J):
  // r[0]=ID r[1]=Name r[2]=Type
  // r[3]=Checkout Duration r[4]=Checkout Cleaners Required
  // r[5]=Checkin Task Duration r[6]=Checkin Cleaners Required
  // r[7]=Checkout Time r[8]=Checkin Task Time r[9]=Notes
  // Expanded model (K–O), all optional / backward-compatible:
  // r[10]=CleaningWindowStart r[11]=CleaningWindowEnd
  // r[12]=RequiredMaleCleaners r[13]=RequiredFemaleCleaners
  // r[14]=RequiresCheckinClean
  const seen=new Set();
  return rows.filter(r=>r[0]&&/^p\d+$/.test(r[0].trim())).filter(r=>{
    const id=r[0].trim(); if(seen.has(id)) return false; seen.add(id); return true;
  }).map(r=>{
    const rawCheckoutDur=parseFloat(r[3]);
    const hasCheckoutDur=!isNaN(rawCheckoutDur)&&rawCheckoutDur>0;
    const checkoutCleaners=parseInt(r[4])||1;
    const rawCheckinDur=parseFloat(r[5]);
    const checkinTaskDuration=!isNaN(rawCheckinDur)&&rawCheckinDur>0?rawCheckinDur:null;
    const checkinCleaners=parseInt(r[6])||1;
    return {
      id:r[0].trim(),
      name:(r[1]||'').trim(),
      type:(r[2]||'short-let').trim(),
      // Compatibility fields — used by scheduler, conflict engine, UI, export
      duration:hasCheckoutDur?rawCheckoutDur:2,
      durationMissing:!hasCheckoutDur,
      cleanersRequired:checkoutCleaners,
      requires2:checkoutCleaners>=2,
      checkoutTime:(r[7]||'10:00').trim(),
      notes:(r[9]||'').trim(),
      // New explicit fields — available for future use
      checkoutDuration:hasCheckoutDur?rawCheckoutDur:2,
      checkoutCleanersRequired:checkoutCleaners,
      checkinTaskDuration,
      checkinCleanersRequired:checkinCleaners,
      checkinTaskTime:(r[8]||'').trim(),
      // Expanded data model (K–O) — parsed only, NOT yet used by scheduler/export
      cleaningWindowStart: isValidHHMM(r[10]) ? String(r[10]).trim() : '10:00',
      cleaningWindowEnd:   isValidHHMM(r[11]) ? String(r[11]).trim() : '16:00',
      requiredMaleCleaners:   parseInt(r[12])||0,
      requiredFemaleCleaners: parseInt(r[13])||0,
      requiresCheckinClean:   parseBool(r[14]),
      area: (r[15]||'').trim(), // optional zone/area for travel-buffer logic
    };
  });
};

const parseTrainingCSV = rows => {
  // rows[2] = header row: corner | c01\nName | c02\nName | ...
  // rows[3]+ = data: "p01 — Villa Foca" | x | | x | ...
  if(rows.length<3) return {};
  const headers=rows[2]||[];
  // Extract cleaner IDs from header (format "c01\nAnita A." or "c01")
  const clIds=headers.slice(1).map(h=>{
    const m=(h||'').match(/^(c\d+)/);
    return m?m[1]:null;
  }).filter(Boolean);

  const training={};
  rows.slice(3).forEach(row=>{
    if(!row[0]) return;
    // Extract property ID from "p01 — Villa Foca"
    const pm=row[0].match(/^(p\d+)/);
    if(!pm) return;
    const pid=pm[1];
    clIds.forEach((cid,j)=>{
      const val=(row[j+1]||'').trim().toLowerCase();
      if(val==='x'||val==='✓'){
        if(!training[cid]) training[cid]=[];
        if(!training[cid].includes(pid)) training[cid].push(pid);
      }
    });
  });
  return training;
};

const normalizeName = v => (v||'').toString().trim().toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');

const resolvePropertyId = (propRaw, propertiesList=PROPERTIES) => {
  const raw=(propRaw||'').trim();
  if(!raw) return '';
  // a) ID prefix — only return if it actually exists in the list
  const idMatch=raw.match(/^(p\d+)/i);
  if(idMatch){
    const id=idMatch[1].toLowerCase();
    return propertiesList.some(p=>p.id===id)?id:'';
  }
  // b) Exact normalized name match
  const wanted=normalizeName(raw);
  const exact=propertiesList.find(p=>normalizeName(p.name)===wanted);
  if(exact) return exact.id;
  // c+d) Loose match — only if unique. Multiple matches → unresolved.
  const matches=propertiesList.filter(p=>{
    const n=normalizeName(p.name);
    return n.includes(wanted)||wanted.includes(n);
  });
  if(matches.length===1) return matches[0].id;
  if(matches.length>1){
    console.warn('[CleanFlow] Ambiguous property match:', raw, '->', matches.map(p=>p.name));
  }
  return '';
};

const resolveCleanerId = (cleanerRaw, cleanersList=CLEANERS) => {
  const raw=(cleanerRaw||'').trim();
  if(!raw) return null;
  // a) ID prefix — only return if it actually exists in the list
  const idMatch=raw.match(/^(c\d+)/i);
  if(idMatch){
    const id=idMatch[1].toLowerCase();
    return cleanersList.some(c=>c.id===id)?id:null;
  }
  // b) Exact normalized name match
  const wanted=normalizeName(raw);
  const exact=cleanersList.find(c=>normalizeName(c.name)===wanted);
  if(exact) return exact.id;
  // c+d) Loose match — only if unique
  const matches=cleanersList.filter(c=>{
    const n=normalizeName(c.name);
    return n.includes(wanted)||wanted.includes(n);
  });
  if(matches.length===1) return matches[0].id;
  if(matches.length>1){
    console.warn('[CleanFlow] Ambiguous cleaner match:', raw, '->', matches.map(c=>c.name));
  }
  return null;
};

const SERVICE_TYPE_IDS = new Set([
  'CHECKOUT_COMPLETE','BACK_TO_BACK','PREPARE_FOR_GUEST',
  'CHECKIN_ONLY','REFRESH_CLEAN','OFFICE_CLEAN',
  'RESTAURANT_CLEAN','MAINTENANCE','TRAINING','OTHER'
]);
const normalizeServiceTypeId = v => {
  const s=(v||'').trim().toUpperCase().replace(/\s+/g,'_').replace(/-/g,'_');
  return SERVICE_TYPE_IDS.has(s)?s:'';
};
const inferServiceTypeId = (propertyId, note='', propertiesList=PROPERTIES) => {
  const prop=propertiesList.find(p=>p.id===propertyId);
  const n=(note||'').toLowerCase();
  if(prop?.type==='office') return 'OFFICE_CLEAN';
  if(prop?.type==='restaurant') return 'RESTAURANT_CLEAN';
  if(n.includes('back to back')) return 'BACK_TO_BACK';
  if(n.includes('prepare for guest')) return 'PREPARE_FOR_GUEST';
  if(n.includes('check in')||n.includes('check-in')) return 'CHECKIN_ONLY';
  if(n.includes('refresh')) return 'REFRESH_CLEAN';
  if(prop?.type==='short-let') return 'CHECKOUT_COMPLETE';
  return 'OTHER';
};

const parseTemplateCSVWithDiagnostics = (rows, propertiesList=PROPERTIES, cleanersList=CLEANERS) => {
  // New column structure (rows[0-2] = title/subtitle/header, rows[3]+ = data):
  // A=Day B=Property C=Service Type D=Start Time E=End Time(info)
  // F=Cleaner1 G=Cleaner2 H=Cleaner3 I=Note
  // Backward-compat: if r[2] looks like HH:MM → legacy format
  const validDays=new Set(DAYS);
  const candidateRows=rows.slice(3).filter(r=>validDays.has((r[0]||'').trim()));
  const totalRows=candidateRows.length;

  const unresolvedProperties=[];
  const unresolvedCleaners=[];
  const invalidServiceTypes=[];
  const rowsWithNoCleaner=[];
  const serviceTypeCounts={};
  const jobs=[];

  candidateRows.forEach(r=>{
    const day=r[0].trim();
    const propRaw=(r[1]||'').trim();
    const propertyId=resolvePropertyId(propRaw,propertiesList);

    if(!propertyId){
      if(propRaw) unresolvedProperties.push(propRaw);
      return; // skip row
    }

    const col2=(r[2]||'').trim();
    const isLegacy=/^\d{1,2}:\d{2}$/.test(col2);

    let rawServiceTypeId, startTime, endTimeInfo, rawCleaners, note;
    if(isLegacy){
      rawServiceTypeId='';
      startTime=col2||'09:00';
      endTimeInfo='';
      rawCleaners=[r[4],r[5],r[6]];
      note=(r[7]||'').trim();
    } else {
      rawServiceTypeId=col2;
      startTime=(r[3]||'09:00').trim();
      endTimeInfo=(r[4]||'').trim();
      rawCleaners=[r[5],r[6],r[7]];
      note=(r[8]||'').trim();
    }

    // Resolve cleaners — track unresolved names
    const cleanerIds=rawCleaners.map(c=>{
      const raw=(c||'').trim();
      if(!raw) return null;
      const id=resolveCleanerId(raw,cleanersList);
      if(!id && raw && raw.toLowerCase()!=='da assegnare') unresolvedCleaners.push(raw);
      return id;
    }).filter(Boolean);

    if(cleanerIds.length===0) rowsWithNoCleaner.push(`${day} — ${propRaw}`);

    // Normalize service type → fallback to infer
    const normalized=normalizeServiceTypeId(rawServiceTypeId);
    const serviceTypeId=normalized||inferServiceTypeId(propertyId,note,propertiesList);
    if(rawServiceTypeId&&!normalized) invalidServiceTypes.push(rawServiceTypeId);

    serviceTypeCounts[serviceTypeId]=(serviceTypeCounts[serviceTypeId]||0)+1;

    jobs.push({day,propertyId,serviceTypeId,cleanerIds,startTime,endTimeInfo,note,type:'template'});
  });

  return {
    jobs,
    diagnostics:{
      totalRows,
      importedRows:jobs.length,
      skippedRows:totalRows-jobs.length,
      unresolvedProperties:[...new Set(unresolvedProperties)],
      unresolvedCleaners:[...new Set(unresolvedCleaners)],
      invalidServiceTypes:[...new Set(invalidServiceTypes)],
      rowsWithNoCleaner,
      serviceTypeCounts,
    },
  };
};

// Wrapper for backward-compat — returns only jobs array
const parseTemplateCSV = (rows, propertiesList=PROPERTIES, cleanersList=CLEANERS) =>
  parseTemplateCSVWithDiagnostics(rows, propertiesList, cleanersList).jobs;


// Hostaway Map parser. Supports TWO schemas, auto-detected from the header rows:
//  - NEW (6 cols): HostawayListingId | HostawayListingName | CleanFlowPropertyId
//                  | CleanFlowPropertyName | Ignore | Notes
//  - OLD (2 cols): HostawayListingName | CleanFlowPropertyId
// Returns { nameMap, byId }:
//  - nameMap: { hostawayListingNameLower: propId }  (used by CSV import via PROP_NAME_MAP)
//  - byId:    { hostawayListingId: { hostawayListingId, hostawayListingName,
//               propertyId, cleanFlowName, ignore, notes } }  (used by API import)
const parseHostawayMapCSV = rows => {
  const nameMap = {};
  const byId = {};
  // Detect new schema: any of the first 3 rows mention the new header names.
  const headerBlob = rows.slice(0, 3).map(r => (r || []).join('|').toLowerCase()).join(' ');
  const isNewSchema = headerBlob.indexOf('hostawaylistingid') !== -1
    && headerBlob.indexOf('cleanflowpropertyid') !== -1;

  rows.slice(3).forEach(r => {
    if (isNewSchema) {
      const listingId   = (r[0] || '').trim();
      const listingName = (r[1] || '').trim();
      const propId      = (r[2] || '').trim();
      const cleanName   = (r[3] || '').trim();
      const ignore      = parseBool(r[4]);
      const notes       = (r[5] || '').trim();
      if (listingId) {
        byId[listingId] = {
          hostawayListingId: listingId,
          hostawayListingName: listingName,
          propertyId: propId,
          cleanFlowName: cleanName,
          ignore: ignore,
          notes: notes,
        };
      }
      // Keep name→propId for CSV-import backward compatibility (only when mapped & not ignored).
      if (listingName && propId && !ignore) nameMap[listingName.toLowerCase()] = propId;
    } else {
      // OLD schema: r[0]=name, r[1]=propId.
      const hostName = (r[0] || '').trim().toLowerCase();
      const propId   = (r[1] || '').trim();
      if (hostName && propId) nameMap[hostName] = propId;
    }
  });
  return { nameMap: nameMap, byId: byId };
};

// ── SOLVER LOCAL ──────────────────────────────────────────────────────────────
const buildLocalAssignmentOptions = (targetJob, jobs, weekOffset) => {
  const jS = t2m(targetJob.startTime);
  const jE = jS + getJobDuration(targetJob)*60;
  const needed = getJobRequiredCleaners(targetJob);
  const requiresTraining = jobRequiresTraining(targetJob);
  const constraints = buildConstraints(weekOffset);

  // Build hour maps from current jobs (excluding targetJob itself)
  const weeklyHrs = {};
  const dailyHrs = {};
  const daySched = {};
  CLEANERS.forEach(cl=>{
    weeklyHrs[cl.id]=0; dailyHrs[cl.id]={}; daySched[cl.id]={};
    DAYS.forEach(d=>{ dailyHrs[cl.id][d]=0; daySched[cl.id][d]=[]; });
  });
  jobs.filter(j=>j.id!==targetJob.id&&j.cleanerIds?.length>0).forEach(j=>{
    const dur=getJobDuration(j);
    j.cleanerIds.forEach(cId=>{
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+dur;
      if(dailyHrs[cId]?.[j.day]!==undefined) dailyHrs[cId][j.day]+=dur;
      if(daySched[cId]?.[j.day]) daySched[cId][j.day].push({start:t2m(j.startTime),end:t2m(j.startTime)+dur*60});
    });
  });

  const validCandidates = [];
  const rejectedCandidates = [];

  CLEANERS.forEach(cl=>{
    const rejectReasons = [];
    // Day availability
    if(!cl.days.includes(targetJob.day)) rejectReasons.push(`non disponibile ${DAY_IT[targetJob.day]}`);
    // Holiday / off period (hard)
    const tDateISO = targetJob.dateISO || toISODateLocal(getWeekDates(weekOffset)[DAYS.indexOf(targetJob.day)] || new Date());
    if(isCleanerUnavailableOnDate(cl, tDateISO)) rejectReasons.push(`assente/ferie il ${tDateISO}`);
    // daysOff in constraints
    if((constraints[cl.id]?.daysOff||[]).includes(targetJob.day)) rejectReasons.push('giorno di riposo programmato');
    // Training
    if(requiresTraining && !TRAINING[cl.id]?.includes(targetJob.propertyId)) rejectReasons.push('non formata per questa proprietà');
    // Overlap
    const hasOverlap = (daySched[cl.id]?.[targetJob.day]||[]).some(s=>jS<s.end&&jE>s.start);
    if(hasOverlap) rejectReasons.push('overlap orario');
    // Travel buffer vs any existing same-day job of this cleaner
    const bufIssue = jobs.find(o=>
      o.id!==targetJob.id && o.day===targetJob.day && (o.cleanerIds||[]).includes(cl.id) &&
      getTravelBufferIssue(cl.name, o, targetJob)
    );
    if(bufIssue){
      const issue=getTravelBufferIssue(cl.name, bufIssue, targetJob);
      rejectReasons.push(`stacco insufficiente (servono ${issue.needed} min, disponibili ${issue.gap} min)`);
    }
    // maxEndTime
    const maxEnd = constraints[cl.id]?.maxEndTime;
    if(maxEnd && jE>t2m(maxEnd)) rejectReasons.push(`supera orario max ${maxEnd}`);

    if(rejectReasons.length>0){
      rejectedCandidates.push({cleanerId:cl.id,cleanerName:cl.name,reason:rejectReasons.join(', ')});
      return;
    }

    // Scoring (lower = better)
    const dur = getJobDuration(targetJob);
    const dailyLim = constraints[cl.id]?.maxDailyHrs ?? cl.dailyHrs;
    const weeklyLim = constraints[cl.id]?.maxWeeklyHrs ?? cl.weeklyHrs;
    const newDaily = (dailyHrs[cl.id]?.[targetJob.day]||0)+dur;
    const newWeekly = (weeklyHrs[cl.id]||0)+dur;
    const overDaily = dailyLim && newDaily>dailyLim ? 1 : 0;
    const overWeekly = weeklyLim && newWeekly>weeklyLim ? 1 : 0;
    const projDays = new Set(Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d));
    projDays.add(targetJob.day);
    const overWorkDays = cl.workDays && projDays.size>cl.workDays ? 1 : 0;
    const isSenior = cl.type==='senior' ? 0.1 : 0; // soft penalty for using senior on simple jobs
    const score = overDaily*10 + overWeekly*8 + overWorkDays*5 + newDaily + (newWeekly/10) + isSenior;

    const reasonParts = [];
    if(!overDaily&&!overWeekly&&!overWorkDays) reasonParts.push('nessun superamento limiti');
    else {
      if(overDaily) reasonParts.push(`supererebbe limite giornaliero (${newDaily}h/${dailyLim}h)`);
      if(overWeekly) reasonParts.push(`supererebbe limite settimanale (${newWeekly}h/${weeklyLim}h)`);
      if(overWorkDays) reasonParts.push(`supererebbe giorni lavorativi (${projDays.size}/${cl.workDays})`);
    }
    reasonParts.push(`${(dailyHrs[cl.id]?.[targetJob.day]||0).toFixed(1)}h già oggi, ${(weeklyHrs[cl.id]||0).toFixed(1)}h settimana`);

    validCandidates.push({
      cleanerId:cl.id, cleanerName:cl.name, score, isSenior:cl.type==='senior',
      reason:reasonParts.join(' · '),
      action:{type:'assign',jobId:targetJob.id,cleanerIds:[cl.id]},
    });
  });

  validCandidates.sort((a,b)=>a.score-b.score);

  let recommended = null;
  let alternatives = [];

  if(needed===1){
    // Single cleaner: standard behaviour
    if(validCandidates[0]){
      recommended = {...validCandidates[0], action:{type:'assign',jobId:targetJob.id,cleanerIds:[validCandidates[0].cleanerId]}};
    }
    alternatives = validCandidates.slice(1,3).map(c=>({...c,action:{type:'assign',jobId:targetJob.id,cleanerIds:[c.cleanerId]}}));
  } else {
    // Multi-cleaner: pick top N
    if(validCandidates.length>=needed){
      const top = validCandidates.slice(0,needed);
      recommended = {
        cleanerId: top[0].cleanerId,
        cleanerName: top.map(c=>c.cleanerName).join(' + '),
        score: top.reduce((s,c)=>s+c.score,0)/needed,
        reason: top.map(c=>c.reason).join(' | '),
        action:{type:'assign',jobId:targetJob.id,cleanerIds:top.map(c=>c.cleanerId)},
      };
      // Second combination if enough candidates remain
      if(validCandidates.length>=needed+1){
        const alt = [validCandidates[1],...validCandidates.slice(needed,needed+needed-1)];
        if(alt.length>=needed){
          alternatives = [{
            cleanerId: alt[0].cleanerId,
            cleanerName: alt.map(c=>c.cleanerName).join(' + '),
            score: alt.reduce((s,c)=>s+c.score,0)/alt.length,
            reason: alt.map(c=>c.reason).join(' | '),
            action:{type:'assign',jobId:targetJob.id,cleanerIds:alt.map(c=>c.cleanerId)},
          }];
        }
      }
    }
    // Not enough valid candidates
    if(!recommended){
      rejectedCandidates.unshift({cleanerId:'',cleanerName:'—',reason:`Servono ${needed} cleaners, disponibili solo ${validCandidates.length} senza conflitti`});
    }
  }

  let escalation = null;
  if(!recommended){
    const reason = needed>1 && validCandidates.length>0
      ? `Servono ${needed} cleaners, disponibili solo ${validCandidates.length} senza conflitti per ${getJobDisplayName(targetJob)} ${targetJob.startTime}–${m2t(jE)} ${DAY_IT[targetJob.day]}`
      : `Nessuna cleaner disponibile per ${getJobDisplayName(targetJob)} ${targetJob.startTime}–${m2t(jE)} ${DAY_IT[targetJob.day]}`;
    escalation = {
      reason,
      options:['Spostare orario','Chiamare cleaner extra','Riassegnare manualmente un job esistente'],
    };
  }

  return {targetJobId:targetJob.id,recommended,alternatives,rejected:rejectedCandidates,escalation};
};

// ── AI OPTIONAL EXPLAINER ────────────────────────────────────────────────────
const explainLocalLastMinuteOptionsWithAI = async (options, apiKey) => {
  if(!AI_ENABLED) return null;
  if(!apiKey) return null;
  const lines = [];
  if(options.recommended) lines.push(`Consigliata: ${options.recommended.cleanerName} (${options.recommended.reason})`);
  options.alternatives.forEach(a=>lines.push(`Alternativa: ${a.cleanerName} (${a.reason})`));
  if(options.escalation) lines.push(`Escalation: ${options.escalation.reason}`);
  const prompt = `Sei l'assistente scheduling di CleanFlow.\nRiscrivi in italiano operativo questa soluzione. Non aggiungere cleaner o orari non presenti nei dati. Massimo 4 righe.\n\n${lines.join('\n')}`;
  try{
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{role:'user',parts:[{text:prompt}]}],
          generationConfig:{maxOutputTokens:250,temperature:0.1},
        })}
    );
    if(!res.ok) return null;
    const data = await res.json();
    const candidate = data?.candidates?.[0];
    if(candidate?.finishReason && candidate.finishReason!=='STOP') return null;
    const text = (candidate?.content?.parts||[]).map(p=>p.text||'').join('').trim();
    // Validate: must mention at least one name from recommended/alternatives
    const knownNames = [options.recommended?.cleanerName,...options.alternatives.map(a=>a.cleanerName)].filter(Boolean);
    const mentionsKnown = knownNames.some(n=>text.includes(n.split(' ')[0]));
    return (text && mentionsKnown) ? text : null;
  }catch(e){ return null; }
};


// ── JOB HELPERS ─────────────────────────────────────────────────────────────
// Is a cleaner on holiday/off on a given date? OffFrom/OffTo are inclusive,
// YYYY-MM-DD. OffFrom only = single-day absence. Both empty = available.
// ── TRAVEL BUFFER (area-based) ──────────────────────────────────────────────
// Normalize an area name: trim, lowercase, strip accents.
const normArea = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

// Parse the TravelBuffers tab (FromArea | ToArea | BufferMinutes) → directional lookup
// { "fromarea→toarea": minutes }. Skips invalid rows / non-positive minutes / header.
const parseTravelBuffersCSV = rows => {
  const map={};
  (Array.isArray(rows)?rows:[]).forEach(r=>{
    const from=normArea(r[0]); const to=normArea(r[1]); const mins=parseInt(r[2]);
    if(!from||!to) return;
    if(from==='fromarea'||from==='from area') return; // header row
    if(isNaN(mins)||mins<=0) return;
    map[from+'→'+to]=mins;
  });
  return map;
};

// Directional travel buffer (minutes) required between jobA's location and jobB's.
// Falls back to OP_SETTINGS.defaultTravelBufferMinutes when areas/properties/tab missing.
const getTravelBufferMinutes = (jobA, jobB) => {
  const def = OP_SETTINGS.defaultTravelBufferMinutes;
  const pa = PROPERTIES.find(p=>p.id===jobA?.propertyId);
  const pb = PROPERTIES.find(p=>p.id===jobB?.propertyId);
  // Temporary/custom job without a real property → default.
  if(!pa || !pb) return def;
  const a = normArea(pa.area); const b = normArea(pb.area);
  if(!a || !b) return def; // area not set on one side → default
  const exact = TRAVEL_BUFFERS[a+'→'+b];
  if(typeof exact === 'number') return exact; // covers same-area explicit value too
  return def;
};

// Returns a travel-buffer issue between two same-cleaner, same-day jobs, or null.
// Existing OVERLAP is handled elsewhere; this only flags insufficient gap when the
// two jobs do NOT overlap. cleanerName is used for the message.
const getTravelBufferIssue = (cleanerName, jobA, jobB) => {
  if(!jobA || !jobB) return null;
  const aS=t2m(jobA.startTime), aE=aS+getJobDuration(jobA)*60;
  const bS=t2m(jobB.startTime), bE=bS+getJobDuration(jobB)*60;
  if(aS<bE && bS<aE) return null; // overlap → handled by overlap logic, not here
  // Determine order: earlier job → later job (buffer is directional on that order).
  let earlier, later, earlierEnd, laterStart;
  if(aE<=bS){ earlier=jobA; later=jobB; earlierEnd=aE; laterStart=bS; }
  else      { earlier=jobB; later=jobA; earlierEnd=bE; laterStart=aS; }
  const needed=getTravelBufferMinutes(earlier, later);
  const gap=laterStart-earlierEnd;
  if(gap < needed){
    return {
      needed, gap,
      msg:`${cleanerName}: stacco insufficiente da ${getJobDisplayName(earlier)} a ${getJobDisplayName(later)} — servono ${needed} min, disponibili ${gap} min`,
    };
  }
  return null;
};

const isCleanerUnavailableOnDate = (cleaner, dateISO) => {
  if(!cleaner || !dateISO) return false;
  const from = cleaner.offFrom || '';
  const to   = cleaner.offTo || '';
  if(!from && !to) return false;
  if(from && to)   return dateISO>=from && dateISO<=to;  // inclusive range
  if(from && !to)  return dateISO===from;                // single-day absence
  if(!from && to)  return dateISO===to;                  // defensive: only OffTo set
  return false;
};

// For property-based jobs, CURRENT Properties is authoritative (so a job created
// when the property needed 1 cleaner picks up a later change to 2). Job-stored
// values are only used for temporary/custom jobs without a valid property.
const isPropertyBasedJob = job => !!(job && job.propertyId && PROPERTIES.find(p=>p.id===job.propertyId));

// A job's config (duration / cleaners) is taken from CURRENT Properties only when it
// is a property-driven job (template / hostaway_api / hostaway_csv / checkout / checkin).
// Extra and last-minute jobs carry their OWN custom config even when placed on a real
// property, so they are NOT property-config-authoritative.
const isCustomConfigJob = job =>
  job && (job.source==='extra' || job.source==='last_minute' || job.type==='extra' || job.type==='last_minute');
const isPropertyConfigAuthoritativeJob = job =>
  isPropertyBasedJob(job) && !isCustomConfigJob(job);

// Duration: custom extra/last_minute keep their own; property-driven use current Properties.
const getJobDuration = job => {
  if(isCustomConfigJob(job) && job.duration && Number(job.duration) > 0) return Number(job.duration);
  const prop = PROPERTIES.find(p => p.id === job.propertyId);
  if(isPropertyConfigAuthoritativeJob(job) && prop){
    // Checkout/back-to-back use checkoutDuration; otherwise property duration.
    const d = prop.checkoutDuration || prop.duration;
    if(d && Number(d)>0) return Number(d);
  }
  if(job.duration && Number(job.duration) > 0) return Number(job.duration);
  return prop?.duration || 0;
};

// Required cleaners: custom extra/last_minute keep their own; property-driven use current Properties.
const getJobRequiredCleaners = job => {
  if(isCustomConfigJob(job) && job.cleanersRequired && Number(job.cleanersRequired)>0) return Number(job.cleanersRequired);
  const prop=PROPERTIES.find(p=>p.id===job.propertyId);
  if(isPropertyConfigAuthoritativeJob(job) && prop){
    if(prop.checkoutCleanersRequired && Number(prop.checkoutCleanersRequired)>0) return Number(prop.checkoutCleanersRequired);
    if(prop.cleanersRequired && Number(prop.cleanersRequired)>0) return Number(prop.cleanersRequired);
    if(prop.requires2) return 2;
    return 1;
  }
  if(job.cleanersRequired && Number(job.cleanersRequired)>0) return Number(job.cleanersRequired);
  return 1;
};
// Training check only applies to jobs with a known property
const jobRequiresTraining = job => !!job.propertyId;
// Use job.displayName, temporaryLocationName, or property name
const getJobDisplayName = job => {
  if(job.displayName) return job.displayName;
  if(job.temporaryLocationName) return job.temporaryLocationName;
  const prop = PROPERTIES.find(p => p.id === job.propertyId);
  return prop?.name || 'Unknown location';
};

// ── EXTRA DUTIES PARSER ──────────────────────────────────────────────────────
// Columns: Date | Property | Temporary Location | Service Type | Start Time |
//          Duration | Cleaner 1 | Cleaner 2 | Cleaner 3 | Priority | Notes
// Row 1=title, Row 2=subtitle, Row 3=header, Row 4+=data
const parseExtraDutiesCSVWithDiagnostics = (rows, weekOffset=0, propertiesList=PROPERTIES, cleanersList=CLEANERS) => {
  const weekDates = getWeekDates(weekOffset);
  const weekMon = weekDates[0];
  const weekSun = weekDates[6];
  weekMon.setHours(0,0,0,0);
  weekSun.setHours(23,59,59,999);

  const parseDate = s => {
    const clean = (s||'').trim();
    // DD/MM/YYYY or D/M/YYYY
    const dmy = clean.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if(dmy) return new Date(parseInt(dmy[3]), parseInt(dmy[2])-1, parseInt(dmy[1]));
    // YYYY-MM-DD
    const ymd = clean.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
    if(ymd) return new Date(parseInt(ymd[1]), parseInt(ymd[2])-1, parseInt(ymd[3]));
    return null;
  };

  const dataRows = rows.slice(3).filter(r => r.some(c => (c||'').trim()));
  const totalRows = dataRows.length;

  const unresolvedProperties=[], unresolvedCleaners=[], invalidServiceTypes=[];
  const rowsWithoutLocation=[], rowsWithNoCleaner=[];
  const serviceTypeCounts={}, priorityCounts={};
  const jobs=[];
  let rowsInSelectedWeek=0;

  dataRows.forEach(r => {
    const dateRaw = (r[0]||'').trim();
    const date = parseDate(dateRaw);
    if(!date || isNaN(date.getTime())) return;
    if(date < weekMon || date > weekSun) return;
    rowsInSelectedWeek++;

    const propRaw = (r[1]||'').trim();
    const tempLoc = (r[2]||'').trim();
    const stRaw   = (r[3]||'').trim();
    const startTime = (r[4]||'09:00').trim();
    const duration  = parseFloat(r[5])||0;
    const priority  = (r[9]||'Normal').trim()||'Normal';
    const note      = (r[10]||'').trim();

    // Resolve property
    let propertyId = '';
    if(propRaw){
      propertyId = resolvePropertyId(propRaw, propertiesList);
      if(!propertyId) unresolvedProperties.push(propRaw);
    }

    // Must have property or temporary location
    if(!propertyId && !tempLoc){
      rowsWithoutLocation.push(dateRaw);
      return;
    }

    // Resolve cleaners
    const cleanerIds = [r[6],r[7],r[8]].map(c => {
      const raw = (c||'').trim();
      if(!raw) return null;
      const id = resolveCleanerId(raw, cleanersList);
      if(!id && raw.toLowerCase()!=='da assegnare') unresolvedCleaners.push(raw);
      return id;
    }).filter(Boolean);

    // Normalize service type — infer from context
    const normalized = normalizeServiceTypeId(stRaw);
    let serviceTypeId = normalized;
    if(!serviceTypeId){
      if(stRaw) invalidServiceTypes.push(stRaw);
      if(propertyId){
        const prop = propertiesList.find(p=>p.id===propertyId);
        if(prop?.type==='office') serviceTypeId='OFFICE_CLEAN';
        else if(prop?.type==='restaurant') serviceTypeId='RESTAURANT_CLEAN';
        else serviceTypeId='OTHER';
      } else {
        serviceTypeId='OTHER';
      }
    }

    if(cleanerIds.length===0) rowsWithNoCleaner.push(`${dateRaw} — ${propRaw||tempLoc}`);
    serviceTypeCounts[serviceTypeId]=(serviceTypeCounts[serviceTypeId]||0)+1;
    priorityCounts[priority]=(priorityCounts[priority]||0)+1;

    // Build day key
    const dow = date.getDay(); // 0=Sun
    const dayKey = DAYS[dow===0?6:dow-1];

    // Display name
    const prop = propertiesList.find(p=>p.id===propertyId);
    const displayName = prop?.name || tempLoc || propRaw || 'Unknown';

    // ISO date string
    const pad = n => String(n).padStart(2,'0');
    const dateISO = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;

    jobs.push({
      id: uid(),
      day: dayKey,
      dateISO,
      propertyId,
      temporaryLocationName: tempLoc,
      displayName,
      serviceTypeId,
      cleanerIds,
      startTime,
      duration,
      priority,
      note,
      type: 'extra',
      source: 'extra',
    });
  });

  return {
    jobs,
    diagnostics:{
      totalRows,
      rowsInSelectedWeek,
      importedRows: jobs.length,
      skippedRows: rowsInSelectedWeek - jobs.length,
      unresolvedProperties: [...new Set(unresolvedProperties)],
      unresolvedCleaners: [...new Set(unresolvedCleaners)],
      invalidServiceTypes: [...new Set(invalidServiceTypes)],
      rowsWithoutLocation,
      rowsWithNoCleaner,
      serviceTypeCounts,
      priorityCounts,
    },
  };
};

// Wrapper for convenience
const parseExtraDutiesCSV = (rows, weekOffset=0, propertiesList=PROPERTIES, cleanersList=CLEANERS) =>
  parseExtraDutiesCSVWithDiagnostics(rows, weekOffset, propertiesList, cleanersList).jobs;



// ── LOAD FROM GOOGLE SHEET ─────────────────────────────────────────────────────
const loadSheetData = async (weekOffset=0) => {
  const urlEntries = Object.entries(SHEET_URLS);

    urlEntries.map(([,url]) => (!url || !/^https?:\/\//.test(url) || url.startsWith('PASTE_')) ? Promise.reject('placeholder') : fetch(url).then(r=>r.text()))

  const byKey = Object.fromEntries(urlEntries.map(([k],i) => [k, fetches[i]]));
  const tmplRes = byKey.template;

  const prRes   = byKey.properties;
  const trRes   = byKey.training;
  const hmRes   = byKey.hostawayMap;
  const edRes   = byKey.extraDuties;

  const parsedCl  = clRes.status==='fulfilled'  ? parseCleanersCSV(parseCSV(clRes.value))    : null;
  const parsedPr  = prRes.status==='fulfilled'  ? parsePropertiesCSV(parseCSV(prRes.value))  : null;
  const parsedTr  = trRes.status==='fulfilled'  ? parseTrainingCSV(parseCSV(trRes.value))    : null;
  const parsedHm  = hmRes.status==='fulfilled'  ? parseHostawayMapCSV(parseCSV(hmRes.value)) : null;
  const tbRes   = byKey.travelBuffers;
  const parsedTb  = tbRes && tbRes.status==='fulfilled' ? parseTravelBuffersCSV(parseCSV(tbRes.value)) : null;

  const templateResult = tmplRes.status==='fulfilled'
    ? parseTemplateCSVWithDiagnostics(parseCSV(tmplRes.value), parsedPr||PROPERTIES, parsedCl||CLEANERS)
    : null;
  const parsedTm = templateResult?.jobs||null;
  const parsedTemplateDiagnostics = templateResult?.diagnostics||null;

  const extraResult = edRes.status==='fulfilled'
    ? parseExtraDutiesCSVWithDiagnostics(parseCSV(edRes.value), weekOffset, parsedPr||PROPERTIES, parsedCl||CLEANERS)
    : null;
  const parsedEd = extraResult?.jobs||null;
  const parsedExtraDiagnostics = extraResult?.diagnostics||null;

  return {
    cleaners:               parsedCl&&parsedCl.length>0             ? parsedCl  : null,
    properties:             parsedPr&&parsedPr.length>0             ? parsedPr  : null,
    training:               parsedTr&&Object.keys(parsedTr).length>0? parsedTr  : null,
    template:               parsedTm&&parsedTm.length>0             ? parsedTm  : null,
    hostawayMap:            parsedHm&&parsedHm.nameMap&&Object.keys(parsedHm.nameMap).length>0? parsedHm.nameMap : null,
    hostawayMapById:        parsedHm&&parsedHm.byId&&Object.keys(parsedHm.byId).length>0? parsedHm.byId : null,
    travelBuffers:          parsedTb&&Object.keys(parsedTb).length>0? parsedTb : null,
    templateDiagnostics:    parsedTemplateDiagnostics,
    extraDuties:            parsedEd&&parsedEd.length>0             ? parsedEd  : null,
    extraDutiesDiagnostics: parsedExtraDiagnostics,
  };
};

// Backend endpoint for shared schedule persistence across devices.

const PUBLISHED_API_URL = 'https://script.google.com/macros/s/AKfycbxXzwNafPiISYqae8EjRtQ2UEmsmoAPaDdpK9RZ1i795JBauNdOp-wZD-1aMmuML2D8/exec';

// Compute weekStartISO (Monday) from a weekOffset relative to current week
const getWeekStartISO = (weekOffset=0) => toISODateLocal(getWeekDates(weekOffset)[0]);
const getWeekEndISO   = (weekOffset=0) => toISODateLocal(getWeekDates(weekOffset)[6]);

// Fetch published schedule for a given weekStartISO. Always resolves to a result object,
// never throws — failure modes are reported via { ok:false, error } so callers can decide.
const fetchPublishedSchedule = async (weekStartISO) => {
  try {
    const url = `${PUBLISHED_API_URL}?weekStartISO=${encodeURIComponent(weekStartISO)}`;
    const res = await fetch(url, { method:'GET', redirect:'follow' });
    if(!res.ok) return { ok:false, error:`HTTP ${res.status}` };
    const data = await res.json();
    if(!data || data.ok!==true) return { ok:false, error:(data&&data.error)||'Unknown API error' };
    return data; // { ok, exists, weekStartISO, weekEndISO, snapshotId, publishedAt, publishedBy, jobs }
  } catch(e) {
    return { ok:false, error: String(e.message||e) };
  }
};

// POST current jobs to the backend. Replaces the entire week atomically server-side.
const publishScheduleToBackend = async (weekStartISO, weekEndISO, publishedBy, jobs, baseSnapshotId=null) => {
  try {
    const res = await fetch(PUBLISHED_API_URL, {
      method:'POST',
      redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain to avoid CORS preflight
      body: JSON.stringify({ weekStartISO, weekEndISO, publishedBy, jobs, baseSnapshotId }),
    });
    if(!res.ok) return { ok:false, error:`HTTP ${res.status}` };
    const data = await res.json();
    // Pass through conflict payload as-is so the caller can show details.
    if(!data || data.ok!==true) return data && data.error ? data : { ok:false, error:(data&&data.error)||'Unknown API error' };
    return data; // { ok, snapshotId, publishedAt, rowCount, weekStartISO, weekEndISO }
  } catch(e) {
    return { ok:false, error: String(e.message||e) };
  }
};

// ─── Operational job normalization for dirty-comparison ────────────────────
// Compare only the fields that matter operationally. Sort deterministically so
// reordering or non-operational metadata changes do not cause false dirty flags.
const OPERATIONAL_FIELDS = ['id','day','dateISO','propertyId','temporaryLocationName','displayName','serviceTypeId','startTime','duration','cleanersRequired','cleanerIds','priority','note','type','source','status'];
const normalizeJobsForCompare = (jobs) => {
  if(!Array.isArray(jobs)) return '[]';
  const normalized = jobs.map(j=>{
    const o = {};
    OPERATIONAL_FIELDS.forEach(k=>{
      let v = j[k];
      if(k==='cleanerIds') v = Array.isArray(v) ? [...v].map(String).sort() : [];
      else if(k==='duration') v = Number(v)||0;
      else if(k==='cleanersRequired') v = parseInt(v,10) || 1;
      else if(v===undefined || v===null) v = '';
      else v = String(v);
      o[k] = v;
    });
    return o;
  });
  // Deterministic sort by composite key
  normalized.sort((a,b)=>{
    const ka = `${a.dateISO}|${a.day}|${a.startTime}|${a.propertyId}|${a.displayName}|${a.id}`;
    const kb = `${b.dateISO}|${b.day}|${b.startTime}|${b.propertyId}|${b.displayName}|${b.id}`;
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  return JSON.stringify(normalized);
};

// Italian relative time for the banner. Compact, supervisor-friendly.
const formatRelativeTimeIt = (isoString) => {
  if(!isoString) return '—';
  const then = new Date(isoString);
  if(isNaN(then.getTime())) return '—';
  const now = new Date();
  const diffMs = now - then;
  const diffSec = Math.round(diffMs / 1000);
  const diffMin = Math.round(diffSec / 60);
  const diffHour = Math.round(diffMin / 60);
  const diffDay = Math.round(diffHour / 24);
  if(diffSec < 60) return 'poco fa';
  if(diffMin < 60) return `${diffMin} min fa`;
  if(diffHour < 6) return `${diffHour} ${diffHour===1?'ora':'ore'} fa`;
  // Same calendar day
  const sameDay = then.toDateString() === now.toDateString();
  if(sameDay) return `oggi ${then.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
  // Yesterday
  const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
  if(then.toDateString() === yesterday.toDateString()){
    return `ieri ${then.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
  }
  if(diffDay < 7) return `${diffDay} giorni fa`;
  return then.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'});
};

// Format DD/MM date for a week range label
// Parse a YYYY-MM-DD string into a LOCAL Date (no UTC shift). Returns null if invalid.
const parseISODateLocal = iso => {
  const [y,m,d] = String(iso || '').split('-').map(Number);
  if(!y || !m || !d) return null;
  return new Date(y, m - 1, d);
};

// Stable operational identity of a job, independent of its generated id.
// Used to de-duplicate published jobs against local last-minute jobs.
const getJobOperationalKey = (job) => {
  if(!job) return '';
  const loc = job.propertyId || job.temporaryLocationName || job.displayName || '';
  const dur = Number(job.duration) || 0;
  return [
    job.dateISO || '',
    job.startTime || '',
    loc,
    job.serviceTypeId || '',
    dur,
  ].join('|');
};

// ── HOSTAWAY API → CleanFlow jobs (frontend mapping + rules) ───────────────
// Convert a Hostaway hour (number 16, or "16:00", or null) to "HH:MM" or fallback.
const hostawayHourToHHMM = (value, fallback) => {
  if(value === null || value === undefined || value === '') return fallback;
  if(typeof value === 'number' && isFinite(value)){
    const h = Math.floor(value);
    if(h < 0 || h > 23) return fallback;
    return String(h).padStart(2,'0') + ':00';
  }
  const s = String(value).trim();
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if(m){
    const h = parseInt(m[1],10);
    if(h>=0 && h<=23) return String(h).padStart(2,'0') + ':' + m[2];
  }
  const n = parseInt(s,10);
  if(!isNaN(n) && n>=0 && n<=23) return String(n).padStart(2,'0') + ':00';
  return fallback;
};

};

const dayFromISO = iso => {
  const d = parseISODateLocal(iso);
  if(!d) return '';
  const dow = d.getDay(); // 0=Sun..6=Sat

// Pure function: reservations (from backend) → { jobs, diagnostics }.
// Applies HOSTAWAY_MAP_BY_ID, Ignore, back-to-back detection and check-in clean.
// Does NOT mutate state and does NOT import — the modal previews then imports.
const generateApiJobsFromReservations = (reservations, weekOffset=0, mapById=HOSTAWAY_MAP_BY_ID, propertiesList=PROPERTIES) => {
  const monISO = getWeekStartISO(weekOffset);
  const sunISO = getWeekEndISO(weekOffset);
  const inWeek = iso => iso && iso>=monISO && iso<=sunISO;
  const list = Array.isArray(reservations) ? reservations : [];

  const diagnostics = {
    fetched: list.length,
    active: 0,
    generatedJobs: 0,
    checkoutJobs: 0,
    backToBackJobs: 0,
    checkinCleanJobs: 0,
    ignored: 0,
    unmapped: 0,
    warnings: [],
    ignoredList: [],
    unmappedList: [],
  };

  // Resolve mapping for a reservation. Returns {status:'ok'|'ignored'|'unmapped', mapping, property}.
  const resolve = (r) => {
    const idKey = r.listingId != null ? String(r.listingId) : '';
    const mapping = idKey && mapById ? mapById[idKey] : null;
    const displayName = (r.listingName || idKey || '(senza nome)');
    if(!mapping){
      return { status:'unmapped', displayName };
    }
    if(mapping.ignore === true){
      return { status:'ignored', mapping, displayName };
    }
    if(!mapping.propertyId){
      return { status:'unmapped', mapping, displayName }; // Ignore FALSE but no propertyId
    }
    const property = propertiesList.find(p => p.id === mapping.propertyId) || null;
    return { status:'ok', mapping, property, displayName };
  };

  // First pass: classify reservations, collect resolved (active, mapped, in-week) ones.
  const resolved = []; // { r, mapping, property, displayName }
  for(let i=0;i<list.length;i++){
    const r = list[i];
    diagnostics.active++; // backend already excluded cancelled; treat all received as active
    const res = resolve(r);
    if(res.status === 'ignored'){
      diagnostics.ignored++;
      diagnostics.ignoredList.push({ listingId:r.listingId, name:res.displayName, reason: (res.mapping&&res.mapping.notes)||'Ignore' });
      continue;
    }
    if(res.status === 'unmapped'){
      diagnostics.unmapped++;
      diagnostics.unmappedList.push({ listingId:r.listingId, name:res.displayName });
      continue;
    }
    if(!res.property){
      diagnostics.warnings.push(`PropertyId "${res.mapping.propertyId}" non trovato nel tab Properties (listing ${res.displayName}) — uso valori di default`);
    }
    resolved.push({ r, mapping:res.mapping, property:res.property, displayName: res.mapping.cleanFlowName || (res.property&&res.property.name) || res.displayName });
  }

  // Build a map of "arrival reservation by property+date" to detect back-to-back
  // AND to source the check-in time from the ARRIVING reservation (not the departing one).
  const arrivalByPropertyDate = {}; // key propertyId|dateISO → arrival reservation
  resolved.forEach(({ r, mapping }) => {
    if(inWeek(r.arrivalDate)) arrivalByPropertyDate[mapping.propertyId + '|' + r.arrivalDate] = r;
  });

  const jobs = [];
  const seen = {}; // internal dedup: dateISO|propertyId|serviceTypeId|hostawayId|type
  const pushJob = (job, hostawayId, type) => {
    const key = [job.dateISO, job.propertyId, job.serviceTypeId, hostawayId, type].join('|');
    if(seen[key]) return false;
    seen[key] = true;
    jobs.push(job);
    return true;
  };

  resolved.forEach(({ r, mapping, property, displayName }) => {
    const pid = mapping.propertyId;
    const dur = (property && (property.checkoutDuration || property.duration)) || 2;
    const checkoutCleaners = (property && (property.checkoutCleanersRequired || property.cleanersRequired)) || 1;

    // ── Checkout job (on departureDate, in-week) ──
    if(inWeek(r.departureDate)){
      const arrivalRes = arrivalByPropertyDate[pid + '|' + r.departureDate];
      const isB2B = !!arrivalRes;
      let startTime, serviceTypeId, note, constraintEndTime;
      if(isB2B){
        // Start = THIS reservation's checkout time. End = the ARRIVING reservation's check-in time.
        startTime = hostawayHourToHHMM(r.checkOutTime, (property&&property.checkoutTime) || '10:00');
        constraintEndTime = hostawayHourToHHMM(arrivalRes.checkInTime, '16:00');
        serviceTypeId = HOSTAWAY_ST_BACK_TO_BACK;
        note = `Hostaway checkout · Res ${r.hostawayId}${r.channelName?' · '+r.channelName:''} · BACK-TO-BACK: must clean between checkout and check-in (${startTime}–${constraintEndTime})`;
      } else {
        startTime = (property && property.cleaningWindowStart) || '10:00';
        serviceTypeId = HOSTAWAY_ST_CHECKOUT;
        note = `Hostaway checkout · Res ${r.hostawayId}${r.channelName?' · '+r.channelName:''}`;
      }
      const job = {
        propertyId: pid,
        day: dayFromISO(r.departureDate),
        dateISO: r.departureDate,
        displayName: displayName,
        startTime: startTime,
        duration: dur,
        cleanersRequired: checkoutCleaners,
        cleanerIds: [],
        type: 'checkout',
        source: 'hostaway_api',
        serviceTypeId: serviceTypeId,
        status: 'unassigned',
        note: note,
      };
      if(isB2B){
        job.constraintStartTime = startTime;
        job.constraintEndTime = constraintEndTime;
      }
      if(pushJob(job, r.hostawayId, 'checkout')){
        diagnostics.checkoutJobs++;
        if(isB2B) diagnostics.backToBackJobs++;
      }
    }

    // ── Check-in clean (on arrivalDate, in-week, only if property requires it) ──
    if(inWeek(r.arrivalDate) && property && property.requiresCheckinClean === true){
      const ciDur = (property.checkinTaskDuration || property.duration) || 2;
      const ciCleaners = (property.checkinCleanersRequired || property.cleanersRequired) || 1;
      const startTime = (property.cleaningWindowStart) || '08:30';
      const arrivalHH = hostawayHourToHHMM(r.checkInTime, '16:00');
      const job = {
        propertyId: pid,
        day: dayFromISO(r.arrivalDate),
        dateISO: r.arrivalDate,
        displayName: displayName,
        startTime: startTime,
        duration: ciDur,
        cleanersRequired: ciCleaners,
        cleanerIds: [],
        type: 'checkin',
        source: 'hostaway_api',
        serviceTypeId: HOSTAWAY_ST_CHECKIN,
        status: 'unassigned',
        note: `Hostaway check-in clean · Res ${r.hostawayId} · arrival ${arrivalHH}`,
      };
      if(pushJob(job, r.hostawayId, 'checkin')) diagnostics.checkinCleanJobs++;
    }
  });

  diagnostics.generatedJobs = jobs.length;
  return { jobs, diagnostics };
};

const formatDayMonth = (isoString) => {
  if(!isoString) return '—';
  const d = parseISODateLocal(isoString);
  if(!d || isNaN(d.getTime())) return isoString;
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
};

const t2m = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const m2t = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const tAdd = (t,h) => m2t((t2m(t)+h*60)%(24*60));
const fmtAMPM = t => { const [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; return `${h%12||12}:${String(m).padStart(2,'0')} ${ap}`; };
const uid = () => { try{return crypto.randomUUID();}catch{return 'j'+Date.now().toString(36)+Math.random().toString(36).slice(2,9);} };

const getMondayOf = (offset=0) => { const now=new Date(); const dow=now.getDay(); const m=new Date(now); m.setDate(now.getDate()-(dow===0?6:dow-1)+offset*7); m.setHours(0,0,0,0); return m; };
const getWeekDates = (offset=0) => { const m=getMondayOf(offset); return DAYS.map((_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return d; }); };
// Local-timezone-safe YYYY-MM-DD (avoid UTC shift on dates near midnight in Malta/Europe)
const toISODateLocal = d => {
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const getDateISOForDay = (day, weekOffset=0) => {
  const dates=getWeekDates(weekOffset);
  const idx=DAYS.indexOf(day);
  return idx>=0?toISODateLocal(dates[idx]):'';
};

// ── CONFLICT ENGINE ─────────────────────────────────────────────────────────────
const detectConflicts = jobs => {
  const out = new Map();
  const add = (id, issue) => { if(!out.has(id)) out.set(id,[]); out.get(id).push(issue); };
  jobs.forEach(job => {
    const jS=t2m(job.startTime), jE=jS+getJobDuration(job)*60;
    const required=getJobRequiredCleaners(job);
    if(job.cleanerIds.length<required)
      add(job.id,{type:'staffing',msg:`Richiede ${required} cleaner${required>1?'s':''} — assegnate solo ${job.cleanerIds.length}`});
    job.cleanerIds.forEach(cId=>{
      const cl=CLEANERS.find(c=>c.id===cId); if(!cl) return;
      if(!cl.days.includes(job.day)) add(job.id,{type:'unavailable',cId,msg:`${cl.name}: non disponibile ${DAY_IT[job.day]}`});
      // Holiday / off period — only checkable when the job carries a concrete date.
      if(job.dateISO && isCleanerUnavailableOnDate(cl, job.dateISO))
        add(job.id,{type:'unavailable',cId,msg:`${cl.name}: assente/ferie il ${job.dateISO}`});
      // Training check only for jobs with a known property
      if(jobRequiresTraining(job)&&!TRAINING[cId]?.includes(job.propertyId))
        add(job.id,{type:'untrained',cId,msg:`${cl.name}: non formata per ${getJobDisplayName(job)}`});
      // Overlap: temporary jobs block cleaner slots too — no prop required.
      // Flag BOTH overlapping jobs so each job's card shows the conflict
      // (previously only the earlier job was flagged).
      jobs.filter(o=>o.id!==job.id&&o.day===job.day&&o.cleanerIds.includes(cId)
      ).forEach(o=>{
        const oS=t2m(o.startTime), oE=oS+getJobDuration(o)*60;
        if(jS<oE&&jE>oS) add(job.id,{type:'overlap',cId,msg:`${cl.name}: già a ${getJobDisplayName(o)} (${o.startTime}–${m2t(oE)})`});
        else {
          // Non-overlapping: check travel buffer. Flag only on THIS job when it is the
          // later one (so each adjacent pair produces one message per job, not duplicated).
          if(jS>=oE){
            const issue=getTravelBufferIssue(cl.name, o, job);
            if(issue) add(job.id,{type:'travel',cId,msg:issue.msg});
          }
        }
      });
    });
  });
  return out;
};

  (p.type==='office'||p.type==='restaurant') && !jobs.some(j=>j.propertyId===p.id)
);
// All properties without any job this week (informational only)
const getAllUncovered = jobs => PROPERTIES.filter(p=>!jobs.some(j=>j.propertyId===p.id));
const computeCleanerStats = jobs => CLEANERS.map(cl=>{
  const assignedHrs=jobs.filter(j=>j.cleanerIds.includes(cl.id)).reduce((s,j)=>s+getJobDuration(j),0);
  const availDays=DAYS.filter(d=>cl.days.includes(d)).length;
  const capacityHrs=cl.weeklyHrs||availDays*MAX_HRS[cl.type];
  const pct=capacityHrs>0?Math.min(100,Math.round(assignedHrs/capacityHrs*100)):0;
  const daysWorked=new Set(jobs.filter(j=>j.cleanerIds.includes(cl.id)).map(j=>j.day)).size;
  const daysOverLimit=cl.workDays>0&&daysWorked>cl.workDays;
  return {cl,assignedHrs,capacityHrs,availDays,pct,daysWorked,daysOverLimit};
});

// ── RICHIESTE EXTRA PARSER ─────────────────────────────────────────────────────
// Reads free Italian text, extracts operational constraints.
// Returns: { daysOff, maxWeeklyHrs, maxDailyHrs, maxEndTime, parsed[] }
const parseExtraRequests = (text, weekOffset) => {
  const result = { daysOff:[], maxWeeklyHrs:null, maxDailyHrs:null, maxEndTime:null, parsed:[] };
  if (!text?.trim()) return result;

  const t = text.toLowerCase();

  // Week validity check — format "19/05/2026 – 25/05/2026" or "19/05 – 25/05"
  // (called separately, parser always runs regardless)

  // Day name map — Italian full + abbreviation
  const DAY_MAP = {
    'lunedì':'Mon','lunedi':'Mon','lun':'Mon',
    'martedì':'Tue','martedi':'Tue','mar':'Tue',
    'mercoledì':'Wed','mercoledi':'Wed','mer':'Wed',
    'giovedì':'Thu','giovedi':'Thu','gio':'Thu',
    'venerdì':'Fri','venerdi':'Fri','ven':'Fri',
    'sabato':'Sat','sab':'Sat',
    'domenica':'Sun','dom':'Sun',
  };

  // Context words that signal unavailability
  const OFF_CTX = ['riposa','riposo','fuori','non disponibile','assente','off','pausa','libera','libero'];

  // For each day name found, check if preceded (within 40 chars) by an off-context word
  Object.entries(DAY_MAP).forEach(([it,en])=>{
    const idx = t.indexOf(it);
    if(idx === -1) return;
    const before = t.slice(Math.max(0,idx-40), idx);
    if(OFF_CTX.some(ctx => before.includes(ctx)) || t.includes(`riposa ${it}`) || t.includes(`fuori ${it}`)){
      if(!result.daysOff.includes(en)){
        result.daysOff.push(en);
        result.parsed.push(`Non disponibile ${DAY_FULL[en]}`);
      }
    }
  });

  // Max daily hours: "max 6 ore al giorno", "max 6 ore giornaliere", "max 6h"
  const dailyM = t.match(/max(?:imo)?\s+(\d+(?:[.,]\d+)?)\s*(?:h\b|ore?\s*(?:al\s*giorno|giornali)?)/);
  if(dailyM){ result.maxDailyHrs=parseFloat(dailyM[1].replace(',','.')); result.parsed.push(`Max ${result.maxDailyHrs}h/giorno`); }

  // Max weekly hours: "max 30 ore questa settimana" / "max 30 ore settimanali"
  const weeklyM = t.match(/max(?:imo)?\s+(\d+)\s*ore?\s*(?:questa\s*)?settimana(?:li)?/);
  if(weeklyM){ result.maxWeeklyHrs=parseInt(weeklyM[1]); result.parsed.push(`Max ${result.maxWeeklyHrs}h/settimana`); }

  // Max end time: "max fino alle 15", "fino alle 15:30", "solo mattina" → 13:00
  const endM = t.match(/(?:max\s+)?fino\s+alle\s+(\d{1,2})(?::(\d{2}))?/);
  if(endM){ result.maxEndTime=`${endM[1].padStart(2,'0')}:${endM[2]||'00'}`; result.parsed.push(`Fine max ${result.maxEndTime}`); }
  else if(t.includes('solo mattina')||t.includes('solo la mattina')){ result.maxEndTime='13:00'; result.parsed.push('Solo mattina (max 13:00)'); }

  return result;
};

// Check if a "Valida per settimana" date range covers the current week
const isWeekValid = (weekStr, weekOffset) => {
  if(!weekStr?.trim()) return false;
  const dates = getWeekDates(weekOffset);
  const weekMon = dates[0]; const weekSun = dates[6];
  // Parse dates like "19/05/2026" or "19/05"
  const parts = weekStr.split(/[–\-—]/);
  const parseDate = s => {
    const clean = s.trim();
    const m = clean.match(/(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{4}))?/);
    if(!m) return null;
    const year = m[3] ? parseInt(m[3]) : weekMon.getFullYear();
    return new Date(year, parseInt(m[2])-1, parseInt(m[1]));
  };
  if(parts.length < 2) return false;
  const from = parseDate(parts[0]); const to = parseDate(parts[1]);
  if(!from||!to) return false;
  // Overlap: week range overlaps with validity range
  return from <= weekSun && to >= weekMon;
};

// Build constraint map: { cId: parsedResult } — only for valid weeks
const buildConstraints = (weekOffset) => {
  const out = {};
  CLEANERS.forEach(cl => {
    if(!cl.extraRequests?.trim()) return;
    const valid = !cl.extraWeek?.trim() || isWeekValid(cl.extraWeek, weekOffset);
    if(!valid) return;
    const parsed = parseExtraRequests(cl.extraRequests, weekOffset);
    if(parsed.daysOff.length||parsed.maxDailyHrs||parsed.maxWeeklyHrs||parsed.maxEndTime)
      out[cl.id] = { ...parsed, cleanerName: cl.name };
  });
  return out;
};

// ── AUTO-SCHEDULER — soft limits + richieste extra ─────────────────────────────
const runAutoSchedule = (allJobs, weekOffset=0) => {
  const constraints = buildConstraints(weekOffset);

  // A job counts as fully assigned only if it has enough cleaners for its requirement
  const isFullyAssigned = job => (job.cleanerIds||[]).length >= getJobRequiredCleaners(job);

  const weeklyHrs = Object.fromEntries(CLEANERS.map(cl=>[cl.id,0]));
  const dailyHrs  = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,0]))]));
  const daySched  = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,[]]))]));
  // Per-cleaner/per-day list of assigned JOB OBJECTS (needed for travel-buffer checks
  // within the SAME generation run — daySched only holds time slots, not areas).
  const dayJobs   = Object.fromEntries(CLEANERS.map(cl=>[cl.id,Object.fromEntries(DAYS.map(d=>[d,[]]))]));

  // Commit existing cleaners (incl. partial) into hour/overlap maps
  allJobs.filter(j=>(j.cleanerIds||[]).length>0).forEach(job=>{
    const dur=getJobDuration(job);
    job.cleanerIds.forEach(cId=>{
      weeklyHrs[cId]=(weeklyHrs[cId]||0)+dur;
      dailyHrs[cId]?.[job.day] && (dailyHrs[cId][job.day]+=dur);
      daySched[cId]?.[job.day]?.push({start:t2m(job.startTime),end:t2m(job.startTime)+dur*60});
      dayJobs[cId]?.[job.day]?.push(job);
    });
  });

  // Map each weekday to its ISO date for this week, for off/holiday checks.
  const weekDates = getWeekDates(weekOffset);
  const dayToISO = Object.fromEntries(DAYS.map((d,i)=>[d, toISODateLocal(weekDates[i])]));
  const jobDateISO = job => job.dateISO || dayToISO[job.day] || '';

  // Schedule jobs that are NOT yet fully staffed: zero-cleaner AND partial jobs
  // (cleanerIds.length < required). Existing cleaners are preserved; we only add
  // the missing number. Fully-assigned jobs are left untouched.
  const unassigned=[...allJobs.filter(j=>(j.cleanerIds||[]).length < getJobRequiredCleaners(j))].sort((a,b)=>{
    const dd=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    return dd!==0?dd:t2m(a.startTime)-t2m(b.startTime);
  });

  const newlyScheduled = unassigned.map(job=>{
    const needed=getJobRequiredCleaners(job);
    const existing=(job.cleanerIds||[]).slice(); // preserve existing assignments
    const missing=Math.max(0, needed-existing.length);
    const jS=t2m(job.startTime), jE=jS+getJobDuration(job)*60;
    const dISO=jobDateISO(job);

    const eligible=CLEANERS
      // Do not re-pick a cleaner already on this job
      .filter(cl=>!existing.includes(cl.id))
      // Training: only required if job has a known property
      .filter(cl=>!jobRequiresTraining(job)||TRAINING[cl.id]?.includes(job.propertyId))
      .filter(cl=>cl.days.includes(job.day))
      // HARD: skip if on holiday/off on this date
      .filter(cl=>!isCleanerUnavailableOnDate(cl, dISO))
      // HARD: skip if daysOff in constraints
      .filter(cl=>!(constraints[cl.id]?.daysOff||[]).includes(job.day))
      // HARD: skip if time overlap
      .filter(cl=>!(daySched[cl.id]?.[job.day]||[]).some(s=>jS<s.end&&jE>s.start))
      // HARD: skip if insufficient travel buffer vs any job already on this cleaner's
      // day (includes jobs assigned EARLIER in this same generation run, via dayJobs).
      .filter(cl=>!(dayJobs[cl.id]?.[job.day]||[]).some(o=>
        o.id!==job.id && getTravelBufferIssue(cl.name, o, job)
      ))
      // HARD: skip if maxEndTime would be exceeded
      .filter(cl=>{
        const maxEnd=constraints[cl.id]?.maxEndTime;
        return !maxEnd || jE <= t2m(maxEnd);
      })
      // SOFT: sort — prefer under daily limit, then under weekly limit, then fewest hours
      // Use contract limits (cl.dailyHrs / cl.weeklyHrs) as baseline, overridden by richieste extra
      .sort((a,b)=>{
        const aDailyLim = constraints[a.id]?.maxDailyHrs ?? a.dailyHrs;
        const bDailyLim = constraints[b.id]?.maxDailyHrs ?? b.dailyHrs;
        const aWeeklyLim = constraints[a.id]?.maxWeeklyHrs ?? a.weeklyHrs;
        const bWeeklyLim = constraints[b.id]?.maxWeeklyHrs ?? b.weeklyHrs;
        const aOver  = aDailyLim  && (dailyHrs[a.id]?.[job.day]||0)+getJobDuration(job) > aDailyLim  ? 1 : 0;
        const bOver  = bDailyLim  && (dailyHrs[b.id]?.[job.day]||0)+getJobDuration(job) > bDailyLim  ? 1 : 0;
        if(aOver!==bOver) return aOver-bOver;
        const aWOver = aWeeklyLim && (weeklyHrs[a.id]||0)+getJobDuration(job) > aWeeklyLim ? 1 : 0;
        const bWOver = bWeeklyLim && (weeklyHrs[b.id]||0)+getJobDuration(job) > bWeeklyLim ? 1 : 0;
        if(aWOver!==bWOver) return aWOver-bWOver;
        // Soft: prefer cleaners under their workDays limit (projected after this job)
        const getProjectedDays = (id, day) => { const s=new Set(Object.entries(dailyHrs[id]||{}).filter(([,h])=>h>0).map(([d])=>d)); s.add(day); return s.size; };
        const aDaysOver = getProjectedDays(a.id,job.day) > (a.workDays||5) ? 1 : 0;
        const bDaysOver = getProjectedDays(b.id,job.day) > (b.workDays||5) ? 1 : 0;
        if(aDaysOver!==bDaysOver) return aDaysOver-bDaysOver;
        return (weeklyHrs[a.id]||0)-(weeklyHrs[b.id]||0);
      });

    const pickNew=eligible.slice(0,missing);
    const pick=[...existing.map(id=>CLEANERS.find(c=>c.id===id)).filter(Boolean), ...pickNew];
    const jobDur=getJobDuration(job);
    // Only the NEW picks get committed to hour/overlap maps (existing already committed above).
    pickNew.forEach(cl=>{
      weeklyHrs[cl.id]=(weeklyHrs[cl.id]||0)+jobDur;
      dailyHrs[cl.id]?.[job.day] && (dailyHrs[cl.id][job.day]+=jobDur);
      daySched[cl.id]?.[job.day]?.push({start:jS,end:jE});
      dayJobs[cl.id]?.[job.day]?.push(job); // so later jobs in this run see it for travel-buffer
    });

    // Build specific soft-limit warnings per newly-picked cleaner
    const warnings=[];
    pickNew.forEach(cl=>{
      const c=constraints[cl.id];
      const dailyLim = c?.maxDailyHrs ?? cl.dailyHrs;
      const weeklyLim = c?.maxWeeklyHrs ?? cl.weeklyHrs;
      const daily = (dailyHrs[cl.id]?.[job.day]||0);
      const weekly = (weeklyHrs[cl.id]||0);
      const projDays = new Set(Object.entries(dailyHrs[cl.id]||{}).filter(([,h])=>h>0).map(([d])=>d)); projDays.add(job.day);
      if(dailyLim && daily > dailyLim) warnings.push(`${cl.name}: ${daily}h/${dailyLim}h/giorno`);
      else if(weeklyLim && weekly > weeklyLim) warnings.push(`${cl.name}: ${weekly}h/${weeklyLim}h/sett.`);
      else if(cl.workDays && projDays.size > cl.workDays) warnings.push(`${cl.name}: ${projDays.size}/${cl.workDays} giorni`);
    });

    return {
      ...job,
      cleanerIds:pick.map(c=>c.id),
      status:pick.length>=needed?'assigned':'needs_review',
      softLimitWarning: warnings.length>0 ? warnings.join(' · ') : null,
    };
  });

  return {
    jobs: [
      ...allJobs.filter(j=>(j.cleanerIds||[]).length >= getJobRequiredCleaners(j)).map(j=>({
        ...j,
        status: 'assigned',
      })),
      ...newlyScheduled,
    ],
    constraints,
  };
};

// ── AI CONTEXT ─────────────────────────────────────────────────────────────────
const buildSystemPrompt=(jobs,weekOffset)=>{
  const dates=getWeekDates(weekOffset);
  const sched=DAYS.map((day,i)=>{
    const dj=jobs.filter(j=>j.day===day).sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
    const ds=`${dates[i].getDate()} ${MON_IT[dates[i].getMonth()]}`;
    if(!dj.length) return `${DAY_FULL[day]} ${ds}: nessun turno`;
    return `${DAY_FULL[day]} ${ds}:\n`+dj.map(j=>{
      const name=getJobDisplayName(j);
      const dur=getJobDuration(j);
      const n=j.cleanerIds.map(id=>CLEANERS.find(c=>c.id===id)?.name).filter(Boolean).join(' + ');
      return `  • ${name} ${j.startTime}–${tAdd(j.startTime,dur)} → ${n||'NON ASSEGNATO'} [${j.type}]${j.note?' ('+j.note+')':''}`;
    }).join('\n');
  }).join('\n');
  const ci=CLEANERS.map(c=>{
    const t=(TRAINING[c.id]||[]).map(pid=>PROPERTIES.find(p=>p.id===pid)?.name).filter(Boolean);
    return `${c.name} (${c.type==='senior'?'SENIOR':c.type}, disp: ${c.days.map(d=>DAY_IT[d]).join('/')}): → ${t.join(', ')}`;
  }).join('\n');
  const uncov=getUncovered(jobs).map(p=>p.name).join(', ')||'nessuna';
  const extras=CLEANERS.filter(cl=>cl.extraRequests&&(!cl.extraWeek||isWeekValid(cl.extraWeek,weekOffset)))
    .map(cl=>`${cl.name}: "${cl.extraRequests}"${cl.extraWeek?' (valida '+cl.extraWeek+')':''}`).join('\n')||'nessuna';
  const propsStr=PROPERTIES.map(p=>{const req=p.cleanersRequired&&p.cleanersRequired>1?' · RICHIEDE '+p.cleanersRequired+' CLEANERS':'';return p.name+' (id:'+p.id+', '+p.type+', '+p.duration+'h'+req+(p.notes?' · '+p.notes:'')+')';}).join('\n');
  const actionBlock='[AZIONI]\n{"suggestions":[{"label":"Descrizione breve","actions":[{"type":"add|reassign|remove","propertyId":"pX","day":"Mon","startTime":"HH:MM","cleanerIds":["cX"],"note":""}]}]}\n['+'/AZIONI]';
  const seniors=CLEANERS.filter(c=>c.type==='senior').map(c=>c.name).join(', ')||'nessuna';
  return `Sei l'assistente scheduling di una cleaning company a Malta. Rispondi SEMPRE in italiano, conciso e operativo.\n\nCLEANERS:\n${ci}\n\nPROPRIETÀ:\n${propsStr}\n\nTURNI (${fmtWeek(weekOffset)}):\n${sched}\n\nRICHIESTE EXTRA QUESTA SETTIMANA:\n${extras}\n\nPROPRIETÀ NON COPERTE: ${uncov}\n\nREGOLE: 1) Solo cleaners formate per training matrix 2) No doppia assegnazione stesso orario 3) Rispetta cleanersRequired 4) Rispetta disponibilità e richieste extra 5) Senior cleaners: ${seniors} — non assumere siano formate su tutto: usa solo la training matrix\n\nQUANDO SUGGERISCI MODIFICHE AI TURNI: dopo la spiegazione in italiano, includi SEMPRE un blocco strutturato:\n${actionBlock}\n\nSolo per add: propertyId, day, startTime, cleanerIds, note.\nSolo per reassign: propertyId, day, startTime, cleanerIds (nuovi).\nSolo per remove: propertyId, day, startTime.\nMax 3 suggestions. Ometti il blocco se non stai suggerendo modifiche specifiche.`;
};

// ── WIW XLSX EXPORT ────────────────────────────────────────────────────────────
const exportWIW = (jobs, weekOffset) => {
  const dates = getWeekDates(weekOffset);
  const rows = [['First Name','Last Name','Date','Start Time','End Time','Job Site','Position','Notes','Type']];
  const sorted=[...jobs].sort((a,b)=>{
    const dd=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    return dd!==0?dd:t2m(a.startTime)-t2m(b.startTime);
  });
  sorted.forEach(job=>{
    const prop=PROPERTIES.find(p=>p.id===job.propertyId);
    const di=DAYS.indexOf(job.day);
    if(!job.dateISO) console.warn('[CleanFlow] Job missing dateISO, falling back to selected week', job);
    const dateStr=job.dateISO?fmtDate(parseISODateLocal(job.dateISO)||dates[di]):fmtDate(dates[di]);
    const start=fmtAMPM(job.startTime);
    const end=fmtAMPM(tAdd(job.startTime,getJobDuration(job)));
    const siteName=getJobDisplayName(job);
    if(job.cleanerIds.length===0){
      rows.push(['UNASSIGNED','',dateStr,start,end,siteName,'',job.note||'',job.type||'']);
    } else {
      job.cleanerIds.forEach(cId=>{
        const cl=CLEANERS.find(c=>c.id===cId); if(!cl) return;
        const [first,...rest]=cl.name.split(' ');
        rows.push([first,rest.join(' '),dateStr,start,end,siteName,cl.type==='senior'?'Senior Cleaner':'Cleaner',job.note||'',job.type||'']);
      });
    }
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:26},{wch:16},{wch:30},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Shifts');
  XLSX.writeFile(wb,`CleanFlow_WhenIWork_${fmtWeek(weekOffset).replace(/[–\s]/g,'_')}.xlsx`);
};

// ── OVERWRITE DIFF MODAL ───────────────────────────────────────────────────────
// Shown only when publishing a week that another device republished after we
// loaded it (serverVersionChanged). Compares local jobs vs the freshly-refetched
// published snapshot by operational key, so the supervisor sees what an overwrite
// would lose before confirming. Frontend-only; no backend involvement.
function OverwriteDiffModal({localJobs, publishedJobs, onConfirm, onClose}){
  const fmtJob = (job) => {
    const when = `${DAY_IT[job.day]||job.day||''}${job.dateISO?` ${job.dateISO}`:''} · ${job.startTime||'—'}`;
    const cleaners = (job.cleanerIds||[])
      .map(id=>CLEANERS.find(c=>c.id===id)?.name?.split(' ')[0])
      .filter(Boolean).join(', ');
    const svc = job.serviceTypeId || job.type || '';
    return { name:getJobDisplayName(job), when, cleaners, svc };
  };

  const localKeys = new Map((localJobs||[]).map(j=>[getJobOperationalKey(j), j]));
  const serverKeys = new Map((publishedJobs||[]).map(j=>[getJobOperationalKey(j), j]));
  const lost   = [...serverKeys].filter(([k])=>!localKeys.has(k)).map(([,j])=>j);   // in published, not local
  const onlyMine = [...localKeys].filter(([k])=>!serverKeys.has(k)).map(([,j])=>j); // in local, not published
  const commonCount = [...localKeys].filter(([k])=>serverKeys.has(k)).length;

  // Display-layer diff for jobs present in BOTH versions (same operational key)
  // but changed in assignment/metadata. getJobOperationalKey stays assignment-
  // independent (used elsewhere for dedup), so we compare these fields here only.
  const sortedIds = ids => [...(ids||[])].map(String).sort().join(',');
  const cleanersFirstNames = job => (job.cleanerIds||[])
    .map(id=>CLEANERS.find(c=>c.id===id)?.name?.split(' ')[0])
    .filter(Boolean).join(', ') || '—';
  const modified = [...localKeys]
    .filter(([k])=>serverKeys.has(k))
    .map(([k, localJob])=>{
      const serverJob = serverKeys.get(k);
      const cleanersDiffer = sortedIds(localJob.cleanerIds) !== sortedIds(serverJob.cleanerIds);
      const noteDiffers = (localJob.note||'') !== (serverJob.note||'');
      const statusDiffers = (localJob.status||'') !== (serverJob.status||'');
      const priorityDiffers = (localJob.priority||'') !== (serverJob.priority||'');
      if(cleanersDiffer || noteDiffers || statusDiffers || priorityDiffers){
        return { localJob, serverJob, cleanersDiffer, noteDiffers, statusDiffers, priorityDiffers };
      }
      return null;
    })
    .filter(Boolean);

  const Row = ({job, tone}) => {
    const f = fmtJob(job);
    return (
      <div style={{padding:'8px 10px',borderRadius:8,background:tone==='lost'?'#FEF2F2':'#F0FDF4',border:`1px solid ${tone==='lost'?'#FECACA':'#BBF7D0'}`,marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>
          {f.when}{f.svc?` · ${f.svc}`:''}{f.cleaners?` · 👤 ${f.cleaners}`:' · non assegnato'}
        </div>
      </div>
    );
  };

  return (<>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>⚠️ Stai per sovrascrivere una versione più recente</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
      Un altro dispositivo ha pubblicato questa settimana dopo che l'hai caricata. Controlla cosa cambia prima di confermare.
    </div>

    <div style={{fontSize:13,fontWeight:800,color:C.conflict,margin:'4px 0 8px'}}>
      🗑 Turni che verranno persi se sovrascrivi ({lost.length})
    </div>
    {lost.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno — la tua versione contiene tutti i turni della versione pubblicata.</div>
      : <div style={{marginBottom:12}}>{lost.map((j,i)=><Row key={'l'+i} job={j} tone="lost"/>)}</div>}

    <div style={{fontSize:13,fontWeight:800,color:'#166534',margin:'4px 0 8px'}}>
      ➕ Turni presenti solo nella tua versione ({onlyMine.length})
    </div>
    {onlyMine.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno.</div>
      : <div style={{marginBottom:12}}>{onlyMine.map((j,i)=><Row key={'m'+i} job={j} tone="mine"/>)}</div>}

    <div style={{fontSize:13,fontWeight:800,color:'#92400E',margin:'4px 0 8px'}}>
      ✏️ Turni modificati in entrambe le versioni ({modified.length})
    </div>
    {modified.length===0
      ? <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Nessuno.</div>
      : <div style={{marginBottom:12}}>{modified.map((m,i)=>{
          const f = fmtJob(m.localJob);
          return (
            <div key={'mod'+i} style={{padding:'8px 10px',borderRadius:8,background:'#FFFBEB',border:'1px solid #FCD34D',marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.name}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{f.when}{f.svc?` · ${f.svc}`:''}</div>
              {m.cleanersDiffer && <div style={{fontSize:11,color:'#92400E',marginTop:4}}>
                👤 Loro: {cleanersFirstNames(m.serverJob)} · Tua versione: {cleanersFirstNames(m.localJob)}
              </div>}
              {m.noteDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>📝 Note diverse</div>}
              {m.statusDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>🔖 Stato diverso ({m.serverJob.status||'—'} → {m.localJob.status||'—'})</div>}
              {m.priorityDiffers && <div style={{fontSize:11,color:'#92400E',marginTop:2}}>⚑ Priorità diversa</div>}
            </div>
          );
        })}</div>}

    <div style={{fontSize:11,color:C.muted,marginBottom:18}}>Turni in comune: {commonCount}{modified.length>0?` (di cui ${modified.length} modificati)`:''}</div>

    <div style={{display:'flex',gap:10}}>
      <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
      <button onClick={onConfirm} style={{flex:1,padding:'12px',borderRadius:10,background:C.conflict,color:'white',fontWeight:800,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Pubblica e sovrascrivi</button>
    </div>
  </>);
}
