          <button onClick={()=>doLoadTemplate(false)} disabled={sheetLoading||!!templateDiagnostics?.blockedReason||templateDiagnostics?.importedRows===0} style={{flex:jobs.length>0?1:2,padding:'12px',borderRadius:10,background:(sheetLoading||templateDiagnostics?.blockedReason||templateDiagnostics?.importedRows===0)?'#DDD':C.nav,color:'white',fontWeight:800,fontSize:13,border:'none',cursor:(sheetLoading||templateDiagnostics?.blockedReason||templateDiagnostics?.importedRows===0)?'not-allowed':'pointer',fontFamily:'inherit'}}>{sheetLoading?'Caricamento…':jobs.length>0?'Sostituisci':'✓ Carica'}</button>
        </div>
      </Modal>}

      {modal==='hostaway'&&<Modal onClose={()=>setModal(null)}><HostawayModal onImport={doImportHostaway} onClose={()=>setModal(null)} weekOffset={weekOffset}/></Modal>}
      {modal==='generateResult'&&<Modal onClose={()=>{setModal(null);setGenerateResult(null);}}><GenerateModal result={generateResult} constraints={generateResult?.constraints} onConfirm={applyGenerate} onClose={()=>{setModal(null);setGenerateResult(null);}} onGenerate={(startDay,endDay)=>handleGenerate(startDay,endDay)}/></Modal>}
      {modal==='add'&&<Modal onClose={()=>setModal(null)}><JobForm initial={{propertyId:'',day:selDay,startTime:'09:00',cleanerIds:[],note:'',type:'extra'}} onSave={saveJob}/></Modal>}
      {modal==='edit'&&editJob&&<Modal onClose={()=>setModal(null)}><JobForm initial={{propertyId:editJob.propertyId,day:editJob.day,startTime:editJob.startTime,cleanerIds:[...editJob.cleanerIds],note:editJob.note||'',type:editJob.type||'extra'}} onSave={saveJob} onDelete={deleteJob}/></Modal>}
      {/* ── LAST MINUTE MODAL ─── */}
      {modal==='lastminute'&&lmForm&&<Modal onClose={()=>setModal(null)}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:C.text,marginBottom:14}}>{lmForm.editingJobId?'✎ Modifica Last Minute Duty':'➕ Last Minute Duty'}</div>
        {lmForm.error&&<div style={{background:'#FDE8E8',border:'1px solid #DC3545',borderRadius:8,padding:'8px 12px',marginBottom:10,fontSize:12,color:C.conflict}}>{lmForm.error}</div>}
        {/* Date + Day */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Data</label>
            <input type="date" value={lmForm.dateISO} onChange={e=>{const d=parseISODateLocal(e.target.value);const dow=d?d.getDay():0;setLmForm(f=>({...f,dateISO:e.target.value,day:DAYS[dow===0?6:dow-1]}));}} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Giorno</label>
            <div style={{padding:'8px',borderRadius:8,background:'#F0EDE8',fontSize:13,color:C.muted}}>{DAY_FULL[lmForm.day]||lmForm.day}</div></div>
        </div>
        {/* Property or Temp Location */}
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Proprietà (se esistente)</label>

            {PROPERTIES.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}

        {!lmForm.propertyId&&<div style={{marginBottom:10}}>
          <label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Temporary Location *</label>

        </div>}
        {/* Service Type + Time */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Service Type</label>
            <select value={lmForm.serviceTypeId} onChange={e=>setLmForm(f=>({...f,serviceTypeId:e.target.value}))} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}>
              {[...SERVICE_TYPE_IDS].map(s=><option key={s} value={s}>{s.replace(/_/g,' ')}</option>)}
            </select></div>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Start Time</label>
            <input value={lmForm.startTime} onChange={e=>setLmForm(f=>({...f,startTime:e.target.value}))} placeholder="15:00" style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}/></div>
        </div>
        {/* Duration + Cleaners Required + Priority */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Duration (h)</label>
            <input type="number" min="0.5" step="0.5" value={lmForm.duration} onChange={e=>setLmForm(f=>({...f,duration:e.target.value}))} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Cleaners req.</label>
            <input type="number" min="1" max="4" value={lmForm.cleanersRequired} onChange={e=>setLmForm(f=>({...f,cleanersRequired:e.target.value}))} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Priority</label>
            <select value={lmForm.priority} onChange={e=>setLmForm(f=>({...f,priority:e.target.value}))} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}>
              {['Low','Normal','High','Urgent'].map(p=><option key={p}>{p}</option>)}</select></div>
        </div>

        {[1,2,3].map(n=>{
          const selectedOtherCleaners=[1,2,3].filter(x=>x!==n).map(x=>lmForm[`cleaner${x}`]).filter(Boolean);

          <label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Cleaner {n} (opzionale)</label>
          <select value={lmForm[`cleaner${n}`]} onChange={e=>setLmForm(f=>({...f,[`cleaner${n}`]:e.target.value}))} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}>
            <option value="">— Non assegnata —</option>
            {CLEANERS.filter(c=>!selectedOtherCleaners.includes(c.id)).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>);
        })}
        {/* Notes */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:C.muted,display:'block',marginBottom:3}}>Note</label>
          <input value={lmForm.note} onChange={e=>setLmForm(f=>({...f,note:e.target.value}))} style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid #E0DBD4',fontFamily:'inherit',fontSize:13}}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setModal(null)} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
          {lmForm.editingJobId&&<button onClick={()=>{if(blockIfWeekMismatch()) return; if(confirm('Eliminare questo turno last minute?')){setJobs(p=>p.filter(j=>j.id!==lmForm.editingJobId));setModal(null);showToast('✓ Last minute eliminato');}}} style={{flex:1,padding:'12px',borderRadius:10,background:C.card,color:C.conflict,fontWeight:700,fontSize:13,border:`2px solid ${C.conflict}`,cursor:'pointer',fontFamily:'inherit'}}>🗑️ Elimina</button>}
          <button onClick={saveLmJob} style={{flex:2,padding:'12px',borderRadius:10,background:'#9D174D',color:'white',fontWeight:800,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>{lmForm.editingJobId?'✓ Salva modifiche':'✓ Aggiungi Last Minute'}</button>
        </div>
      </Modal>}

      {/* ── SOLVER RESULT MODAL ─── */}
      {modal==='solver'&&lmSolverResult&&<Modal onClose={()=>{setModal(null);setLmSolverResult(null);}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:C.text,marginBottom:14}}>🔎 Trova soluzione</div>
        {AI_ENABLED&&lmSolverResult.loading&&<div style={{color:C.muted,fontSize:13,marginBottom:10}}>⏳ AI in elaborazione... (il risultato locale è già disponibile sotto)</div>}
        {AI_ENABLED&&lmSolverResult.aiText&&<div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'12px',marginBottom:14,fontSize:13,whiteSpace:'pre-line'}}>
          <div style={{fontWeight:800,color:'#1D4ED8',marginBottom:4}}>✨ AI suggerisce:</div>
          {lmSolverResult.aiText}
        </div>}
        {!lmSolverResult.aiText&&!lmSolverResult.loading&&<div style={{background:'#F9F8F5',borderRadius:8,padding:'8px 12px',marginBottom:10,fontSize:11,color:C.muted}}>Soluzione calcolata automaticamente dal solver locale</div>}
        {/* Recommended */}
        {lmSolverResult.options.recommended?(<div style={{background:'#F0FFF4',border:'1px solid #86EFAC',borderRadius:10,padding:'12px',marginBottom:10}}>
          <div style={{fontWeight:800,color:'#166534',fontSize:13,marginBottom:4}}>✅ Soluzione consigliata</div>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>{lmSolverResult.options.recommended.cleanerName}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{lmSolverResult.options.recommended.reason}</div>
          <button onClick={()=>applySolverAction(lmSolverResult.options.recommended.action)} style={{marginTop:10,width:'100%',padding:'9px',borderRadius:8,background:'#166534',color:'white',fontWeight:800,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>✓ Applica soluzione</button>
        </div>):null}
        {/* Alternatives */}
        {lmSolverResult.options.alternatives?.length>0&&<div style={{marginBottom:10}}>
          <div style={{fontWeight:700,color:C.muted,fontSize:11,marginBottom:6}}>ALTERNATIVE</div>
          {lmSolverResult.options.alternatives.map((a,i)=>(
            <div key={i} style={{background:'#F9F8F5',borderRadius:8,padding:'10px 12px',marginBottom:6,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
              <div><div style={{fontSize:13,fontWeight:700,color:C.text}}>{a.cleanerName}</div><div style={{fontSize:11,color:C.muted}}>{a.reason}</div></div>
              <button onClick={()=>applySolverAction(a.action)} style={{padding:'6px 12px',borderRadius:8,background:C.nav,color:'white',fontWeight:700,fontSize:12,border:'none',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>Applica</button>
            </div>
          ))}
        </div>}
        {/* Escalation */}
        {/* Rescue Split — shown only when no normal recommendation, BEFORE escalation */}
        {!lmSolverResult.options.recommended && lmSolverResult.options.rescueOptions?.length>0&&(
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:800,color:'#92400E',background:'#FEF3C7',border:'1px solid #FCD34D',borderRadius:8,padding:'8px 12px',marginBottom:8}}>
              🆘 Ultima spiaggia: Rescue Split
            </div>
            {lmSolverResult.options.rescueOptions.map((ro,ri)=>(
              <div key={ri} style={{background:'#FFF7ED',border:'1px solid #FDBA74',borderRadius:10,padding:'12px',marginBottom:8,fontSize:12}}>
                <div style={{fontWeight:800,fontSize:13,color:'#9A3412',marginBottom:4}}>
                  {ro.cleanerName} — rilascio {ro.releaseTime}
                  {ro.sameArea&&<span style={{marginLeft:8,fontSize:11,color:'#15803D',fontWeight:700}}>✓ stessa area</span>}
                </div>
                <div style={{color:'#78350F',marginBottom:2}}>
                  <strong>Fonte:</strong> {ro.donorPropertyName} {ro.donorStartTime}–{ro.donorEndTime}
                  {' '}· team: {ro.donorOriginalTeamNames.join(', ')}
                  {' '}· completato {Math.round(ro.completedPct*100)}%
                </div>
                <div style={{color:'#78350F',marginBottom:2}}>
                  <strong>Rimanenti sulla fonte:</strong> {ro.remainingCleanerNames.join(', ')||'—'}
                </div>
                <div style={{color:'#78350F',marginBottom:2}}>
                  <strong>Target:</strong> {ro.targetPropertyName} {ro.targetStartTime}–{ro.targetEndTime}
                  {' '}· viaggio {ro.travelMinutes} min
                </div>
                <div style={{color:'#78350F',marginBottom:4,display:'flex',gap:12,flexWrap:'wrap'}}>
                  <span>Formazione: {ro.targetTrainingOk?'✓':'✗'}</span>
                  <span>Genere target: {ro.targetGenderOk?'✓':'✗'}</span>
                  <span>Perdita: {Math.round(ro.lostWorkerMinutes/6)/10}h lavoro</span>
                </div>
                {ro.sourceGenderRelaxed&&<div style={{fontSize:11,color:'#92400E',marginBottom:3}}>ℹ️ Requisito genere fonte rilassato (completamento ≥50%)</div>}
                {ro.warnings.map((w,wi)=><div key={wi} style={{fontSize:11,color:'#B91C1C',fontStyle:'italic',marginTop:2}}>⚠️ {w}</div>)}
              </div>
            ))}
          </div>
        )}
        {lmSolverResult.options.escalation&&<div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:10,padding:'12px',marginBottom:10}}>
          <div style={{fontWeight:800,color:'#856404',fontSize:13,marginBottom:4}}>{lmSolverResult.options.rescueOptions?.length>0?'⚠️ Se nessuna Rescue Split è accettabile:':'⚠️ Escalation richiesta'}</div>
          <div style={{fontSize:12,color:'#92400E',marginBottom:6}}>{lmSolverResult.options.escalation.reason}</div>
          {lmSolverResult.options.escalation.options.map((o,i)=><div key={i} style={{fontSize:12,color:'#92400E'}}>• {o}</div>)}
        </div>}
        {/* Rejected */}
        {lmSolverResult.options.rejected?.length>0&&<details style={{marginTop:8}}>
          <summary style={{fontSize:11,color:C.muted,cursor:'pointer'}}>Cleaners non disponibili ({lmSolverResult.options.rejected.length})</summary>
          <div style={{marginTop:6}}>
            {lmSolverResult.options.rejected.map((r,i)=><div key={i} style={{fontSize:11,color:C.muted,padding:'3px 0'}}>• {r.cleanerName}: {r.reason}</div>)}
          </div>
        </details>}
        <button onClick={()=>{setModal(null);setLmSolverResult(null);}} style={{marginTop:12,width:'100%',padding:'10px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Chiudi</button>
      </Modal>}

      {modal==='wiw'&&<Modal onClose={()=>setModal(null)}><WIWExportModal jobs={jobs} weekOffset={weekOffset} wf={wf} conflicts={conflicts} showToast={showToast} planningWeekOffset={planningWeekOffset}/></Modal>}
      {modal==='overwriteDiff'&&<Modal onClose={()=>setModal(null)}><OverwriteDiffModal localJobs={jobs} publishedJobs={publishedJobsSnapshot?.jobs||[]} onClose={()=>setModal(null)} onConfirm={()=>{setModal(null); publishCurrentSchedule(true);}}/></Modal>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);</script></body></html>
