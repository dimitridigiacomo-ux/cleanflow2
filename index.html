// ── WORKFLOW BANNER ────────────────────────────────────────────────────────────
// ─── Published schedule banner (shared desktop + mobile) ──────────────────
// Renders three states: published-clean, dirty (unpublished changes), and
// unpublished-week (no published snapshot but local jobs exist).
// issueCount uses a real union: jobs that are either in conflict OR needs_review.
function PublishedScheduleBanner({
  publishedStatus, publishedJobsSnapshot, dirty, draftRestored, publishing,
  jobs, conflicts, weekMismatchActive,
  onPublish, onDiscard, compact=false,
}){
  const pad = compact ? '7px 14px' : '6px 24px';
  const fs = compact ? 12 : 11;
  // Real union issue count across current jobs
  const issueCount = jobs.filter(j => (conflicts && conflicts.has && conflicts.has(j.id)) || j.status==='needs_review').length;
  // Published-snapshot issue count (for clean-state badge): compute conflicts from
  // the SNAPSHOT itself, not from current jobs — current jobs may have diverged.
  const snapConflicts = publishedJobsSnapshot ? detectConflicts(publishedJobsSnapshot.jobs) : null;
  const snapIssueCount = publishedJobsSnapshot
    ? publishedJobsSnapshot.jobs.filter(j => (snapConflicts && snapConflicts.has && snapConflicts.has(j.id)) || j.status==='needs_review').length
    : 0;

  const btnPublish = (label) => (
    <button onClick={onPublish} disabled={publishing} style={{padding:compact?'6px 12px':'4px 12px',borderRadius:8,background:'#9D174D',color:'white',fontWeight:800,fontSize:fs,border:'none',cursor:publishing?'not-allowed':'pointer',fontFamily:'inherit',opacity:publishing?0.6:1}}>{publishing?'Pubblicazione…':label}</button>
  );
  const btnDiscard = (
    <button onClick={onDiscard} disabled={publishing} style={{padding:compact?'6px 10px':'4px 10px',borderRadius:8,background:C.card,color:C.warn,fontWeight:700,fontSize:fs,border:'1px solid #FCD34D',cursor:publishing?'not-allowed':'pointer',fontFamily:'inherit'}}>🗑 Scarta modifiche</button>
  );
  const issueBadge = (n) => n>0 ? <span style={{marginLeft:4,padding:'1px 8px',borderRadius:6,background:'#FEE2E2',color:'#991B1B',fontWeight:700}}>⚠ {n} da rivedere</span> : null;

  // State 1 & 2: a published snapshot exists for this week
  if(publishedStatus==='loaded' && publishedJobsSnapshot){
    return (
      <div style={{
        background:dirty?'#FFFBEB':'#EEF2FF',
        borderBottom:`1px solid ${dirty?'#FCD34D':'#C7D2FE'}`,
        padding:pad,fontSize:fs,
        color:dirty?'#92400E':'#3730A3',
        display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        {dirty ? (
          <>
            <span>⚠️</span>
            <span style={{fontWeight:800}}>Modifiche non pubblicate</span>
            {!compact && <span style={{color:'#B45309'}}>— pubblica per renderle visibili su altri dispositivi.</span>}
            {issueBadge(issueCount)}
            {draftRestored && <span style={{marginLeft:6,padding:'1px 8px',borderRadius:6,background:'#FEF3C7',color:'#92400E',fontWeight:700}}>📝 Bozza locale ripristinata</span>}
            <span style={{flex:1}}/>
            {btnPublish('📤 Pubblica turni')}
            {btnDiscard}
          </>
        ) : (
          <>
            <span>📡</span>
            <span style={{fontWeight:700}}>Piano pubblicato</span>
            {publishedJobsSnapshot.meta.weekStartISO && publishedJobsSnapshot.meta.weekEndISO && <span style={{color:'#6366F1'}}>· {formatDayMonth(publishedJobsSnapshot.meta.weekStartISO)}–{formatDayMonth(publishedJobsSnapshot.meta.weekEndISO)}</span>}
            <span style={{color:'#6366F1'}}>· {formatRelativeTimeIt(publishedJobsSnapshot.meta.publishedAt)}</span>
            {!compact && <span style={{color:'#6366F1',opacity:0.7}} title={publishedJobsSnapshot.meta.publishedAt?new Date(publishedJobsSnapshot.meta.publishedAt).toLocaleString('it-IT'):''}>({publishedJobsSnapshot.meta.publishedAt?new Date(publishedJobsSnapshot.meta.publishedAt).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'})</span>}
            {publishedJobsSnapshot.meta.publishedBy&&<span style={{color:'#6366F1'}}>· da {publishedJobsSnapshot.meta.publishedBy}</span>}
            <span style={{color:'#6366F1'}}>· {publishedJobsSnapshot.jobs.length} turni</span>
            {issueBadge(snapIssueCount)}
            <span style={{flex:1}}/>
            <button disabled title="Tutto pubblicato" style={{padding:compact?'6px 12px':'4px 12px',borderRadius:8,background:'rgba(99,102,241,0.08)',color:'#9CA3AF',fontWeight:600,fontSize:fs,border:'1px solid #E5E7EB',cursor:'not-allowed',fontFamily:'inherit'}}>✓ Tutto pubblicato</button>
          </>
        )}
      </div>
    );
  }

  // State 3: no published snapshot, but local jobs exist for this week
  if(publishedStatus==='none' && !weekMismatchActive && jobs.length>0){
    return (
      <div style={{background:'#F0FDF4',borderBottom:'1px solid #BBF7D0',padding:pad,fontSize:fs,color:'#166534',display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        <span>📋</span>
        <span style={{fontWeight:700}}>Settimana non ancora pubblicata</span>
        <span style={{color:'#15803D'}}>· {jobs.length} turni locali</span>
        {issueBadge(issueCount)}
        <span style={{flex:1}}/>
        {btnPublish('📤 Pubblica turni')}
        {jobs.length>0 && <button onClick={onDiscard} disabled={publishing} style={{padding:compact?'6px 10px':'4px 10px',borderRadius:8,background:C.card,color:C.ok,fontWeight:700,fontSize:fs,border:'1px solid #BBF7D0',cursor:publishing?'not-allowed':'pointer',fontFamily:'inherit'}}>🗑 Scarta</button>}
      </div>
    );
  }

  return null;
}

function WorkflowBanner({wf,onLoadTemplate,onImportHostaway,onGenerate,onExport,totalC,isDesktop}){
  const step=wf.shiftsGenerated&&!wf.staleGeneration?4:wf.hostawayLoaded?3:wf.templateLoaded?2:1;
  const stale=wf.staleGeneration;

  if(isDesktop) return null; // desktop uses sidebar steps

  const steps=[
    {n:1,label:'Template',done:wf.templateLoaded},
    {n:2,label:'Hostaway',done:wf.hostawayLoaded},
    {n:3,label:'Genera',done:wf.shiftsGenerated&&!stale},
    {n:4,label:'Export',done:false},
  ];

  return(
    <div style={{background:C.card,borderBottom:'1px solid #E8E5E0',padding:'10px 16px'}}>
      {stale&&(
        <div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:10,padding:'8px 12px',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:16}}>⚠️</span>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:'#856404'}}>Dati aggiornati dopo la generazione</div>
            <div style={{fontSize:11,color:'#92400E'}}>Rigenera i turni prima di esportare</div>
          </div>
          <button onClick={()=>onGenerate()} style={{marginLeft:'auto',background:'#856404',color:'white',border:'none',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>Rigenera</button>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        {steps.map((s,i)=>(
          <div key={s.n} style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
            <div style={{width:22,height:22,borderRadius:'50%',background:s.done?C.ok:step===s.n?C.nav:'#E0DDD8',color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>
              {s.done?'✓':s.n}
            </div>
            <span style={{fontSize:11,fontWeight:step===s.n?800:500,color:step===s.n?C.nav:C.muted}}>{s.label}</span>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:'#E0DDD8',margin:'0 4px'}}/>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── HOSTAWAY IMPORT MODAL ──────────────────────────────────────────────────────
function HostawayModal({onImport,onClose,weekOffset=0}){
  const [mode,setMode]=useState('api'); // 'api'|'file' (demo kept internally, not in UI)
  const [parsed,setParsed]=useState(null);
  const [rawRows,setRawRows]=useState(null); // cached parsed CSV data for re-parsing on format change
  const [dateFormat,setDateFormat]=useState('DMY'); // 'DMY' | 'YMD' | 'MDY'
  const [err,setErr]=useState('');
  const fileRef=useRef(null);

  const parseHostawayDate=(dateStr,fmt)=>{
    const clean=(dateStr||'').trim();
    // YYYY-MM-DD always wins regardless of format setting (unambiguous)
    const ymd=clean.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
    if(ymd){
      const y=parseInt(ymd[1]),mo=parseInt(ymd[2]),da=parseInt(ymd[3]);
      const d=new Date(y,mo-1,da);
      // Reject auto-corrected dates (e.g. 31/02 → 03/03)
      if(d.getFullYear()!==y||d.getMonth()!==mo-1||d.getDate()!==da) return null;
      return d;
    }
    const m=clean.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if(!m) return null;
    const a=parseInt(m[1]);
    const b=parseInt(m[2]);
    const y=parseInt(m[3]);
    let dayN, monthN;
    if(fmt==='MDY'){ monthN=a; dayN=b; }
    else { dayN=a; monthN=b; } // DMY default
    const d=new Date(y,monthN-1,dayN);
    if(d.getFullYear()!==y||d.getMonth()!==monthN-1||d.getDate()!==dayN) return null;
    return d;
  };

  const normalizeTime = t => {
    const m=(t||'').trim().match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return '10:00';
    const h=parseInt(m[1]);
    const min=parseInt(m[2]);
    if(h<0||h>23||min<0||min>59) return '10:00';
    return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
  };

  const parseRows=(rows,fmt)=>{
    const out=[];
    const diag={total:rows.length,imported:0,invalidDates:0,unmappedProps:0};
    rows.forEach(r=>{
      const d=parseHostawayDate(r.dateStr,fmt);
      if(!d){ diag.invalidDates++; return; }
      const dow=d.getDay();
      const dayKey=DAYS[dow===0?6:dow-1];
      const dateISO=toISODateLocal(d);
      const startTime=normalizeTime(r.timeStr);
      const propId=PROP_NAME_MAP[r.propName.toLowerCase()];
      if(!propId){ diag.unmappedProps++; return; }
      const note=`Hostaway checkout ${r.dateStr}`;
      out.push({
        propertyId:propId,
        day:dayKey,
        dateISO,
        startTime,
        note,
        type:'checkout',
        source:'hostaway_csv',
        serviceTypeId: inferServiceTypeId(propId, note),
        status:'unassigned',
        cleanerIds:[]
      });
    });
    diag.imported=out.length;
    return {jobs:out,diag};
  };

  const [diagnostics,setDiagnostics]=useState(null);

  // ── API mode state ──
  const [apiLoading,setApiLoading]=useState(false);
  const [apiError,setApiError]=useState('');
  const [apiResult,setApiResult]=useState(null); // { jobs, diagnostics }
  const loadFromApi=async()=>{
    setApiError(''); setApiResult(null); setApiLoading(true);
    try{
      const startDate=getWeekStartISO(weekOffset);
      const endDate=getWeekEndISO(weekOffset);
      const url=`${PUBLISHED_API_URL}?action=hostawayReservations&startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`;
      const res=await fetch(url,{redirect:'follow'});
      const data=await res.json();
      if(!data||data.ok!==true){
        setApiError('Errore API: '+((data&&data.error)||('HTTP '+res.status))+(data&&data.stage?` (${data.stage})`:''));
        setApiLoading(false);
        return;
      }
      const result=generateApiJobsFromReservations(data.reservations||[], weekOffset);
      // Carry backend diagnostics (excluded statuses, pages) for display.
      result.diagnostics.backend=data.diagnostics||null;
      result.diagnostics.rawCount=data.rawCount!=null?data.rawCount:null;
      setApiResult(result);
    }catch(e){
      setApiError('Errore di rete: '+String(e.message||e));
    }
    setApiLoading(false);
  };

  // Re-parse whenever rawRows or dateFormat changes
  useEffect(()=>{
    if(!rawRows) return;
    const {jobs:out,diag}=parseRows(rawRows,dateFormat);
    setParsed(out);
    setDiagnostics(diag);
    setErr(out.length===0?'Nessun checkout valido — verifica formato data e mappatura proprietà nel tab "Hostaway Map".':'');
  },[rawRows,dateFormat]);

  const handleFile=e=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        const rows=parseCSV(text);
        if(rows.length<2){setErr('File CSV vuoto o non valido.'); return;}
        const headers=rows[0].map(h=>h.toLowerCase());
        const nameIdx=headers.findIndex(h=>h.includes('listing')||h.includes('property'));
        const dateIdx=headers.findIndex(h=>h.includes('check-out')||h.includes('checkout'));
        const timeIdx=headers.findIndex(h=>h.includes('time'));
        if(nameIdx<0||dateIdx<0){setErr('Colonne non trovate. Assicurati che il CSV Hostaway abbia "Listing Name" e "Check-out".'); return;}
        const extracted=rows.slice(1).map(cells=>({
          propName:(cells[nameIdx]||'').trim(),
          dateStr:(cells[dateIdx]||'').trim(),
          timeStr:timeIdx>=0?(cells[timeIdx]||'').trim():'10:00',
        }));
        setRawRows(extracted);
        // useEffect will re-parse using current dateFormat
      }catch(e2){setErr('Errore nel parsing del CSV. '+e2.message);}
    };
    reader.readAsText(file);
  };

  const demoDates=getWeekDates(weekOffset);
  const demoRows=DEMO_HOSTAWAY.map(r=>{
    const propId=PROP_NAME_MAP[r.propertyName.toLowerCase()];
    if(!propId) return null;
    const dayIdx=DAYS.indexOf(r.day);
    const dateISO=dayIdx>=0?toISODateLocal(demoDates[dayIdx]):'';
    return {propertyId:propId,day:r.day,dateISO,startTime:r.startTime,note:r.note,type:'checkout',source:'hostaway_csv',serviceTypeId:inferServiceTypeId(propId,r.note),status:'unassigned',cleanerIds:[]};
  }).filter(Boolean);

  const toLoad=mode==='demo'?demoRows:(mode==='api'?(apiResult?apiResult.jobs:null):parsed);

  return(
    <>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>📥 Importa da Hostaway</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Carica il CSV checkout della prossima settimana da Hostaway → Reservations → Download Report</div>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {[['api','API Hostaway'],['file','CSV reale']].map(([v,l])=>(
          <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:'10px',borderRadius:10,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit',background:mode===v?C.nav:'#F0EDE8',color:mode===v?'white':C.text}}>
            {l}
          </button>
        ))}
      </div>

      {mode==='file'&&(
        <div style={{marginBottom:16}}>
          <div style={{background:'#F0F7FF',borderRadius:10,padding:'12px 14px',marginBottom:10,fontSize:12,color:'#2A5FA0',fontWeight:600}}>
            📋 Colonne richieste nel CSV Hostaway:<br/>
            <span style={{fontFamily:'monospace',fontSize:11}}>"Listing Name", "Check-out" (data), "Check-out Time" (opzionale)</span>
          </div>
          <button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:'14px',borderRadius:12,border:'2px dashed #E0DDD8',background:C.card,cursor:'pointer',fontFamily:'inherit',fontSize:14,color:C.muted,fontWeight:700}}>
            📂 Seleziona file CSV
          </button>
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{display:'none'}}/>
          {err&&<div style={{color:C.conflict,fontSize:12,marginTop:8,fontWeight:700}}>⚠️ {err}</div>}
        </div>
      )}

      {mode==='api'&&(
        <div style={{marginBottom:16}}>
          <div style={{background:'#F0F7FF',borderRadius:10,padding:'12px 14px',marginBottom:10,fontSize:12,color:'#2A5FA0',fontWeight:600}}>
            🔌 Carica le prenotazioni direttamente da Hostaway per la settimana selezionata ({getWeekStartISO(weekOffset)} → {getWeekEndISO(weekOffset)}). Mappatura da tab "Hostaway Map".
          </div>
          <button onClick={loadFromApi} disabled={apiLoading} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:apiLoading?'#DDD':C.nav,color:'white',cursor:apiLoading?'default':'pointer',fontFamily:'inherit',fontSize:14,fontWeight:800}}>
            {apiLoading?'Caricamento…':'🔌 Carica da Hostaway API'}
          </button>
          {apiError&&<div style={{color:C.conflict,fontSize:12,marginTop:8,fontWeight:700}}>⚠️ {apiError}</div>}
          {apiResult&&(
            <div style={{background:'#F9F8F5',border:'1px solid #EEE',borderRadius:10,padding:'10px 12px',marginTop:10,fontSize:12,color:C.text}}>
              <div style={{fontWeight:800,marginBottom:4}}>Diagnostica</div>
              <div style={{color:C.muted}}>
                Prenotazioni: {apiResult.diagnostics.fetched} · Job generati: {apiResult.diagnostics.generatedJobs}
                {' '}(Checkout {apiResult.diagnostics.checkoutJobs}, Back-to-back {apiResult.diagnostics.backToBackJobs}, Check-in {apiResult.diagnostics.checkinCleanJobs})
              </div>
              <div style={{color:C.muted,marginTop:2}}>Ignorati: {apiResult.diagnostics.ignored} · Non mappati: {apiResult.diagnostics.unmapped}</div>
              {apiResult.diagnostics.unmapped>0&&(
                <div style={{color:'#856404',background:'#FFF3CD',borderRadius:6,padding:'6px 8px',marginTop:6,fontWeight:700}}>
                  ⚠️ {apiResult.diagnostics.unmapped} listing non mappati (non importati): {apiResult.diagnostics.unmappedList.map(u=>u.name).join(', ')}
                </div>
              )}
              {apiResult.diagnostics.warnings.length>0&&(
                <div style={{color:C.conflict,marginTop:6,fontWeight:700}}>
                  {apiResult.diagnostics.warnings.map((w,i)=><div key={i}>⚠️ {w}</div>)}
                </div>
              )}
              {apiResult.diagnostics.backend&&apiResult.diagnostics.backend.cancelledExcluded>0&&(
                <div style={{color:C.muted,marginTop:4}}>Escluse dal backend (cancellate/inattive): {apiResult.diagnostics.backend.cancelledExcluded}</div>
              )}
            </div>
          )}
        </div>
      )}

      <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>
        Anteprima — {(toLoad||[]).length} {mode==='api'?'turni':'checkout'}
      </div>
      {mode==='file'&&diagnostics&&(diagnostics.invalidDates>0||diagnostics.unmappedProps>0||diagnostics.imported<diagnostics.total)&&(
        <div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:8,padding:'8px 12px',marginBottom:10,fontSize:11,fontWeight:700,color:'#856404'}}>
          Importate {diagnostics.imported}/{diagnostics.total} righe · {diagnostics.invalidDates} date non valide · {diagnostics.unmappedProps} property non riconosciute
        </div>
      )}
      <div style={{background:'#F9F8F5',borderRadius:12,padding:'4px 0',marginBottom:20,maxHeight:220,overflowY:'auto'}}>
        {(toLoad||[]).length===0?(
          <div style={{padding:'20px',textAlign:'center',color:C.muted,fontSize:13}}>
            {mode==='file'?'Carica un CSV per vedere l\'anteprima':(mode==='api'?'Carica da Hostaway API per vedere i turni':'Nessun checkout da mostrare')}
          </div>
        ):(toLoad||[]).map((r,i)=>{
          const p=PROPERTIES.find(x=>x.id===r.propertyId);
          const label = r.serviceTypeId===HOSTAWAY_ST_BACK_TO_BACK?'back-to-back'
            : r.type==='checkin'?'check-in'
            : 'checkout';
          const lc = r.serviceTypeId===HOSTAWAY_ST_BACK_TO_BACK?{bg:'#FEE2E2',fg:'#B91C1C'}
            : r.type==='checkin'?{bg:'#FEF3C7',fg:'#92400E'}
            : {bg:'#E8F4FF',fg:'#2A5FA0'};
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:'1px solid #F0EDE8'}}>
              <span style={{fontSize:14}}>{TI(p?.type)}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text}}>{r.displayName||p?.name||r.propertyId}</div>
                <div style={{fontSize:11,color:C.muted}}>{r.dateISO} · {DAY_FULL[r.day]} · {r.startTime} · Non assegnata</div>
              </div>
              <span style={{fontSize:10,background:lc.bg,color:lc.fg,borderRadius:6,padding:'2px 7px',fontWeight:700}}>{label}</span>
            </div>
          );
        })}
      </div>

      <div style={{display:'flex',gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
        <button onClick={()=>toLoad&&toLoad.length>0&&onImport(toLoad)} disabled={!toLoad||toLoad.length===0}
          style={{flex:2,padding:'12px',borderRadius:10,background:toLoad&&toLoad.length>0?C.nav:'#DDD',color:'white',fontWeight:800,fontSize:13,border:'none',cursor:toLoad&&toLoad.length>0?'pointer':'default',fontFamily:'inherit'}}>
          ✓ Importa {(toLoad||[]).length} {mode==='api'?'turni da Hostaway API':'Checkout'}
        </button>
      </div>
    </>
  );
}

// ── GENERATE RESULT MODAL ──────────────────────────────────────────────────────
function GenerateModal({result,constraints,onConfirm,onClose,onGenerate}){
  const [startDay,setStartDay]=useState('Mon');
  const [endDay,  setEndDay  ]=useState('Sun');
  const {jobs,startDay:appliedFrom,endDay:appliedTo}=result||{jobs:[]};
  // Show stats only for the generated range, not full week
  const rangeJobs=appliedFrom?jobs.filter(j=>{const i=DAYS.indexOf(j.day);return i>=DAYS.indexOf(appliedFrom)&&i<=DAYS.indexOf(appliedTo||appliedFrom);}):jobs;
  const assigned=rangeJobs.filter(j=>j.status==='assigned'&&j.cleanerIds.length>0);
  const needsReview=rangeJobs.filter(j=>j.status==='needs_review'||j.cleanerIds.length===0);
  const softWarnings=rangeJobs.filter(j=>j.softLimitWarning);
  const constraintList=Object.values(constraints||{});

  // Auto-correct endDay if it's before startDay
  const startIdx=DAYS.indexOf(startDay);
  const endIdx  =DAYS.indexOf(endDay);
  const effectiveEnd = endIdx >= startIdx ? endDay : startDay;
  const rangeLabel = startDay===effectiveEnd ? DAY_FULL[startDay]
    : DAY_FULL[startDay]+' → '+DAY_FULL[effectiveEnd];

  if(!result){
    return(
      <>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>⚡ Genera Turni</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Seleziona il periodo da generare</div>

        <div style={{display:'flex',gap:12,marginBottom:16}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Da</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {DAYS.map(d=>(
                <button key={d} onClick={()=>setStartDay(d)}
                  style={{padding:'7px 11px',borderRadius:9,fontWeight:700,fontSize:12,border:'none',cursor:'pointer',fontFamily:'inherit',
                    background:startDay===d?C.nav:'white',color:startDay===d?'white':C.text,
                    boxShadow:startDay===d?`0 3px 10px ${C.nav}40`:'0 1px 4px rgba(0,0,0,0.08)'}}>
                  {DAY_IT[d]}
                </button>
              ))}
            </div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>A</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {DAYS.map(d=>{
                const disabled=DAYS.indexOf(d)<DAYS.indexOf(startDay);
                return(
                  <button key={d} onClick={()=>!disabled&&setEndDay(d)} disabled={disabled}
                    style={{padding:'7px 11px',borderRadius:9,fontWeight:700,fontSize:12,border:'none',cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',
                      background:endDay===d&&!disabled?C.accent:disabled?'#F0EDE8':'white',
                      color:endDay===d&&!disabled?'white':disabled?'#CCCCCC':C.text,
                      boxShadow:endDay===d&&!disabled?`0 3px 10px ${C.accent}40`:'0 1px 4px rgba(0,0,0,0.08)'}}>
                    {DAY_IT[d]}
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div style={{background:'#F0F7FF',borderRadius:10,padding:'10px 14px',marginBottom:20,fontSize:12,color:'#2A5FA0',fontWeight:600}}>
          ⚡ Verranno generati i turni per: <strong>{rangeLabel}</strong>
          {(startDay!=='Mon'||effectiveEnd!=='Sun')&&<span style={{color:C.muted,fontWeight:400}}> · I giorni fuori range rimarranno invariati</span>}
        </div>

        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
          <button onClick={()=>onGenerate(startDay,effectiveEnd)} style={{flex:2,padding:'12px',borderRadius:10,background:C.nav,color:'white',fontWeight:800,fontSize:14,border:'none',cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span>⚡</span><span>Genera {rangeLabel}</span>
          </button>
        </div>
      </>
    );
  }

  // Show results
  return(
    <>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:C.text,marginBottom:4}}>⚡ Genera Turni — Risultato</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
        {appliedFrom?`${DAY_FULL[appliedFrom]}${appliedTo&&appliedTo!==appliedFrom?' → '+DAY_FULL[appliedTo]:''} · `:''}
        I template già assegnati restano bloccati · I turni senza cleaner vengono assegnati · I turni parziali restano da rivedere · Richieste extra e limiti applicati
      </div>

      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <div style={{background:'#F0FFF4',borderRadius:12,padding:'14px',flex:1,textAlign:'center',border:'1px solid #86EFAC'}}>
          <div style={{fontSize:28,fontWeight:800,color:C.ok,fontFamily:"'Syne',sans-serif"}}>{assigned.length}</div>
          <div style={{fontSize:12,color:'#166534',fontWeight:700}}>Assegnati ✓</div>
        </div>
        <div style={{background:needsReview.length>0?'#FDE8E8':'#F0FFF4',borderRadius:12,padding:'14px',flex:1,textAlign:'center',border:`1px solid ${needsReview.length>0?C.conflict+'40':'#86EFAC'}`}}>
          <div style={{fontSize:28,fontWeight:800,color:needsReview.length>0?C.conflict:C.ok,fontFamily:"'Syne',sans-serif"}}>{needsReview.length}</div>
          <div style={{fontSize:12,color:needsReview.length>0?C.conflict:'#166534',fontWeight:700}}>Da rivedere{needsReview.length>0?' ⚠️':' ✓'}</div>
        </div>
        {softWarnings.length>0&&(
          <div style={{background:'#FFFBEB',borderRadius:12,padding:'14px',flex:1,textAlign:'center',border:'1px solid #FCD34D'}}>
            <div style={{fontSize:28,fontWeight:800,color:C.amber,fontFamily:"'Syne',sans-serif"}}>{softWarnings.length}</div>
            <div style={{fontSize:12,color:C.amber,fontWeight:700}}>Limite soft ⚠</div>
          </div>
        )}
      </div>

      {constraintList.length>0&&(
        <>
          <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Richieste extra applicate ({constraintList.length})</div>
          <div style={{background:'#F0F7FF',borderRadius:12,padding:'4px 0',marginBottom:14,border:'1px solid #BFDBFE'}}>
            {constraintList.map((c,i)=>(
              <div key={i} style={{padding:'8px 14px',borderBottom:i<constraintList.length-1?'1px solid #DBEAFE':'none'}}>
                <div style={{fontSize:12,fontWeight:800,color:'#1D4ED8',marginBottom:3}}>{c.cleanerName}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {c.parsed.map((p,j)=><span key={j} style={{fontSize:11,padding:'2px 8px',borderRadius:6,background:'#DBEAFE',color:'#1E40AF',fontWeight:600}}>{p}</span>)}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {softWarnings.length>0&&(
        <>
          <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Assegnate oltre il limite morbido</div>
          <div style={{background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:12,padding:'8px 14px',marginBottom:14}}>
            {softWarnings.map((job,i)=>{const p=PROPERTIES.find(x=>x.id===job.propertyId);return(<div key={i} style={{fontSize:12,color:C.amber,fontWeight:600,lineHeight:2}}>⚠ {DAY_FULL[job.day]} · {p?.name} · {job.softLimitWarning}</div>);})}
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Assegnate comunque — nessuna alternativa disponibile. Puoi chiedere all'AI.</div>
          </div>
        </>
      )}

      {needsReview.length>0&&(
        <>
          <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Richiedono attenzione manuale</div>
          <div style={{background:'#FDE8E8',borderRadius:12,padding:'8px 0',marginBottom:14,maxHeight:180,overflowY:'auto'}}>
            {needsReview.map((job,i)=>{const p=PROPERTIES.find(x=>x.id===job.propertyId);return(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:'1px solid #F5CCCC'}}>
                <span>{TI(p?.type)}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{p?.name}</div><div style={{fontSize:11,color:C.conflict}}>{DAY_FULL[job.day]} · {job.startTime}</div></div>
              </div>
            );})}
          </div>
        </>
      )}

      <div style={{display:'flex',gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:10,background:'#F0EDE8',color:C.text,fontWeight:700,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>Annulla</button>
        <button onClick={onConfirm} style={{flex:2,padding:'12px',borderRadius:10,background:C.nav,color:'white',fontWeight:800,fontSize:13,border:'none',cursor:'pointer',fontFamily:'inherit'}}>✓ Applica Turni</button>
      </div>
    </>
  );
}


// ── JOB CARD ──────────────────────────────────────────────────────────────────
function JobCard({job,conflicts,onClick,onFix,highlight,onFindSolution}){
  const prop=PROPERTIES.find(p=>p.id===job.propertyId);
  const displayName=getJobDisplayName(job);
  const jobDuration=getJobDuration(job);
  const displayCleanerIds=dedupeCleanerIds(job.cleanerIds);
  const cls=displayCleanerIds.map(id=>CLEANERS.find(c=>c.id===id)).filter(Boolean);
  const issues=conflicts?.get(job.id)||[];
  const hasC=issues.length>0;
  const endT=tAdd(job.startTime,jobDuration);
  const badgeMeta=(()=>{
    if(job?.serviceTypeId===HOSTAWAY_ST_BACK_TO_BACK) return{label:'back-to-back',bg:'#FEE2E2',color:'#B91C1C'};
    if(job?.type==='checkin'||job?.serviceTypeId===HOSTAWAY_ST_CHECKIN) return{label:'check-in',bg:'#FEF3C7',color:'#92400E'};
    if(job?.type==='checkout') return{label:'Checkout',bg:'#FFF0E8',color:'#C05000'};
    if(job?.type==='template') return{label:'Template',bg:'#E8F0FE',color:'#2A5FA0'};
    if(job?.type==='extra') return{label:'Extra',bg:'#F0FFF4',color:'#166534'};
    if(job?.type==='last_minute') return{label:'Last minute',bg:'#FFF0F5',color:'#9D174D'};
    return{label:job?.type||'Job',bg:'#F0EDE8',color:C.muted};
  })();

  return(
    <div id={`job-${job.id}`} style={{background:C.card,borderRadius:14,padding:'14px 16px',marginBottom:10,
      border:`2px solid ${highlight?C.conflict:hasC?C.conflict+'50':'transparent'}`,
      boxShadow:highlight?`0 0 0 3px ${C.conflict}30,0 2px 10px ${C.conflict}20`:hasC?`0 2px 10px ${C.conflict}18`:'0 2px 8px rgba(0,0,0,0.06)',
      transition:'box-shadow 0.3s,border-color 0.3s'}}>
      <div onClick={onClick} style={{cursor:'pointer'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:22}}>{TI(prop?.type)}</span>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:C.text,lineHeight:1.2}}>{displayName}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{job.startTime} – {endT} · {jobDuration}h</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:badgeMeta.bg,color:badgeMeta.color,fontWeight:700}}>{badgeMeta.label}</span>
            {job.fallbackUsed&&<span style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:'#FEF3C7',color:'#92400E',fontWeight:700}}>Fallback: {job.cleanersRequired}cl·{job.duration}h</span>}
            <span style={{fontSize:12,color:C.muted}}>{hasC?'⚠️':'✎'}</span>
          </div>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:(hasC||prop?.notes||job.note)?8:0}}>
          {cls.length===0?<span style={{fontSize:12,color:job.status==='needs_review'?C.conflict:C.muted,fontWeight:700}}>{job.status==='needs_review'?'⚠️ Da assegnare manualmente':'⏳ Non ancora assegnata'}</span>
            :cls.map(cl=>(
              <span key={cl.id} style={{display:'flex',alignItems:'center',gap:5,background:CL_COLOR[cl.id]+'1A',borderRadius:20,padding:'4px 10px'}}>
                <span style={{width:20,height:20,borderRadius:'50%',background:CL_COLOR[cl.id],display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'white',fontWeight:800}}>{cl.initials}</span>
                <span style={{fontSize:12,fontWeight:700,color:CL_COLOR[cl.id]}}>{cl.name.split(' ')[0]}</span>
              </span>
            ))}
        </div>
        {job.note&&<div style={{fontSize:11,color:'#6B5E4E',background:'#FAF6EF',borderRadius:7,padding:'5px 9px',marginBottom:hasC?8:0,fontStyle:'italic'}}>📝 {job.note}</div>}
        {hasC&&<div style={{background:'#FDE8E8',borderRadius:8,padding:'8px 10px',marginTop:4}}>
          {issues.map((issue,i)=>{
            const icon=issue.type==='untrained'?'📋':issue.type==='unavailable'?'📅':issue.type==='overlap'?'⏰':issue.type==='staffing'?'👥':'⚠️';
            return <div key={i} style={{fontSize:11,color:C.conflict,fontWeight:700,lineHeight:1.8}}>{icon} {issue.msg}</div>;
          })}
        </div>}
        {prop?.notes&&!hasC&&<div style={{fontSize:11,color:'#9A9080',marginTop:4,fontStyle:'italic'}}>ℹ️ {prop.notes}</div>}
      </div>
      {AI_ENABLED&&hasC&&<button onClick={e=>{e.stopPropagation();onFix(job,issues.map(i=>i.msg));}} style={{marginTop:10,width:'100%',padding:'9px',borderRadius:10,background:C.nav,color:'white',fontSize:13,fontWeight:800,border:'none',cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>🤖 Chiedi all'AI come risolvere</button>}
      {(job.source==='last_minute'||job.source==='extra'||job.type==='checkout'||job.status==='needs_review'||(job.cleanerIds||[]).length<getJobRequiredCleaners(job)||(conflicts&&conflicts.has&&conflicts.has(job.id)))&&onFindSolution&&<button onClick={e=>{e.stopPropagation();onFindSolution(job);}} style={{width:'100%',marginTop:6,padding:'9px',borderRadius:10,background:'#FFF0F5',color:'#9D174D',fontSize:12,fontWeight:800,border:'2px solid #FBC4D8',cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>🔎 Trova soluzione</button>}
    </div>
  );
}

// ── WEEK VIEW ──────────────────────────────────────────────────────────────────
function WeekView({jobs,conflicts,weekOffset,onDaySelect,onConflictDay,onLoadTemplate,onImportHostaway,onGenerate,wf,dataReady,genGate,trainingOk,trainingMissing,trainingMissingJobs,onFix,onFindSolution,highlightJobId,setHighlightJob,onAdd,onEdit}){
  // Review issues (staffing/gender shortfalls + needs_review status) are operationally
  // different from real scheduling clashes (overlap, travel, late-rest, unavailable,
  // untrained, window). detectConflicts() itself doesn't distinguish them — it lumps
  // both into the same Map — so the split uses the shared helpers defined near
  // detectConflicts() (also used by Sidebar, to avoid the two drifting apart).
  const realConflictCount = getRealConflictCount(jobs, conflicts);
  // issueCount drives the separate "Da rivedere" badge — union of needs_review status
  // and ANY conflicts entry (including pure staffing/gender ones).
  const issueCount=jobs.filter(j =>
    j.status === 'needs_review' ||
    (conflicts.get(j.id)||[]).length > 0
  ).length;
  const dates=useMemo(()=>getWeekDates(weekOffset),[weekOffset]);
  const today=useMemo(()=>getTodayKey(),[]);
  const uncovered=useMemo(()=>getUncovered(jobs),[jobs]); // mandatory only (office/restaurant)
  const totalHrs=useMemo(()=>Math.round(jobs.reduce((s,j)=>s+getJobDuration(j),0)*10)/10,[jobs]);
  const unassigned=jobs.filter(j=>j.cleanerIds.length===0).length;

  return(
    <div style={{paddingBottom:8}}>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <StatPill label="Turni" value={jobs.length} color={C.nav}/>
        <StatPill label="Conflitti" value={realConflictCount} color={realConflictCount>0?C.conflict:C.ok} onClick={realConflictCount>0?()=>{const f=jobs.find(j=>getRealConflictIssues(conflicts,j.id).length>0);if(f)onConflictDay(f.day);}:undefined}/>
        {issueCount>0&&<StatPill label="Da rivedere" value={issueCount} color={C.amber}/>}
        <StatPill label="Ore pian." value={`${totalHrs}h`} color={C.blue}/>
      </div>

      {/* Action buttons */}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button onClick={onLoadTemplate} style={{flex:1,display:'flex',alignItems:'center',gap:8,background:C.card,borderRadius:12,padding:'11px 14px',border:'1.5px solid #86EFAC',cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>
          <span style={{fontSize:18}}>📊</span>
          <div><div style={{fontSize:12,fontWeight:800,color:'#166534'}}>Default Template</div><div style={{fontSize:10,color:'#4ADE80'}}>{wf.templateLoaded?'✓ Caricato':'Carica turni fissi'}</div></div>
        </button>
        <button onClick={onImportHostaway} style={{flex:1,display:'flex',alignItems:'center',gap:8,background:C.card,borderRadius:12,padding:'11px 14px',border:'1.5px solid #FCD34D',cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>
          <span style={{fontSize:18}}>📥</span>
          <div><div style={{fontSize:12,fontWeight:800,color:C.amber}}>Hostaway</div><div style={{fontSize:10,color:'#F59E0B'}}>{wf.hostawayLoaded?(wf.hostawaySource==='hostaway_csv'?'✓ CSV importato':'✓ API importato'):'Importa checkout'}</div></div>
        </button>
      </div>

      {/* Genera Turni */}
      {(wf.templateLoaded||wf.hostawayLoaded)&&!trainingOk&&(
        <div style={{background:trainingMissingJobs>0?'#FDE8E8':'#FFF3CD',border:`1px solid ${trainingMissingJobs>0?C.conflict+'40':'#FFCC02'}`,borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:12,color:trainingMissingJobs>0?C.conflict:'#856404',fontWeight:600}}>
          <div>{trainingMissingJobs>0?'🔴':'⚠️'} Training matrix incompleta — {trainingMissing} {trainingMissing===1?'proprietà':'proprietà'} senza cleaners formate.</div>
          {trainingMissingJobs>0&&<div style={{marginTop:4,fontWeight:700}}>⚠️ {trainingMissingJobs} {trainingMissingJobs===1?'turno caricato non ha':'turni caricati non hanno'} nessuna cleaner formata — non verranno assegnati.</div>}
          <div style={{marginTop:4,fontWeight:400,opacity:0.8}}>Controlla il tab Training nel Google Sheet prima di generare.</div>
        </div>
      )}
      {(()=>{
        const g = genGate || {enabled:dataReady!==false, reason:''};
        const enabled = g.enabled;
        return (
        <button onClick={()=>enabled&&onGenerate()} disabled={!enabled}
          style={{width:'100%',padding:'14px',borderRadius:14,border:'none',cursor:!enabled?'not-allowed':'pointer',fontFamily:'inherit',marginBottom:14,
            background:!enabled?'#DDD':wf.staleGeneration?C.warn:wf.shiftsGenerated?'#F0EDE8':C.nav,
            color:!enabled?'#999':wf.staleGeneration?'white':wf.shiftsGenerated?C.nav:'white',
            fontWeight:800,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:10,
            boxShadow:wf.staleGeneration?`0 0 0 3px ${C.warn}40`:'none'}}>
          <span>⚡</span>
          <span>{!enabled?g.reason:wf.staleGeneration?'⚠️ Rigenera Turni':wf.shiftsGenerated?'↺ Rigenera Turni':'Genera Turni Automaticamente'}</span>
          {unassigned>0&&!wf.shiftsGenerated&&enabled&&<span style={{background:'rgba(255,255,255,0.3)',borderRadius:10,padding:'2px 8px',fontSize:12}}>{unassigned} non assegnati</span>}
        </button>
        );
      })()}

      {realConflictCount>0&&(
        <div style={{background:'#FDE8E8',border:`1.5px solid ${C.conflict}30`,borderRadius:14,padding:'12px 16px',marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.conflict,marginBottom:8}}>⚠️ Conflitti — tocca per andare al giorno</div>
          {DAYS.filter(day=>jobs.some(j=>j.day===day&&getRealConflictIssues(conflicts,j.id).length>0)).map(day=>{
            const dc=jobs.filter(j=>j.day===day&&getRealConflictIssues(conflicts,j.id).length>0);
            return(
              <button key={day} onClick={()=>onConflictDay(day)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',background:C.card,borderRadius:10,padding:'9px 12px',marginBottom:6,border:`1px solid ${C.conflict}20`,cursor:'pointer',fontFamily:'inherit'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:13,fontWeight:800,color:C.conflict}}>{DAY_FULL[day]}</span>
                  <span style={{fontSize:11,color:C.muted}}>{dc.length} {dc.length===1?'conflitto':'conflitti'}</span>
                </div>
                <div style={{display:'flex',gap:4,flex:1,justifyContent:'center',flexWrap:'wrap'}}>
                  {dc.map(j=>{const p=PROPERTIES.find(x=>x.id===j.propertyId);return(<span key={j.id} style={{fontSize:10,padding:'2px 7px',borderRadius:6,background:C.conflict+'18',color:C.conflict,fontWeight:700}}>{p?.name}</span>);})}
                </div>
                <span style={{color:C.conflict,fontSize:16}}>›</span>
              </button>
            );
          })}
        </div>
      )}

      {/* Duration missing warning — severity based on count */}
      {jobs.length>0&&(()=>{const missing=PROPERTIES.filter(p=>p.durationMissing&&jobs.some(j=>j.propertyId===p.id));if(!missing.length) return null;const severe=missing.length>=4;return(<div style={{background:severe?'#FDE8E8':'#FFF3CD',border:`1px solid ${severe?'#DC354540':'#FFCC02'}`,borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:12,color:severe?'#DC3545':'#856404',fontWeight:600}}>{severe?'🔴':'⚠️'} {missing.length} {missing.length===1?'proprietà ha':'proprietà hanno'} durata mancante nel Google Sheet — lo scheduler usa 2h come fallback{severe?'. Verifica il Google Sheet prima di generare':''}: {missing.map(p=>p.name).join(', ')}</div>);})()}
      {/* Checkout fallback config diagnostics — parser-only warnings, no effect on scheduler */}
      {(()=>{const fbWarns=PROPERTIES.flatMap(p=>(p.checkoutFallbackWarnings||[]).map(w=>({prop:p.name,msg:w})));if(!fbWarns.length) return null;return(<div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:12,color:'#856404',fontWeight:600}}>⚠️ Checkout Fallback — {fbWarns.length} avvis{fbWarns.length===1?'o':'i'}: {fbWarns.map((w,i)=><div key={i} style={{marginTop:i===0?4:2,fontWeight:500}}>{w.prop}: {w.msg}</div>)}</div>);})()}
      {/* Property parser warnings — header not found, missing columns, or time-like in numeric field */}
      {(()=>{const pw=PROPERTIES.flatMap(p=>(p.parserWarnings||[]).map(w=>({prop:p.name,msg:w})));if(!pw.length) return null;return(<div style={{background:'#FDE8E8',border:'1px solid #DC354540',borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:12,color:'#DC3545',fontWeight:600}}>🔴 Properties parser — {pw.length} avvis{pw.length===1?'o':'i'}: {pw.map((w,i)=><div key={i} style={{marginTop:i===0?4:2,fontWeight:500}}>{w.prop}: {w.msg}</div>)}</div>);})()}
      {/* Cleaner parser warnings — invalid fields, duplicates, bad dates */}
      {(()=>{const cw=CLEANERS.flatMap(c=>(c.cleanerWarnings||[]).map(w=>({cl:c.name||c.id,msg:w})));if(!cw.length) return null;return(<div style={{background:'#FFF3CD',border:'1px solid #FFCC02',borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:12,color:'#856404',fontWeight:600}}>⚠️ Cleaners parser — {cw.length} avvis{cw.length===1?'o':'i'}: {cw.map((w,i)=><div key={i} style={{marginTop:i===0?4:2,fontWeight:500}}>{w.cl}: {w.msg}</div>)}</div>);})()}

      {uncovered.length>0&&jobs.length>0&&(
        <div style={{background:'#FDE8E8',border:`1.5px solid ${C.conflict}30`,borderRadius:14,padding:'12px 16px',marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:800,color:C.conflict,marginBottom:8}}>⚠️ Uffici/Ristoranti senza turni questa settimana ({uncovered.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {uncovered.map(p=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:5,background:C.card,borderRadius:10,padding:'6px 10px',border:`1px solid ${C.conflict}30`}}>
                <span style={{fontSize:13}}>{TI(p.type)}</span>
                <div><div style={{fontSize:12,fontWeight:700,color:C.conflict}}>{p.name}</div><div style={{fontSize:10,color:C.muted}}>{p.duration}h</div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Panoramica Settimana</div>
      {DAYS.map((day,i)=>{
        const dj=jobs.filter(j=>j.day===day).sort(sortJobsByPropertyDisplayOrder);
        const dc=dj.filter(j=>conflicts.has(j.id)).length;
        const isToday=day===today&&weekOffset===0;
        return(
          <button key={day} onClick={()=>onDaySelect(day)} style={{width:'100%',background:C.card,borderRadius:14,padding:'13px 16px',textAlign:'left',cursor:'pointer',border:`1.5px solid ${isToday?C.accent+'60':dc>0?C.conflict+'30':'transparent'}`,boxShadow:isToday?`0 2px 10px ${C.accent}20`:'0 1px 5px rgba(0,0,0,0.06)',marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:dj.length?8:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:isToday?C.accent:C.text}}>{DAY_FULL[day]}</span>
                <span style={{fontSize:12,color:C.muted}}>{dates[i].getDate()} {MON_IT[dates[i].getMonth()]}</span>
                {isToday&&<span style={{background:C.accent,color:'white',borderRadius:8,padding:'1px 7px',fontSize:10,fontWeight:800}}>Oggi</span>}
                {dc>0&&<button onClick={e=>{e.stopPropagation();onConflictDay(day);}} style={{background:C.conflict,color:'white',borderRadius:10,padding:'2px 9px',fontSize:10,fontWeight:800,border:'none',cursor:'pointer',fontFamily:'inherit'}}>⚠️ {dc}</button>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:12,color:C.muted}}>{dj.length}t</span>
                <span style={{color:'#CCC',fontSize:16}}>›</span>
              </div>
            </div>
            {dj.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {dj.slice(0,5).map(j=>{const p=PROPERTIES.find(x=>x.id===j.propertyId);const hc=conflicts.has(j.id);return(<span key={j.id} style={{fontSize:11,padding:'3px 8px',borderRadius:8,fontWeight:700,background:hc?'#FDE8E8':TYPE_COLOR[p?.type||'short-let']+'18',color:hc?C.conflict:TYPE_COLOR[p?.type||'short-let']}}>{TI(p?.type)} {p?.name}</span>);})}
              {dj.length>5&&<span style={{fontSize:11,color:C.muted}}>+{dj.length-5}</span>}
            </div>}
            {dj.length===0&&<div style={{fontSize:12,color:'#CCCCCC'}}>Nessun turno</div>}
          </button>
        );
      })}
    </div>
  );
}

// ── DAY VIEW ───────────────────────────────────────────────────────────────────
function DayView({jobs,conflicts,day,setDay,weekOffset,onAdd,onEdit,onFix,onFindSolution,highlightJobId,setHighlightJob,onLoadTemplate}){
  const dj=jobs.filter(j=>j.day===day).sort(sortJobsByPropertyDisplayOrder);
  const today=useMemo(()=>getTodayKey(),[]);
  const dates=useMemo(()=>getWeekDates(weekOffset),[weekOffset]);

  useEffect(()=>{
    if(!highlightJobId) return;
    let t1,t2;
    t1=setTimeout(()=>{
      const el=document.getElementById(`job-${highlightJobId}`);
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
      t2=setTimeout(()=>setHighlightJob(null),2000);
    },150);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[highlightJobId,setHighlightJob]);

  return(
    <div>
      <div style={{display:'flex',gap:5,marginBottom:20,overflowX:'auto',paddingBottom:4}}>
        {DAYS.map((d,i)=>{
          const hc=jobs.filter(j=>j.day===d&&conflicts.has(j.id)).length>0;
          const cnt=jobs.filter(j=>j.day===d).length;
          const isToday=d===today&&weekOffset===0; const isSel=d===day;
          return(
            <button key={d} onClick={()=>setDay(d)} style={{flex:'0 0 auto',minWidth:50,padding:'7px 6px',borderRadius:12,cursor:'pointer',fontFamily:'inherit',background:isSel?C.nav:'white',color:isSel?'white':isToday?C.accent:C.text,fontWeight:700,fontSize:12,position:'relative',display:'flex',flexDirection:'column',alignItems:'center',gap:1,border:hc&&!isSel?`2px solid ${C.conflict}`:isSel?'2px solid transparent':isToday?`2px solid ${C.accent}40`:'2px solid transparent',boxShadow:isSel?`0 3px 10px ${C.nav}40`:'0 1px 4px rgba(0,0,0,0.08)'}}>
              <span style={{fontSize:10,opacity:0.7}}>{DAY_IT[d]}</span>
              <span style={{fontSize:17,lineHeight:1}}>{dates[i].getDate()}</span>
              {cnt>0&&<span style={{fontSize:9,opacity:0.6}}>{cnt}t</span>}
              {hc&&<span style={{position:'absolute',top:-3,right:-3,width:8,height:8,borderRadius:'50%',background:C.conflict,border:'2px solid white'}}/>}
              {isToday&&!isSel&&<span style={{position:'absolute',bottom:3,width:4,height:4,borderRadius:'50%',background:C.accent}}/>}
            </button>
          );
        })}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <span style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.text}}>{DAY_FULL[day]}</span>
          <span style={{fontSize:13,color:C.muted,marginLeft:8}}>{dates[DAYS.indexOf(day)]?.getDate()} {MON_IT[dates[DAYS.indexOf(day)]?.getMonth()]}</span>
          {day===today&&weekOffset===0&&<span style={{marginLeft:8,background:C.accent,color:'white',borderRadius:8,padding:'2px 8px',fontSize:11,fontWeight:800}}>Oggi</span>}
        </div>
        <button onClick={()=>onAdd(day)} style={{background:C.nav,color:'white',borderRadius:10,padding:'9px 15px',fontSize:13,fontWeight:700,border:'none',cursor:'pointer',fontFamily:'inherit'}}>+ Aggiungi</button>
      </div>
      {dj.length===0
        ?<div style={{textAlign:'center',padding:'40px 8px',color:C.muted}}>
          <div style={{fontSize:44,marginBottom:10}}>📭</div>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Nessun turno per {DAY_FULL[day]}</div>
          <div style={{fontSize:13,marginBottom:20}}>Aggiungi manualmente o carica il template</div>
          <button onClick={onLoadTemplate} style={{padding:'10px 20px',borderRadius:12,background:C.nav,color:'white',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,fontSize:13}}>📊 Carica Default Template</button>
        </div>
        :dj.map(job=><JobCard key={job.id} job={job} conflicts={conflicts} onClick={()=>onEdit(job)} onFix={onFix} onFindSolution={onFindSolution} highlight={job.id===highlightJobId}/>)}
    </div>
  );
}

// ── TEAM VIEW ──────────────────────────────────────────────────────────────────
function CleanersView({jobs,selDay,weekOffset,onDaySelect,dataVersion}){
  const [viewMode,setViewMode]=useState('week');
  const dates=useMemo(()=>getWeekDates(weekOffset),[weekOffset]);
  const today=useMemo(()=>getTodayKey(),[]);
  const idx=DAYS.indexOf(selDay);
  const stats=useMemo(()=>computeCleanerStats(jobs),[jobs,dataVersion]);
  const totCap=stats.reduce((s,x)=>s+x.capacityHrs,0);
  const totAss=stats.reduce((s,x)=>s+x.assignedHrs,0);
  const overall=totCap>0?Math.round(totAss/totCap*100):0;
  // Constraints needed for effective daily limit flag in "Turni per cleaner" view.
  const constraints=useMemo(()=>buildConstraints(weekOffset),[weekOffset,dataVersion]);

  return(
    <div>
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.text,marginBottom:10}}>👥 Team</div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[['week','📊 Ore'],['shifts','📋 Turni'],['day','📋 '+DAY_IT[selDay]]].map(([v,l])=>(
          <button key={v} onClick={()=>setViewMode(v)} style={{flex:1,padding:'8px',borderRadius:10,fontWeight:700,fontSize:12,border:'none',cursor:'pointer',fontFamily:'inherit',background:viewMode===v?C.nav:'white',color:viewMode===v?'white':C.text,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>{l}</button>
        ))}
      </div>

      {viewMode==='week'&&(<>
        <div style={{background:C.card,borderRadius:14,padding:'14px 16px',marginBottom:14,boxShadow:'0 1px 5px rgba(0,0,0,0.06)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:C.text}}>Utilizzo team settimanale</div>
            <div style={{fontSize:14,fontWeight:800,color:overall>85?C.conflict:overall>60?C.ok:C.amber}}>{overall}%</div>
          </div>
          <div style={{height:8,background:'#EEE',borderRadius:4,overflow:'hidden',marginBottom:8}}>
            <div style={{height:'100%',width:`${overall}%`,background:overall>85?C.conflict:overall>60?C.ok:C.amber,borderRadius:4,transition:'width 0.5s ease'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.muted}}>
            <span>{totAss}h pianificate</span><span>{totCap}h disponibili</span>
          </div>
          {jobs.length===0&&<div style={{fontSize:11,color:C.muted,marginTop:10,textAlign:'center',fontStyle:'italic'}}>Carica il template per vedere l'utilizzo</div>}
        </div>
        <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Ore pianificate vs disponibili</div>
        {stats.map(({cl,assignedHrs,capacityHrs,availDays,pct,daysWorked,daysOverLimit})=>{
          const barColor=pct>90?C.conflict:pct>60?C.ok:pct>20?C.amber:'#DDD';
          return(
            <div key={cl.id} style={{background:C.card,borderRadius:14,padding:'12px 16px',marginBottom:8,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                <div style={{width:34,height:34,borderRadius:'50%',background:CL_COLOR[cl.id],display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'white',fontWeight:800,flexShrink:0}}>{cl.initials}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{fontWeight:800,fontSize:13,color:C.text}}>{cl.name}</div>
                    <div style={{fontSize:12,fontWeight:800,color:barColor}}>{assignedHrs}h / {capacityHrs}h</div>
                  </div>
                  <div style={{fontSize:11,color:daysOverLimit?C.warn:C.muted}}>{cl.type==='senior'?'⭐ Senior':cl.type} · {daysWorked}/{cl.workDays}gg{daysOverLimit?' ⚠️':''}</div>
                </div>
              </div>
              <div style={{height:7,background:'#EEE',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:barColor,borderRadius:4,transition:'width 0.5s ease'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.muted,marginTop:4}}>
                <span>{pct}%</span><span>{capacityHrs-assignedHrs}h libere</span>
              </div>
            </div>
          );
        })}
      </>)}

      {/* ── Turni per cleaner ───────────────────────────────────────────────── */}
      {viewMode==='shifts'&&(<>
        <div style={{fontSize:11,color:C.muted,marginBottom:12}}>Turni assegnati per cleaner — tutta la settimana</div>
        {CLEANERS.map(cl=>{
          const clJobs=jobs.filter(j=>(j.cleanerIds||[]).includes(cl.id));
          const weeklyAssigned=clJobs.reduce((s,j)=>s+getJobDuration(j),0);
          const capacityHrs=cl.weeklyHrs||cl.days.length*8;
          const limit=getEffectiveDailyLimit(cl,constraints);
          // Worked-days diagnostic: count distinct days with at least one assigned job.
          const workedDays=new Set(clJobs.map(j=>j.day)).size;
          const maxDays=getEffectiveMaxWorkedDays(cl);
          const daysOver=workedDays>maxDays;
          return(
            <div key={cl.id} style={{background:C.card,borderRadius:14,padding:'13px 16px',marginBottom:10,boxShadow:'0 1px 5px rgba(0,0,0,0.06)'}}>
              {/* Cleaner header */}
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <div style={{width:34,height:34,borderRadius:'50%',background:CL_COLOR[cl.id],display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'white',fontWeight:800,flexShrink:0}}>{cl.initials}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:14,color:C.text}}>{cl.name}</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
                    <span style={{fontSize:11,color:C.muted}}>{cl.type==='senior'?'⭐ Senior':cl.type}</span>
                    {daysOver&&<span style={{fontSize:9,padding:'1px 6px',borderRadius:5,background:'#FDE8E8',color:C.conflict,fontWeight:800}}>{workedDays}/{maxDays}gg ⚠</span>}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.nav}}>{weeklyAssigned}h</div>
                  <div style={{fontSize:10,color:C.muted}}>{capacityHrs}h cap.</div>
                </div>
              </div>
              {/* Day rows */}
              {DAYS.map((day,di)=>{
                const dayJobs=clJobs.filter(j=>j.day===day).slice().sort((a,b)=>t2m(a.startTime)-t2m(b.startTime));
                const dayTotal=dayJobs.reduce((s,j)=>s+getJobDuration(j),0);
                const overLimit=dayTotal>limit;
                const atLimit=dayTotal===limit&&dayTotal>0;
                const isToday=day===today&&weekOffset===0;
                const available=cl.days.includes(day);
                // Holiday check: OffFrom/OffTo from the Cleaners sheet (YYYY-MM-DD inclusive range).
                const dayDateISO=dates[di]?toISODateLocal(dates[di]):'';
                const isHoliday=dayDateISO?isCleanerUnavailableOnDate(cl,dayDateISO):false;
                return(
                  <div key={day} style={{borderTop:'1px solid #F0EDE8',paddingTop:7,paddingBottom:7,opacity:(available&&!isHoliday)?1:0.45}}>
                    {/* Day header row */}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:dayJobs.length?5:0}}>
                      <span style={{fontSize:12,fontWeight:700,color:isToday?C.accent:C.text}}>
                        {DAY_IT[day]} {dates[di]?.getDate()}
                        {isToday&&<span style={{marginLeft:5,background:C.accent,color:'white',borderRadius:6,padding:'1px 5px',fontSize:9,fontWeight:800}}>Oggi</span>}
                        {isHoliday&&<span style={{marginLeft:6,background:'#DBEAFE',color:'#1D4ED8',borderRadius:6,padding:'1px 7px',fontSize:9,fontWeight:800,letterSpacing:0.5}}>HOLIDAY</span>}
                        {!isHoliday&&dayJobs.length===0&&<span style={{marginLeft:6,background:'#F3F4F6',color:'#6B7280',borderRadius:6,padding:'1px 7px',fontSize:9,fontWeight:800,letterSpacing:0.5}}>OFF</span>}
                      </span>
                      {dayTotal>0&&(
                        <span style={{fontSize:11,fontWeight:700,
                          color:overLimit?C.conflict:atLimit?C.amber:C.muted,
                          padding:'1px 6px',borderRadius:6,
                          background:overLimit?'#FDE8E8':atLimit?'#FFF3CD':'transparent'}}>
                          {dayTotal}h{overLimit?' ⚠ oltre limite':atLimit?' ● pieno':''}
                        </span>
                      )}
                    </div>
                    {/* Job rows */}
                    {dayJobs.length>0
                      ? dayJobs.map(job=>{
                          const dur=getJobDuration(job);
                          const endT=tAdd(job.startTime,dur);
                          const name=getJobDisplayName(job);
                          const badgeLabel=job.serviceTypeId===HOSTAWAY_ST_BACK_TO_BACK?'B2B'
                            :job.type==='checkin'?'check-in'
                            :job.type==='checkout'?'checkout'
                            :job.type==='extra'?'extra'
                            :job.type==='last_minute'?'LM'
                            :job.type==='template'?'tmpl'
                            :'';
                          const badgeColor=job.serviceTypeId===HOSTAWAY_ST_BACK_TO_BACK?'#B91C1C'
                            :job.type==='checkin'?'#92400E'
                            :job.type==='checkout'?'#C05000'
                            :job.type==='extra'?'#166534'
                            :job.type==='last_minute'?'#9D174D'
                            :'#4B5563';
                          const badgeBg=job.serviceTypeId===HOSTAWAY_ST_BACK_TO_BACK?'#FEE2E2'
                            :job.type==='checkin'?'#FEF3C7'
                            :job.type==='checkout'?'#FFF0E8'
                            :job.type==='extra'?'#F0FFF4'
                            :job.type==='last_minute'?'#FFF0F5'
                            :'#F3F4F6';
                          return(
                            <div key={job.id} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0 3px 8px',borderLeft:`2px solid ${CL_COLOR[cl.id]}30`}}>
                              <span style={{fontSize:11,color:C.muted,fontWeight:600,minWidth:100,flexShrink:0}}>{job.startTime}–{endT}</span>
                              <span style={{fontSize:11,fontWeight:700,color:C.text,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
                              {badgeLabel&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:5,background:badgeBg,color:badgeColor,fontWeight:700,flexShrink:0}}>{badgeLabel}</span>}
                              {job.fallbackUsed&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:5,background:'#FEF3C7',color:'#92400E',fontWeight:700,flexShrink:0}}>fb</span>}
                            </div>
                          );
                        })
                      : isHoliday
                        ? <div style={{fontSize:10,color:'#1D4ED8',fontWeight:700,paddingLeft:8,letterSpacing:0.5}}>HOLIDAY</div>
                        : <div style={{fontSize:10,color:'#9CA3AF',fontWeight:700,paddingLeft:8,letterSpacing:0.5}}>OFF</div>
                    }
                  </div>
                );
              })}
            </div>
          );
        })}
      </>)}

      {viewMode==='day'&&(<>
        <div style={{display:'flex',gap:5,marginBottom:14,overflowX:'auto',paddingBottom:4}}>
          {DAYS.map((d,i)=>{const isToday=d===today&&weekOffset===0;const isSel=d===selDay;return(
            <button key={d} onClick={()=>onDaySelect(d)} style={{flex:'0 0 auto',minWidth:46,padding:'6px 5px',borderRadius:10,cursor:'pointer',fontFamily:'inherit',background:isSel?C.nav:'white',color:isSel?'white':isToday?C.accent:C.text,fontWeight:700,fontSize:11,display:'flex',flexDirection:'column',alignItems:'center',gap:1,border:isSel?'2px solid transparent':isToday?`2px solid ${C.accent}40`:'2px solid transparent',boxShadow:isSel?`0 3px 10px ${C.nav}40`:'0 1px 4px rgba(0,0,0,0.08)'}}>
              <span style={{fontSize:9,opacity:0.7}}>{DAY_IT[d]}</span>
              <span style={{fontSize:15}}>{dates[i].getDate()}</span>
            </button>
          );})}
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{DAY_FULL[selDay]} {dates[idx]?.getDate()} {MON_IT[dates[idx]?.getMonth()]}{selDay===today&&weekOffset===0?' · Oggi':''}</div>
        {CLEANERS.map(cl=>{
          const avail=cl.days.includes(selDay);
          const tj=jobs.filter(j=>j.day===selDay&&j.cleanerIds.includes(cl.id));
          const hrs=tj.reduce((s,j)=>s+getJobDuration(j),0);
          const trained=(TRAINING[cl.id]||[]).map(pid=>PROPERTIES.find(p=>p.id===pid)?.name).filter(Boolean);
          return(
            <div key={cl.id} style={{background:C.card,borderRadius:14,padding:'13px 16px',marginBottom:8,opacity:avail?1:0.4,boxShadow:'0 1px 5px rgba(0,0,0,0.06)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:tj.length?10:5}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:'50%',background:CL_COLOR[cl.id],display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'white',fontWeight:800}}>{cl.initials}</div>
                  <div><div style={{fontWeight:800,fontSize:14,color:C.text}}>{cl.name}</div><div style={{fontSize:11,color:C.muted}}>{cl.type==='senior'?'⭐ Senior':cl.type}</div></div>

// ── PARSE AI ACTIONS ──────────────────────────────────────────────────────────
// AI embeds [AZIONI]...[/AZIONI] blocks in responses when suggesting changes.
const parseAIActions = (text) => {
  // Match complete block [AZIONI]...[/AZIONI] or incomplete [AZIONI]... (truncated)
  const fullMatch = text.match(/\[AZIONI\]([\s\S]*?)\[\/AZIONI\]/);
  const partialMatch = !fullMatch && text.match(/\[AZIONI\]([\s\S]*?)$/);
  const match = fullMatch || partialMatch;
  if (!match) return { displayText: text, suggestions: [] };
  const displayText = text.replace(/\[AZIONI\][\s\S]*$/, '').trim();
  try {
    const jsonStr = match[1].trim();
    // Try to parse as-is, or auto-close truncated JSON
    let parsed;
    try { parsed = JSON.parse(jsonStr); }
    catch {
      // Attempt to fix truncated JSON by closing open brackets
      const fixed = jsonStr + ']}]}';
      parsed = JSON.parse(fixed);
    }
    const sugs = parsed.suggestions || [];
    if(!sugs.length) return { displayText: text, suggestions: [] };
    return { displayText, suggestions: sugs };
  } catch { return { displayText: text.replace(/\[AZIONI\][\s\S]*$/, '').trim(), suggestions: [] }; }
};
